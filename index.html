    {num:2,subj:"민법",text:"권리남용에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["확정판결에 따른 강제집행도 특별한 사정이 있으면 권리남용이 될 수 있다.","주로 자기의 채무 이행만을 회피할 목적으로 동시이행항변권을 행사하는 경우에 그 항","권리남용이 인정되기 위해서는 권리행사로 인한 권리자의 이익과 상대방의 불이익 사이","권리남용이 불법행위가 되어 발생한 손해배상청구권은 1년의 단기소멸시효가 적용된다.","토지소유자의 건물 철거 청구가 권리남용으로 인정된 경우라도 토지소유자는 그 건물의"],answer:3},
    {num:3,subj:"민법",text:"제한능력자에 관한 설명으로 옳지 않은 것은?",choices:["권리만을 얻는 법률행위는 미성년자가 단독으로 할 수 있다.","미성년자가 법정대리인으로부터 허락을 얻은 특정한 영업에 관하여는 성년자와 동일한","법정대리인이 미성년자에게 한 특정한 영업의 허락을 취소하는 경우 그 취소로 선의의","제한능력자의 상대방은 계약 당시 제한능력자임을 알았을 경우에는 그 의사표시를 철회","상대방이 거절의 의사표시를 할 수 있는 경우 제한능력자를 상대로 그 의사표시를 할"],answer:2},
    {num:4,subj:"민법",text:"부재에 관한 설명으로 옳지 않은 것은?",choices:["부재자가 정한 재산관리인의 권한이 부재자의 부재 중에 소멸한 때에는 법원은 이해관","부재자가 재산관리인을 정한 경우 부재자의 생사가 분명하지 아니하게 되어 이해관계인","부재자의 생사가 분명하지 아니한 경우 부재자가 정한 재산관리인이 권한을 넘는 행위","법원이 선임한 재산관리인은 관리할 재산목록을 작성하여야 한다.","법원이 선임한 재산관리인에 대하여 법원은 부재자의 재산으로 상당한 보수를 지급할"],answer:1},
    {num:6,subj:"민법",text:"사단법인 甲의 대표자 乙이 직무에 관한 불법행위로 丙에게 손해를 가하였다. 甲의 불법행위능력(민법 제35조)에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례 에 따름)",choices:["甲의 불법행위가 성립하여 甲이 丙에게 손해를 배상하면 甲은 乙에게 구상할 수 있다.","乙이 법인을 실질적으로 운영하면서 사실상 대표하여 사무를 집행하였더라도 대표자로","甲의 불법행위책임은 그가 乙의 선임ㆍ감독에 주의를 다하였음을 이유로 면책되지 않는다.","乙의 행위가 외형상 대표자의 직무행위로 인정되는 경우라면 그것이 乙 개인의 이익만","乙이 청산인인 경우에도 甲의 불법행위책임이 성립할 수 있다."],answer:1},
    {num:7,subj:"민법",text:"법인에 관한 설명으로 옳지 않은 것은?",choices:["영리 아닌 사업을 목적으로 하는 재단은 주무관청의 허가를 얻어 이를 법인으로 할 수","법인은 그 주된 사무소의 소재지에서 설립등기를 함으로써 성립한다.","법인은 법률의 규정에 좇아 정관으로 정한 목적의 범위 내에서 권리와 의무의 주체가","재단법인의 존립시기는 정관의 필요적 기재사항이다.","재단법인의 설립자가 그 명칭만 정하지 아니하고 사망한 때에는 이해관계인 또는 검사"],answer:3},
    {num:8,subj:"민법",text:"물건에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["관리할 수 있는 자연력은 동산이다.","분묘에 안치되어 있는 선조의 유골은 그 제사주재자에게 승계된다.","금전은 동산이다.","주물을 점유에 의하여 시효취득하여도 종물을 점유하지 않았다면 그 효력은 종물에 미","권리의 과실(果實)은 민법상 과실(果實)이다."],answer:4},
    {num:9,subj:"민법",text:"반사회적 법률행위에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["형사사건의 변호사 성공보수약정은 반사회적 법률행위이다.","아버지 소유의 부동산이 이미 제3자에게 매도되어 제3자로부터 등기독촉을 받고 있는","살인을 포기할 것을 조건으로 한 증여는 반사회적 법률행위가 아니다.","부부간에 어떠한 일이 있어도 이혼하지 않겠다는 합의는 반사회적 법률행위이다.","수사기관에서 참고인으로 허위진술하는 대가로 돈을 받기로 한 약정은 반사회적 법률행"],answer:2},
    {num:10,subj:"민법",text:"甲이 乙에게 X부동산을 허위표시로 매도하고 이전등기를 해 주었다. 이에 관한 설명 으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["甲은 乙을 상대로 매매대금의 지급을 청구할 수 없다.","甲은 乙을 상대로 X부동산의 반환을 구할 수 있다.","만약 乙과 X부동산에 대해 저당권설정계약을 체결하고 저당권설정등기를 한 丙이 허위","만약 乙 명의로 등기된 X부동산을 가압류한 丙이 허위표시에 대해 선의이지만 과실이","만약 X부동산이 乙로부터 丙, 丙으로부터 丁에게 차례로 매도되어 각기 그 명의로 이전"],answer:4},
    {num:11,subj:"민법",text:"착오에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["법률행위의 내용의 중요부분에 착오가 있으면 취소할 수 있는 것이 원칙이다.","1심 판결에서 패소한 자가 항소심 판결 선고 전에 패소를 예상하고 법률행위를 하였으나","의사표시의 착오가 표의자의 중대한 과실로 발생하였으나 상대방이 표의자의 착오를 알","착오한 표의자의 중대한 과실 유무에 관한 증명책임은 의사표시를 취소하게 하지 않으","착오자의 착오로 인한 취소로 상대방이 손해를         입게 되더라도, 착오자는 불법행위로 인"],answer:1},
    {num:12,subj:"민법",text:"사기에 의한 의사표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["상대방이 기망하였으나 표의자가 기망되지 않고 의사표시를 하였다면 기망을 이유로 그","제3자가 행한 사기로 계약을 체결한 경우 상대방이 그 사실을 알았거나 알 수 있       었을","상대방의 대리인이 사기를 행하여 계약을 체결한 경우 그 대리인은 ‘제3자에 의한 사기’","상대방이 사용자책임을     져","‘제3자에 의한 사기’로 계약을 체결한 피기망자는 그 계약을 취소하지 않은 상      태에서 그"],answer:4},
    {num:13,subj:"민법",text:"대리행위에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["미성년자 甲의 법정대리인 乙이 제3자 丙의 이익만을 위한 대리행위를 하고 그 사정을","매매위임장을 제시하고 매매계약을 체결하면서 계약서에 대리인의 성명만 기재하는 경","특정한 법률행위를 위임한 경우에 대리인이 본인의 지시에 좇아 그 행위를 한 때에는","하나의 물건에 대해 본인과 대리인이 각각 계약을 체결한 경우, 대리인이 체결한 계약은","본인은 임의대리인이 제한능력자라는 이유로 대리행위를 취소할 수 있다."],answer:0},
    {num:14,subj:"민법",text:"임의대리에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["권한을 정하지 아니한 대리인은 대리의 목적물에 대해 모든 개량행위를 할 수 있다.","대리권은 그 권한에 부수하여 필요한 한도에서 상대방의 의사표시를 수령하는 수령대리","수권행위는 묵시적인 의사표시로 할 수 있다.","대리권의 존속 중 원인된 법률관계가 종료하기 전에는 본인은 수권행위를 철회할 수 있다.","대리인에 대한 성년후견의 개시는 대리권의 소멸사유이다."],answer:0},
    {num:15,subj:"민법",text:"미성년자 甲의 법정대리인 乙이 복대리인 丙을 선임한 경우에 관한 설명으로 옳지 않은 것은?",choices:["乙은 항상 복임권이 있다.","丙도 법정대리인의 지위를 가진다.","乙이 부득이한 사유로 丙을 선임한 경우라면 甲에 대하여 그 선임감독에 관한 책임이","乙이 사망한 경우 丙의     복대리인의 지위는 원칙적으로 소멸한다.","丙은 자    신이 수령한 법률행위의 목적물을 乙에게 인도할 의무가 있다."],answer:1},
    {num:17,subj:"민법",text:"권한을 넘은 표현대리(민법 제126조)에 관한 설명으로 옳지 않은 것은? (다툼이 있 으면 판례에 따름)",choices:["권한을 넘은 대리행위와 기본대리권이 반드시 동종의 것이어야 하는 것은 아니다.","대리인이 사술을 써서 대리행위의 표시를 하지 아니하고 단지 본인의 성명을 모용하여","권한을 넘은 표현대리에 관한 규정에서의 제3자에는 당해 표현대리행위의 직                 접 상대방","권한을 넘은 표현대리에 있어서 정당한 이유의 유무는 대리행위 당시를 기                준으로 하여","복임권이 없는 대리인이 선임한 복대리인의 대리권도 권한을 넘은 표현대리에서의 기본"],answer:2},
    {num:18,subj:"민법",text:"계약에 대한 무권대리에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["범죄가 되는 무권대리행위에 대하여 장기간 형사고소를 하지 아니하였다는 사실만으로","본인이 추인을 거절하더라도 상대방은 철회권을 행사할 수 있다.","본인이 무권대리행위의 일부에 대해 추인을 한 경우, 그에 대하여 상대방의 동의를 얻으","본인이 무권대리인에게 한 추인의 의사표시는 항상 효력이 없다.","무권대리인의 계약상대방에 대한 책임(민법 제135조 제1항)은 대리권의               흠결에 관하여"],answer:2},
    {num:19,subj:"민법",text:"무권대리와 표현대리에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["유권대리에 관한 주장 속에는 무권대리에 속하는 표현대리의 주장이 포함되어 있다고","표현대리가 성립하는 경우, 상대방에게 과실이 있어도 과실상계의 법리를 유추적용하여","대리행위가 강행법규 위반으로 무효인 경우 표현대리 법리가 적용되지 않는다.","상대방은 계약 당시에 대리인에게 대리권이 없음을 안 때에는 계약을 철회할 수 없다.","제한능력자인 무권대리인은 민법 제135조 제1항에 따라 계약을 이행할 책임 또는 손해"],answer:4},
    {num:20,subj:"민법",text:"법률행위의 무효에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["법률행위의 일부분이 무효이면 그 일부분만 무효로 되는 것이 원칙이다.","의사무능력을 이유로 법률행위가 무효인 경우 의사무능력자는 이익의 현존여부를 불         문","무효인 법률행위에 대해 당사자가 무효임을 알고 추인하면 그 법률행위는 소급하여 유","불공정한 법률행위로서 무효인 경우 그 무효인 법률행위는 추인에 의하여 유효로 될 수","반사회적 법률행위로서 무효인 경우 그 무효로 선의의 제3자에게 대항할 수 없다."],answer:3},
    {num:21,subj:"민법",text:"법률행위의 취소에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["제한능력자도 단독으로 취소권을 행사할 수 있다.","법률행위의 취소로 무효가 된 그 법률행위는 무효행위의 추인의 법리에 따라 추인할 수","근로계약이 취소된 경우 이미 제공된 근로자의 노무를 기초로 형성된 취소 이전의 법률","취소권자가 추인할 수 있은 후에 이의를 보류한 상태에서 취소할 수 있는 계약을 이행","계약이 해제된 후에도 해제의 상대방은 해제로 인한 불이익을 면하기 위하여 취소권을"],answer:1},
    {num:22,subj:"민법",text:"기간에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["계약 기간의 기산점을 오는 7월 1일부터 기산하여 주(週)로 정한 때에는 기간의 초일은","기간을 시(時)로 정한 때에는 즉시로부터 기산한다.","기간을 월(月)로 정한 경우에 최종의 월에 해당일이 없는 때에는 그 월의 말일로 기간이","기간의 말일이 토요일 또는 공휴일에 해당한 때에는 기간은 그 익일로 만료한다.","정년이 60세라 함은 만 60세에 도달하는 날을 말하는 것이라고 보는 것이 상당하다."],answer:0},
    {num:23,subj:"민법",text:"소멸시효에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["시효기간 만료로 인한 권리의 소멸은 시효의 이익을 받은 자가 시효완성의 항변을 하지","시효를 원용할 수 있는 사 은 권리의 소멸에 의하여 직           접 이익을 받는 사람에 한정된다.","시효가     완성된 채권의 시효이익을 채무자가 포기하면 포기한 때로부터 그 채권의 시효","시효는 법률행위에 의하여 이를 배제하거나 경감할 수 없다.","시효는 그 기산일에 소급하여 효력이 생 긴다."],answer:3},
    {num:24,subj:"민법",text:"소멸시효에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["채권 및 소유권 이외의 재산권은 10년간 행사하지 아니하면 시효가 완성한다.","점유권은 시효에 걸리지 아니한다.","시효는 권리행사에 법률상의 장애사유가 없는 때로부터 진행한다.","정지조건부 권리는 조건이 성취된 때부터 시효가 진행된다.","부작위를 목적으로 하는 채권의 시효는 위반행위를 한 때로부터 진행한다."],answer:0},
    {num:25,subj:"민법",text:"소멸시효의 중단에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["채무자가 제기한 소에 대하여 채권자가 응소하여 그 소송에서 적극적으로 권리를 주장","시효 성 전에 한 채무의 일부변제는 특별한 사정이 없는 한 시효중단사유가 될 수 있다.","현존하지 않는 장","임의출석의 경우에 화해가 성립되지 아니한 때에는 1월내에 소를 제기하지 아니하면 시","시효의 중단은 당사자      및 그 승계인 사이에만 효력이 있는 것이 원칙이다."],answer:2},
    {num:28,subj:"행정법",text:"행정입법에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["재량준칙은 일반적으로 행정조직 내부에서만 효력을 가질 뿐 대외적인 구속력을 갖는","재량권 행사의 준칙인 행정규칙이 정한 바에 따라 되풀이 시행되어 행정관행이 형성되","법원이 구체적 규범통제를 통해 위헌․위법으로 선언할 심판대상은 원칙적으로 해당 규","헌법이 인정하고 있는 위임입법의 형식은 예시적인 것으로 보아야 한다.","보건복지부 고시인 약제급여․비급여목록 및 급여상한금액표에 대해서는 취소소송으로"],answer:2},
    {num:29,subj:"행정법",text:"재량행위와 기속행위에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["공유수면 관리 및 매립에 관한 법률상 공유수면 점용허가는 기속행위이다.","재외동포에 대한 사증발급과 관련한 재량권 불행사는 그 자체로 재량권 일탈․남용에","국토의 계획 및 이용에 관한 법률에 의하여 지정된 도시지역 안에서 토지의 형질변경행","법령상 감경사유가 있는 경우 이를 전혀 고려하지 않은 과징금 부과처분은 위법하다.","행정청이 제재처분 양정을 하면서 이익형량을 하였다면 그 양정에 정당성․객관성이 결"],answer:3},
    {num:30,subj:"행정법",text:"A시장은 甲소유 토지의 일부를 기부채납하는 조건(강학상 부담으로 본다)으로 甲이 신청한 개발제한구역 내의 토지형질변경행위허가를 한 후 甲과 기부채납 이행을 위 한 증여계약을 체결하였다. 이에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판 례에 따름)",choices:["甲이 기부채납을 불이행할 경우, A시장은 토지형질변경행위허가를 철회할 수 있다.","甲은 기부채납의 부관만을 대상으로 하여 취소소송을 제기할 수 있다.","기부채납의 부관이 당연무효이거나 취소되지 아니한 이상 甲은 위 부관으로 인한 증여","토지형질변경행위허가를 함에 있어 부관을         붙일 필요가 있는지의 유무 등을 판단함에","A시장은 토지형질변경행위허가를 한 후에는 甲의 동의가 있는 경우라도 부관을         새로 붙"],answer:4},
    {num:32,subj:"행정법",text:"처분의 취소 또는 변경에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["처분의 위법은 직권취소의 사유가 되지만, 처분의 부당은 직권취소의 사유가 되지 않는다.","수익적 처분의 직권취소 필요성에 관한 증명책임은 처분의 상대방에 있다.","수익적 처분에 대한 직권취소의 경우에는 행정절차법상 사전             통지가 필요하지 않다.","행정청은 행정소송이 계속되고 있는 때에는 직권으로 해당 처분을 변경할 수 없다.","산업재해보상보험법상 연금지급결정을 취소하는 처분이 적법하다고 하여 그에 터 잡은"],answer:4},
    {num:33,subj:"행정법",text:"A시는 조례에 근거하여 甲회사와 생활폐기물수집․운반대행위탁계약을 체결하였다. 이 계약에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["사법상 계약으로 계약자유의 원칙이 적용된다.","국가를 당사자로 하는 계약에 관한 법률이 적용된다.","계약의 체결에 관한 다툼은 공법상 당사자소송에 의한다.","계약절차에는 행정절차법이 적용된다.","계약의 해지   통보에 관한 다툼은 취소소송에 의한다."],answer:0},
    {num:34,subj:"행정법",text:"행정절차법이 정하고 있는 적용제외 대상이 아닌 것은?",choices:["국가안전보장ㆍ국방ㆍ외교 또는 통일에 관한 사항 중 행정절차를 거칠 경우 국가의 중","감사원이 감사위원회의의 결정을 거쳐 행하는 사항","심사청구, 해양안전심판, 조세심판, 특허심판, 행정심판, 그 밖의 불복절차에 따른 사항","국회 또는 지방의회의 의결을 거치거나 동의 또는 승인을 받아 행하는 사항","처분의 전제가 되는 사실이 경찰의 수사에 의하여 객관적으로 증명된 사항"],answer:4},
    {num:35,subj:"행정법",text:"행정절차법상 처분절차에 관한 설명으로 옳지 않은 것은?",choices:["처분을 할 때 해당 처분의 영향이 광범위하여 널리 의견을 수렴할 필요가 있다고 행정","행정청은 인허가 등의 취소 시 의견제출기한 내에 당사자등의 신청이 있는 경우에는 청","청문ㆍ공청회 또는 의견제출을 거쳤을 때에는 신속히 처분하여 해당 처분이 지연되지","행정청은 처분을 할 때에는 이해관계인에게 그          근거와 이유를 제시하여야 한다.","행정청은 처분을   신속히 처리할 필요가 있거나 사안이 경미한 경우에는 말 또는 그             밖"],answer:3},
    {num:36,subj:"행정법",text:"공공기관의 정보공개에 관한 법률에 관한 설명으로 옳은 것은? (다툼이 있으면 판례 에 따름)",choices:["국내에 학술ㆍ연구를 위하여 일시적으로 체류하는 외국인은 정보공개를 청구할 권리가 없다.","공개 청구한 정보가 비공개대상인 부분과 공개 가능한 부분이 혼합되어 있는 경우 부분","사립대학교는 정보공개의무를 지는 공공기관에 해당하지 않는다.","정보공개를 요구받은 공공기관이 공개를 거부하는 경우에는 비공개사유에 해당하는지를","청구인은 공공기관의 비공개 결정에 대하여 불복이 있는 경우 이의신청 절차를 거치지"],answer:3},
    {num:38,subj:"행정법",text:"행정대집행법상 대집행에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["철거대집행 계고처분 후 행한 제2차 계고는 대집행기한의 연기통지가 아니라 새로운 철","철거명령과 계고처분은 계고서라는 명칭의 1장의 문서로 이루어질 수 있다.","대집행은 처분청 스스로 하여야 하며, 대집행 권한을 제3자에게 위임․위탁할 수 없다.","후행처분인 대집행영장발부통보처분의 취소소송에서, 선행처분인 계고처분의 위법을 이","행정청이 대집행의 방법으로 건물철거의무의 이행을 실현할 수 있는 경우, 건물철거 대"],answer:1},
    {num:39,subj:"행정법",text:"행정의 실효성 확보수단에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["건축법상 이행강제금 부과처분은 항고소송으로 다툴 수는 없다.","이행강제금은 대체적 작위의무의 위반에 대하여 부과될 수 없다.","건 법상 이행강제금의 납부의무는 상속인에게 승계될 수 없는 일신전속적인 성질의 것이다.","대집행에 요한 비용은 국세징수법의 예에 의하여 징수할 수 없다.","병무청장이 병역법에 따라 병역의무 기피자의 인적사항을 인터넷 홈페이지에 공개하는"],answer:2},
    {num:40,subj:"행정법",text:"행정권한의 위임 등에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정권한의 위임은 법률에 규정된 행정기관의 장의 권한 중 일부를 그 보조기관 또는","행정권한의 내부위임은 법률이 위임을 허용하고 있지 아니한 경우에도 행정관청의 내부","위임기관은 수임기관의 수임사무 처리에 대하여 지휘ㆍ감독하고, 그 처리가 위법하거나","수임사무의 처리에 관하여 위임기관은 수임기관에 대하여 사전승인을 받거나 협의를 할","행정기관은 위임을 받은 사무의 전부 또는 일부를 보조기관 또는 하급행정기관에 재위"],answer:4},
    {num:41,subj:"행정법",text:"행정기관에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["법령에 따라 행정권한을 위탁받은 사인은 행정청이 될 수 없다.","행정에 관한 의사를 결정하여 표시하는 국가 또는 지방자치단체의 기관은 행정청이다.","지방자치단체는 그 소관 사무의 일부를 독립하여 수행할 필요가 있으면 법령이나 그 지","행정기관의 장은 소관사무를 통할하고 소속공무원을 지휘ㆍ감독한다.","정부조직법은 합의제행정기관의 설치에 관한 법적 근거를 두고 있다."],answer:0},
    {num:44,subj:"행정법",text:"행정심판법에 관한 설명으로 옳은 것은?",choices:["행정심판위원회는 당사자의 동의가 없더라도 심판청구의              신속하고 공정한 해결을 위하","행정심판위원회는 사정재결시 그 재결의 주 에서 그 처분 또는 부작위가 위법하거나 부","집행정지로 목적을  달성할 수 있는 경우에도 임시처분이 허용된다.","처분청이 심판청구기간을 법정기간보다 긴 기간으로 잘못 고지한 경우, 심판청구기간은","행정심판위원회는 심판청구의 대상이 되는 처분보다 청구인에게 불리한 재결을 할 수"],answer:1},
    {num:45,subj:"행정법",text:"공익사업을 위한 토지 등의 취득 및 보상에 관한 법률에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["사업인정처분이 당연무효이면 그것이 유효함을 전제로 이루어진 수용재결도 무효이다.","수용재결에 대한 이의신청은 행정소송을 하기 위한 필수적인 전심절차이다.","수용재결에 대한 취소소송의 제기는 사업의 진행 및 토지의 수용 또는 사용을 정지시키","토지소유자가 보상금 증 액청구소송을 제기할 경우 사업시행자를 피고로 하여야 한다.","보상금증감청구소송의 제기기간은 이의신청을 거친 경우 이의신청에 대한 재결서를 받"],answer:1},
    {num:46,subj:"행정법",text:"국가배상법 제2조 제1항 단서의 이중배상금지에 관한 설명으로 옳지 않은 것은? (다 툼이 있으면 판례에 따름)",choices:["피해자가 군인ㆍ군무원ㆍ경찰공무원 또는 예비군대원이어야 한다.","병역법상 공익근무요원은 군인에 해당하여 이중배상이 금지되는 자에 속한다.","전투ㆍ훈련 또는 이에 준하는 직무집행 뿐만 아니라 일반 직무집행에 관하여도 적용된다.","전투훈련 중 민간인이 군인과 공동불법행위를 한 경우 민간인은 자신의 부담 부분만을","전투ㆍ훈련 등 직무집행과 관련하여 전사ㆍ순직하거나 공상을 입은 손해에 한한다."],answer:1},
    {num:47,subj:"행정법",text:"신청에 대한 거부처분에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["거부처분은 당사자의 권익을 제한하는 처분에 해당하므로 원칙적으로 행정절차법상 사","거부처분에 대하여는 행정소송법상 집행정지를 구할 이익이 있어 집행정지가 허용된다.","거부처분의 취소판결의 취지에 따라 행정청이 처분을 하지 않는 경우, 당사자는 수소법","거부처분이 성립되려면    신청인에게 그 행위발동을 요구할 법규상 또는 조리상 신청권이","거부처분에 대하여는 행정소    송법상 명문의 규정으로 의무이행소송이 허용된다."],answer:3},
    {num:48,subj:"행정법",text:"지방자치법상 주민소송에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["주민소송을 제기하기 전에 주민감사청구를 거쳐야 한다.","지방의회의원에게 손해배상청구를 할 것을 요구하는 주민소송은 인정되지 않는다.","공금의 부과ㆍ징수 업무를 게을리한 사실의 위법 확인을 요구하는 주민소송은 인정된다.","행정처분인 해당 행위의 취소를 요구하는 주민소송은 인정된다.","주민소송의 대상이 되는 위법한 행위나 해태사실은 감사청구한 사항과 동일할 필요는"],answer:1},
    {num:49,subj:"행정법",text:"국가공무원법상 징계처분과 소청 등에 관한 설명으로 옳지 않은 것은? (다툼이 있으 면 판례에 따름)",choices:["공무원에 대한 직위해제처분은 징계처분이다.","직위해제처분과 그 후속 직권면직처분은 별개 독립의 처분으로 일사부재리원칙에 위배","소청심사위원회가 소청 사건을 심사할 때 소청인에게 진술 기회를 주지 아니한 결정은","소청심사위원회의 결정은 처분 행정청을 기  속한다.","소청심사위원회의 결정은 그 이유를 구체적으로 밝힌 결정서로 하여야 한다."],answer:0},
    {num:50,subj:"행정법",text:"국유재산법에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정재산의 사용허가기간은 원칙상 5년 이내로 한다.","일반재산은 민법상 시효취득의 대상이 되지 아니한다.","행정재산에는 사권을 설정하지     못한다.","보존용재산은 법령이나 그 밖의 필요에 따라 국가가 보존하는 재산이다.","중앙관서의 장은 사용허가한 행정재산을 국가가 직접 공용으로 사용하기 위하여 필요하게"],answer:1},
    {num:52,subj:"행정학개론",text:"미국 행정학의 형성과 발달과정에 관한 설명으로 옳지 않은 것은?",choices:["1883년 제정된 펜들턴법(Pendleton Act)에 의해 엽관제 인사제도가 도입되었다.","1887년 윌슨(W. Wilson)은 “행정의 연구(The Study of Administration)”에서 행정의 본","1920년대에서 1930년대에 걸쳐 능률에 기초한 관리를 주장하는 정통 행정학의 모습을","1930년대 이후 등장한 정치행정일원론은 행정의 정책형성 기능을 중시하였다.","1940년대 이후 행태주의는 행정학의 과학화를 위하여 사실판단적인 것만을 연구대상으"],answer:0},
    {num:53,subj:"행정학개론",text:"신공공서비스론에 관한 설명으로 옳은 것은?",choices:["행정의 민주성 보다는 시장논리에 따라 생산성이나 효율성을 강조한다.","관료는 사회문제를 해결하는 과정에서 협상과 중재 기능을 담당한다.","공익을 행정활동으로 생성되는 부산물로 간주한다.","기업가적 목표달성을 위한 광범위한 행정재량을 인정한다.","상명하복하는 관료적 조직구조와 고객에 대한 규제와 통제를 선호한다."],answer:1},
    {num:54,subj:"행정학개론",text:"행정이론에 관한 설명으로 옳지 않은 것은?",choices:["신행정론은 관료들이 정책결정을 해야만 한다는 적극적 정치행정일원론을 주장한다.","공공선택이론은 집권적 관료제가 공공서비스를 제공하는데 있어서 유일한 최선의 방안","포 스트","신공공관리론은 고객의 개인적 이익이 아닌 시민 전체로서의 공익에 대한 책임성과 대","신제도주의 이론은 제도가 개인행위를 제약하지만, 개인 간 상호작용의 결과로 제도가"],answer:3},
    {num:56,subj:"행정학개론",text:"내부고발에 관한 설명으로 옳지 않은 것은?",choices:["내부고발의 대상은 일반적으로 조직 내에서 행해진           비윤리적 행위이다.","내부고발의 대상이 되는     문제를 조직 내에서 해결할 장치가 없거나 제대로 작동되지 않","내부고발은 조직 내부의 비리를 대외적으로 폭로하는 외부적 행위이다.","내부고발제 실시로 조직 내에서 부패에 대한 경각심 확대와 부패 억제 효과가 기대된다.","현재 우리나라에는 내부고발자를 보호하는 관련 법률이 없다."],answer:4},
    {num:57,subj:"행정학개론",text:"정책평가에 관한 설명으로 옳지 않은 것은?",choices:["총괄평가는 정책집행이 이루어지는 과정을 평가하는 활동으로 형성평가라고도 한다.","정책평가의 외적 타당성은 정책평가 결과의 일반화 가능성을 의미한다.","정책평가의 내적 타당성은 정책이 집행된 이후에 나타나는 변화가 정책에 기인한 것인","정책평가의 신뢰도는 동일한 측정도구를 반복해서 사용했을 때 동일한 결과를 얻을 확","정책평가의 내적 타당성을 저해하는 요인으로 선정요인, 성숙요인, 역사요인 등을 들 수"],answer:0},
    {num:58,subj:"행정학개론",text:"정책의제설정에 관한 설명으로 옳지 않은 것은?",choices:["공중의제는 사회문제 혹은 사회적 쟁점이 한 단계 더 나아가 일반 공중의 주목을 받게","외부주도형은 공중의제화를 억제하기 때문에 일종의 음모형에 해당한다.","동원형은 사회문제가 정부의제로 먼저 채택되고, 정부의 의도적인 노력에 의해서 공중의","내부접근형은 선진국의 경우, 특수 이익집단이 비밀리에 정부의 혜택을 보려는 외교ㆍ국","위기나 재난 등 극적 사건은 사회문제를 정부의제화 시키는 점화장치에 해당된다."],answer:1},
    {num:59,subj:"행정학개론",text:"정책집행연구 중 하향적 접근방법에 관한 설명으로 옳지 않은 것은?",choices:["집행에 영향을 주는 집행관료와 이해관계집단 등 다양한 행위자들의 생각과 상호작용을","정책집행을 정책결정과정에서 채택된 정책목표를 달성하는 과정으로 본다.","바람직한 정책집행이 일어날 수 있는 규범적 처방을 정책결정자에게 제시해주는데 관심","유능하고 헌신적인 관료가 집행을 담당하여야 효과적인 정책집행이 가능하다고 한다.","효과적인 정책집행을 위하여 조직화된 이익집단, 강력한 리더십 등이 있어야 한다고 한다."],answer:0},
    {num:61,subj:"행정학개론",text:"허즈버그(F. Herzberg)의 동기ㆍ위생 2요인이론에 관한 설명으로 옳은 것은?",choices:["인간의 욕구를 계층적 구조로 나누어 설명한다.","하위계층의 욕구가 충족되어야 상위계층의 욕구가 나타나기 시작한다.","모든 욕구는 충족되면 동기부여로 이어진다.","동기요인에는 보수, 신분보장, 작업조건, 대인관계 등이 포함된다.","위생요인은 주로 생리적 욕구, 안전욕구 등을 만족시키는 요인들이다."],answer:4},
    {num:62,subj:"행정학개론",text:"인간관계론에 관한 설명으로 옳지 않은 것은?",choices:["비공식적 집단의 역할을 강조한다.","메이요(E. Mayo)의 호손(Hawthorne) 실험은 인간관계론의 형성에 영향을 주었다.","인간을 생존에 대한 기본적인 욕구에 의해 동기 부여되는 것으로 본다.","과학적 관리론과 마찬가지로 생산성 향상을 추구한다.","작업환경이나 물리적 조건보다 조직구성원의 사회심리적 요인을 중시한다."],answer:2},
    {num:63,subj:"행정학개론",text:"행정조직에 관한 설명으로 옳은 것은?",choices:["위원회 조직은 결정권한의 최종 책임이 기관장 한 사람에게 집중되어 있는 조직이다.","방송통신위원회, 공정거래위원회와 같은 행정위원회는 결정권한을 갖고 있으며 집행까지","책임운영기관은 중 앙통제 중심의 관료제적 성격을 갖는 조직으로 실제 일을 맡아 집행","책임운영기관은 수익성보다는 정부기능이 갖고 있는 공익성만을 강조하며, 효율성보다는","애드호크라시는 현대의 복잡하고 불확실한 환경에서 발생하는 문제에 신속하게 대응하"],answer:1},
    {num:65,subj:"행정학개론",text:"인사행정제도에 관한 설명으로 옳지 않은 것은?",choices:["실적제는 개인의 객관적인 능력ㆍ자격ㆍ성적을 기준으로 공무원을 임용하는 제도이다.","직업공무원제도는 계급제, 일반능력자 중심의 임용, 신분보장 등을 토대로 한다.","계급제는 직무를 기준으로 직무의 난이도와 책임도에 따라 직위를 분류하는 제도이다.","엽관제는 정당에 대한 공헌도와 충성심에 입각하여 공무원을 임용하는 제도이다.","대표관료제는 국민에 대한 대응성과 공직 임용의 사회적 형평성을 제고시키려는 목적을"],answer:2},
    {num:66,subj:"행정학개론",text:"국가공무원법상 우수 공무원으로 특별승진임용하거나 일반 승진시험에 우선 응시하게 할 수 있는 경우에 해당하지 않는 것은?",choices:["청렴하고 투철한 봉사 정신으로 직무에 모든 힘을 다하여 공무 집행의 공정성을 유지하고","공무원으로 10년 이상 근속하고, 정년 전에 스스로 퇴직 할 때","직무수행 능력이 탁월하여 행정 발전에 큰 공헌을 한 자","제안제도의 운영에 있어서 제안의 채택ㆍ시행으로 국가 예산을 절감하는 등 행정 운영 발","재직 중 공적이 특히 뚜렷한 자가 공무로 사망한 때"],answer:1},
    {num:69,subj:"행정학개론",text:"특별회계제도에 관한 설명으로 옳은 것은?",choices:["예산집행부서의 재량을 억제하여 책임성을 제고시킨다.","예산단일의 원칙을 준수하는데 유리하다.","대통령령으로 설치된다.","예산통일의 원칙이 적용되는 제도이다.","예산제도가 복잡해지므로 국가재정의 통합적 관리를 어렵게 한다."],answer:4},
    {num:70,subj:"행정학개론",text:"지방자치단체의 자치권에 관한 설명으로 옳은 것은?",choices:["자치권은 원칙적으로 해당 자치단체의 관할구역 안에 있는 재화ㆍ물자를 제외한 모든","국권설은 프랑스의 지방권 사상을 기초로 확립되었다.","고유권설은 자치권을 인간의 자연권과 마찬가지로 본래적이고 침해할 수 없는 고유한","중앙정부의 전제적 군주정치가 대의제 민주정치로 대체됨에 따라 제도적 보장설의 논거","제도적 보장설에서 보장이란 헌법으로 지방자치제도를 보장한다는 것이 아니라, 개별적"],answer:2},
    {num:72,subj:"행정학개론",text:"현재 우리나라의 지방재원에 관한 설명으로 옳은 것은?",choices:["지방교부세는 과세용도에 따라 보통세와 목적세로 나눈다.","세외수입은 재원의 성격상 의존재원이다.","국고보조금은 재원의 성격상 자체재원이다.","특정재원과 달리 일반재원은 지방자치단체가 어떠한 경비로도 자유롭게 지출할 수 있는","지방세 수입에는 사용료, 수수료, 재산임대수입 등이 있다."],answer:3},
    {num:73,subj:"행정학개론",text:"전자정부법상 ( ㄱ )과 ( ㄴ )에 들어갈 용어로 옳은 것은? ○ ( ㄱ )(이)란 행정기관 등이 보유하고 있는 행정정보, 전자적 수단에 의하여 행 정정보의 수집ㆍ가공ㆍ검색을 하기 쉽게 구축한 정보시스템, 정보시스템의 구축 에 적용되는 정보기술, 정보화예산 및 정보화인력 등을 말한다. ○ ( ㄴ )(이)란 전기통신기본법 제2조제2호에 따른 전기통신설비를 활용하거나 전기통신설비와 컴퓨터 및 컴퓨터 이용기술을 활용하여 정보를 수집ㆍ가공ㆍ저 장ㆍ검색ㆍ송신 또는 수신하는 정보통신체제를 말한다. ※ 전기통신기본법 제2조제2호에 따른 전기통신설비라 함은 전기통신을 하기 위한 기 계ㆍ기구ㆍ선로 기타 전기통신에 필요한 설비를 말한다. :",choices:["ㄱ 정보자원              : 통신망","ㄱ: 정보자원            ㄴ: 정보기술아키텍처","ㄱ: 정보시스템감리         ㄴ: 정보통신망","ㄱ: 정보시스템감리         ㄴ: 정보기술아키텍처","ㄱ: 정보기술아키텍처        ㄴ: 정보통신망"],answer:0},
    {num:74,subj:"행정학개론",text:"우리나라의 행정개혁에 관한 설명으로 옳지 않은 것은?",choices:["제2공화국에서는 경찰중립화를 위해 공안위원회와 감찰위원회가 구성ㆍ운영되었다.","제3공화국의 행정개혁은 행정개혁조사위원회에 의해 추진되었다.","제4공화국의 행정개혁은 서정쇄신운동의 일환으로 전개되었다.","김영삼정부에서는 행정절차법과 공공기관의 정보공개에 관한 법률을 제정해 행정의 투","김대중정부에서는 행정개혁을 위해 정부혁신추진위원회를 설치하였다."],answer:0},
  ],
  "2022": [
    {num:1,subj:"민법",text:"민법의 법원(法源)에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["헌법에 의하여 체결․공포된 민사에 관한 조약은 민법의 법원(法源)이 될 수 있다.","관습법은 헌법재판소의 위헌법률심판의 대상이 아니다.","관습법의 존재는 특별한 사정이 없으면 당사자의 주장․증명을 기다릴 필요 없이 법원이","사실인 관습은 법원(法源)으로서 법령에 저촉되지 않는 한 법칙으로서의 효력이 있다.","공동선조와 성과 본을 같이 하는 후손은 성별의 구별 없이 성년이 되면 당연히 종중의"],answer:[1,3]},
    {num:2,subj:"민법",text:"신의칙에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["신의칙에 반하는 것은 강행규정에 위반하는 것이므로 당사자의 주장이 없더라도 법원이","법정대리인의 동의 없이 신용구매계약을 체결한 미성년자가 나중에 법정대리인의 동의","무권대리인이 본인을 단독상속한 경우, 본인의 지위에서 자신이 한 무권대리행위의 추인을","병원은 입원환자의 휴대품 등의 도난을 방지하기 위하여 필요한 적절한 조치를 강구하여","채권자가 유효하게 성립한 계약에 따른 급부의 이행을 청구하는 경우, 법원이 신의칙에"],answer:1},
    {num:3,subj:"민법",text:"부재와 실종에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["부재자로부터 재산처분권을 위임받은 재산관리인은 그 재산을 처분함에 있어 법원의","법원이 선임한 부재자 재산관리인의 권한초과행위에 대한 법원의 허가 결정은 기왕의","법원은 법원이 선임한 부재자 재산관리인으로 하여금 부재자의 재산관리 및 반환에","실종선고를 받은 자는 실종기간이 만료된 때에 사망한 것으로 본다.","부재자의 제1순위 상속인이 있는 경우, 제2순위 상속인은 특별한 사정이 없는 한 부재자에"],answer:1},
    {num:4,subj:"민법",text:"후견에 관한 설명으로 옳지 않은 것은?",choices:["가정법원은 성년후견개시의 심판을 할 때 본인의 의사를 고려하여야 한다.","가정법원이 피성년후견인에 대하여 한정후견개시의 심판을 할 때에는 종전의 성년후견의","피성년후견인의 법률행위는 원칙적으로 취소할 수 있지만, 가정법원은 취소할 수 없는","가정법원은 피한정후견인이 한정후견인의 동의를 받아야 하는 행위의 범위를 정할 수","가정법원은 정신적 제약으로 특정한 사무에 관하여 후원이 필요한 자에 대하여는 본"],answer:4},
    {num:5,subj:"민법",text:"민법상 법인에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["재단법인의 기본재산을 새롭게 편입하는 행위는 주무관청의 허가를 받지 않아도 유효하다.","재단법인의 감사는 민법상 필수기관이다.","사단법인의 사원권은 정관에 정함이 있는 경우 상속될 수 있다.","사단법인이 정관에 이사의 대표권에 관한 제한을 규정한 경우에는 이를 등기하지 않더","이사 전원의 의결에 의하여 잔여재산을 처분하도록 한 사단법인의 정관 규정은 성질상"],answer:2},
    {num:7,subj:"민법",text:"민법상 법인의 해산과 청산에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["해산한 법인은 청산의 목적범위 내에서만 권리가 있고 의무를 부담한다.","사단법인 총회의 해산결의는 정관에 다른 규정이 없는 한 총사원의 4분의 3 이상의 동의가","민법상 청산절차에 관한 규정에 반하는 잔여재산의 처분행위는 특별한 사정이 없는 한","청산 중의 법인은 변제기에 이르지 아니한 채권에 대해서도 변제할 수 있다.","법인의 청산인은 채권신고기간 내에는 채권자에 대하여 변제하지 못하므로 법인은 그"],answer:4},
    {num:8,subj:"민법",text:"물건에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["주물의 소유자의 상용에 공여되고 있더라도 주물 자체의 효용과 관계가 없는 물건은","원본채권이 양도되면 특별한 사정이 없는 한 이미 변제기에 도달한 이자채권도 당연히","주물을 처분할 때 종물을 제외하거나 종물만을 별도로 처분하는 특약은 무효이다.","피상속인이 유언으로 자신의 유골의 매장장소를 지정한 경우, 제사주재자는 피상속인의","‘종물은 주물의 처분에 따른다’고 규정한 민법 제100조 제2항의 ‘처분’에는 공법상 처분은"],answer:0},
    {num:9,subj:"민법",text:"임의대리권의 범위에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["임의대리권의 범위는 원칙적으로 수권행위에 의하여 정해진다.","특별한 사정이 없는 한 통상의 임의대리권은 필요한 한도에서 수령대리권을 포함한다.","매도인으로부터 매매계약체결에 대한 대리권을 수여받은 자는 특별한 사정이 없는 한","매도인으로부터 매매계약의 체결과 이행에 대해 포괄적인 대리권을 수여받은 자는 특별한","부동산을 매수할 권한을 수여받은 자는 원칙적으로 그 부동산을 처분할 권한이 없다."],answer:3},
    {num:10,subj:"민법",text:"의사표시에 관한 설명으로 옳지 않은 것은?",choices:["청약의 의사표시는 그 표시가 상대방에게 도달한 때에 그 효력이 생긴다.","의사표시자가 청약의 의사표시를 발송한 후 사망하였다면, 그 의사표시는 처음부터 무효인","행위능력을 갖춘 미성년자에게는 특별한 사정이 없는 한 의사표시의 수령능력이 인정된다.","표의자가 과실없이 상대방을 알지 못하는 경우, 민사소송법 공시송달의 규정에 의하여","의사표시의 상대방이 의사표시를 받은 때에 제한능력자인 경우, 특별한 사정이 없는 한"],answer:1},
    {num:11,subj:"민법",text:"대리에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["대리인은 행위능력자임을 요하지 아니한다.","사실상의 용태에 의하여 대리권의 수여가 추단될 수 있다.","임의대리의 원인된 법률관계가 종료하기 전이라도 본인은 수권행위를 철회할 수 있다.","수권행위에서 권한을 정하지 아니한 대리인은 보존행위만을 할 수 있다.","복대리인은 본인의 대리인이다."],answer:3},
    {num:12,subj:"민법",text:"무권대리행위에 대한 본인의 추인에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["추인은 무권대리인의 동의가 있어야 유효하다.","추인은 무권대리인이 아닌 무권대리행위의 상대방에게 하여야 한다.","무권대리행위가 범죄가 되는 경우, 본인이 그 사실을 알고 장기간 형사고소를 하지 않았","추인은 무권대리행위가 있음을 알고 하여야 한다.","무권대리행위의 일부에 대한 추인은 상대방의 동의가 없더라도 유효하다."],answer:3},
    {num:13,subj:"민법",text:"불공정한 법률행위에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["불공정한 법률행위는 원칙적으로 추인에 의해서 유효로 될 수 없다.","궁박은 경제적 원인에 기인하는 것을 말하며, 심리적 원인에 기인할 수 없다.","특별한 사정이 없는 한 경솔ㆍ궁박은 본인을 기준으로 판단하고, 무경험은 대리인을","법률행위가 현저하게 공정성을 잃은 경우, 그 법률행위 당사자의 궁박ㆍ경솔ㆍ무경험은","불공정한 법률행위에는 무효행위의 전환에 관한 민법 제138조는 적용되지 않는다."],answer:0},
    {num:14,subj:"민법",text:"사기에 의한 의사표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["광고에 있어 다소의 과장은 일반 상거래의 관행과 신의칙에 비추어 시인될 수 있는 한","부작위에 의한 기망행위에서 고지의무는 조리상 일반원칙에 의해서는 인정될 수 없다.","사기에 의한 의사표시가 인정되기 위해서는 의사표시자에게 재산상의 손실을 주려는 사","기망행위로 인하여 법률행위의 내용으로 표시되지 않은 동기에 관하여                 착오를 일으킨","사기에 의한 의사표시의 취소는 선의의 제3자에게 대항하지 못한다."],answer:1},
    {num:16,subj:"민법",text:"착오로 인한 의사표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["법률행위 내용의 중요부분에 착오가 있는 경우, 그 착오가 표의자의 중과실로 인한 것이","표의자는 자신에게 중과실이 없음에 대한 주장ㆍ증명            책임을 부담한다.","착오로 인한 의사표시에 관한 민법 제109조 제1항의 적용은 당사자의 합의로 배제할 수","착오로 인하여 표의자가 경제적 불이익을 입지 않았다면 이는 법률행위 내용의 중요","표의자가 장래에 있을 어떤 사항의 발생이 미필적임을 알아 그 발생을 예기한 데 지나지"],answer:1},
    {num:18,subj:"민법",text:"법률행위의 부관에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["상계의 의사표시에는 원칙적으로 조건을 붙일 수 있다.","조건부 법률행위에서 조건의 내용자체가 불법적이어서 무효인 경우, 원칙적으로 그 조건","해제조건부 법률행위의 조건이 불능조건인 경우, 그 법률행위는 무효이다.","시기(","기한은 특별한 사정이 없는 한 채무자의 이익을 위한 것으로 추정한다."],answer:4},
    {num:19,subj:"민법",text:"법률행위의 무효에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["진의 아닌 의사표시는 원칙적으로 무효이다.","법률행위가 무효와 취소사유를         모두 포함하고 있는 경우, 당사자는 취소권이 있더라도","법률행위의 무효는 제한능력자,         착오나 사기․강박에 의하여 의사표시를 한 자, 그의","타인의 권리를 목적으로 하는 매매계약은 특별한 사정이 없는 한 유효하다.","무효인 법률행위는 추인할 수 있는 날로부터 3년, 법률행위를 한 날로부터 10년 이후에는"],answer:3},
    {num:20,subj:"민법",text:"취소할 수 있는 법률행위의 법정추인에 해당하지 않는 것은? (다툼이 있으면 판례에 따름)",choices:["취소할 수 있는 행위로부터 생긴 채무의 이행을 위해 취소권자가 상대방에게 일부 이행을","취소할 수 있는 행위로부터 생긴 채무의 이행을 위해 취소권자가 상대방에게 이행을","취소할 수 있는 행위로부터 생긴 채무의 이행을 위해 취소권자가 상대방에게 저당권을","취소권자가 취소할 수 있는 행위에 의하여 성립된 채권을 소                   멸시키고 그 대신 다른","취소할 수 있는 행위로부터 취득한 권리의 전부를 취소권자의 상대방이 제3자에게 양도"],answer:4},
    {num:21,subj:"민법",text:"민법상 기간에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["연령 계산에는 출생일을 산입한다.","기간의 초일(初日)이 공휴일에 해당한 때에는 기간은 그 익일부터 기산한다.","기간을 시, 분, 초로 정한 때에는 즉시로부터 기산한다.","기간을 주, 월 또는 연으로 정한 때에는 역(曆)에 의하여 계산한다.","기간을 일, 주, 월로 정한 때에는 그 기간이 오전 영(零)시로부터 시작하는 때가 아니면"],answer:1},
    {num:22,subj:"민법",text:"소멸시효와 제척기간에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["소멸시효가 완성되면 그 기간이 경과한 때부터 장래에 향하여 권리가 소멸하지만, 제척","소멸시효는 그 성질상 기간의 중단이 있을 수 없지만, 제척기간은 권리자의 청구가 있으면","소멸시효가 완성된 이후 그 이익을 포기하는 것은 원칙적으로 인정되지만, 제척기간은","소멸시효 완성에 의한 권리소멸은 법원의 직권조사 사항이지만, 제척기간에 의한 권리의","매도인의 하자담보책임에 기한 매수인의 손해배상청구권과 같이 청구권에 관하여 제척기"],answer:2},
    {num:25,subj:"민법",text:"甲이 자신 소유의 X 토지를 乙에게 매도하면서 乙의 매매대금의 지급과 동시에 乙 앞으로 소유권이전등기를 마쳐주기로 약정하였다. 이에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["甲과 乙이 소유권이전등기와 매매대금의 지급을 이행하였으나 위 매매계약이 통정허위","甲과 乙의 매매계약이 甲이 미성년자임을 이유로 적법하게 취소된 경우, 甲은 특별한","甲이 乙의 매매대금지급 불이행을 이유로 매매계약을 적법하게 해제한 경우, 乙은 계약","甲과 乙이 각각 소유권이전등기와 매매대금의 지급을 이행한 이후, 乙이 甲의 사기를 이유로","甲과 乙의 매매계약이 관련 법령에 따라 관할청의 허가를 받아야 함에도 아직 토지거래"],answer:2},
    {num:27,subj:"행정법",text:"행정상 신뢰보호 원칙의 적용요건에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["공적 견해표명은 묵시적으로 할 수 없다.","신 보호의 대상은 특정 개인에 대한 행정          작용에 한정되며, 법률에 대한 신뢰는 신뢰","행정청이 공적 견해표명을 한 후, 사정변경이 있는 경우에는 특별한 사정이 없는 한 행정","귀책사유의 유무는 상대방을 기준으로 판단하며 상대방으로부터 신청행위를 위임받은","단순히    착오   떠"],answer:2},
    {num:28,subj:"행정법",text:"판례에 따를 때 수리를 요하지 않는 신고에 해당하는 것은?",choices:["다른 법률에 의한 인ㆍ허가의제 효과를 수반하는 「건축법」상 건축신고","「건축법」제14조제1항에 따른 건축신고","「수산업법」상 어업의 신고","「노인장기요양보험법」상 장기요양기관의 폐업신고","「식품위생법상」상 영업양도에 따른 지위승계 신고"],answer:1},
    {num:29,subj:"행정법",text:"행정행위의 효력에 관한 설명으로 옳지 않은 것은?",choices:["실정법상 공정력을 직접적으로 규정하는 법률은 없다.","불가쟁력은 행정행위의 상대방이나 이해관계인에 대한 구속력이다.","불가변력이란 처분청 스스로도 당해 행정행위에 구속되어 직권으로 취소ㆍ변경할 수 없는","집행력은 의무가 부과되는 행정행위에서 문제된다.","불가변력이 있는 행정행위일지라도 쟁송기간이 경과하지 않는 한 행정쟁송에 의한 취소가"],answer:0},
    {num:30,subj:"행정법",text:"행정입법에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["법령의 위임이 없음에도 법령에 규정된 처분 요건 사항을 부령에서 변경하여 규정한 경우,","행정입법의 부작위는 항고소송으로 다툴 수 없다.","재량준칙은 행정의 자기구속법리나 평등원칙 등에 의해 대외적 구속력을 가질 수 있다.","「장기요양급여 제공기준 및 급여비용 산정방법 등에 관한 고시」에 대해 외부적 구속효를","대법원판결에 의해 명령ㆍ규칙이 헌법         또"],answer:4},
    {num:31,subj:"행정법",text:"행정행위의 하자승계 논의의 전제에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["선행행위와 후행행위가 모두 항고소송의 대상인 행정처분이어야 한다.","선행행위에는 취소사유인 하자가 존재해야 한다.","후행행위는 하자가 없이 적법해야 한다.","선행행위에 불가  쟁력이 발생해야 한다.","후행행위에 불가변력이 발생해야 한다."],answer:4},
    {num:32,subj:"행정법",text:"강학상 인가에 해당하는 것은? (다툼이 있으면 판례에 따름)",choices:["「부동산 거래신고 등에 관한 법률」상 외국인등의 토지거래 허가","공유수면매립면허","보세구역의 설영특허","법무부장관의 공증 인가","자동차 운전면허대장상의 등재행위"],answer:0},
    {num:33,subj:"행정법",text:"행정작용에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["행정계획은 사인의 신뢰보호를 위해 일반적으로 계획존속청구권이 인정된다.","행정사법작용에는 사적자치의 원칙이 통용되므로 공법적 제한을 받지 않는다.","사실행위는 법적 효과의 제거대상이 될 수 없으므로, 권력적인지 비권력적인지를 불문하고","계약직공무원에 대한 채용계약해지를 함에 있어서는            「행정절차법」에 의하여 그 근거와","행정지도는 상대방의 임의적인    협력을 구하는 것이므로, 법률우위의 원칙은 적용되지 않는다."],answer:3},
    {num:34,subj:"행정법",text:"확약에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["확약은 일방적 행위라는 점에서 복수당사자의 의사의 합치인 공법상 계약과는 구분된다.","확약은 종국적 규율이 아니라는 점에서 종국적 규율을 하는 사전결정이나 부분허가와","어업권면허에 선행하는 우선순위결정은 강학상 확약에 불과하고 행정처분은 아니다.","확약 이후에 사실상태 또는 법적 상태가 변경된 경우에도 확약의 구속성이 상실되기","확약은 정당한 권한을 가진 행정청에 의해서 그 권한의 범위 내에서만 발해질 수 있다."],answer:3},
    {num:35,subj:"행정법",text:"행정절차에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["행정절차에 관하여 다른 법률에 특별한 규정이 있는 경우에도 「행정절차법」이 우선한다.","행정청은 청문이 필요하다고 인정하는 경우에도 법령등에서 청문을 하도록 규정한 경우","신청에 대한 거부처분은 사전통지대상이다.","행정청은 신청 내용을    모두 그대로 인정하는 처분을 하는 경우 처분의 근거와 이유를","「행정절차법」에는 행정지도에 관한 규정을 두고 있지 않다."],answer:3},
    {num:36,subj:"행정법",text:"개인정보보호법상 정보주체가 자신의 개인정보 처리와 관련하여 가지는 권리가 아닌 것은?",choices:["개인정보의 처리에 관한 정보를 제공받을 권리","개인정보의 처리 정지를 요구할 권리","개인정보의 처리 여부를 확인하고 개인정보에 대하여 사본의 발급을 요구할 권리","개인정보의 처리에 관한 동의 여부, 동의 범위 등을 결정할 권리","개인정보처리자의 가명정보 처리에 동의할 권리"],answer:4},
    {num:38,subj:"행정법",text:"공공기관의 정보공개에 관한 법령상 정보공개에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["공개청구의 대상이 되는 정보는 공공기관이 보유ㆍ관리하고 있는 정보에 한정된다.","일정한 요건을 갖춘 외","정보공개 청구권자의 권리구제 가능성이 없는 경우에는 비공개 대상 정보에 해당하지","정보공개청구에 대한 공공기관의            비공개결정에 대한 불복절차로 이의신청, 행정심판,","법인이 거    래하는 금융기관의 계좌번호에 관한 정보는 법인의 영업상 비밀에 관한 사항"],answer:2},
    {num:39,subj:"행정법",text:"과징금에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정법규 위반에 대해 벌 금 이외에 과 징 금을 부과하는 것은 이중처 벌 금지의 원칙에","제재적 행정처분으로서의 과        징금은 현실적인 행위자가 아닌 법령상 책임자에게 부과할","제재적 행정처분으로서의 과  징금은 원칙적으로 위반자의 고의 또는 과실을 요한다.","과징금은 국가의 형벌권을 실행하는 과벌이 아니다.","법령으로 정한 ‘과징금을 부과하는 위반행위와 과징금의 금액’에 열거되지 않은 위반행위에"],answer:2},
    {num:40,subj:"행정법",text:"공익사업을 위한 토지 등의 취득 및 보상에 관한 법령상 손실보상에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["토지수용재결시 대상토지의 평가는 재결에서 정한 수용시기가 아닌 수용재결일을 기준","관할   토지수용위원회에 잔여지수용청구를 하려는 토지소유자는 사업완료일까지 그 수용","이주대 대상자는 사 시행자가 이주대 에 대한 구체적인 계 을 수립하여 공고한 때에   획","공익사업시행지구 밖의 영업손실에 대해서도 일정한 요건 하에 보상을 받을 수 있다.","재결에서 정한 보상금 액 이 일부 보상항목은 과소하고 다른 보상항목은 과다할 경우"],answer:2},
    {num:41,subj:"행정법",text:"행정심판에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["의무이행심판에서 청구가 이유 있으면 신청에 따른 처분을 하거나 처분을 할 것을 피청","심판청구기간을 법상 규정된 기간보다 긴 기간으로              잘못 고지한 경우에도 규정된 행정","시 ㆍ도지사의 처분에 대한 심판청구는 시 ㆍ도지사 소속으로                 두는 행정심판위원회에서","심리는 구 심리나 서면심리로 하고, 당사자가 구           술심리를 신청한 경우에는 서면심리는","항고소송에서의 처분사유의 추가ㆍ변경의 법리는 행정심판에 적용되지 않는다."],answer:0},
    {num:43,subj:"행정법",text:"국가배상에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["공무를 위탁받은 사인의 직무집행행위에 대해서도 국가배상책임이 성립할 수 있다.","가해행위인 처분에 대해 취소판결이 확정된 경우에는 기판력에 의해 국가배상소송에서도","생명ㆍ신체의 침해로 인한 국가배상을 받을 권리는 압류하지 못한다.","피해자나 그 법정대리인이 손해 및 가해자를 알지 못한 경우 국가배상청구권의 소멸시효","외 인이 피해자인 경우에는 해당         국가와 상호 보증이 있을 때에만 「국가배상법」이"],answer:1},
    {num:44,subj:"행정법",text:"공물에 관한 설명으로 옳은 것은?",choices:["공공용물은 직접 행정주체 자신의 사용에 제공된 공물을 말한다.","국가 또는 지방자치단체가 소유권자인 공물을 국유공물이라 한다.","공물의 관리주체와 공물의 귀속주체가 다른 공물을 자유공물(自有公物)이라고 한다.","경찰견은 동산공물에 해당한다.","도로, 공원 등은 자연공물에 해당한다."],answer:3},
    {num:46,subj:"행정법",text:"행정조직에 관한 설명으로 옳지 않은 것은?",choices:["훈령이란 상급관청이 하급관청의 권한행사를 지휘하기 위해 발하는 명령이다.","공무원이 대외적 구속력이 없는 훈 령에 위반한 경우에도 위법은 아니며 징 계 책 임이","상급관청은 직권에 의해 하급관청의 위법ㆍ부당한 행위의 취소를 명할 수 있다.","징계위원회 같은 의결기관으로서의 위원회는 의결권은 물론이고 정해진 의사를 대외적","주관  쟁의결정권이란 하급관청 사이에 권한의 분쟁이 있는 경우, 상급관청이 그 분쟁을"],answer:3},
    {num:47,subj:"행정법",text:"경찰책임에 관한 설명으로 옳지 않은 것은?",choices:["행위능력이 없는 자도 경찰책임자가 될 수 있다.","경찰책임자에 대한 경찰권의 발동이 어려운 경우에는 예외적으로 경찰책임이 없는 자에","물건에 대한 권원의 유무와 관계없이 물건을 현실적으로 지배하고 있는 자에게도 상태","행위책임의 행위에는 부작위를 포함한다.","타인을 감독하는 자가 타인의 행위에 대하여 지는 경찰책임은 자기책임이 아니라 타인의"],answer:4},
    {num:48,subj:"행정법",text:"공무원관계에 관한 판례의 태도로 옳은 것은?",choices:["공무원임용결격사유가 있는지의 여부는 임용당시가 아닌 채용후보자 명부에 등록한 때에","임용당시 공무원임용결격사유가 있었다면 비록 국가의 과실에 의하여 임용결격자임을","국가가 공무원임용결격사유가 있는 자에 대해 결격사유가 있음을 알지 못하고 임용하였","시험승진후보자명부에서의 삭제행위는 행정처분이다.","직위해제는 징계처분에 해당한다."],answer:1},
    {num:49,subj:"행정법",text:"지방자치법상 주민소송에 관한 설명으로 옳지 않은 것은?",choices:["주민소송은 민중소송이며 객관소송이다.","해당 행위를 계속하면 회복하기 곤란한 손해가 발생할 우려가 있는 경우에 그 행위의","주민소송을 제기하기 위해서는 그에          앞서 당해 사안에 대해 주민감사청구를 하여야","소송의 계속(   繫屬) 중에 소송을 제기한 주민이 사망하면 소송절차는 중단된다.","주민소송이 진행 중이라도 다른 주민은 같은 사항에 대하여 별도의 소송을 제기할 수"],answer:4},
    {num:50,subj:"행정법",text:"행정소송법상 취소소송에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["무효인 처분에 대하여는 무효확인청구소송을 제기하여야 하고 취소소송을 제기할 수는","신청에 대한 거부행위는 취소소송의 대상이 될 수 없다.","처분등을 할 정당한 권한을 가진 행정청만이 피고적           격을 갖는다.","처분이 위법한 것으로 인정되는 경우에도 공공복리를 위하여 원고의 청구가 기           각될 수","과세처분취소소송에서 적법하게 부과될 정당한 세액이 산출되더라도 법원은 정당한"],answer:3},
    {num:51,subj:"행정학개론",text:"지방자치에 관한 설명으로 옳지 않은 것은?",choices:["지방자치의 본질적 의미는 지역주민이 그 지역의 제반 문제를 스스로 결정하고 처리하는","지방자치는 정치적 활동과는 무관하며 공공행정의 가치를 중시한다.","지방자치는 지방분권을 전제로 하며, 주민참여는 ‘풀뿌리 민주주의’ 원리를 구현한다.","지방자치단체라는 공법인을 통해 주민에게 필요한 주요 정책의 실험장 역할을 한다.","지역특성에 맞는 행정과 정책을 통해 행정의 능률성과 책임성을 확립한다."],answer:1},
    {num:54,subj:"행정학개론",text:"우리나라 지방자치단체의 유형과 특징에 관한 설명으로 옳지 않은 것은?",choices:["지방자치단체에는 특별시, 광역시, 도, 특별자치도, 특별자치시와 시ㆍ군ㆍ구(자치구)가","두 개 이상의 지방자치단체가 특정한 목적을 위하여 법인으로서의 특별지방자치단체를","특별시, 광역시 및 특별자치시가 아닌 인구 100만 이상의 시는 특례시 명칭을 부여받고","모든 지방자치단체는 법령의 범위를 벗어나 사무 처리와 조례 제정을 할 수 없다.","특별시 ㆍ 광역 시 또 는 특별자치시가 아닌 인구 50만 이상의 시는 자치구가 아닌 구를"],answer:2},
    {num:55,subj:"행정학개론",text:"우리나라 지방자치제도에 있어서 주민의 권리에 관한 내용으로 옳지 않은 것은?",choices:["주민 A씨(30세)는 자신이 살고 있는 지역의 지방자치단체 발전과 운영에 기여할 수 있다.","○○시 주민 B씨(20세)는 청년일자리 창출에 관한 조례의 필요성에 따라 요건을 갖추어","지방자치단체 외국인등록대장에 등록된 베트남국적 C씨(45세)는 국내에 영주할 수 있는","○○시 비례대표 시의원의 심각한 불법행위 문제를 알고 있는 ○○시 주민 D씨(55세)","○○시 주민 E씨(57세)는 시의 공금 지출에 관한 사항의 위법에 대해 감사청구한 자로서,"],answer:2},
    {num:56,subj:"행정학개론",text:"행정학의 주요 이론에 관한 내용으로 옳지 않은 것은?",choices:["신제도주의론은 공식적 제도나 구조는 물론 비공식적 제도와 규범도 중요하게 강조한다.","행태주의 행정연구는 가치와 사실문제를 엄격하게 구분하고 자유와 평등의 가치를 연구","체제이론은 행정현상을 여러 변수 중에서 환경을 포함해 거시적으로 접근한다.","인간관계론은 조직목표 달성을 위해 생산성과 능률성에 기반을 둔 금전적 보상과 경제적","신행정    학 이론은 참여와 형평의 가치를 중심으로 현실문제의 처방적 연구를 중시한다."],answer:3},
    {num:59,subj:"행정학개론",text:"전자정부와 공공행정의 변화에 관한 설명으로 옳지 않은 것은?",choices:["전자정부 발전으로 인한 정보 화 의 역 기능은 사회적 질서와 안전을 위 협 하는 디 지 털","일반적으로 정보는 공공재 성 이 강하기 때 에 행정정보의문           비대칭성 문제는 해소 내지","정부의 맞춤형 전자서비스와 빅데이터 산업 고도화 차원에서 개인정보의 행정기관 간","전자정부 서비스는 이용자들의 거래비용과 기회비용 및 민원업무 감소에 기여한다.","전자정부의 발달에 의한 공공데이터 개방은 행정정보의 독점적 소유를 촉진시키고 있다."],answer:4},
    {num:61,subj:"행정학개론",text:"기계적 조직과 학습조직의 특성에 관한 내용으로 옳지 않은 것은?",choices:["기계적 조직은 위계적ㆍ경직적 조직문화를 갖는데 비해 학습조직은 적응적 조직문화를 갖는다.","기계적 조직은 조직원의 재 량 과 책 임을 중시하나 학 습조직은 조직원 과 업 을 상 세 히","기계적 조직은 경쟁을 중시하나 학습조직은 협력을 중시한다.","기계적 조직은 수직적 구조이나 학습조직은 수평적 구조를 지향한다.","기계적 조직은 정보가 최고관리층에 집중되는 반면에 학습조직은 조직원들에게 공유된다."],answer:1},
    {num:62,subj:"행정학개론",text:"우리나라 고위공무원단제도에 관한 설명으로 옳지 않은 것은?",choices:["고위공무원단을 구성하는 공무원은 전원 중앙행정기관 소속이다.","각 부처 장관은 소속에 관계없이 전체 고위공무원단 중에서 적임자를 인선한다.","계급과 연공서열 보다는 직무와 성과 중심의 인사관리를 추구한다.","행정부처에 배치된 고위공무원의 인사와 복무는 소속 장관이 관리한다.","고위직의 개방을 확대하고 경    쟁을 촉진하기 위한 제도이다."],answer:0},
    {num:63,subj:"행정학개론",text:"우리나라 인사혁신처에 관한 설명으로 옳지 않은 것은?",choices:["법률의 범위 내에서 인사규칙을 제정한다.","인사행정의 공정성을 제고하기 위한 독립합의형 대통령 직속기관이다.","인사 법령에 따라 인사행정에 관한 구체적인 사무를 수행한다.","행정기관 소속 공무원의            징계처분 등에 대한 소청을 심사ㆍ결정하기 위하여 소청심사","인사행정을 수행하는 중        앙정부의 인사행정기관이다."],answer:1},
    {num:64,subj:"행정학개론",text:"직업공무원제도에 관한 설명으로 옳지 않은 것은?",choices:["젊고 유능한 인재들이 공직을 평생 직업으로 선택하여 근무하게 하는 제도이다.","행정의 계속성과 안정성을 확보하게 한다.","폐쇄적 임용으로 인해 공직분위기의 침체가 우려된다.","일반행정가 보다는 전문행정가 양성을 목표로 한다.","신분보장으로 인해 무사안일과 관료의 병리현상이 초래될 위험이 있다."],answer:3},
    {num:66,subj:"행정학개론",text:"조직구조의 분권화가 요구되는 상황으로 옳지 않은 것은?",choices:["규칙과 절차의 합리성ㆍ효율성에 대해 신뢰하고 있다.","조직이 속한 사회의 민주화가 촉진되고 있다.","기술과 환경이 격동적으로 변화하고 있다.","고객에게 신속하고 대응적인 서비스 요구가 증가하고 있다.","조직구성원들의 참여 확대와 창의성 발현이 요구되고 있다."],answer:0},
    {num:68,subj:"행정학개론",text:"국회의 예산결산에 관한 설명으로 옳지 않은 것은?",choices:["결산 심의를 한 결과 문제가 있는 특정사안에 대하여 감사원에 감사를 요구할 수 있다.","결산은 회계연도에서 국가의 수입과 지출 실적을 확정적 계수로 표시하는 행위이다.","예산의 범위 내에서 재정활동을 했는지 확인하고 그 결과를 재정운용에 반영하는 과정","부당한 지","재정운용의 비능률이 발견된 경우 시정을 요구할 수 있고 차년도 예산과정에서 쟁점화"],answer:3},
    {num:69,subj:"행정학개론",text:"정책집행에서 하향적 접근방법에 관한 설명으로 옳지 않은 것은?",choices:["정책이 추구하는 목표를 분명히 하고, 정책결정자의 의도를 정확히 이해할수록 정책은","정책결정의 결과물인 정책목표를 달성해 가는 과정을 정책집행으로 이해한다.","정책집행 현장에서 집행조직과 정책사업 사이의 상호적응이 강조된다.","정책이 결과물을 창출하는 과정에서 정책결정자가 어떤 역할을 했는지에 관심이 있다.","정책결정단계에서 주된 역할을 하는 참여자와 정책내용에 초점을 맞춘다."],answer:2},
    {num:71,subj:"행정학개론",text:"이해충돌방지법에 관한 내용으로 옳지 않은 것은?",choices:["공직자는 직무관련자가 사적이해관계자임을 안 날부터 30일 이내에 소속기관장에게 그","공직자는 직무수행 중 알게 된               비밀 또","공직자는 직무관 자에게 사적으로                노무 또는 조언ㆍ자문 등을 제공하고 대가를 받는","공직자는 공공기관이 소유하거나 임차한 물품ㆍ차 ㆍ선박ㆍ항공기ㆍ건물ㆍ 지ㆍ시   량                   토        설","공직자는 직무관 자인 소속 기관의 직자(공직자가 아니게 된 부터 2년 이내인 자)와       날"],answer:0},
    {num:73,subj:"행정학개론",text:"행정개혁의 구조적 접근방법에 관한 설명으로 옳지 않은 것은?",choices:["행정체계의 구조적 설계를 개선함으로써 행정개혁의 목표를 달성하려는 접근방법이다.","분권화 수준의 개선, 권한배분의 개편, 명령계통의 수정, 작업집단의 설계 등을 추진한다.","주된 목표는 기능중복의 제거 및 표준적 절차의 간소화 등이다.","조직의 분권화를 통해 조직계층의 단순화, 명령과 책임 등을 명확히 할 수 있다.","공무원의 의식개혁, 업무자세 및 태도 개선 등에 초점을 맞춘다."],answer:4},

    {num:17,subj:"민법",text:"착오에 의한 의사표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["착오로 인하여 표의자가 경제적 불이익을 입은 것이 아니라면 이를 법률행위 내용의","기망행위로 인하여 법률행위의 내용으로 표시되지 않은 동기에 관하여 착오를 일으킨","대리인에 의한 계약체결의 경우, 특별한 사정이 없는 한 착오의 유무는 대리인을 표준으","매도인이 매수인의 채무불이행을 이유로 매매계약을 적법하게 해제한 후라도 매수인은","착오로 인한 의사표시에 있어서 표의자의 중대한 과실 유무에 관한 증명책임은 그 상대"],answer:4},
    {num:18,subj:"민법",text:"법률행위의 무효와 취소에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["계약이 불공정한 법률행위로서 무효인 경우, 그 계약에 대한 부제소합의는 특별한 사정이","취소할 수 있는 법률행위에서 취소권자의 상대방이 이행을 청구하는 경우에는 법정추인이","매매계약이 약정된 대금의 과다로 인해 불공정한 법률행위에 해당하여 무효인 경우,","무권리자가 타인의 권리를 처분하는 계약을 체결한 경우, 권리자가 이를 추인하면 계약의","취소할 수 있는 법률행위의 상대방이 그 법률행위로 취득한 권리를 타인에게 임의로 양"],answer:3},
    {num:19,subj:"민법",text:"법률행위의 조건과 기한에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["기한이익 상실의 특약은 특별한 사정이 없는 한 정지조건부 기한이익 상실의 특약으로","당사자가 불확정한 사실이 발생한 때를 이행기한으로 정한 경우, 그 사실의 발생이 불가","조건성취로 불이익을 받을 자가 과실로 신의성실에 반하여 조건의 성취를 방해한 때에는","기한부 법률행위의 당사자가 기한도래의 효력을 그 도래 전으로 소급하게 할 의사를","조건이 성립하기 위해서는 조건의사와 그 표시가 필요하고, 조건의사가 있더라도 그것이"],answer:4},
    {num:20,subj:"민법",text:"복대리에 관한 설명으로 옳은 것은?",choices:["복대리인은 대리인의 대리인이다.","법정대리인은 언제나 복임권이 있다.","대리인이 파산하여도 복대리권은 소멸하지 않는다.","임의대리인은 본인의 승낙이 있는 때에 한하여 복임권을 갖는다.","복대리인이 선임되면 특별한 사정이 없는 한 대리인의 대리권은 소멸한다."],answer:1},
    {num:21,subj:"민법",text:"무권대리인 乙은 아무런 권한 없이 자신을 甲의 대리인이라고 칭하면서 丙과 甲소유 의 X토지에 대한 매매계약을 체결하였다. 이에 관한 설명으로 옳지 않은 것은? (표 현대리는 성립하지 않으며, 다툼이 있으면 판례에 따름)",choices:["丙이 계약 체결 당시 乙이 무권대리인임을 알지 못하였다면, 丙은 甲의 추인이 있기 전에","丙이 계약 체결 당시 乙이 무권대리인임을 알았더라도 丙은 상당한 기간을 정하여 甲에게","甲이 乙의 무권대리행위의 내용을 변경하여 추인한 경우, 그 추인은 그에 대한 丙의","乙이 대리권을 증명하지 못하고 甲의 추인도 받지 못한 경우, 丙은 계약 체결 당시 乙이","계약 체결 후 乙이 甲의 지위를 단독상속한 경우, 乙은 본인의 지위에서 丙을 상대로"],answer:3},
    {num:22,subj:"민법",text:"민법상 기간에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["2023년 6월 1일(목) 14시부터 2일간의 기간이 만료하는 때는 2023년 6월 4일 24시이다.","2023년 6월 1일(목) 16시부터 72시간의 기간이 만료하는 때는 2023년 6월 4일 16시이다.","2023년 4월 1일(토) 09시부터 2개월의 기간이 만료하는 때는 2023년 6월 2일 24시이다.","2004년 5월 16일(일) 오전 7시에 태어난 사람은 2023년 5월 16일 24시에 성년자가 된다.","민법 제157조의 초일불산입의 원칙은 강행규정이므로 당사자의 합의로 달리 정할 수 없다."],answer:1},
    {num:23,subj:"민법",text:"소멸시효에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["선택채권의 소멸시효는 선택권을 행사할 수 있는 때로부터 진행한다.","부작위를 목적으로 하는 채권의 소멸시효는 위반행위를 한 때로부터 진행한다.","불확정기한부 채권의 소멸시효는 그 기한이 객관적으로 도래한 때로부터 진행한다.","어떤 권리의 소멸시효기간이 얼마나 되는지에 대해서는 법원이 직권으로 판단할 수 없다.","부동산에 대한 매매대금채권이 소유권이전등기청구권과 동시이행의 관계에 있는 경우,"],answer:3},
    {num:25,subj:"민법",text:"소멸시효 중단에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["지급명령에 의한 시효중단의 효과는 지급명령을 신청한 때에 발생한다.","시효이익을 받을 본인의 대리인은 소멸시효 중단사유인 채무의 승인을 할 수 있다.","가압류의 피보전채권에 관하여 본안의 승소판결이 확정되면 가압류에 의한 시효중단의","재판상의 청구로 인하여 중단한 소멸시효는 재판이 확정된 때로부터 새로이 진행한다.","시효중단의 효력 있는 승인에는 상대방의 권리에 관한 처분능력이나 권한 있음을 요하지"],answer:2},
    {num:28,subj:"행정법",text:"행정입법에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["입법 실제에 있어서 통상 대통령령에는 시행령이라는 이름을 붙이고 총리령과 부령에는","헌법이 인정하고 있는 위임입법의 형식은 예시적인 것이다.","상위 법령의 집행을 위하여 필요한 경우에는 상위 법령의 위임이 없더라도 집행명령으로","법원이 구체적 규범통제를 통해 위헌․위법으로 선언할 심판대상은 원칙적으로 재판의","고시가 다른 집행행위의 매개 없이 그 자체로서 직접 국민의 구체적인 권리의무나 법률"],answer:2},
    {num:30,subj:"행정법",text:"행정행위의 불가변력과 불가쟁력에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["불가변력은 행정행위의 상대방이나 이해관계인을 구속하는 효력이고 불가쟁력은 행정청을","불가변력은 모든 행정행위에 다 인정되지만, 불가쟁력은 예외적으로 일부 행정행위의","불가변력은 당해 행정행위에 대하여서만 인정되는 것이고, 동종의 행정행위라 하더라도","행정처분이 불복기간의 경과로 인하여 확정된 경우 처분의 기초가 된 사실관계나 법률","행정심판의 재결은 준사법적 행위로서 불가쟁력이 인정되므로 행정심판 청구인은 제소"],answer:2},
    {num:31,subj:"행정법",text:"행정지도에 관한 설명으로 옳지 않은 것은?",choices:["행정지도를 반드시 서면으로 해야 하는 것은 아니다.","행정기관은 행정지도의 상대방이 행정지도에 따르지 아니하였다는 것을 이유로 불이익한","행정기관이 같은 행정목적을 실현하기 위하여 많은 상대방에게 행정지도를 하려는 경우","행정지도의 상대방은 해당 행정지도의 내용뿐만 아니라 행정지도의 방식에 관해서도","「행정기본법」은 임의성의 원칙 등 행정지도의 원칙에 관하여 규정하고 있다."],answer:4},
    {num:32,subj:"행정법",text:"행정행위의 부관에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["부담부 행정행위는 부담을 이행하여야 비로소 그 효력이 발생한다.","부담을 불이행한 것만으로는 주된 행정행위의 효력이 소멸하지 않는다.","부담은 그 자체로서 행정쟁송의 대상이 될 수 있다.","행정청은 처분에 재량이 없는 경우에는 법률에 근거가 있는 경우에 부관을 붙일 수 있다.","어업면허처분 중 면허의 유효기간만 취소하여 달라는 소송을 제기하는 것은 허용될 수"],answer:0},
    {num:33,subj:"행정법",text:"공법상 계약에 관한 설명으로 옳은 것은?",choices:["「행정절차법」은 공법상 계약의 절차에 관한 일반법이다.","행정청은 공법상 계약의 상대방을 선정하고 계약 내용을 정할 때 공법상 계약의 공공성","행정청이 공법상 계약을 체결하는 경우 계약의 목적 및 내용을 명확하게 적은 계약서를","공법상 계약에는 법률우위의 원칙이 적용되지 않는다.","행정청이 공법상 계약을 체결할 때 법령등에 따른 관계 행정청의 동의, 승인 등이 필요"],answer:2},
    {num:34,subj:"행정법",text:"행정절차법상 행정청의 관할 및 협조에 관한 설명으로 옳지 않은 것은?",choices:["행정청이 그 관할에 속하지 아니하는 사안을 접수한 경우 지체 없이 이를 관할 행정청","행정응원에 드는 비용은 응원을 하는 행정청이 부담한다.","행정청은 행정의 원활한 수행을 위하여 서로 협조하여야 한다.","행정응원을 요청받은 행정청은 응원을 거부하는 경우 그 사유를 응원을 요청한 행정청에","행정청의 관할이 분명하지 아니한 경우이지만 공통으로 감독하는 상급 행정청이 없는"],answer:1},
    {num:35,subj:"행정법",text:"행정절차법상 송달 및 기간ㆍ기한에 관한 설명으로 옳은 것은?",choices:["정보통신망을 이용한 송달은 송달받을 자의 동의 여부와 상관없이 언제든지 가능하다.","행정청은 송달하는 문서의 명칭과 송달받는 자의 성명을 확인할 수 있는 기록을 보존하지","송달은 다른 법령등에 특별한 규정이 있는 경우를 제외하고는 해당 문서를 발신한 때","천재지변으로 기한을 지킬 수 없는 경우에는 그 사유가 끝나는 날이 속하는 주말까지","외국에 거주하거나 체류하는 자에 대한 기간 및 기한은 행정청이 그 우편이나 통신에"],answer:4},
    {num:36,subj:"행정법",text:"개인정보 보호법상 개인정보 보호 원칙에 관한 설명으로 옳지 않은 것은?",choices:["개인정보처리자는 개인정보의 처리 목적에 필요한 범위에서 적합하게 개인정보를 처리","개인정보처리자는 개인정보의 처리 목적에 필요한 범위에서 개인정보의 정확성, 완전성","개인정보처리자는 정보주체의 사생활 침해를 최소화하는 방법으로 개인정보를 처리하여야","개인정보처리자는 개인정보 처리방침 등 개인정보의 처리에 관한 사항을 공개하여야 한다.","개인정보처리자는 개인정보를 익명 또는 가명으로 처리하여서는 아니 된다."],answer:4},
    {num:37,subj:"행정법",text:"행정대집행법의 내용에 관한 설명으로 옳은 것은?",choices:["의무자가 동의한 경우라도 행정청은 해가 뜨기 전에는 대집행을 착수 할 수 없다.","해가 지기 전에 대집행을 착수한 경우라도 해가 진 후에는 행정청은 즉시 대집행을","대집행에 대하여는 행정심판을 제기할 수 없다.","대집행에 요한 비용은 「민사집행법」의 예에 의하여 징수하여야 한다.","대집행에 요한 비용에 대하여서는 행정청은 사무비의 소속에 따라 국세에 다음가는"],answer:4},
    {num:38,subj:"행정법",text:"질서위반행위규제법의 내용에 관한 설명으로 옳지 않은 것은?",choices:["다른 법률에 특별한 규정이 없는 한 14세가 되지 아니한 자의 질서위반행위에 대해서도","고의 또는 과실이 없는 질서위반행위는 과태료를 부과하지 아니한다.","법률에 따르지 아니하고는 어떤 행위도 질서위반행위로 과태료를 부과하지 아니한다.","대한민국 영역 밖에 있는 대한민국의 선박 또는 항공기 안에서 질서위반행위를 한 외국","대한민국 영역 밖에서 질서위반행위를 한 대한민국의 국민에게도 적용한다."],answer:0},
    {num:39,subj:"행정법",text:"취소소송에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["제약회사는 보건복지부 고시인 ‘약제급여ㆍ비급여 목록 및 급여 상한금액표’ 중 그 제약","처분의 효과가 소멸된 뒤에는 그 처분의 취소로 인하여 회복되는 법률상 이익이 있어도","지방법무사회가 법무사의 사무원 채용승인 신청을 거부한 경우 채용승인을 신청한 법무","기존의 시외버스운송사업자인 甲회사는 동일노선을 운행하는 乙회사에 대한 시외버스운","「주택법」상 입주자는 건축물의 하자를 이유로 그 건축물에 대한 사용검사처분의 취소"],answer:0},
    {num:40,subj:"행정법",text:"행정심판법의 내용에 관한 설명으로 옳지 않은 것은?",choices:["부작위란 행정청이 당사자의 신청에 대하여 상당한 기간 내에 일정한 처분을 하여야 할","행정심판은 처분이 있음을 알게 된 날부터 180일 이내에 청구하여야 한다.","청구인이 경제적 능력으로 인해 대리인을 선임할 수 없는 경우에는 행정심판위원회에","여러 명의 청구인이 공동으로 심판청구를 할 때에는 청구인들 중에서 3명 이하의 선정","의무이행심판은 처분을 신청한 자로서 행정청의 거부처분 또는 부작위에 대하여 일정한"],answer:1},
    {num:41,subj:"행정법",text:"행정소송법의 내용에 관한 설명으로 옳지 않은 것은?",choices:["처분등을 취소하는 확정판결은 당사자에 대해서만 효력이 있다.","처분등이라 함은 행정청이 행하는 구체적 사실에 관한 법집행으로서의 공권력의 행사","행정소송의 종류로는 항고소송, 당사자소송, 민중소송, 기관소송이 규정되어 있다.","무효등 확인소송은 처분등의 효력 유무 또는 존재 여부의 확인을 구할 법률상 이익이","행정청의 재량에 속하는 처분이라도 재량권의 한계를 넘거나 그 남용이 있는 때에는"],answer:0},
    {num:42,subj:"행정법",text:"국가배상에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["인사업무담당 공무원이 다른 공무원의 공무원증을 위조한 행위는 직무집행행위에 해당","행정처분이 후에 항고소송에서 취소되면 그 기판력에 의하여 당해 행정처분은 공무원의","생명ㆍ신체의 침해로 인한 국가배상을 받을 권리는 양도하지 못한다.","경찰관이 범죄수사를 함에 있어 법규상 또는 조리상의 한계를 위반하였다면 이는 법령","영조물 설치․관리상의 하자는 공공의 목적에 공여된 영조물이 그 용도에 따라 통상"],answer:1},
    {num:43,subj:"행정법",text:"행정조직과 권한의 위임 등에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정기관은 법령으로 정하는 바에 따라 그 소관사무의 일부를 하급행정기관에 위임할","행정기관 또는 소속기관을 설치하거나 공무원의 정원을 증원할 때에는 반드시 예산상의","행정권한의 위임은 권한의 법적인 귀속을 변경하는 것이므로 법률이 위임을 허용하고","행정권한의 내부위임은 법률이 위임을 허용하고 있는 경우에 한하여 인정된다.","헌법은 행정각부의 설치ㆍ조직과 직무범위는 법률로 정한다고 규정하고 있다."],answer:3},
    {num:44,subj:"행정법",text:"행정심판법상 재결에 관한 설명으로 옳지 않은 것은?",choices:["재결은 서면으로 한다.","행정심판위원회는 사정재결을 할 수 없다.","재결은 청구인에게 재결서의 정본이 송달되었을 때에 그 효력이 생긴다.","행정심판위원회는 심판청구의 대상이 되는 처분보다 청구인에게 불리한 재결을 하지 못","행정심판위원회는 심판청구가 적법하지 아니하면 그 심판청구를 각하한다."],answer:1},
    {num:46,subj:"행정법",text:"국가공무원에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["공무원의 신분과 지위의 특수성상 공무원에 대해서는 일반 국민에 비해 보다 넓고 강한","공무원이 그 직무를 수행함에 있어 소속 상관의 명백한 위법 내지 불법한 명령에 따라야","법관, 검사, 외무공무원은 일반직공무원에 해당한다.","모든 공무원은 법령을 준수하며 성실히 직무를 수행하여야 한다.","국가기관의 장은 소속 공무원을 임용할 때 합리적인 이유 없이 사회적 신분을 이유로"],answer:2},
    {num:47,subj:"행정법",text:"경찰관 직무집행법상 사실의 확인을 위하여 경찰관이 출석 요구서를 보내 경찰관서에 출석할 것을 요구할 수 있는 직무수행으로 명시되어 있지 않은 것은?",choices:["미아를 인수할 보호자 확인","유실물을 인수할 권리자 확인","사고로 인한 사상자 확인","긴급구호를 요청받은 보건의료기관에 대한 요청사실의 확인","행정처분을 위한 교통사고 조사에 필요한 사실 확인"],answer:3},
    {num:48,subj:"행정법",text:"국가재정법의 내용에 관한 설명으로 옳지 않은 것은?",choices:["정부는 재정건전성의 확보를 위하여 최선을 다하여야 한다.","정부는 「성별영향평가법」에 따른 성별영향평가의 결과를 포함하여 예산이 여성과 남성","한 회계연도의 모든 수입을 세입으로 하고, 모든 지출을 세출로 한다.","예산은 예산총칙ㆍ세입세출예산ㆍ계속비ㆍ명시이월비 및 국고채무부담행위를 총칭한다.","정부는 예측할 수 없는 예산 외의 지출에 충당하기 위하여 일반회계 예산총액의 100분의"],answer:4},
    {num:52,subj:"행정학개론",text:"신제도주의에 관한 설명으로 옳은 것은?",choices:["합리적 선택 제도주의는 개인의 표준화된 행동코드로서 제도의 준수를 통한 소속감을","역사적 제도주의는 서로 다른 국가들 사이의 제도가 유사해지는 현상을 설명하는데","사회학적 제도주의는 동일한 상황에서 국가 간의 상이한 제도로 인해 서로 다른 정책이","사회학적 제도주의는 개인에 대한 가정에 기초한 미시적․연역적 방법에 주로 의존한다.","합리적 선택 제도주의의 연장선상에서 오스트롬(E. Ostrom)은 ‘공유재의 비극’의 해결"],answer:4},
    {num:53,subj:"행정학개론",text:"정부실패이론의 설명으로 옳지 않은 것은?",choices:["정부예산의 공유재적 성격 때문에 자원배분의 비효율성이 발생한다.","정부의 X-비효율성은 정부서비스의 공급측면보다는 사회적․정치적 수요 측면 때문에","선거에 민감한 정치인들의 정치적 보상기제로 인해 사회문제가 과장되거나 단기적 해결","사회문제 해결의 목표보다는 내부적인 절차와 규칙에 집착하는 정부조직 목표의 대치","정부 개입에 의한 인위적 지대(rent)를 획득하는 과정에서 불필요한 자원 낭비가 발생한다."],answer:1},
    {num:54,subj:"행정학개론",text:"행정학의 패러다임에 관한 설명으로 옳은 것은?",choices:["뉴거버넌스는 정부 내부의 관리보다는 외부 주체와의 관계를 강조한다.","신공공관리는 부서 간 또는 기관 간 경쟁보다 협력을 강조한다.","신행정학은 행정의 능률성과 중립성을 강조한다.","전통적 관료제 중심의 행정은 환경변화에 대한 유연한 적응에 유리하다.","신공공관리의 고객은 사회적 책임의식을 갖춘 적극적 시민성을 특징으로 한다."],answer:0},
    {num:56,subj:"행정학개론",text:"행정의 능률성(efficiency)과 효과성(effectiveness)에 관한 설명으로 옳은 것은?",choices:["효과성은 목표와 무관하게 자원을 낭비 없이 사용하는 것을 의미한다.","능률성은 사회문제의 해결정도를 의미한다.","어떤 해결대안이 효과적이면 그 대안은 항상 능률적이다.","비용효과(cost-effectiveness) 분석은 효과를 화폐가치로 측정하기 어려운 상황에서 적용","효과성은 행정의 수단적 가치인 반면, 능률성은 민주성과 마찬가지로 본질적 가치이다."],answer:3},
    {num:61,subj:"행정학개론",text:"학습조직에 관한 설명으로 옳지 않은 것은?",choices:["리더의 사려 깊은 리더십이 요구된다.","구성원의 권한강화를 강조한다.","수평적 구조의 팀으로 구성된다.","전체보다 부분을 중시한다.","조직구성원은 조직의 공식자료에 접근할 수 있어야 한다."],answer:3},
    {num:62,subj:"행정학개론",text:"동기부여 이론에 관한 설명으로 옳은 것은?",choices:["머슬로(A. Maslow)의 욕구계층이론은 과정이론에 해당한다.","매클리랜드(D. McClelland)의 성취동기이론은 모든 사람이 비슷한 욕구의 계층을 갖고","동기부여 이론은 일반적으로 내용이론과 형식이론으로 분류된다.","앨더퍼(C. Alderfer)의 ERG이론은 인간의 욕구를 계층화한 점에서는 머슬로(A. Maslow)","허즈버그(F. Herzberg)의 욕구충족요인이원론은 인간에게 만족을 주는 요인과 불만족을"],answer:3},
    {num:63,subj:"행정학개론",text:"조직구조 설계 시 고려해야 할 기본 요소에 관한 설명으로 옳지 않은 것은?",choices:["누구에게 보고하는 지를 정하는 명령 체계","상관에게 보고하는 부하의 수를 의미하는 통솔 범위","의사결정이 이루어지는 계층이 위치한 수준을 의미하는 집권과 분권","문서화된 정도를 의미하는 공식화","조직의 일차적 목표와 관련된 사업을 수행하는 참모와 이를 지원하는 계선"],answer:4},
    {num:64,subj:"행정학개론",text:"직위분류제에 관한 설명으로 옳지 않은 것은?",choices:["조직 내의 직위들을 각 직위에 배당된 직무의 속성에 따라 분류ㆍ관리하는 제도를 말한다.","직위(職位)란 1명의 공무원에게 부여할 수 있는 직무와 책임을 말한다.","직군(職群)이란 직무의 종류ㆍ곤란성과 책임도가 상당히 유사한 직위의 군을 말한다.","직렬(職列)이란 직무의 종류가 유사하고 그 책임과 곤란성의 정도가 서로 다른 직급의","직류(職類)란 같은 직렬 내에서 담당 분야가 같은 직무의 군을 말한다."],answer:2},
    {num:66,subj:"행정학개론",text:"국가공무원법상 징계에 관한 설명으로 옳은 것은?",choices:["징계는 파면ㆍ해임ㆍ강등ㆍ강임ㆍ정직ㆍ감봉ㆍ견책으로 구분한다.","징계로 해임처분을 받은 때부터 5년이 지나지 아니한 자는 공무원으로 임용될 수 없다.","강등은 1계급 아래로 직급을 내리고 공무원신분은 보유하나 6개월간 직무에 종사하지","정직은 1개월 이상 3개월 이하의 기간으로 하고, 정직 처분을 받은 자는 그 기간 중","감봉은 1개월 이상 3개월 이하의 기간 동안 보수의 2분의 1을 감한다."],answer:3},
    {num:68,subj:"행정학개론",text:"재정사업자율평가제도에 관한 설명으로 옳은 것은?",choices:["일정 규모 이상인 신규 사업의 경제적 타당성을 검토하여 사업의 추진 여부를 결정하는","다년도 사업에 대해 사업규모, 총사업비, 사업기간 등을 정해 미리 기획재정부장관과","부족한 재원을 고려하여 민간자본을 공공의 SOC 투자에 동원하는 제도","예산지출을 줄이거나 수입을 늘리는 데 기여한 자에게 성과금을 지급하는 제도","각 중앙관서의 장과 기금관리주체가 기획재정부장관이 정하는 바에 따라 주요 재정사업을"],answer:4},
    {num:70,subj:"행정학개론",text:"지방자치의 원리로서 주민자치에 관한 설명으로 옳은 것은?",choices:["국가에 대한 지방자치단체의 법률상의 상대적 독립성을 강조한다.","주민자치의 전통은 주로 유럽 대륙권 국가에서 찾아볼 수 있다.","대의민주제를 포함한 지방자치단체의 주민대표성과 민주성을 강조한다.","자치권이 국가로부터 파생 내지 위임된 것으로 보는 전래설 또는 수탁설에 기초한다.","민족국가 출현과 함께 수립된 헌정체제에 기초한 중앙정부와 지방자치단체의 관계를"],answer:2},
    {num:72,subj:"행정학개론",text:"지방자치법에 규정된 특별지방자치단체에 관한 내용으로 옳지 않은 것은?",choices:["특별지방자치단체는 법인으로 한다.","구성 지방자치단체의 장은 특별지방자치단체의 장을 겸할 수 있다.","특별지방자치단체의 의회는 규약으로 정하는 바에 따라 구성 지방자치단체의 의회 의원","특별지방자치단체의 구역은 특별한 사정이 있을 때에는 해당 지방자치단체 구역의 일부","2개 이상의 지방자치단체가 특별지방자치단체를 설치하는 경우 구성하는 지방자치단체의"],answer:4},
    {num:73,subj:"행정학개론",text:"지방자치법상 지방자치단체의 사무 배분 및 처리의 기본원칙에 관한 설명으로 옳지 않은 것은?",choices:["국가는 국가와 지방자치단체 간의 사무를 주민의 편익증진 등을 고려하여 서로 중복되지","국가가 지방자치단체에 사무를 배분할 때에는 관련 사무를 포괄적으로 배분하여야 한다.","도와 시ㆍ군이 사무를 처리할 때 사무가 서로 겹치면 도에서 먼저 처리한다.","지방자치단체는 조직과 운영을 합리적으로 하고 규모를 적절하게 유지하여야 한다.","시ㆍ군 및 자치구는 해당 구역을 관할하는 시ㆍ도의 조례를 위반하여 사무를 처리할 수"],answer:2},
    {num:74,subj:"행정학개론",text:"지식행정에 관한 설명으로 옳은 것은?",choices:["행정지식은 구조적이고 단기간에 창출되기 때문에 관리에 많은 시간과 자원이 소요되지","지식은 정보와 동일하므로 지식행정은 정보행정과 동일한 수준의 활동이다.","지식행정은 행정활동의 프로세스 개선과 무관하다.","지식행정은 지식사회를 설계하고 지식관리를 통해 가치를 창출하고 극대화하는 것을","지식행정은 문제 해결 및 사회변화 예견을 위해 정보관리기술에 의존하지 않는다."],answer:3},

    {num:1,subj:"민법",text:"신의성실의 원칙에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["신의칙 위반 여부는 당사자의 주장이 없더라도 법원이 직권으로 판단할 수 있다.","사정변경의 원칙에서의 사정이란 계약을 체결하게 된 일방 당사자의 주관적ㆍ개인적","실효의 원칙은 공법관계인 권력관계에도 적용될 수 있다.","여행계약상 기획여행업자는 여행자의 안전을 확보하기 위한 합리적 조치를 할 신의칙상","주로 자기의 채무 이행만을 회피하기 위한 수단으로 동시이행항변권을 행사하는 경우,"],answer:1},
    {num:3,subj:"민법",text:"민법상 미성년자의 법률행위에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["미성년자의 법률행위에 법정대리인의 동의를 요하도록 하는 규정은 강행규정이다.","법정대리인의 동의를 요하는 미성년자의 법률행위에 있어서 법정대리인의 동의는 묵시","미성년자가 법정대리인으로부터 허락을 얻은 특정한 영업에 관해서는 성년자와 동일한","법정대리인이 미성년자에게 한 특정한 영업의 허락을 취소하는 경우, 그 취소는 선의의","미성년자와 계약을 체결한 상대방은 계약 당시 미성년자임을 알았을 경우에는 그 의사"],answer:1},
    {num:4,subj:"민법",text:"성년후견에 관한 설명으로 옳지 않은 것은?",choices:["피성년후견인도 의사능력이 있으면 유효하게 임의대리행위를 할 수 있다.","가정법원은 본인의 의사에 반하더라도 특정후견의 심판을 할 수 있다.","검사나 지방자치단체의 장도 특정후견의 심판을 청구할 수 있는 자에 포함된다.","특정후견은 특정후견의 심판에서 정한 기간이 경과하면 가정법원의 종료심판 없이도","특정후견의 심판을 하는 경우에는 특정후견의 기간 또는 사무의 범위를 정하여야 한다."],answer:1},
    {num:5,subj:"민법",text:"민법상 법인에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["재단법인은 법률의 규정에 의함이 아니면 성립하지 못한다.","재단법인의 설립자가 정관에 필요적 기재사항 중 이사임면의 방법만 정하지 않고 사망한","재단법인의 목적을 달성할 수 없는 경우, 설립자나 이사는 주무관청의 허가를 얻어 설립의","사단법인의 감사는 법인의 재산상황에 관하여 부정한 것이 있음을 발견한 경우, 이를","법인에 대한 청산종결등기가 경료되었더라도 청산사무가 종결되지 않는 한, 법인은 그"],answer:3},
    {num:6,subj:"민법",text:"민법상 법인의 이사에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["이사가 여러 명인 경우 정관에 다른 정함이 없으면 법인의 사무집행은 이사의 과반수로써","이사의 결원으로 법인에게 손해가 생길 염려가 있는 경우, 법원은 이해관계인이나 검사의","이사는 정관 또는 총회의 결의로 금지하지 아니한 사항에 한하여 타인으로 하여금 특정한","법인의 정관에 이사의 해임사유에 관한 규정이 있는 경우, 법인은 특별한 사정이 없는 한","이사의 사임은 특별한 사정이 없는 한 주무관청의 승인이 있어야 그 효력이 발생한다."],answer:4},
    {num:8,subj:"민법",text:"민법상 물건에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["주물의 구성부분도 종물이 될 수 있다.","독립한 물건이라도 부동산은 종물이 될 수 없다.","주물에 대한 점유시효취득의 효력은 점유하지 않는 종물에도 미친다.","천연과실은 물건의 사용대가로 받는 금전 기타의 물건을 말한다.","당사자는 주물을 처분할 때에 특약으로 종물을 제외할 수 있다."],answer:4},
    {num:9,subj:"민법",text:"반사회질서의 법률행위에 해당하지 않는 것은? (다툼이 있으면 판례에 따름)",choices:["행정기관에 진정서를 제출하여 상대방을 궁지에 빠뜨린 다음 이를 취하하는 조건으로","보험계약자가 다수의 보험계약을 통하여 보험금을 부정취득할 목적으로 체결한 보험계약","성매매행위를 전제로 한 선불금의 대여행위","반사회질서의 법률행위에 의하여 조성된 재산인 이른바 비자금을 소극적으로 은닉하기","도박자금에 제공할 목적으로 한 금전대차계약"],answer:3},
    {num:10,subj:"민법",text:"불공정한 법률행위에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["특별한 사정이 없는 한 경매에도 불공정한 법률행위에 관한 민법 제104조가 적용된다.","불공정한 법률행위에 해당하는지는 법률행위가 이루어진 시점을 기준으로 약속된 급부와","불공정한 법률행위가 성립하기 위한 요건인 궁박, 경솔, 무경험은 그 중 일부만 갖추어져도","궁박은 급박한 곤궁을 의미하는 것으로서 심리적 원인에 기인할 수도 있다.","무경험은 어느 특정영역에 있어서의 경험부족이 아니라 거래일반에 대한 경험부족을 뜻"],answer:0},
    {num:13,subj:"민법",text:"착오로 인한 의사표시에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["표의자가 경과실로 인한 착오로 의사표시를 하고 그 착오를 이유로 의사표시를 취소한","착오로 인한 의사표시의 취소에 관한 민법 제109조 제1항은 당사자의 합의로 그 적용을","매도인이 매수인의 채무불이행을 이유로 매매계약을 적법하게 해제한 후에도 매수인은","매도인의 하자담보책임이 성립하는 경우, 매매계약 내용의 중요 부분에 착오가 있더라도","상대방이 표의자의 착오를 알고 이를 이용한 경우라도 의사표시의 착오가 표의자의 중"],answer:2},
    {num:14,subj:"민법",text:"사기ㆍ강박에 의한 의사표시에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["신의칙상 고지의무를 부담하는 자는 고지의무의 대상이 되는 사실을 이미 알고 있는 자","계약이 제3자의 위법한 사기행위로 체결된 경우, 표의자가 제3자를 상대로 사기로 인한","강박에 의한 의사표시에 대한 취소권의 행사기간은 소멸시효기간이다.","소송행위가 강박에 의하여 이루어진 경우, 특별한 사정이 없는 한 강박을 이유로 소송","상품의 선전 ㆍ 광고에 다소의 과장이나 허위가 수반되는 것은 그것이 일반 상거래의"],answer:4},
    {num:15,subj:"민법",text:"甲은 친구 乙로부터 丙 소유의 X토지를 매수할 대리권을 수여받아, 乙을 대리하여 丙과 X에 관한 매매계약을 체결하였다. 이에 관한 설명으로 옳지 않은 것은? (다툼 이 있으면 판례에 따름)",choices:["매매계약 내용의 중요부분에 관하여 乙의 착오가 있는 경우, 甲에게는 착오가 없더라도","甲의 사기로 丙이 매도의 의사표시를 한 경우, 乙이 그 사실을 몰랐더라도 丙은 사기를","丙이 이중매매를 하였고 위 매매계약이 제2매매인 경우에 甲이 丙의 배임행위에 적극","매매계약이 乙에게 불공정한 법률행위에 해당하는지 판단할 때 경솔, 무경험은 乙이","丙의 채무불이행이 있는 경우, 甲은 특별한 사정이 없는 한 채무불이행을 이유로 한"],answer:0},
    {num:16,subj:"민법",text:"권한을 넘은 표현대리에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["권한을 넘은 표현대리에 관한 규정은 법정대리에도 적용된다.","대리인이 그 권한 외의 법률행위를 한 경우, 대리인에게 그 권한이 있다고 상대방이 믿을","복대리인 선임권이 없는 대리인에 의하여 선임된 복대리인의 권한은 기본대리권이 될","대리권소멸 후의 표 현대리가 인정되는 경우, 그 표현대리의 권한을 넘은 대리행위가 있","대리행위의 표시를 하지 아니하고 자기가 본인인 것처럼 기망하여 본인 명의로 직접"],answer:2},
    {num:17,subj:"민법",text:"법률행위의 무효와 취소에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["취소된 법률행위는 처음부터 무효인 것으로 본다.","무효행위의 추인은 묵시적으로 할 수 있다.","토지거래계약 허가구역 내 토지에 대하여 처음부터 허가를 잠탈하는 내용의 매매계약이","반사회질서의 법률행위로서 무효인 경우, 그 무효로 선의의 제3자에게 대항할 수 있다.","취소할 수 있는 법률행위의 상대방이 확정된 경우에는 그 취소는 그 상대방에 대한"],answer:2},
    {num:18,subj:"민법",text:"미성년자 甲은 자신의 자전거를 乙에게 매도하는 계약을 체결하였고 甲은 미성년자 임을 이유로 계약을 취소하려고 한다. 이에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["甲은 계약을 취소하면 그가 악의인 경우에도 그 현존이익의 한도에서 상환할 책임이 있다.","甲은 법정대리인의 동의 없이 단독으로 계약을 취소할 수 있다.","甲의 취소권의 행사기간은 법원의 직권조사사항이다.","甲의 법정대리인이 취소할 수 있는 법률행위를 추인하는 경우, 그 추인은 취소의 원인이","甲의 취소권은 추인할 수 있는 날로부터 3년내에, 법률행위를 한 날로부터 10년내에"],answer:3},
    {num:19,subj:"민법",text:"법률행위의 조건과 기한에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["기한의 이익은 특약이나 법률행위의 성질로 분명하지 아니한 경우에는 채무자를 위한","채무자가 담보를 손상하게 한 때에 그는 기한의 이         익을 주장하지 못한다.","조건있는 법률행위의 당사자는 조건의 성부가 미정한 동안에는 조건의 성취로 인하여 생길","2024년 4 에 2024년 제12회 행정사 시험에 시하여응      최        격","불법조건이   붙은 법률행위는 그 조건만 무효이다."],answer:4},
    {num:20,subj:"민법",text:"법률행위의 부관에 관한 설명으로 옳은 것은?",choices:["정지조건 있는 법률행위는 조건이 성취한 때로부터 그 효력을            잃는다.","조건이 법률행위의 당시에 이미 성취할 수 없는 불능조건인 경우에는 그 조건이 해제","종기(","기한의 이익이 상대방에게도 있는 경우에 당사자 일방은 그 상대방의 손해를 배상하고","조건의 성취가 미정한 권리의무는 일반규정에 의하여 처분, 상속 또는 담보로 할 수 없다."],answer:3},
    {num:21,subj:"민법",text:"민법상 기간에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["내년 6월 1일부터 ‘4일 동안’이라고 하는 경우에 그 기산점은 내년 6월 1일이다.","기간을 시(時)로 정한 때에는 즉시로부터 기산한다.","정년이 60세라고 하는 것은 특별한 사정이 없으면 만60세가 만료되는 날을 말한다.","1세 에 이른 사 람 의 나이는 출생일을 산 입 하여 만(滿 ) 나이로 계산하고 연수(年數 )로","어느 기간의 말일인   6월 4일이 토요일이고 6월 6일이 공휴일인 경우, 그 기간은 6월 7일에"],answer:2},
    {num:22,subj:"민법",text:"甲의 乙에 대한 채권의 소멸시효기간이 가장 긴 것은? (甲, 乙은 상인이 아님)",choices:["甲이 연예인 乙에게 물건을 공급한 경우, 甲의 물건공급대금채권","甲의 동산을 乙이 사용한 경우, 甲의 동산사용료채권","甲교사의 강의를 乙학생이 수강한 경우, 甲의 수강료채권","甲이 乙에게 부동산을 매도한 경우, 甲의 매매대금채권","생산자 甲이 乙에게 생산물을 판매한 경우, 甲의 생산물대금채권"],answer:3},
    {num:23,subj:"민법",text:"소멸시효의 효력에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["소멸시효는 그 기산일에 소급하여 효력이 생긴다.","주된 권리의 소멸시효가 완성한 때에는 종속된 권리에 그 효력이 미친다.","소멸시효는 법률행위에 의하여 이를 배제할 수 없으나 연장할 수는 있다.","소멸시효의 이 익은 미리 포기하지 못한다.","채무자가 소멸시효 완성 후 채권자에 대하여 채무 일부를 변제함으로써 시효의 이익을"],answer:2},
    {num:24,subj:"민법",text:"소멸시효에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["부동산 매수인이 목적 부동산을 인도받아 계속 점유하고 있는 경우, 매수인의 소유권 이","소유권에 기한 물권적 청구권은 소멸시효에 걸리지 아니한다.","판결에 의하여 확정되고 판결 확정 당시에 변제기가 도래한 채권은 단기소멸시효에 해당한","시효의 중단은 원칙적으로 당사자        및 그 승계인 사이에만 효력이 있다.","점유권은 시효에   걸리지 아니한다."],answer:0},
    {num:25,subj:"민법",text:"소멸시효의 중단과 정지에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["채무자가 제기한 소에 대하여 채권자가 응소하여 그 소송에서 적극적으로 권리를 주장","승소 확정판결을 받은 채권자가 그 판결상 채권의 시효중단을 위해 후소를 제기하는 경","상속재산에 속한 권리나 상속재산에 대한 권리는 상속인의 확정, 관리인의 선임 또는            파","화해를 위한 소환은 상대방이 출석하지 아니한 때에는 화해신청인이 1월내에 소를 제기","천재 기타 사변으로 소멸시효를 중단할 수 없을 때에는 그 사유가 종료한 때로부터 1           월"],answer:1},
    {num:27,subj:"행정법",text:"공법관계에 관한 소송이 아닌 것은? (다툼이 있으면 판례에 따름)",choices:["행정재산의 사용허가 신청에 대한 거부를 다투는 소송","서울시립무용단 단원의 해촉에 관한 소송","공익사업으로 인하여 이주하게 된 주거용 건축물의 세입자에게 인정되는 주거이전비","주민등록전입신고와 그 수리 여부에 관한 소송","한국마사회 기수의 면허취소를 다투는 소송"],answer:4},
    {num:28,subj:"행정법",text:"공법상 계약에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["공법상 계약에는 법률우위의 원칙이 적용된다.","공법상 계약의 체결 시 계약의 목적    및 내용을 명확하게 적은 계약서를 작성하여야 한다.","공법상 계약에   따른 권리ㆍ의무의 확인 소송은 공법상 당사자소송에 의한다.","확약은 일방적 행위라는 점에서 복수당사자의 의사의 합치인 공법상 계약과는 구분된다.","｢ 국 가를 당사자로 하는 계약에 관한 법률｣에 따 라 국 가가 당사자가 되는 공공계약은"],answer:4},
    {num:29,subj:"행정법",text:"행정규칙에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정규칙은 특별한 사정이 없는 한 대외적으로 국민이나 법원을 구속하는 효력이 없다.","처분이 행정규칙을 따른 것이면 적법성이 보장된다.","처분이 행정규칙을 위반하였다고 해서 그러한 사정만으로 곧바로 위법하게 되는 것은","행정규칙에     따른 처분의 적법성 여부는 상위법령의 규정과 입법 목적 등에 적합한지","행정규칙이 그 정한 바에 따라 되풀이 시행되어 행정관행이 이루어지게 되면 행정기관은"],answer:1},
    {num:30,subj:"행정법",text:"행정행위의 효력에 관한 판례의 내용으로 옳지 않은 것은?",choices:["행정행위는 불가쟁력의 효력이 있어 법령에 의한 불복기간이 경과한 경우에는 당사자는","연령미달의 결격자가 타인의 이름으로 운전면허시험에 응시, 합격하여 교부받은 운전","민사소송에 있어서 어느 행정처분의 당연무효 여부가 선결 제로 되는 때에는 민사법원은","행정처분이 불    복기간의 경과로 인하여 확정될 경우, 그 처분의 기초가 된 사실관계나","구 ｢원자력법｣에   따른 원자로 시설의 부지사전승인처분은 그 자체로서 독립한 행정처분"],answer:3},
    {num:31,subj:"행정법",text:"행정기본법상 행정행위의 취소ㆍ철회에 관한 설명으로 옳은 것은?",choices:["위법한 처분의 일부에 대해 취소할 수 없다.","부당한 처분에 대해서는 취소할 수 없다.","당사자의 신    뢰를 보호할 가치가 있는 경우에는 위법한 처분에 대해 장래를 향하여 취소","적법한 처분은 중대한 공 을 위하여 필요한 경우에도 그 처분의 전부를 철회할 수 없다.","적법한 처분을 철회하는 경우에는 철회로 인하여 당사자가                 입게 될 불이익을 철회로"],answer:2},
    {num:32,subj:"행정법",text:"행정행위의 부관에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["행정청은 처분에 재량이 없는 경우에는 법률에 근거가 있는 경우에 부관을 붙일 수 있다.","부관은 해당 처분과 실질적인 관련이 있어야 하지만, 해당 처분의 목적에는 구속되지 않는다.","법률이 예정하는 행정행위의 효과를 일부 배제하는 부관은 독립하여 행정소송의 대상이","행정처분에     붙인 부담인 부관이 무효가 되면 그 부담의 이행으로 한 사법상 법률행위도","｢하천법｣상 하천부지 점용허가에는 그 성질상 부관을            붙일 수 없다."],answer:0},
    {num:33,subj:"행정법",text:"甲은 건축물을 신축하기 위하여 허가청인 A에게 건축허가(주된 허가)를 신청하였다. 甲은 건축허가를 신청하면서 산지전용허가도 받고자 하는데, 건축법상 甲이 건축허가 를 받으면 산지관리법에 따른 산지전용허가(관련 허가)를 받은 것으로 의제된다. 이에 관한 설명으로 옳지 않은 것은? (단, 관련 허가의 허가청은 B임)",choices:["甲은 건축허가를 A에게 신청하면서 산지전용허가에 필요한 서류를 함께 제출하여야 한다.","A는 건축허가를 하기 전에 산지전용허가에 관하여 미리 B와 협의하여야 한다.","B는 산지전용허가에 관한 법령을 위반하여 협의에 응해서는 아니 된다.","A와 B 사이에 협의가 되면 건축허가와 산지전용허가를 모두 받은 것으로 본다.","산지전용허가가 의제된 경우 B는 산지전용허가를 직접 한 것으로 보아 관계 법령에 따른"],answer:3},
    {num:34,subj:"행정법",text:"행정절차법상 처분절차에 관한 설명으로 옳은 것은?",choices:["행정청은 처분을 할 때에는 단 순 ㆍ 반 복 적인 처분으로서 당사자가 그 이유를 명 백히","행정청은 처분에 오기(誤記)가 있어서 직권으로 이를 정정한 경우에는 그 사실을 당사자","행정청은 행정청의     편의를 위하여 신청인이 다른 행정청에 처분을 구하는 신청을 접수","행정청은 다수의 행정청이 관여하는 처분을 구하는 신청을                접수한 경우에는 관계 행정","행정청은 필요한 처분기준을 정하여 공표하는 것이 해당 처분의 성질상 현저히 곤란한"],answer:3},
    {num:35,subj:"행정법",text:"공공기관의 정보공개에 관한 법률의 내용으로 옳지 않은 것은?",choices:["공개될 경우 부동산 투기, 매점매석 등으로 특정인에게 이익 또는 불이익을 줄 우려가","공공기관은 부득이한 사유가 없다면 정보공개의 청구를 받은                 날부터 10일 이내에 공개","공공기관은 공개 청구된 공개 대상 정보의 일부가 제3자와 관 이 있다고 인정할 때에는련","공공기관은 정보의 공개를 결정한 경우 해당 청구인이 사본의 교부를 원하는 때에는 이를","정보공개청구는 말로써 할 수 있다."],answer:0},

    {num:40,subj:"행정법",text:"甲의 건축허가 신청에 대하여 관할 군수 乙은 거부처분을 하였으나, 해당 거부처분 에 무효사유에 해당하는 하자가 있어 甲이 행정쟁송으로 다투고자 한다. 이에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["甲은 거부처분 무효확인심판을 제기할 수 있다.","甲은 의무이행심판을 제기할 수 있다.","甲이 거부처분 무효확인소송을 제기한 경우 무효인 사유를 주장ㆍ증명할 책임은 甲에게 있다.","甲이 거부처분 무효확인소송을 제기한 경우 ｢행정소송법｣상 취소소송의 사정판결 규정은","甲이 무효의 선언을 구하는 의미의 취소소송을 제기한 경우 제소기간의 제한이 없다."],answer:4},

    {num:43,subj:"행정법",text:"관할 시장 A는 2024. 2. 5. 甲에 대하여 1,000만 원의 과징금부과처분을 하였고, 甲 은 2024. 2. 6. 처분서를 수령하였다. 甲은 과징금부과처분 취소심판을 제기하였는데, 관할 행정심판위원회는 2024. 4. 23. 1,000만 원의 과징금부과처분을 700만 원으로 감액하는 일부취소재결을 하여, 해당 재결서의 정본이 2024. 4. 24. 甲에게 송달되었 다. 이때 甲이 일부취소재결에도 아직 취소되지 않고 남아있는 부분이 위법하다고 보아 취소소송을 제기하는 경우 소의 대상과 제소기간의 기산일은? (일부취소재결 고유의 하자는 없으며, 다툼이 있으면 판례에 따름) 소의 대상                             제소기간 기산일",choices:["700만 원으로 감액된 2024. 2. 5. 자 과징금부과처분                    2024. 4. 24.","700만 원으로 감액된 2024. 2. 5. 자 과징금부과처분                             6","700만 원으로 감액한 2024. 4. 23. 자 일부취소재결                    2024. 4. 24.","700만 원으로 감액한 2024. 4. 23. 자 일부취소재결                             6","2024. 2. 5. 자 1,000만 원의 과징금부과처분                       2024. 2. 6."],answer:0},

    {num:51,subj:"행정학개론",text:"외부효과에 관한 설명으로 옳지 않은 것은?",choices:["긍정적 외부효과는 사회적 적정수준보다 과잉생산의 결과를 가져온다.","불법주차, 환경오염 등은 부정적 외부효과를 야기 시키는 행위이다.","외부효과란 시장을 거치지 않고 제3자에게 이익을 주거나 비용을 부담시키는 행위이다.","부정적 외부효과를 해결하기 위해 조세를 부과할 수도 있다.","긍정적 외부효과의 대표적인 예는 교육, 교통정리 등이 있다."],answer:0},

    {num:59,subj:"행정학개론",text:"자치경찰제에 관한 설명으로 옳지 않은 것은?",choices:["2006년 제주특별자치도 자치경찰제 시범 도입에 이어 2021년부터 본격적으로 자치경찰제가","자치경찰사무로 지역 내 주민의 생활안전 활동과 교통활동에 관한 사무가 있다.","광역자치단체장 소속으로 시ㆍ도자치경찰위원회가 자치경찰사무를 관장한다.","시ㆍ도 자치경찰위원회는 시ㆍ도지사의 지휘감독을 받아 자치경찰사무를 수행한다.","국가경찰사무는 국민의 생명ㆍ신체 및 재산의 보호, 범죄의 예방ㆍ진압 및 수사 등이다."],answer:3},
    {num:62,subj:"행정학개론",text:"중앙인사기관에 관한 설명으로 옳지 않은 것은?",choices:["중앙인사기관은 각 행정기관의 합리적 인사운영, 인력의 효율적 활용, 공무원의 공직규범","중 앙인사기관은 행정수반으로부터의 독립성과 다수 위원들의 협의에 의한 의사결정을","1948년 정부수립 이후 우리나라 중앙인사기관은 비독립단독제 형태를 유지하여 오고 있다.","우리나라에서 인사관리기능을 수행하기 위해 각 부처의 인사기관과 각 지방자치단체의","현재 우리나라의 중앙인사기관은 국무총리 소속의 인사혁신처이다."],answer:2},
    {num:63,subj:"행정학개론",text:"공급의 담당주체와 수단의 결합방식으로 공공서비스를 아래와 같이 나타낼 때 ( ) 에 들어갈 내용으로 옳은 것은? 구분                 공급 주체 공공부문        민간부문 공급 수단      권력        (ㄱ)         (ㄴ) 시장        (ㄷ)         (ㄹ) :        :        :",choices:["ㄱ 일반행정, ㄴ 책임경영, ㄷ 민간위   탁, ㄹ: 민간기업","ㄱ: 책임경영, ㄴ: 일반행정, ㄷ: 민간기업, ㄹ: 민간위탁","ㄱ: 민간기업, ㄴ: 민간위탁, ㄷ: 책임경영, ㄹ: 일반행정","ㄱ: 일반행정, ㄴ: 민간위탁, ㄷ: 책임경영, ㄹ: 민간기업","ㄱ: 책임경영, ㄴ: 민간위탁, ㄷ: 일반행정, ㄹ: 민간기업"],answer:3},
    {num:64,subj:"행정학개론",text:"현대조직이론의 특징으로 옳지 않은 것은?",choices:["인간행태의 발전과 쇄신적 가치관을 중시하며 인간을 자아실현인ㆍ복잡인으로 파악한다.","가치의 다원화 및 행정현상의 다양성을 인정한다.","효과성ㆍ생산성ㆍ민주성ㆍ대응성ㆍ사회적 적실성과 종합적인 행정개혁을 중시한다.","조직을 환경과 상호작용하는 동태적ㆍ유기체적 개방체제로 파악한다.","조직발전을 위해 조직의 변동과 갈등을 전적으로 억제한다."],answer:4},
    {num:65,subj:"행정학개론",text:"경력직 공무원에 관한 설명으로 옳은 것은?",choices:["직업공무원제의 적용을 받지 않는다.","선거에 의해 취임하는 공무원은 경력직 공무원이다.","특수한 임무를 수행하기 위해 임용되는 별정직 공무원이 대표적인 경력직 공무원이다.","실적과 자격에 의해 임용되며 신분이 보장된다.","기술직과 연구직에 종사하는 공무원은 경력직 공무원에 해당하지 않는다."],answer:3},
    {num:66,subj:"행정학개론",text:"공공서비스 생산방식 중 이용권(voucher)에 관한 설명으로 옳지 않은 것은?",choices:["공공서비스의 생산을 민간에 위탁하는 방법 중의 하나이다.","시민들은 정부가 지정하는 하나의 서비스 제공 기관에서 이용권을 사용하여야 한다.","보건복지부는 각종 돌봄서비스에서 전자 이용권을 제공하고 있다.","소비자 중심의 맞춤형 사회서비스가 강조되면서 서비스가 확대되고 있다.","노인, 장애인, 보육 정책 등에서 서비스가 확대되고 있다."],answer:1},
    {num:68,subj:"행정학개론",text:"우리나라 스마트 전자정부의 비전에 관한 설명으로 옳지 않은 것은?",choices:["국민이 직접 증명하는 공급자 중심의 획일적인 서비스를 극대화하는 정부이다.","부처 간 장벽이 없는 네트워크를 통해 서비스 연계ㆍ통합이 가능한 정부이다.","모바일 기기 등으로 어디서나 편리한 서비스를 제공하는 정부이다.","국민의 수요에 실시간으로 반응하는 서비스를 제공하는 정부이다.","참여ㆍ소통으로 수요자가 원하는 서비스와 정보를 제공하는 정부이다."],answer:0},
    {num:70,subj:"행정학개론",text:"지방자치에 관한 설명으로 옳은 것은?",choices:["일정기간 지역에 거주하지 않았더라도 주민등록만 되어 있다면 지방자치법상 주민으로","국가로부터 일정한 부분 자치권한을 이양 받은 자치권을 고유권이라고 한다.","특례시에는 자치구가 설치되어 있다.","자치권이란 자연적으로 발생한 주민의 권리이므로 전래권이다.","지방자치단체는 주민의 복리와 재산을 보호하고 외교ㆍ국방과 같은 문제를 다룬다."],answer:0},
    {num:71,subj:"행정학개론",text:"정책결정의 이론모형에 관한 설명으로 옳지 않은 것은?",choices:["만족모형은 인간의 능력에 한계가 있으므로 최적의 대안이 아닌 만족하는 정도의 대안","최적모형은 비정형적인 정책결정 시 창의성이나 통찰력 같은 초합리성을 중요시 한다.","쓰레기통모형은 고도로 불확실한 조직상황하에서의 정책결정양태를 설명한다.","관료정치모형은 의견이 동일한 관리자들이 연합하여 최종해결안을 선택하고, 토론과","점증모형은 정책결정과정을 약간의 향상을 위해 그럭저럭 헤쳐 나가는 과정으로 본다."],answer:3},
    {num:72,subj:"행정학개론",text:"정책이론에 관한 설명으로 옳지 않은 것은?",choices:["마르크스주의 - 현대국가는 모든 자본가 계층의 공통된 이해관계를 대변하기 위한 위원","엘리트주의 - 지배계층은 모든 정책과정을 장악하고 영향력을 행사하며 정책의 혜택을","무의사결정 - 정치적 행위자는 자신의 효용과 만족감을 최대화하기 위하여 합리적으로","제도주의 - 정책분석의 초점은 정부제도의 공식적ㆍ법적 기구에 맞추는 것이다.","다원주의 - 정부의 역할은 단지 집단 간의 이익대결과 갈등을 조정하는 중립적인 제3자에"],answer:2},
    {num:73,subj:"행정학개론",text:"주민소송제에 관한 설명으로 옳은 것은?",choices:["주민들이 공직자를 재직 중에 불신임해 그만두게 하는 제도로서 가장 적극적이고 강력한","지역의 주요 안건을 해결하는 제도로서 지방자치단체의 중요한 사항에 대하여 결정권을","선출직 공직자를 임기 중에 소환해 파면시키는 제도이다.","주민이 감사청구한 일정한 재무회계 사항과 관련이 있는 지방자치단체의 장 등의 위법한","주민이 능동적이고 적극적으로 지방자치단체의 장이나 의회의원 권한의 일부를 제약"],answer:3},
    {num:75,subj:"행정학개론",text:"관리과학에 관한 설명으로 옳은 것은?",choices:["정책이 내포하는 목적가치를 중요시 한다.","자원과 비용의 사회적 배분을 고려한다.","질적 분석을 중요시 한다.","정치적 요인을 고려한다.","계량적 분석에 입각하여 처방을 제시한다."],answer:4},

  "2025": [
    {num:1,subj:"민법",text:"관습법과 사실인 관습에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["미등기 무허가건물의 취득자에게는 소유권에 준하는 관습법상의 물권이 있다.","사실인 관습은 법원(法源)으로서 법령에 저촉되지 않는 한 법칙으로서의 효력이 있다.","시효로 관습법상 분묘기지권을 취득한 사람은 토지소유자가 분묘기지에 관한 지료를","관습법은 그 존재를 당사자가 주장, 증명하여야 하고, 법원이 직권으로 확정할 수 없다.","사실인 관습은 관련 분야의 제정법이 강행규정이라도 특별한 사정이 없는 한 법률행위의"],answer:2},
    {num:2,subj:"민법",text:"신의성실의 원칙에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["신의성실의 원칙은 당사자의 주장이 없더라도 법원이 직권으로 판단할 수 있다.","소멸시효를 이유로 한 채무자의 항변권 행사에는 신의성실의 원칙이 적용되지 않는다.","무권대리인이 본인을 단독 상속한 경우, 본인의 지위에서 추인을 거절하더라도 신의성실의","강행규정에 위반하여 계약을 체결한 자가 스스로 그 계약의 무효를 주장하는 것은 특별한","조건의 성취로 이익을 받을 당사자가 신의성실에 반하여 조건을 성취시키더라도, 상대방이"],answer:0},
    {num:3,subj:"민법",text:"법원에 의하여 부재자 甲의 재산관리인으로 선임된 乙에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["乙은 관리할 甲의 재산목록을 작성해야 한다.","법원은 甲의 재산으로 乙에게 상당한 보수를 지급할 수 있다.","乙은 법원의 허가가 없으면 부동산 소유권이전등기말소절차의 이행을 청구할 수 없다.","법원은 甲 소유 부동산에 대한 乙의 처분행위를 사후 추인의 방법으로 허가할 수 있다.","乙이 甲의 사망을 확인했더라도, 부재자 재산관리인으로서의 선임결정이 취소되지 않으면,"],answer:2},
    {num:5,subj:"민법",text:"민법상 한정후견인 제도에 관한 설명으로 옳지 않은 것은?",choices:["가정법원은 피한정후견인이 한정후견인의 동의를 받아야 하는 행위의 범위를 정할 수","질병, 장애, 노령 등으로 인한 정신적 제약 때문에 사무 처리 능력이 지속적으로 결여된","가정법원이 한정후견개시의 심판을 할 때 피성년후견의 경우에서와 마찬가지로 본인의","피한정후견인의 행위에서 한정후견인의 동의가 필요한 범위에 대한 변경 청구는 검사나","피한정후견인이 한 법률행위가 일상생활에 필요하고 그 대가가 과도하지 않다면, 그 법"],answer:1},
    {num:6,subj:"민법",text:"민법상 법인의 정관에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["사단법인의 정관은 자치법규가 아니라 계약이다.","재단법인의 정관은 특별한 사정이 없는 한, 그 변경방법을 정관에 정한 때에 한하여","이사의 대표권에 대한 제한은 이를 정관에 기재하지 않더라도 등기하면 효력이 있다.","사단법인의 정관 변경은 법원의 허가를 얻지 않으면 효력이 없다.","재단법인의 존립시기나 해산사유는 정관의 필요적 기재사항이다."],answer:1},
    {num:7,subj:"민법",text:"민법상 사단법인에 관한 규정 중 비법인사단에 유추적용할 수 없는 것은? (다툼이 있으면 판례에 따름)",choices:["임시이사의 선임에 관한 제63조","법인의 권리능력에 관한 제34조","법인의 해산에 따른 청산인을 정하는 제82조","이사의 대표권에 대한 제한의 대항요건을 규정한 제60조","대표자의 불법행위에 대한 법인의 책임을 규정한 제35조 제1항"],answer:3},
    {num:8,subj:"민법",text:"민법상 법인의 소멸에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["사단법인은 사원이 없게 되거나 총회의 결의로도 해산한다.","청산종결등기가 마쳐진 경우에도 청산사무가 종료되지 않았다면 청산법인으로 존속한다.","청산인은 채권자에 대하여 채권신고를 최고해야 하고, 알고 있는 채권자는 청산에서","법인이 파산이 아닌 사유로 해산한 경우 정관 또는 총회의 결의로 달리 정한 바가 없으면,","민법상의 청산절차에 관한 규정은 강행규정이므로 이에 반하는 잔여재산의 처분행위는"],answer:2},
    {num:9,subj:"민법",text:"주물과 종물에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["주물과 종물은 동일한 소유자에 속한 것으로 법률상 하나의 물건으로 취급된다.","주물 소유자의 상용에 공여되고 있는 물건이라도 주물 자체의 효용과 직접 관계가 없다면","주물을 처분할 때 특약으로 종물을 제외할 수 없고 종물만을 별도로 처분할 수도 없다.","주물과 종물의 관계에 관한 법리는 주된 권리와 종된 권리 상호간에는 적용되지 않는다.","종물은 주물의 처분에 따른다는 법률효과는 주물의 권리관계가 공법상 처분에 의하여"],answer:1},
    {num:10,subj:"민법",text:"법률행위에 관한 설명으로 옳지 않은 것은?",choices:["법률행위인 계약의 자유는 사적 자치의 주요한 발현 형식이다.","계약은 청약과 승낙의 의사표시가 합치하여 성립하는 법률행위이다.","단독행위는 법률행위의 일종으로서 법률효과를 발생시키는 법률요건이다.","법률행위인 유언과 상속은 법률효과의 발생에 의사표시가 필수적이라는 점에서 공통점이","종기가 있는 법률행위는 기한이 도래한 때로부터 그 효력을 잃는다."],answer:3},
    {num:12,subj:"민법",text:"반사회질서의 법률행위에 해당하지 않는 것은? (다툼이 있으면 판례에 따름)",choices:["매도인의 배임행위에 적극 가담한 이중매매계약","도박자금에 제공할 목적으로 한 금전소비대차계약","형사사건의 변호에서 무죄 판결을 받기 위해 성공보수를 약정하는 계약","소송에서 사실대로 증언해 주는 대가로 통상적이지 않은 거액을 받기로 한 약정","해외파견 교육연수를 받은 근로자가 일정기간 소속 회사에 근무하기로 한 약정"],answer:4},
    {num:13,subj:"민법",text:"불공정한 법률행위에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["특별한 사정이 없는 한 경매에도 불공정한 법률행위에 관한 민법 제104조가 적용된다.","매매계약이 약정된 대금의 과다로 인해 불공정한 법률행위에 해당하여 무효인 경우,","불공정한 법률행위는 원칙적으로 무효행위의 추인에 의해서 유효로 될 수 없다.","무상 증여계약도 불공정한 법률행위가 될 수 있다.","불공정한 법률행위로서 무효인 경우에 선의의 제3자에 대해서는 무효를 주장할 수 없다."],answer:2},
    {num:14,subj:"민법",text:"진의 아닌 표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["진의 아닌 의사표시는 원칙적으로 표시된 대로 법적 효과가 발생한다.","진의 아님을 알았다는 사실은 의사표시의 유효를 주장하는 사람이 증명해야 한다.","진의는 특정 내용의 의사표시를 하고자 하는 표의자의 생각이지 표의자가 진정으로","표시가 진의와 다 름을 표의자가 알고 있다는 점은 착오와 구별된다.","표시와 진의의 불일치가 상대방과 합의된 것이라면 통정허위표시이다."],answer:1},
    {num:15,subj:"민법",text:"사기에 의한 의사표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["의사표시의 상대방이 없는 경우라면, 기망행위를 누가 했는지에 상관없이 취소할 수 있다.","상대방의 대리인에 의한 사기는 민법 제110조 제2항에서 말하는 제3자의 사기에 해당하지","고지의무가 있는 사람이 알리지 않고 일부          러 침묵하였다면, 부작위라도 기망행위가 될","기망행위로    착오에 빠지게 된 경우이므로, 의사와 표시의 불일치가 아니라 의사표시의","표의자에게 특정한 의사표시를 하도록 하는 것을             넘어 재산상의 손실을 주려는 기망"],answer:4},
    {num:16,subj:"민법",text:"표현대리에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["권한을 넘은 표현대리에서 법정대리권도 기본 대리권이 될 수 있다.","대리행위가 강행법규 위반으로 무효이더라도 표현대리 법리가 적용된다.","처음부터 아무 대리권도 없     었던 사람의 대리행위에 대하여 대리권 소멸 후의 표현대리를","대리권 수여의 표시로 인한 표현대리에서 대리권 존재에 대한 상대방의 선의            및 무과실은","표현대리의 성립으로 본인이 이행책임을 질 때 상대방의 과실이 있는 경우에는 과실상"],answer:0},
    {num:17,subj:"민법",text:"민법상 법률행위의 무효에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["법률행위의 일부분이 무효인 때에는 그 전부를 무효로 하지만, 무효부분이 없더라도 법","무효인 법률행위가 다른 법률행위의 요건을 구비하고, 당사자가 무효를 알았더라면 다른","무효인 법률행위는 추인하여도 효력이 생기지 않지만, 당사자가 무효임을 알고 추인한","토지거래 허가구 역 내 토지에 대하여 허가를 받기 전에 한 매매가 처음부터 허가를","무권리자가    타인의 권리를 처분하는 계약을 한 경우, 권리자가 추인하면 그 계약의 효과는"],answer:3},
    {num:18,subj:"민법",text:"미성년자의 매매계약을 미성년을 이유로 취소하는 경우, 민법 제146조가 규정하는 취소권의 행사기간에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["취소권은 추인할 수 있는 날로부터 3년 내에, 매매계약을 한 날로부터 10년 내에 행사해야","추인할 수 있는 날은 취소 원인의 종료로 취소권행사에 관한 장애가 없              어져서 취소권자가","미성년자가 성년에 이른 날로부터 3년, 법정대리인이 미성년자의 매매계약을                  안 날로부","민법 제146조의 취소권 소멸 규정은 제     척기간이 아니라 소멸시효기간에 관한 것이다.","취소권은 재판상이  든 재판외이든 민법 제146조가 규정하는 기간 내에 행사하면 된다."],answer:3},
    {num:20,subj:"민법",text:"법률행위의 조건에 관한 설명으로 옳은 것은?",choices:["해제조건이 있는 법률행위는 조건이 성취한 때부터 효력이 생긴다.","조건의 성취가 미정한 권리의무는 일반규정에 의해 처분, 상속 또는 담보로 할 수 없다.","선량한 풍속 기타 사회질서에 위반한 조건의 법률행위는 조건이 없는 법률행위이다.","해제조건이 법률행위의 당시에 이미 성취할 수 없는 것인 경우 그 법률행위는 무효이다.","기한은 특별한 사정이 없는 한 채무자의 이익을 위한 것으로 추정한다."],answer:4},
    {num:21,subj:"민법",text:"민법상 기간에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["기간의 계산은 법령, 재판상의 처분 또는 법률행위에 다른 정한 바가 없으면 민법의","민법의 기간에 관한 규정은 사법관계      뿐만 아니라 공법관계에도 적용된다.","나이는 출생일을 산입하여 만(滿) 나이로 계산한다.","기간을 일, 주, 월 또는 년으로 정한 때는 초일 불산입의 원칙이 적용되어 당사자간의","기간의 말일이 토요일 또는 공    휴일에 해당한 때는 기간은 그 익일로 만료한다."],answer:3},
    {num:22,subj:"민법",text:"소멸시효와 제척기간에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["소멸시효의 이익은 미리 포기할 수 있다.","소멸시효는 그 기산일에 소급하여 효력이 생긴다.","제척기간이 경과한 때부터 장래에 향하여 권리가 소멸한다.","제척기간의 기산점은 특별한 사정이 없는 한 원칙적으로 권리가 발생한 때이다.","제척기간이 도과했는지 여부는 당사자의 주장이 없더라도 법원이 직권으로 조사하여"],answer:0},
    {num:23,subj:"민법",text:"민법상 3년의 소멸시효 기간의 적용을 받는 채권이 아닌 것은?",choices:["이자 기타 1년 이내의 기간으로 정한 금전지급채권","의사의 치료에 관한 채권","도급받은 자의 공사에 관한 채권","변호사의 직무에 관한 채권","판결에 의하여 확정된 채권"],answer:4},
    {num:24,subj:"민법",text:"소멸시효의 기산점에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["동시이행의 항변권이 붙은 채권의 소멸시효는 이행기부터 진행한다.","이행불능으로 인한 전보배상청구권의 소멸시효는 이행불능시부터 진행한다.","기한의 정    함이 없는 채권의 소멸시효는 채권이 성립한 때부터 진행한다.","형성권적 기한이익 상실의 특약이 있는 할부채무는 1회의 불이행시부터 바로 전액에 대해","부작위를 목적으로 하는 채권의 소멸시효는 위반행위를 한 때부터 진행한다."],answer:3},
    {num:25,subj:"민법",text:"소멸시효 중단에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["재판상의 청구는 그 소송이 각하, 기각 또는 취하된 경우에는 그로부터 6월 내에 다시","시효중단의 효력있는 승인은 상대방의 권리에 관한 처분의 능력이나 권한이 있음을","시효의 중단은 원칙적으로 당사자        및 그 승계인간에만 효력이 있다.","압류는 시효의 이익을 받은 자에 대해 하지 않은 때에는 이를 그에게 통지한 후가 아니면","재판상의 청구로 인해 중단한 시효는 재판이 확정된 때부터              새로이 진행한다."],answer:1},
    {num:28,subj:"행정법",text:"행정계획에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정계획이란 특정한 행정목표를 달성하기 위하여 서로 관련되는 행정수단을 종합ㆍ조","행정주체는 구체적인 행정계       획을 입안ㆍ결정하면서 비교적 광범위한 형성의 자유를","행정주체가 기반시 을 조성하기 위하여 도시ㆍ 계 시 결정을 할 때 행사하는 재 권       량","자연환경 보호 등을 목적으로 하는 도시관리계 획결정은 행정청의 재량적 판단으로서,","구) 「도시계획법」상 도시기본계획은 일반 국민에 대한 직접적인 구속력이 있다."],answer:4},
    {num:29,subj:"행정법",text:"행정입법에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["상급행정기관의 소속 공무원에 대한 업무처리지침은 일반적으로 행정조직 내부에서만","조례는 집행행위의 개입 없이도 그 자체로서 직접 국민의 구체적인 권리의무에 영향을","처분이 행정규칙을 위반하      였다고 해서 그러한 사정만으로 곧바로 위법하게 되는 것은","지방의회는 자치사무에 관하여 법률에 특별한 규정이 없는 한 지방자치단체의 장의","법령보충적 행정규칙은 상위법령과 결합하여 대외적 구속력이 있는 법규명령으로서의"],answer:1},
    {num:30,subj:"행정법",text:"인허가의제 제도에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["인허가의제를 받으려면 주된 인허가를 신청할 때, 불가피한 사유로 함께 제출할 수 없는","주된 인허가 행정청은 주된 인허가를 하기 전에 관련 인허가에 관하여 미리 관련 인허가","인허가의제의 효과는 주된 인허가의 해당 법률에 규정된 관련 인허가에 한정된다.","인허가의제의 경우 관련 인허가 행정청은 관련 인허가를 직접 한 것으로 보아 관계","인허가의제 제도는 사업시행자의 이익을 위하여 만들어진 것이므로 사업시행자가 반드시"],answer:4},

    {num:34,subj:"행정법",text:"행정절차법상 행정응원을 요청할 수 있는 경우로 명시된 경우가 아닌 것은?",choices:["법령등의 이유로 독자적인 직무 수행이 어려운 경우","행정서비스에 대한 국민의 만족도를 높이기 위하여 필요한 경우","다른 행정청의 응원을 받아 처리하는 것이 보다 능률적이고 경제적인 경우","다른 행정청에 소속되어 있는 전문기관의 협조가 필요한 경우","인원ㆍ장비의 부족 등 사실상의 이유로 독자적인 직무 수행이 어려운 경우"],answer:1},
    {num:36,subj:"행정법",text:"개인정보 보호법령상 고정형 영상정보처리기기를 설치ㆍ운영할 수 있는 경우로 명시된 경우가 아닌 것은?",choices:["범죄의 예방 및 수사를 위하여 필요한 경우","화재 예방을 위하여 정당한 권한을 가진 자가 설치ㆍ운영하는 경우","교통단속을 위하여 정당한 권한을 가진 자가 설치ㆍ운영하는 경우","촬영 사실을 명확히 표시하여 정보주체가 촬영 사실을 알 수 있도록 하였음에도 불구하고","촬영된 영상정보를 저장하지 아니하는 경우로서 출입자 수, 성별, 연령대 등 통계값 또는"],answer:3},
    {num:37,subj:"행정법",text:"행정대집행법의 내용에 관한 설명으로 옳지 않은 것은?",choices:["행정청은 해가 지기 전에 대집행을 착수한 경우라도 해가 진 후에는 대집행을 하여서는","대   집행에 요한 비용에 대하여서는 행정청은 사무비의 소속에 따라 국세에 다음가는","대집행에 대하여는 행정심판을 제기할 수 있다.","대집행에 요한 비용은 「국세징수법」의 예에 의하여 징수할 수 있다.","의무자가 동의한 경우 행정청은 해가 뜨기 전에 대집행을 할 수 있다."],answer:0},

    {num:39,subj:"행정법",text:"행정소송법상 항고소송에 관한 내용으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["국가기관은 취소소송의 당사자가 될 수 있다.","교육에 관한 조례의 무효확인소송을 제기함에 있어서는 그 조례의 공포권이 있는 시ㆍ도","대리권을 수여받은 데 불과하여 그 자신의 명의로는 행정처분을 할 권한이 없는 행정청","지방자치단체장이       국유 일반재산을 대부하여 달라는 신청을 거부한 것은 행정처분이","행정규칙에 의한 불문경고조치는 항고소송의 대상이 되는 행정처분에 해당하지 아니한다."],answer:4},

    {num:42,subj:"행정법",text:"공익사업을 위한 토지 등의 취득 및 보상에 관한 법률의 내용에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["사업시행자는 사용의 개시일에 토지의 사용권을 취득하며, 그 토지에 관한 다른 권리는","수용재결에 불복할 때는 이의신청을 거치지 않고도 행정소송을 제기할 수 있다.","재결에 의한 경우 보상액의 산정은 수용개시 당시의 가격을 기준으로 한다.","사업인정처분이 당연무효이더라도 그것이 유효함을 전제로 이루어진 수용재결이 무효가","보상액을 산정할 경우에 해당 공익사          업으로 인하여 토지등의 가격이 변동되었을 때에는"],answer:1},
    {num:44,subj:"행정법",text:"행정기관에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["상급행정기관의 하급행정기관에 대한 승인 ㆍ 동의 ㆍ 지시는 국 민의 권리 의무에 직접","법제처는 국무총리 소속 행정기관이다.","중앙행정기관의 설치와 직무범위는 법률로 정한다.","각 행정기관의 장은 소관사무를 통할하고 소속공무원을 지휘ㆍ감독한다.","행정기관에는 그 소관사무의 일부를 독립하여 수행할 필요가 있는 때에는 법률로 정하는"],answer:0},

    {num:47,subj:"행정법",text:"국가재정법의 내용에 관한 설명으로 옳지 않은 것은?",choices:["예산, 결산 및 기금에 관한 사무는 기획재정부장관이 관장한다.","각 회계연도의 경비는 그 연도의 세입 또는 수입으로 충당하여야 한다.","국가의 회계는 통상회계와 임시회계로 구분한다.","한 회계연도의 모든 수입을 세입으로 하고, 모든 지출을 세출로 한다.","예산은 예산총칙ㆍ세입세출예산ㆍ계속비ㆍ명시이월비 및 국고채무부담행위를 총칭한다."],answer:2},

    {num:50,subj:"행정법",text:"국유재산법의 내용에 관한 설명으로 옳은 것은?",choices:["보존용재산은 일반재산에 속한다.","공용재산이   란 국가가 직접 공공용으로 사용하거나 대통령령으로 정하는 기한까지 사용","기업용재산은 「민법」 제245조에 따른 시효취득의 대상이 된다.","판결에 따라 취득하는 경우에도 사권(私權)이 설정된 재산은 그 사권이 소멸된 후가","총괄청이나 중앙관서의 장은 소유자 없는 부동산을 국유재산으로 취득한다."],answer:4},

function getYrSt(year){
  const qs=QUESTIONS_DB[year]||[];
  const res=S.yr[year]||{};
  const ans=res.answers||{};
  let ok=0,ng=0,sk=0;
  const hasAns=qs.some(q=>q.answer!==null&&q.answer!==undefined);
  qs.forEach((q,i)=>{
    const c=ans[i];
    if(c===undefined){sk++;return;}
    if(q.answer===null||q.answer===undefined)return;
    const cs=Array.isArray(q.answer)?q.answer:[q.answer];
    if(cs.includes(c))ok++;else ng++;
  });
  const answered=Object.keys(ans).length;
  const isDone=answered===qs.length;
  const pct=hasAns&&answered>0?Math.round(ok/answered*100):null;
  return{qs,ans,ok,ng,sk,answered,isDone,pct,hasAns,total:qs.length};
}

function getThQs(theme){
  const subj=theme.id.startsWith('민법_')?'민법':theme.id.startsWith('행정법_')?'행정법':'행정학개론';
  const res=[];
  Object.entries(QUESTIONS_DB).forEach(([yr,qs])=>{
    qs.forEach(q=>{
      if(q.subj!==subj)return;
      const hay=(q.text+' '+q.choices.join(' ')).toLowerCase();
      if(theme.keywords.some(kw=>hay.includes(kw.toLowerCase())))
        res.push({...q,year:yr});
    });
  });
  return res;
}

function getThSt(tid,tqs){
  const res=S.th[tid]||{};const ans=res.answers||{};
  let ok=0,ng=0;
  tqs.forEach((q,i)=>{
    const c=ans[i];if(c===undefined)return;
    if(q.answer===null||q.answer===undefined)return;
    const cs=Array.isArray(q.answer)?q.answer:[q.answer];
    if(cs.includes(c))ok++;else ng++;
  });
  const answered=Object.keys(ans).length;
  const isDone=answered===tqs.length&&tqs.length>0;
  const hasAns=tqs.some(q=>q.answer!==null&&q.answer!==undefined);
  const pct=hasAns&&answered>0?Math.round(ok/answered*100):null;
  return{ok,ng,answered,isDone,pct,hasAns,total:tqs.length};
}

    const st=SS[key];

    html+='</div>';

// ── 시작 ──
function startYear(year){
  const qs=(QUESTIONS_DB[year]||[]).map((q,i)=>({...q,year,idx:i}));
  const ex=S.yr[year]||{};
  ses={mode:'year',key:year,qs,ans:{...(ex.answers||{})},memos:{...(ex.memos||{})},cur:0};
  if(Object.keys(ses.ans).length>0&&Object.keys(ses.ans).length<qs.length){
    for(let i=0;i<qs.length;i++){if(ses.ans[i]===undefined){ses.cur=i;break;}}
  }
  document.getElementById('exam-title').textContent=year+'년 제'+(RD[year]||'')+'회';
  document.getElementById('exam-chip').textContent=qs.length+'문제';
  document.getElementById('q-ychip').style.display='none';
  show('s-exam');renderQ();
}

function startTheme(tid){
  const th=Object.values(THEMES).flat().find(t=>t.id===tid);
  const qs=getThQs(th).map((q,i)=>({...q,idx:i}));
  if(!qs.length){alert('해당 테마의 문제가 없습니다.');return;}
  const ex=S.th[tid]||{};
  ses={mode:'theme',key:tid,qs,ans:{...(ex.answers||{})},memos:{...(ex.memos||{})},cur:0};
  if(Object.keys(ses.ans).length>0&&Object.keys(ses.ans).length<qs.length){
    for(let i=0;i<qs.length;i++){if(ses.ans[i]===undefined){ses.cur=i;break;}}
  }
  document.getElementById('exam-title').textContent=th.name;
  document.getElementById('exam-chip').textContent=qs.length+'문제';
  document.getElementById('q-ychip').style.display='';
  show('s-exam');renderQ();
}

function retryExam(){
  const k=ses.mode==='year'?'yr':'th';

  if(ses.mode==='year')startYear(ses.key);else startTheme(ses.key);
}

function renderQ(){
  const q=ses.qs[ses.cur],tot=ses.qs.length;
  const done=Object.keys(ses.ans).length;
  document.getElementById('q-ctr').textContent=(ses.cur+1)+'/'+tot;
  document.getElementById('q-pct').textContent=Math.round(done/tot*100)+'%';
  document.getElementById('p-fill').style.width=(done/tot*100)+'%';
  if(ses.mode==='year'){
    document.getElementById('q-num').textContent='문제 '+q.num;
  } else {
    document.getElementById('q-num').textContent='Q'+(ses.cur+1);
    document.getElementById('q-ychip').textContent=q.year+'년 '+q.num+'번';
  }
  document.getElementById('q-subj').textContent=q.subj;
  document.getElementById('q-text').textContent=q.text;
  const hasAns=q.answer!==null&&q.answer!==undefined;
  document.getElementById('q-noanswer').style.display=hasAns?'none':'';

  const el=document.getElementById('choices');el.innerHTML='';
  q.choices.forEach((c,i)=>{
    if(!c)return;
    const btn=document.createElement('button');
    btn.className='cb';
    btn.innerHTML='<span class="cl">'+LB[i]+'</span><span>'+c+'</span>';
    btn.onclick=()=>pick(i);
    el.appendChild(btn);
  });

  document.getElementById('ex-box').classList.remove('on');
  document.getElementById('ex-btn').style.display='none';
  document.getElementById('memo').value=ses.memos[ses.cur]||'';
  document.getElementById('memo-ok').style.opacity='0';
  document.getElementById('btn-prev').disabled=ses.cur===0;
  document.getElementById('btn-next').innerHTML=ses.cur===tot-1
    ?'채점하기 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>'
    :'다음 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>';

  if(ses.ans[ses.cur]!==undefined)restorePick(q);
}

function pick(idx){
  if(ses.ans[ses.cur]!==undefined)return;
  ses.ans[ses.cur]=idx;persist();
  markChs(ses.qs[ses.cur],idx);updateProg();
}

function markChs(q,chosen){
  const btns=document.querySelectorAll('.cb');
  btns.forEach(b=>b.disabled=true);
  const hasAns=q.answer!==null&&q.answer!==undefined;
  if(hasAns){
    const cs=Array.isArray(q.answer)?q.answer:[q.answer];
    btns.forEach((b,i)=>{
      if(cs.includes(i))b.classList.add('ok');
      else if(i===chosen&&!cs.includes(i))b.classList.add('ng');
    });
  } else {
    btns[chosen]?.classList.add('sel');
  }
  document.getElementById('ex-btn').style.display='block';
}

function restorePick(q){markChs(q,ses.ans[ses.cur]);}

function updateProg(){
  const done=Object.keys(ses.ans).length,tot=ses.qs.length;
  document.getElementById('q-pct').textContent=Math.round(done/tot*100)+'%';
  document.getElementById('p-fill').style.width=(done/tot*100)+'%';
}

function prevQ(){if(ses.cur>0){ses.cur--;renderQ();}}
function nextQ(){if(ses.cur<ses.qs.length-1){ses.cur++;renderQ();}else showResult();}

function saveMemo(){
  ses.memos[ses.cur]=document.getElementById('memo').value;persist();
  const el=document.getElementById('memo-ok');el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1500);
}
function confirmBack(){
  persist();
  if(Object.keys(ses.ans).length>0&&Object.keys(ses.ans).length<ses.qs.length){
    if(!confirm('진행 중입니다. 저장 후 홈으로 가시겠어요?'))return;
  }
  goHome();
}
function persist(){
  const k=ses.mode==='year'?'yr':'th';
  S[k][ses.key]={answers:{...ses.ans},memos:{...ses.memos}};sv();
}
