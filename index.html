  "2017": [
    {num:1,subj:"민법",text:"관습법과 사실인 관습에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["관습법은 성문법에 대하여 보충적 효력을 가진다.","관습법이 성립하기 위해서는 사회구성원의 법적 확신과 인식이 있어야 한다.","사실인 관습은 법원(法源)으로서의 효력이 인정된다.","사실인 관습은 그 존재를 당사자가 주장ㆍ증명하여야 한다.","사실인 관습은 당사자의 의사가 명확하지 아니한 때에 그 의사를 보충함에 그친다."],answer:2},
    {num:2,subj:"민법",text:"신의성실의 원칙에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["제한능력자의 행위라는 이유로 법률행위를 취소하는 것은 신의성실의 원칙에 위배되지 않는다.","강행법규에 위반하여 약정을 체결한 당사자가 그 약정의 무효를 주장하는 것은 신의성","무권대리인이 본인을 단독 상속한 경우 본인의 지위에서 추인을 거절하는 것은 신의성","이사가 회사재직 중 회사의 확정채무를 보증한 후 사임한 경우에 사정변경을 이유로 보","법원은 당사자의 주장이 없더라도 직권으로 신의성실의 원칙에 위반되는지 여부를 판단"],answer:3},
    {num:4,subj:"민법",text:"부재와 실종에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["실종선고를 받은 사람은 사망한 것으로 추정되므로 반증을 들어 실종선고의 효과를 다","부재자 재산관리인의 권한초과행위에 대한 법원의 허가 결정은 기왕의 법률행위를 추인","법원이 선임한 재산관리인은 재산의 보존행위를 하는 경우에 법원의 허가를 얻어야 한다.","부재자 재산관리인으로서 권한초과행위의 허가를 받고 그 선임결정이 취소되기 전에 그","실종선고 확정 전 실종자를 당사자로 하여 선고된 판결은 효력이 없다."],answer:3},
    {num:6,subj:"민법",text:"법인의 불법행위책임에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["대표권이 없는 이사의 행위로 인하여는 법인의 불법행위가 성립하지 않는다.","외형상 법인의 대표자의 직무행위라고 인정할 수 있는 것이라면 그것이 법령규정에 위","법인의 대표자의 행위가 직무에 관한 행위에 해당하지 아니함을 피해자가 중대한 과실","이사의 대표권에 대한 제한은 정관에 기재하여야 효력이 발생하고, 등기하면 제3자에게","법인의 권리능력을 벗어나는 행위의 효과는 법인에게 귀속되지 않기 때문에 이로 인하"],answer:4},
    {num:7,subj:"민법",text:"물건에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["독립된 부동산으로서의 건물이라고 하기 위하여는 최소한의 기둥과 지붕 그리고 주벽이","주물과 종물을 별도로 처분하는 약정은 효력이 없다.","주물과 다른 사람의 소유에 속하는 물건은 종물이 될 수 없다.","법정과실은 수취할 권리의 존속기간일수의 비율로 취득한다.","주물과 종물의 관계에 관한 법리는 주된 권리와 종된 권리 상호간에도 적용된다."],answer:1},
    {num:8,subj:"민법",text:"민법상 기간에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["기간이 오전 0시부터 시작하는 경우라고 하더라도 초일을 산입하지 않는다.","기간의 계산에 관하여 법률행위에서 다르게 정하고 있더라도 민법의 기간 계산방법이","초일이 공휴일이라고 해서 다음날부터 기간을 기산하는 것은 아니다.","민법상 기간의 계산에 관한 규정은 공법관계에는 적용되지 않는다.","주, 월 또는 연(年)의 처음으로부터 기간을 기산하지 아니하는 때에는 최후의 주, 월 또"],answer:2},
    {num:9,subj:"민법",text:"협의의 무권대리에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["상대방이 상당한 기간을 정하여 본인에게 무권대리행위의 추인 여부의 확답을 최고한 경우","무권대리행위의 추인은 무권대리인이나 상대방에게 명시적인 방법으로만 할 수 있다.","상대방은 계약 당시에 대리인에게 대리권이 없음을 안 때에도 본인의 추인이 있을 때까","본인이 무권대리행위의 내용을 변경하여 추인한 경우에는 상대방의 동의를 얻지 못하는","대리인으로서 계약을 맺은 자에게 대리권이 없다는 사실을 알 수 있었던 상대방은 무권"],answer:3},
    {num:10,subj:"민법",text:"반사회질서의 법률행위에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["대물변제계약이 불공정한 법률행위로서 무효인 경우에도 목적부동산의 소유권을 이전받","반사회질서의 법률행위라도 당사자가 그 무효임을 알고 추인하면 새로운 법률행위로서","형사사건에 관하여 체결된 성공보수약정은 약정액이 통상적으로 용인될 수 있는 수준을 초","관련 법령에서 정한 한도를 초과하는 부동산 중개수수료 약정은 전부 무효이다.","소송에서 증인이 증언을 조건으로 소송의 일방 당사자로부터 통상적으로 용인될 수 있는"],answer:4},
    {num:11,subj:"민법",text:"법률행위의 목적에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["불공정한 법률행위가 성립하기 위하여는 궁박ㆍ경솔ㆍ무경험의 요건이 모두 충족되어야 한다.","무상증여는 불공정한 법률행위가 될 수 없다.","해외파견된 근로자가 귀국일로부터 3년간 회사에 근무하여야 하고, 이를 위반한 경우에","공익법인이 주무관청의 허가 없이 기본재산을 처분하는 것은 무효이다.","도박자금에 제공할 목적으로 금전의 대차를 한 때에는 그 대차계약은 반사회질서의 법"],answer:0},
    {num:12,subj:"민법",text:"甲과 乙은 강제집행을 면할 목적으로 서로 통모하여 甲 소유의 X토지를 乙에게 매도하 는 내용의 허위 매매계약서를 작성하고, 이에 근거하여 乙 앞으로 소유권이전등기를 마 쳤다. 이에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["甲은 X토지에 대하여 乙 명의의 소유권이전등기의 말소를 청구할 수 있다.","乙의 채권자 丙이 乙 명의의 X토지를 가압류하면서 丙이 甲과 乙 사이의 매매계약이 허위","乙이 사망한 경우 甲은 乙의 단독상속인 丁에게 X토지에 대한 매매계약의 무효를 주장할","乙의 채권자 丙이 乙 명의의 X토지를 가압류한 경우 丙이 보호받기 위해서는 선의이고 무","乙 명의의 X토지를 가압류한 丙은 특별한 사정이 없는 한 선의로 추정된다."],answer:3},
    {num:13,subj:"민법",text:"착오로 인한 의사표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["의사표시의 동기에 착오가 있더라도 당사자 사이에서 그 동기를 의사표시의 내용으로 삼은","착오로 인한 의사표시에 있어서 표의자에게 중대한 과실이 있는지의 여부에 관한 증명책","근 당권 정계약에서 채무자의 동일성에 관한            착오는 법률행위 내용의 중요부분에 관한","대리인에 의한 계약체결의 경우 착오의 유무는 대리인을 표준으로 결정한다.","당사자는 합의를 통하여 착오로 인한 의사표시 취소에 관한 민법 제109조 제1항의 적용을"],answer:1},
    {num:14,subj:"민법",text:"사기, 강박에 의한 의사표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["제3자에 의한 사기행위로 계약을 체결한 경우에는 그 계약을 취소해야만 제3자에 대하여","신의성실의 원칙상 고지의무가 있는 자가 소 적으로 진실을극              숨기는 것은 기망행위에 해","강박에 의하여 의사결정을    스스로 할 수 있는 여지가 완전히 박탈된 상태에서 이루어진 법","상대방 있는 의사표시에 관하여 제3자가 사기를 행한 경우에는 상대방이 그 사실을 알","강박에 의한 의사표시라고 하려면 상대방이 불법으로 어떤 해악을 고지함으로 인하여 공포"],answer:0},
    {num:15,subj:"민법",text:"법률행위의 대리에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["권한의 범위가 정해지지 않은 임의대리인은 부패하기 쉬운 농산물을 처분할 수 없다.","대리인은 행위능력자이어야 한다.","부동산 입 찰절차에서 동일물건에 관하여 이해관계가 다른 2인 이상의 대리인이 된 경우","예금계약의 체결을 위임받은 자의 대리권에는 당연히 그 예금을 담보로 하여 대출을 받거","복대리인은 그 권한내에서 대리인을 대리한다."],answer:2},
    {num:17,subj:"민법",text:"표현대리에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["권한을 넘은 표현대리에 있어서 법정대리권은 기본대리권이 될 수 없다.","대리행위가 강행법규 위반으로 무효인 경우에는 표현대리가 성립할 수 없다.","유권대리에 관한 주장 속에 표현대리의 주장이 포함되어 있다고 볼 수 없다.","민법 제129조의 대리권 소멸 후의 표현대리로 인정되는 경우에, 그 표현대리의 권한을 넘는","대리권수여의 표시에 의한 표현대리가 성립하려면 대리권 없음에 대하여 상대방이 선의이"],answer:0},
    {num:18,subj:"민법",text:"조건에 관한 설명으로 옳지 않은 것은?",choices:["조건의 성취가 미정인 권리의무는 일반규정에 의하여 처분, 상속, 보존 또는 담보로 할 수 있다.","조건이 선량한 풍속 기타 사회질서에 위반한 것인 때에는 그 법률행위는 무효로 한다.","당사자가 조건 성취전에특별한 의사표시를 하지 않으면 조건성취의 효력은 소급효가 없다.","해제조건부 법률행위의 경우 법률행위 당시 조건이 이미 성취할 수 없는 것인 때에는","조건부 법률행위의 당사자는 조건의 성부가         미정인 동안에 조건의 성취로 인하여 생길"],answer:3},
    {num:19,subj:"민법",text:"甲은 18세 때 시가 5,000만원에 상당하는 명화(名畵)를 법정대리인인 丙의 동의 없 이 乙에게 400만원에 매도하였으나, 그 당시 乙은 甲의 외모로 보아 그가 성년이라 고 생각하였다. 현재 甲이 미성년자라고 할 때 다음 설명 중 옳은 것은?",choices:["甲은 매매계약을 취소할 수 없다.","丙은 매매계약을 추인할 수 있으나, 甲은 추인할 수 없다.","乙이 丙에게 1개월 이상의 기간을 정하여 매매계약을 추인할 것인지 확답을 촉구한 경","丙이 적법하게 매매계약을 취소한 경우 그 매매계약은 취소한 때로부터 무효인 것으로 본다.","甲이 매매대금을 전부 유흥비로 탕진한 후 丙이 매매계약을 적법하게 취소한 경우, 乙은"],answer:1},
    {num:20,subj:"민법",text:"무효인 법률행위에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["무효인 재산상 법률행위를 당사자가 무효임을 알고 추인한 경우 제3자에 대한 관계에서","무효인 법률행위가 다른 법률행위의 요건을 구비한 경우, 당사자가 그 무효를 알 다면 다른","무효행위의 추인은 무효원인이 소 멸한 후에 하여야 효력이 있다.","무효행위의 추인은 명시적일뿐만 아니라 묵시적으로도 할 수 있다.","법률행위의 일부분이 무효인 때에는 그 전부를 무효로 한다. 그러나 그 무효부분이 없더라"],answer:0},
    {num:21,subj:"민법",text:"취소할 수 있는 법률행위로서 법정추인이 되는 경우가 아닌 것은?",choices:["취소할 수 있는 행위로부터 생긴 채권에 관하여 취소권자가 상대방에게 이행한 경우","취소권자가 취소할 수 있는 행위로 취득한 권리를 전부 양도한 경우","취소권자의 상대방이 이행을 청구하는 경우","취소권자가 채무자로서 담보를 제공하는 경우","취소권자가 채권자로서 강제집행 하는 경우"],answer:2},
    {num:22,subj:"민법",text:"소멸시효에 관한 설명으로 옳은 것은?",choices:["시효 중단사유가 종료하면 남은 시효기간이 경과함으로써 소멸시효는 완성된다.","주된 권리의 소멸시효가 완성되어도 종속된 권리에는 그 영향을 미치지 않는다.","소멸시효중단의 효력은 당사자 사이에서만 효력이 있다.","소멸시효는 특약에 의하여 이를 배제, 연장 또는 가중할 수 있다.","판결에 의하여 확정된 채권은 단기의 소멸시효에 해당한 것이라도 그 소멸시효는 10년으로 한다."],answer:4},
    {num:24,subj:"민법",text:"소멸시효의 기산점에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["채무불이행으로 인한 손해배상청구권의 소멸시효는 계약이 성립한 때로부터 진행한다.","확정기한부채권의 소멸시효는 그 기한이 도래한 때로부터 진행한다.","정지조건부 권리의 소멸시효는 그 조건이 성취된 때로부터 진행한다.","부작위를 목적으로 하는 채권의 소멸시효는 위반행위를 한 때로부터 진행한다.","동시이행의 항변권이 붙은 채권의 소멸시효는 그 이행기로부터 진행한다."],answer:0},
    {num:26,subj:"행정법",text:"권한의 위임에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["권한의 위임은 법적 근거를 요하지 않는다.","권한의 위임은 위임청의 권한의 일부에 한하여 인정된다.","권한의 위임이 기간의 도래에 의해 종료되면 위임된 권한은 다시 위임기관에 회복된다.","보조기관에게 권한을 위임하는 경우 권한의 위임기관은 그 보조기관의 권한행사를 지휘","권한을 위임 받은 기관은 특히 필요한 경우에는 법령으로 정하는 바에 따라 위임 받은"],answer:0},
    {num:27,subj:"행정법",text:"행정대집행법상 대집행에 관한 설명으로 옳지 않은 것은?",choices:["비대체적 작위의무의 불이행에 대해서는 대집행이 가능하지 않다.","대집행은 대체적 작위의무의 불이행이 있다고 하여 언제             든지 인정되는 것은 아니다.","대집행을 실제 수행하는 자는 당해 행정청이어야 하는 것은 아니다.","대집행을 한다는뜻의 계고는 문서로 하여야 한다.","대집행에 대하여는 행정심판을 제기할 수 없다."],answer:4},
    {num:29,subj:"행정법",text:"공물과 관련한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["도로의 지하는 도로법상의 도로점용의 대상이 아니다.","공용폐지의 의사표시는 묵시적으로 할 수 있으나 적법한 의사표시이어야 한다.","국유재산법상 행정재산은 시효취득에 관한 민법의 규정에도 불구하고 시효취득의 대상","원 래의 행정재산이 공용폐지되어 시효취득의 대상이 된다는 입증책임은 시효취득을 주","국가배상법상 공공의  영조물은 국가 또는 지방자치단체에 의하여 특정 공공목적에 공여"],answer:0},
    {num:31,subj:"행정법",text:"고시(告示)에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["고시가 국민의 기본권을 제한하는 내용을 담고 있어 상위법령과 결합하여 대외적 구속","고시가 구체적인 규율의 성격을 갖더라도 행정처분에 해당하지 않는다.","고시가 집행행위의 매개 없이 그 자체로서 직접 국민의 구체적인 권리의무를 규율할 때","고시와 같은 형식으로 입법위임을 할 때에는 법령이 전문적ㆍ기술적 사항이나 경미한","고시의 규정 내용이 법령의 위임 범위를 벗어난 경우에는 대외적 구속력을 인정할 여지는 없다."],answer:1},
    {num:33,subj:"행정법",text:"국가공무원법령상 공무원의 징계와 관련된 설명으로 옳은 것은?",choices:["형벌과 징계벌 사이에는 일사부재리의 원칙이 적용된다.","징계 중 파면, 해임, 강등을 중징계라 하고, 정직, 감봉, 견책을 경징계라 한다.","금전의 수수행위에 대한 징계의결 등의 요구는 징계 등의 사유가 발생한 날부터 3년이","징계처분에 대한 행정소송은 소청심사위원회의 심사ㆍ결정을 거치지 아니하고도 제기할","수사기관에서 수사 중인 사건에 대하여는 수사개시의 통보를 받은 날로부터         징계절차를"],answer:4},
    {num:35,subj:"행정법",text:"행정행위의 공정력에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["행정소송법은 공정력의 실정법적 근거를 명시적으로 인정하고 있다.","공정력은 행정행위가 무효인 경우에도 인정된다.","공정력은 행정행위     뿐만 아니라 행정의 사실행위에도 인정되는 효력이다.","공정력이      란 행정행위가 위법하더라도 취소되지 않는 한 유효한 것으로 통용되는 효력을","어떤 행정행위에 공정력이 발생하면 그 처분을 한 처분청이라도 공정력을 부정하지 못한다."],answer:3},
    {num:36,subj:"행정법",text:"지방자치법령의 내용으로 옳은 것은?",choices:["조례의 제정청구권은 지방자치단체의 주민의 권리에 해당하지 않는다.","비례대표 지방의회의원은 주민소환의 대상자가 된다.","주민소환에 관한 법률은 주민소환사유를 제한하고 있지 않다.","감사청구를 하지 않은 주민도 주민소송의 원고가 될 수 있다.","주민소송과 관련한 세부사항은 주민소송법에서 별도로 정하고 있다."],answer:2},
    {num:38,subj:"행정법",text:"법규명령의 통제에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["일반적ㆍ추상적인 법령이나 규칙은 항고소송의 대상이 될 수 없다.","행정부가 제정한 규칙이 별도의 집행행위를 기다리지 않고 직           접 국민의 기본권을 침해","법규명령에 대하여는 국회도 직접적으로 통제할 수 있는 방법이 있다.","법규명령에 대한 구체적 규범통제의 최종적 심사권은 헌법재판소에 전속한다.","법규명령에 대한 국민의 통제수단으로는 여론ㆍ압력단체의 활동 등과 같은 간접적인 수"],answer:3},
    {num:39,subj:"행정법",text:"준법률행위적 행정행위에 해당하는 것은? (다툼이 있으면 판례에 따름)",choices:["도시 및 주거환경정비법상 조합설립인가","여객자동차운수사업법상 개인택시운송사업면허","선거인명부에의 등록","불법광고물의 철거명령","감독청에 의한 공법인의 임원 임명"],answer:2},
    {num:40,subj:"행정법",text:"공공기관의 정보공개에 관한 법률에 의거하여, 甲은 A대학교에 대하여 재학 중인 체 육특기생들의 일정기간 동안의 출석 및 성적 관리에 관한 정보공개를 청구하였다. 이에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["甲은 A대학교와 체육특기생들과는 아무런 이해관계가 없으므로 정보공개청구권을 가지","A대학교가 사립대학교라면 정보공개의무를 지는 공공기관에 해당하지 않는다.","甲의 청구에 대하여 A대학교가 제3자의 권리침해를 이유로 하여 비공개 결정을 하였다","A대학교 체육특기생 乙이 자신의 정보를 공개하지 아니할 것을 요청한 경우에도, A대학","甲의 A대학교에 대한 정보공개청구의 비용은 공익적 차원에서 A대학교가 부담한다."],answer:3},
    {num:42,subj:"행정법",text:"세무서장 甲은 乙회사에 대한 세무조사를 하면서 乙회사의 주요 거래처인 丙회사에 게 乙회사와의 거래를 일정기간 중지하여 줄 것을 요청하였다(이하, ‘이 사건 요청행 위’라고 한다). 이로 인하여 乙회사는 경제적인 불이익을 입게 되었다. 이에 관한 설 명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["이 사건 요청행위는 권고 내지 협조를 구하는 권고적 성격의 행위로서 丙의 법률상의","이 사건 요청행위가 규제적ㆍ구속적 성격을 상당히 강하게 가지게 될 경우 헌법소원의","이 사건 요청행위는乙의 국가배상법상 손해배상청구 요건인 공무원의 직무에 해당하지 않는다.","이 사건 요청행위를 할 때 甲은 그 목적 달성에 필요한 최소한도 내에서 하여야 한다.","이 사건 요청행위를 할 때 甲은 丙에게 요청행위의 취지 및 내용과 신분을 밝혀야 한다."],answer:2},
    {num:44,subj:"행정법",text:"행정절차법의 내용으로 옳지 않은 것은?",choices:["행정청에 전자문서로 처분을 신청하는 경우에는 행정청의                       컴퓨터 등에 입력한 이후, 입","상위법령 등의 단순한 집행을 위한 경우에는 입법예고를 하지 아니할 수 있다.","행정상 입법예고기간은 예고할 때 정하되, 특별한 사정이 없으면 40일(자치법규는 20일)","예고된 입법안에 대하여 누구든지 의견을 제출할 수 있다.","청문이란 행정청이 어떠한 처분을 하기 전에 당사자등의 의견을 직접 듣고 증거를 조사"],answer:0},
    {num:45,subj:"행정법",text:"행정행위의 부관의 한계에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["부관은 주된 행위와 실질적 관련성을 가져야 한다.","부관은 주된 행위의 본질적 목적에 반해서는 안 된다.","부관의 사후변경은 사정변경으로 인하여 당초에 부담을 부가한 목적을               달성할 수 없게","부관의 내용은 비례의 원칙에 적합하여야 한다.","부관의 내용은 적법하고 이행가능 하여야 한다."],answer:2},
    {num:46,subj:"행정법",text:"행정심판에 관한 설명으로 옳은 것은?",choices:["청구인적격이 없는 자가 제기한 행정심판이라고 하더라도 본안심리를 거쳐서 기각하여야 한다.","행정심판의 대상은 행정청의 위법ㆍ부당한 처분에 한정되며, 부작위는 대상이 될 수 없다.","대통령의 처분에 대하여는 다른 법률에서 행정심판을 청구할 수 있도록 정한 경우 외에는","취소심판의 청구기간은 무효등확인심판청구에도 적용한다.","법인이 아닌 사단은 대표자나 관리인이 정하여져 있는 경우에도 그 사단의 이름으로 심"],answer:2},
    {num:47,subj:"행정법",text:"행정규칙에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["행정규칙의 제정에는 일반적으로 법적 근거가 필요하지 않다.","대통령령으로 정한 제재적 처분기준은 행정규칙으로서의 성질을 가진다.","행정절차법상 처분의 기준이 되는 재량준칙을 변경하는 경우 이를 공표할              필요가 없다.","재량권 행사의 준칙인 행정규칙에 행정관행이 성립되어 있지 않더라도 행정기관은 그","상급 행정기관은 감독권에 근거하여서는 하급 행정기관에 대한 행정규칙을 발할 수 없다."],answer:0},
    {num:48,subj:"행정법",text:"행정조직에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["기관위임사무는 법령에 별도의 위임이 없는 한 조례의 규율대상이 되지 않는다.","법령상 규칙으로 행정권한을 위임해야 함에도 조례에 의한 위임에 따라 행해진 수임기","행정권한의 내부위임임에도 불구하고 수임기관이 자기의 이               름으로 처분을 한 경우 항고","행정권한을 위 탁 받은 공공단체 또는 그 기관이나 사인은 행정절차법상의 행정청에 해","공법인의 경우도 사경제 주체로서     활동하는 경우에는 기본권의 주체가 될 수 있다."],answer:1},
    {num:49,subj:"행정법",text:"행정소송법상 사정판결에 관한 설명으로 옳지 않은 것은?",choices:["무효확인소송에서는 사정판결을 할 수 없다.","사정판결 시 법원은 그 판결의 주문에서 그 처분등이 위법함을 명시하여야 한다.","당사자의 주장이 없더라도 법원은 직권으로 사정판결을 할 수 있다.","사정판결이 있으면 취소소송의 대상인 처분은 당해 처분이 위법함에도 그 효력이 유지","사정판결은 기각판결이므로 소송비용은 원고가 부담한다."],answer:4},
    {num:50,subj:"행정법",text:"경찰관직무집행법의 내용으로 옳지 않은 것은?",choices:["경찰관은 어떠한 죄를 범하려 하고 있다고 의심할 만한 상당한 이유가 있는 사람에 대","경찰관이 불심검문 장소에서 질문하는 것이 교통에 방해가 된다고 인정하여 가까운 경","외국 정부기관 및 국제기구와의 국제협력은 경찰관의 직무에 해당한다.","경찰관은 대테러 작전 등 국가안전에 관련되는 작전을 수행할 때에는 개인화기 외에 공","경찰장구란 경찰관이 휴대하여 범인 검거와 범죄 진압 등의 직무수행에 사용하는 수갑,"],answer:1},
    {num:53,subj:"행정학개론",text:"매트릭스조직에 관한 설명으로 옳은 것은?",choices:["단일한 명령 및 보고체제를 갖고 있다.","하위조직 간 정보 흐름이 활성화된다.","하위조직 간 할거주의가 발생할 경우 조정이 용이하다.","불안정한   환경에 적절하게 대응하지 못한다.","복잡한 의사결정을 하지 못한다."],answer:1},
    {num:54,subj:"행정학개론",text:"조직구조에 관한 설명으로 옳지 않은 것은?",choices:["수평구조는 수직적 계층과 부서 간 경계를 실질적으로 제거하고 의사소통을 원활하게","네트워크조직은 높은 독자성을 지닌 조직 단위나 조직들 간에 협력적 연계장치로 구성","사업구조는 특정 산출물별로 운영되므로 고객만족도 제고 및 성과관리에 유리하다.","기계적 구조는 조직의 외부환경이 안정적일 때 채택되며, 의사결정 집권화, 규칙과 절차","학습조직은 시행착오나 실패를 두려워하여 철저한 사전 준비를 통해 시행착오나 실패의"],answer:4},
    {num:55,subj:"행정학개론",text:"다음 대화에서 요구되는 과장의 리더십은? 국회 국정감사가 종료된 후 ○○부 ○○과의 국정감사 수감 결산 간담회가 열렸다. A과장이 다른 업무로 불참한 상황에서 직속 상급자인 A과장의 리더십에 대해 과원들의 의견이 표출되었다. B과원: “과장님이 부하직원들을 좀 더 존중하고 배려하여 주시면 좋겠습니다. 일전에 제가 심한 몸살로 고생하며 근무했는데도 과장님이 한마디 위로도 안하셔서 서운했습니다.” C과원: “일방적으로 지시만 하지 마시고 우리들이 창의성을 발휘하도록 지적인 자극을 주시면 좋을텐데...” D과원: “무엇보다도 과장님이 우리 과의 새로운 비전을 제시하고 우리가 그것을 공유하여 성취하도록 지도하시어 더욱 발전하였으면 합니다.”",choices:["번스(Burns)와 바스(Bass)의 변혁적 리더십","블레이크(Blake)와 머튼(Mouton)의 관리망 이론 리더십","피들러(Fiedler)의 상황적응적 리더십","허쉬(Hersey)와 블랜차드(Blanchard)의 삼차원적 리더십","유클(Yukl)의 다중연결모형 리더십"],answer:0},
    {num:56,subj:"행정학개론",text:"특별회계제도에 관한 설명으로 옳은 것은?",choices:["예산집행부서의 재량을 억제하여 책임성을 제고시킨다.","예산단일의 원칙을 준수하는데 유리하다.","특별회계는 행정각부의 명령으로 설치할 수 있다.","예산통일의 원칙의 예외에 해당하는 제도이다.","예산제도가 단순해지므로 국가 재정의 통합적 관리에 유리하다."],answer:3},
    {num:57,subj:"행정학개론",text:"예산이 성립하지 않을 때 중앙정부가 사용하는 예산제도에 관한 설명으로 옳지 않은 것은?",choices:["우리나라는 1960년도 이후부터 준예산제도를 채택하고 있다.","우리나라는 회계연도 개시 30일 전까지 국회에서 예산안이 의결되지 못하는 경우 준예","우리나라의 제1공  화국 때는 가예산제도를 사용했다.","영국, 캐나다, 일본 등은 잠정예산제도를 사용하고 있다.","우리나라는 준예산제도를 실제 사용해 본 경험이 없다."],answer:1},
    {num:60,subj:"행정학개론",text:"정책결정모형에 관한 설명으로 옳지 않은 것은?",choices:["에치오니(Etzioni)는 규범적이지만 비현실적인 합리모형과 현실적이지만 보수적인 점증모","사이몬(Simon)은 결정자의 인지능력의 한계, 상황의 불확실성 및 시간의 제약 때문에 제","합리모형에서 말하는 합리성은 정치적 합리성이다.","쓰레기통모형에서 가정하는 상황은 불확실성과 혼란이 심한 상태이다.","점증모형은 실제의 결정상황에 기초한 현실적이고 기술적인 모형이다."],answer:2},
    {num:61,subj:"행정학개론",text:"콥과 로스(Cobb & Ross)가 제시한 정책의제설정 모형에 관한 내용으로 옳지 않은 것은?",choices:["외부주도형은 다원화되고 민주화된 선진국 정치체제에서 많이 나타나는 유형이다.","내부접근형은 고위의사결정자 등에 의해 정부의제가 먼저 설정되고 정책순응을 확보하","외부주도형은 정부 바깥에 있는 집단이 사회문제를 정부가 해결해줄 것을 요구하며 정","내부접근형은 국방, 외교 등 비밀 유지가 필요한 분야의 정책, 또는 강한 반대가 예상됨","동원형은 정부의 힘이 강하고 민간부문이 취약한 후진국에서 많이 나타나는 유형이나,"],answer:1},
    {num:65,subj:"행정학개론",text:"우리나라 책임운영기관에 관한 설명으로 옳지 않은 것은?",choices:["경영의 자율성이 부여되는 대신 성과에 대한 책임이 요구된다.","우리나라 책임운영기관에는 국립중앙극장, 국립현대미술관, 경찰병원 등이 있다.","책임운영기관의 회계는 특별회계로 하여 예산 운영상의 자율성을 보장하여야 한다.","책임운영기관의 장은 공모를 통해 임기제공무원으로 임용된다.","사업적ㆍ집행적 성격의 행정서비스 비율이 높은 사무에 적합하다."],answer:2},
    {num:69,subj:"행정학개론",text:"대표관료제(representative bureaucracy)에 관한 설명으로 옳은 것은?",choices:["대표관료제는 행정의 전문성과 생산성을 강화한다.","대표관료제의 발전은 행정의 형평성과 능률성을 제고한다.","대표관료제는 공직사회 내부 구성원 상호 간 견제를 통하여 내적 통제를 강               화한다.","대표관료제의 관료들은 정책과정에서 자신이 속한 배경집단의 이익보다는 공익을 추구","집단보다는 개인에     역점을 두는 대표관료제는 자유주의와 부합한다."],answer:2},
    {num:70,subj:"행정학개론",text:"직위분류제에 관한 설명으로 옳지 않은 것은?",choices:["동일한 직무에 대한 동일한 보수 지급의 원칙에 부합한다.","직무의 내용, 특성, 자격 등 객관적인 기준에 따라 합리적인 인사가 이루어질 수 있다.","조직 내에서 부서 간 협조와 교류를 원활하게 하지 못하는 단점이 있다.","장기적인 발전 가능성이나 잠재력을 중시하는 직업공무원제의 수립에 유용하다.","동일 직렬에 장기간 근무를 원칙으로 하기 때문에 행정의 전문화에 기여한다."],answer:3},
    {num:72,subj:"행정학개론",text:"우리나라 지방자치단체의 자치입법권에 관한 설명으로 옳지 않은 것은?",choices:["지방자치단체는 법령의 범위 안에서 자치에 관한 규정을 제정할 수 있다.","지방자치단체는 지방자치단체의 장에게 위임하여 행하는 국가사무에 관하여 조례를 제","지방자치단체는 법률의 구체적인 위임이 없더라도 조례를 위반한 행위에 대하여 벌금을","특별시ㆍ광역시ㆍ도ㆍ특별자치도는 해당 지역의 환경적 특수성을 고려하여 필요하다고","교육감은 법령 또는 조례의 범위 안에서 그 권한에 속하는 사무에 관하여 교육규칙을"],answer:2},
    {num:73,subj:"행정학개론",text:"지방공기업법상 지방직영기업에 관한 설명으로 옳은 것은?",choices:["지방자치단체는 지방직영기업을 설치ㆍ경영하려는 경우에는 그 설치ㆍ운영의 기본사항","지방자치단체가 새로운 법인을 설립하여 운영하는 간접경영방식이다.","일반회계와는 별도로 예산의 심의ㆍ확정에 지방의회의 의결이 필요 없는 특별회계로 운","「지방공기업법」의 적용을 받기 때문에「지방자치법」의 적용을 받지 않는다.","지방자치단체로부터 독립해 있기 때문에 지방자치단체장의 통제를 받지 않는다."],answer:0},
  ],
  "2018": [
    {num:1,subj:"민법",text:"자연인의 권리능력에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["권리능력은 가족관계등록부의 기재로 그 취득이 추정되므로, 그 기재가 진실에 반하는 사정이 있더라도 번복하지 못한다.","동시사망이 추정되는 경우에도 대습상속은 인정될 수 있다.","태아인 동안에 부(父)가 교통사고로 사망한 경우, 태아는 살아서 출생하더라도 그 정신적 고통에 대한 위자료를 청구할 수 없다.","태아가 사산된 경우에도 태아인 동안의 권리능력은 인정된다.","실종선고를 받은 자는 실종기간이 만료한 때에 사망한 것으로 추정한다."],answer:1},
    {num:2,subj:"민법",text:"민법의 법원(法源)인 관습법에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["관습법이란 사회의 거듭된 관행으로 생성된 사회생활규범이 사회의 법적 확신과 인식에 의하여 법적 규범으로 승인·강행되기에 이른 것을 말한다.","어떤 관행이 관습법으로 승인된 이상, 사회구성원들이 그러한 관행의 법적 구속력에 대하여 확신을 갖지 않게 되었더라도, 그 관습법은 법규범으로서의 효력에 영향을 받지 않는다.","관습법의 존재는 당사자의 주장·증명이 없어도 법원이 직권으로 이를 확정할 수 있다.","수목의 집단에 대한 공시방법인 명인방법은 판례에 의하여 확인된 관습법이다.","관습법은 법령에 저촉되지 아니하는 한 법칙으로서의 효력이 있다."],answer:1},
    {num:3,subj:"민법",text:"민법상 비법인사단에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["비법인사단의 사원이 집합체로서 물건을 소유할 때에는 총유로 한다.","대표자는 비법인사단의 제반 업무처리를 대리인에게 포괄적으로 위임할 수 없다.","대표자 또는 관리인이 있는 비법인사단은 그 사단에 속하는 부동산에 관하여 등기능력을 가진다.","비법인사단 소유의 재산에 대한 대표자의 처분행위가 사원총회의 결의를 거치지 않아 무효가 되더라도, 상대방이 선의인 경우에는 그 처분행위에 대하여 민법 제126조의 표현대리 법리가 준용된다.","비법인사단의 대표자가 직무에 관하여 타인에게 손해를 가한 경우, 그 사단은 민법 제35조 제1항의 유추적용에 의해 그 손해를 배상할 책임이 있다."],answer:3},
    {num:4,subj:"민법",text:"피성년후견인에 관한 설명으로 옳은 것은?",choices:["가정법원은 청구권자의 청구가 없더라도 직권으로 성년후견개시의 심판을 한다.","정신적 제약으로 사무처리능력이 일시적으로 결여된 경우, 성년후견개시의 심판을 해야 한다.","법인은 성년후견인이 될 수 없다.","일상생활에 필요하고 그 대가가 과도하지 아니한 피성년후견인의 법률행위는 성년후견인이 취소할 수 없다.","가정법원은 청구권자의 청구가 없더라도 피성년후견인의 취소할 수 없는 법률행위의 범위를 임의로 변경할 수 있다."],answer:3},
    {num:5,subj:"민법",text:"민법상 물건에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["국립공원의 입장료는 법정과실이 아니다.","「입목에 관한 법률」에 따라 등기된 입목은 그 토지와 독립하여 거래의 객체가 될 수 없다.","장소, 종류, 수량 등이 특정되어 있는 집합물은 양도담보의 대상이 될 수 있다.","주물의 소유자의 사용에 공여되고 있더라도 주물 그 자체의 효용과 직접 관계가 없는 물건은 종물이 아니다.","지하에서 용출되는 온천수는 토지의 구성부분일 뿐 그 토지와 독립된 권리의 객체가 아니다."],answer:1},
    {num:6,subj:"민법",text:"甲이 乙을 기망하여 乙소유 토지를 丙에게 시가에 비해 현저히 저렴한 가격으로 처분하도록 유인하였고, 이에 따라 乙은 丙과 그 토지에 대한 매매계약을 체결한 후 소유권이전등기를 마쳐주었다. 乙은 甲의 사기를 이유로 丙과의 매매계약을 취소하고자 한다. 이에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름) ㄱ. 甲의 기망사실을 丙이 알 수 있었던 경우, 乙은 위 계약을 취소할 수 있다. ㄴ. 甲의 사기로 불법행위가 성립하더라도, 乙은 위 계약을 취소하지 않는 한 甲에 대하여 불법행위로 인한 손해배상을 청구할 수 없다. ㄷ. 선의의 제3자 丁이 丙으로부터 위 토지를 매수하여 소유권이전등기를 마쳤다면, 그 후 乙이 자신과 丙 사이의 매매계약을 취소하여도 이를 근거로 丁명의의 소유권이전등기의 말소를 청구할 수 없다.",choices:["ㄱ","ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ"],answer:2},
    {num:7,subj:"민법",text:"민법상 법인의 대표권에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["이사의 대표권 제한에 관한 정관의 규정이 등기되어 있지 않으면, 법인은 그 규정으로 악의의 제3자에게도 대항할 수 없다.","법인과 이사의 이익상반행위로 특별대리인을 선임하는 경우, 법원은 이해관계인이나 검사의 청구에 의하여 선임하여야 한다.","민법 규정에 의하여 선임된 직무대행자가 그 권한을 정한 규정에 위반하여 법인의 통상사무 범위를 벗어난 행위를 한 경우, 법인은 선의의 제3자에 대하여 책임을 진다.","대표자의 행위가 직무에 관한 행위에 해당하지 아니함을 피해자가 중과실로 알지 못한 경우에도, 피해자는 법인에게 손해배상책임을 물을 수 있다.","법인의 대표에 관하여는 대리에 관한 규정을 준용한다."],answer:3},
    {num:8,subj:"민법",text:"민법상 사단법인의 기관에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["이사의 임면에 관한 사항은 정관의 임의적 기재사항이다.","사단법인의 이사는 매년 1회 이상 통상총회를 소집하여야 한다.","이사가 수인인 경우, 정관에 다른 규정이 없으면 법인의 사무집행은 이사의 과반수로써 결정한다.","감사는 필요기관이 아니다.","사원총회의 의결사항은 정관에 다른 규정이 없으면, 총회를 소집할 때 미리 통지된 사항에 한한다."],answer:0},
    {num:9,subj:"민법",text:"甲은 乙에게 매매계약체결의 대리권을 수여하였고, 乙은 甲을 대리하여 丙소유의 토지에 관하여 丙과 매매계약을 체결하였다. 그 계약의 효력이 甲에게 미치는 경우를 모두 고른 것은? (다툼이 있으면 판례에 따름) ㄱ. 甲이 피한정후견인인 乙에게 대리권을 수여하여 위 계약이 체결된 경우 ㄴ. 甲이 수권행위를 통하여 乙과 丁이 공동으로 대리하도록 정하였음에도 乙이 단독의 의사결정으로 위 계약을 체결한 경우 ㄷ. 乙이 위 토지에 대한 丙의 선행 매매사실을 알면서도 丙의 배임적 이중매매행위에 적극 가담하여 위 계약을 체결하였으나 이러한 사실을 甲이 알지 못한 경우",choices:["ㄱ","ㄷ","ㄱ, ㄴ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ"],answer:0},
    {num:10,subj:"민법",text:"법률행위의 무효에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["가장행위는 무효이나, 은닉행위는 그 행위에 요구되는 요건을 갖추면 유효이다.","무효행위가 다른 법률행위의 요건을 갖추고 있는 경우, 당사자가 무효임을 알았더라면 다른 법률행위를 하였을 것이라고 인정될 때에는 다른 법률행위로서 효력을 가진다.","불공정한 법률행위는 궁박, 경솔, 무경험의 요건을 모두 갖추어야 한다.","불공정한 법률행위의 피해자는 법률행위의 무효를 주장하여 이미 급부한 것의 반환을 청구할 수 있다.","무효인 법률행위는 추인에 의하여도 유효로 되지 않는 것이 원칙이나, 당사자가 무효임을 알면서 추인한 때에는 새로운 법률행위로 본다."],answer:1},
    {num:11,subj:"민법",text:"법률행위의 조건에 관한 설명으로 옳지 않은 것은?",choices:["기성조건이 정지조건이면 조건 없는 법률행위로 한다.","불법조건이 붙은 법률행위는 무효이다.","조건이 선량한 풍속 기타 사회질서에 위반한 것인 경우, 그 조건 없는 법률행위는 유효이다.","조건의 성취가 미정한 권리의무는 일반규정에 의하여 처분, 상속, 보존 또는 담보로 할 수 있다.","조건부 법률행위에서 고의로 조건의 성취를 방해한 경우 상대방은 그 조건이 성취된 것으로 주장할 수 있다."],answer:4},
    {num:12,subj:"민법",text:"민법상 소멸시효에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["매매계약의 해제로 인한 원상회복청구권에는 10년의 소멸시효가 적용된다.","금전채무의 소멸시효 완성 후 채무자가 채무를 일부 변제한 경우, 그 채무에 대한 소멸시효의 이익을 포기한 것으로 볼 수 있다.","판결에 의하여 확정된 채권의 소멸시효는 10년이나, 그 채권이 판결 당시 단기 소멸시효에 해당한다면 단기 소멸시효가 적용된다.","소멸시효의 이익의 포기는 소멸시효가 완성된 후에만 할 수 있다.","소멸시효의 기산점은 권리를 행사할 수 없는 경우에 해당하지 않는 한 원칙적으로 권리가 발생한 때이다."],answer:4},
    {num:13,subj:"민법",text:"甲은 자신 소유의 X토지에 乙 명의로 등기하였고, 이후 乙은 X토지를 丙에게 매도하였다. 이에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름) 甲, 乙 사이의 명의신탁약정과 乙, 丙 사이의 매매계약이 이루어진 경우",choices:["甲, 乙 사이의 명의신탁약정은 무효이다.","乙, 丙 사이의 매매계약은 유효이다.","丙이 명의신탁 사실에 대하여 선의인 경우, 丙은 X토지의 소유권을 취득한다.","甲은 불법행위를 원인으로 乙에 대하여 X토지의 소유권 이전을 청구할 수 있다.","甲은 부당이득을 원인으로 乙에 대하여 X토지의 소유권 이전을 청구할 수 있다."],answer:4},
    {num:14,subj:"민법",text:"계약의 해제에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["당사자 일방이 이행기 전에 이행거절의사를 명백히 한 경우, 상대방은 이행기 전이라도 계약을 해제할 수 있다.","당사자가 계약의 해제권을 행사하기 위해서는 반드시 최고를 하여야 한다.","계약의 해제는 손해배상의 청구에 영향을 미치지 아니한다.","채무자의 이행불능으로 계약이 해제된 경우, 계약해제의 소급효로 인하여 채권자의 손해배상청구권이 소멸하는 것은 아니다.","계약 해제로 인한 원상회복의무는 동시이행관계에 있다."],answer:0},
    {num:15,subj:"민법",text:"甲은 자신 소유의 부동산을 乙에게 매도하는 계약을 체결하면서 계약금으로 1,000만 원을 수령하였다. 이에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["계약금은 해약금으로 추정된다.","乙이 잔금지급의무를 이행하지 아니하였더라도 甲이 그 의무를 최고하지 않으면 계약해제권이 발생하지 않는다.","乙이 중도금을 지급한 이후에도 甲은 계약금의 배액을 상환하여 계약을 해제할 수 있다.","甲이 乙의 채무불이행으로 계약을 해제하면서 계약금을 위약금으로 공제하는 경우, 별도로 실제 손해액을 청구할 수 없다.","甲과 乙이 계약금을 위약벌로 약정한 경우에도 법원은 이를 감액할 수 있다."],answer:2},
    {num:16,subj:"민법",text:"민법상 임대차에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["임대인은 목적물을 임차인에게 인도하고 계약 존속 중 그 사용·수익에 필요한 상태를 유지하게 할 의무를 부담한다.","임차인이 임대인의 동의 없이 임차권을 양도한 경우, 임대인은 계약을 해지할 수 있다.","임차인이 임대인의 동의를 얻어 임차물을 전대한 경우, 임대인과 임차인의 합의로 임대차계약이 해지되더라도 전차인에게는 그 효력이 미치지 않는다.","임대차가 묵시적으로 갱신된 경우, 전 임대차에 대하여 제3자가 제공한 담보는 기간 만료로 소멸한다.","임차인은 임대차 종료 후 임차목적물을 반환한 경우에 비로소 보증금 반환채권이 발생한다."],answer:2},
    {num:17,subj:"민법",text:"甲은 乙에게 금전을 대여하였다. 이에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["甲이 금전소비대차계약의 성립을 증명하기 위하여 차용증을 제출한 경우, 그 차용증 성립의 진정에 관한 증명책임은 乙에게 있다.","대여금의 이자는 당사자의 약정이 없으면 청구할 수 없다.","利息制限法의 최고이자율을 초과하는 이자를 약정한 경우, 그 이자약정 전부가 무효이다.","이자제한법을 위반하여 약정된 초과이자 부분을 임의로 지급한 때에는 이를 원본에 충당할 수 있다.","당사자 사이에 이자 있는 소비대차를 한 경우에 대주가 금전 기타 대체물을 인도하기 전에는 차주는 계약을 해제할 수 있다."],answer:2},
    {num:18,subj:"민법",text:"甲은 乙에게 자신의 X토지에 乙 소유의 건물을 소유하는 것을 목적으로 하는 지상권을 설정하였다. 이에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["지상권의 존속기간을 정하지 않은 경우, 甲은 언제든지 지상권의 소멸을 청구할 수 있다.","乙이 2년 이상의 지료를 지급하지 아니한 경우, 甲은 지상권의 소멸을 청구할 수 있다.","지상권이 소멸하면 乙은 甲에게 건물의 매수를 청구할 수 있다.","乙이 甲의 동의 없이 X토지를 제3자에게 임대한 경우, 甲은 지상권을 소멸시킬 수 있다.","乙은 지상권을 甲의 동의 없이 처분할 수 없다."],answer:4},
    {num:19,subj:"민법",text:"취득시효에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["부동산의 취득시효 완성 후 제3자에게 소유권 이전등기가 마쳐진 경우, 원칙적으로 취득시효의 기산점을 임의로 선택하여 시효 완성 당시의 소유자를 변경할 수 없다.","10년간 소유의 의사로 평온, 공연하게 동산을 점유한 자는 그 동산이 타인 소유임을 과실 없이 알지 못한 경우에도 그 동산의 소유권을 취득한다.","부동산의 점유취득시효는 20년간 소유의 의사로 평온, 공연하게 부동산을 점유한 자가 그 등기를 한 때에 완성된다.","부동산에 대한 점유취득시효 완성 전에 원소유자로부터 부동산을 매수한 제3자에 대해서는 시효취득을 주장할 수 없다.","집합건물의 공용부분은 취득시효의 대상이 될 수 없다."],answer:3},
    {num:20,subj:"민법",text:"물권의 변동에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["부동산에 관한 물권의 득실변경은 등기하여야 효력이 생기므로, 매매계약이 체결되어도 등기 이전에는 소유권이 이전되지 않는다.","甲이 乙에게 부동산을 증여하는 계약을 체결하였으나 등기를 경료하지 않은 경우에도, 甲은 乙에게 소유권이전등기를 경료할 의무가 있다.","부동산을 목적으로 하는 소유권 이외의 물권에 관하여도 등기가 없으면 물권 변동의 효력이 생기지 않는다는 민법 제186조의 규정이 적용된다.","甲이 소유하는 X토지의 지적공부상 면적과 실제 면적이 다른 경우, 甲의 소유권의 범위는 지적공부상의 경계를 기준으로 한다.","미등기 무허가건물의 양수인은 그 건물에 관하여 사실상의 처분권을 가지므로 이를 타인에게 처분할 수 있다."],answer:4},
    {num:21,subj:"민법",text:"민법상 유치권에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["유치권자는 유치물에 관한 채권이 변제기에 이르지 아니한 때에도 유치권을 행사할 수 있다.","유치권자는 채무자의 승낙 없이 유치물을 사용, 대여 또는 담보에 제공하지 못한다.","타인의 물건 또는 유가증권을 점유한 자는 그 물건이나 유가증권에 관하여 생긴 채권을 가지는 경우에는 변제를 받을 때까지 그 물건 또는 유가증권을 유치할 권리가 있다.","유치권이 성립한 후 유치물의 소유권이 제3자에게 이전된 경우에도 유치권자는 새로운 소유자에게도 유치권을 주장할 수 있다.","채무자의 승낙을 얻어 유치물을 사용한 유치권자는 특별한 사정이 없는 한 차임에 상당하는 이익을 채무자에게 반환하여야 한다."],answer:3},
    {num:22,subj:"민법",text:"甲 소유 토지에 乙이 1번 저당권(채권최고액 1억 원), 丙이 2번 저당권(채권최고액 5천만 원)을 각각 취득하였다. 위 저당권들이 실행되어 甲의 토지가 1억 5천만 원에 낙찰된 경우에 관한 설명으로 옳은 것은? (경매비용 없음)",choices:["乙의 저당권의 피담보채권액이 8천만 원이고 丙의 저당권의 피담보채권액이 8천만 원인 경우, 乙은 8천만 원, 丙은 7천만 원을 배당받는다.","乙의 저당권의 피담보채권액이 8천만 원이고 丙의 저당권의 피담보채권액이 8천만 원인 경우, 乙은 8천만 원, 丙은 5천만 원을 배당받는다.","乙의 저당권의 피담보채권액이 1억 2천만 원이고 丙의 저당권의 피담보채권액이 5천만 원인 경우, 乙은 1억 원, 丙은 5천만 원을 배당받는다.","乙의 저당권의 피담보채권액이 1억 2천만 원이고 丙의 저당권의 피담보채권액이 5천만 원인 경우, 乙은 1억 원, 丙은 0원을 배당받는다.","乙의 저당권의 피담보채권액이 1억 2천만 원이고 丙의 저당권의 피담보채권액이 5천만 원인 경우, 乙은 1억 2천만 원, 丙은 3천만 원을 배당받는다."],answer:2},
    {num:23,subj:"민법",text:"부당이득에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["수익자가 이익을 받은 후 법률상 원인 없음을 안 때에는 그때부터 악의의 수익자로서 받은 이익에 이자를 붙여 반환하고 손해가 있으면 이를 배상하여야 한다.","채무 없이 변제한 자가 변제 당시 착오로 채무 있음을 믿었다면 부당이득반환청구를 할 수 없다.","타인 소유의 부동산을 권원 없이 무단 점유·사용하는 경우, 차임 상당의 이익을 부당이득으로 반환하여야 한다.","급부부당이득의 경우 이득자는 급부된 것을 원물반환하는 것이 원칙이나, 현물반환이 불가능한 경우에는 가액반환을 하여야 한다.","불법원인급여에서 불법성이 수익자에게만 있는 경우에는 급여자는 그 이익의 반환을 청구할 수 있다."],answer:0},
    {num:24,subj:"민법",text:"민법상 불법행위에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["민법상 과실상계는 손해의 공평한 분담을 위하여 손해배상의 책임 및 그 금액의 결정에서 피해자의 과실을 참작하는 제도이다.","불법행위로 인한 손해배상채권에서 지연손해금은 불법행위 시부터 발생한다.","불법행위로 인한 손해배상청구권의 단기소멸시효는 피해자나 그 법정대리인이 그 손해 및 가해자를 안 날로부터 3년이다.","명예를 훼손당한 자는 손해배상에 갈음하거나 손해배상과 함께 명예회복을 위한 처분을 법원에 청구할 수 있다.","사용자의 배상책임에 있어서 사용자는 피용자의 선임과 그 사무감독에 상당한 주의를 한 때에도 손해배상책임을 부담한다."],answer:1},
    {num:25,subj:"민법",text:"민법상 계약의 청약에 관한 설명으로 옳지 않은 것은?",choices:["청약은 그 내용이 상대방에게 도달한 때에 효력이 발생한다.","청약은 상대방에게 도달하기 전에 취소할 수 있다.","청약자가 청약의 의사표시를 발송한 후 제한능력자가 되어도 청약의 효력에 영향을 미치지 않는다.","불특정 다수인에 대한 청약은 특별한 사정이 없는 한 효력이 없다.","청약에 승낙기간을 정한 경우, 청약자는 그 기간 내에 청약을 철회할 수 없다."],answer:3},
    {num:26,subj:"행정법",text:"행정행위의 효력에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정행위에 불가쟁력이 발생한 이후에는 그 행정행위의 상대방인 국민이 그 행정행위의 위법성을 법원에서 다툴 수 없게 된다.","행정행위에 공정력이 발생한 이후에는 해당 행정행위의 위법성을 이유로 국가배상청구를 할 수 없다.","행정행위에 불가변력이 발생하면 처분청 스스로도 행정행위를 취소·변경할 수 없다.","선행 행정행위의 존재를 전제로 하는 후행 행정행위에서 선행 행정행위의 위법성 승계 여부는 원칙적으로 그 행위들이 동일한 목적을 위하여 일련의 절차를 구성하는지 여부에 따라 결정된다.","확약에는 공정력, 불가쟁력, 불가변력 등의 효력이 인정되지 않는다."],answer:2},
    {num:27,subj:"행정법",text:"행정입법에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["법규명령은 법규성이 있으나 행정규칙은 법규성이 없다.","재량준칙으로서 행정규칙이 공표된 경우, 신뢰보호의 원칙이나 평등의 원칙을 매개로 외부적 구속력이 발생할 수 있다.","헌법재판소는 행정규칙도 법규명령의 형식으로 발령된다면 법규명령에 준하는 효력이 있다고 한다.","법률의 위임 없이 형사처벌 등 국민의 기본권 제한에 관하여 규정한 법규명령은 위헌이다.","법규명령은 일반적으로 고시, 훈령, 예규 등의 형식으로 발령된다."],answer:2},
    {num:28,subj:"행정법",text:"행정법의 일반원칙에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["비례의 원칙 중 상당성의 원칙(협의의 비례원칙)은 행정목적과 행정수단 사이에 적절한 비례관계가 있어야 한다는 것이다.","평등의 원칙에 의하면 행정기관은 불합리한 차별을 하여서는 아니 된다.","행정기관이 위법한 선례를 반복하는 경우, 당사자는 평등의 원칙에 따른 행정작용을 요구할 수 있다.","신뢰보호의 원칙을 원용하기 위해서는 행정기관이 언명한 것이 취소·변경될 것이라는 신뢰가 있어야 한다.","신뢰보호의 원칙에 의하면 공익과 신뢰보호 사이의 이익형량에 따라 보호가치 있는 신뢰에 반하는 행정작용이 위법이 될 수 있다."],answer:4},
    {num:29,subj:"행정법",text:"행정행위의 취소와 철회에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정행위의 취소는 행정행위가 성립 당시부터 위법 또는 부당한 경우에 그 효력을 소멸시키는 행위이다.","법정 취소사유에 해당하는 경우에도, 처분청은 그 취소가 공익에 부합하는지 여부 및 상대방에게 발생하는 불이익을 고려하여야 한다.","행정행위의 철회는 당초 적법하게 성립된 행정행위를 공익상의 필요나 사정변경을 이유로 장래에 향하여 그 효력을 소멸시키는 행위이다.","수익적 행정행위의 상대방이 상대방에게 부담하는 상대방 및 관계인의 의무를 위반한 경우, 처분청은 수익적 행정행위를 철회할 수 있다.","적법한 수익적 행정처분을 처분청이 공익상의 이유로 취소할 수는 없다."],answer:1},
    {num:30,subj:"행정법",text:"행정절차에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["다수의 행정청이 관여하는 처분의 경우 주된 행정청이 청문을 실시한다.","행정절차법은 처분의 상대방에게 처분 전에 의견진술의 기회를 주는 방법으로서 청문, 공청회, 의견제출의 세 가지를 인정하고 있다.","청문주재자는 의견서를 작성하여 행정청에게 제출하여야 하고, 행정청은 청문의 결과와 청문주재자의 의견서를 존중하여 처분을 하여야 한다.","청문에 있어서 행정청이나 청문주재자는 필요한 경우에 관계인을 청문에 출석하게 하여 의견을 들을 수 있다.","처분의 상대방이 의견제출을 통하여 주장한 내용을 행정청이 처분에 반영하지 않은 경우, 행정청은 이유를 설명하여야 한다."],answer:1},
    {num:31,subj:"행정법",text:"행정소송법상 항고소송에 관한 설명으로 옳지 않은 것은?",choices:["취소소송의 제소기간은 처분등이 있음을 안 날부터 90일 이내이다.","거부처분취소소송에서 원고승소판결이 확정되면 행정청은 판결의 취지에 따른 처분을 하여야 한다.","무효등확인소송은 처분의 무효를 확인하는 소송으로, 제소기간의 제한이 없다.","부작위위법확인소송에서 법원이 인용판결을 선고한 경우 행정청은 부작위위법확인판결에서 명한 내용에 따른 처분을 하여야 한다.","취소소송에서는 집행정지 신청이 허용된다."],answer:3},
    {num:32,subj:"행정법",text:"행정상 즉시강제에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["행정상 즉시강제는 의무의 불이행을 전제로 하여 행정상의 장해를 제거하는 작용이다.","행정상 즉시강제에는 적법절차원리가 적용되지 않는다.","출입국관리법에 의한 외국인의 강제퇴거는 즉시강제에 해당하지 않는다.","전통시장이 화재예방을 위하여 점포 등에 대하여 강제적으로 소방시설을 설치하는 행위는 즉시강제에 해당한다.","즉시강제에 대해서는 집행정지 신청이 허용되지 않는다."],answer:1},
    {num:33,subj:"행정법",text:"공법상 계약에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["공법상 계약은 공법적 효과의 발생을 목적으로 하는 복수 당사자 사이의 반대방향의 의사표시의 합치를 의미한다.","행정기관이 사인과 맺는 모든 계약은 공법상 계약이다.","공법상 계약은 원칙적으로 대등한 지위에서 체결된다.","지방자치단체가 사인과 체결한 폐기물처리위탁계약이 공법상 계약인지 사법상 계약인지는 구체적인 사정에 따라 결정된다.","공법상 계약에 관한 분쟁은 원칙적으로 공법상 당사자소송에 의한다."],answer:2},
    {num:34,subj:"행정법",text:"행정계획에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["구속적 행정계획은 행정청뿐만 아니라 국민도 구속한다.","행정계획을 수립하는 행정청에게는 재량이 인정되며, 이 재량에는 형량의 하자가 포함된다.","행정계획의 입안·결정에는 반드시 당사자에게 의견진술의 기회를 주어야 한다.","계획확정절차에서 불복한 주민의 의견은 계획이 확정되기 전에 행정청의 처리결과를 통지받아야 한다.","행정계획도 경우에 따라서는 항고소송의 대상이 될 수 있다."],answer:1},
    {num:35,subj:"행정법",text:"국가배상에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["군인이 직무수행 중 전사하거나 순직한 경우에는 다른 법령의 규정에 의하여 재해보상금 등의 보상을 지급받을 수 있다 하더라도 국가배상법에 의한 손해배상을 청구할 수 있다.","국가배상법의 배상책임자인 공무원은 국가공무원법상의 공무원만을 의미한다.","국가배상법상의 공무원의 직무집행은 권력적 행위만을 의미하는 것이 아니라 비권력적 행위도 포함한다.","국가배상법상 국가나 지방자치단체는 공무원에게 중과실이 있는 경우 배상금을 지급한 후 해당 공무원에게 구상할 수 있다.","손해배상의 소송은 배상심의회에 배상신청을 하지 아니하고도 제기할 수 있다."],answer:1},
    {num:36,subj:"행정법",text:"행정심판에 관한 설명으로 옳지 않은 것은?",choices:["청구인은 행정심판청구서를 피청구인인 행정청에게 제출할 수 있다.","행정심판은 처분이 있음을 알게 된 날부터 90일 이내에 청구하여야 한다.","행정심판법상 의무이행심판은 인정되지 않는다.","행정심판위원회는 필요하다고 인정할 경우에는 직권으로 집행정지를 할 수 있다.","심판청구는 처분의 효력이나 그 집행 또는 절차의 속행에 영향을 주지 아니한다."],answer:2},
    {num:37,subj:"행정법",text:"정보공개에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["공공기관이 공개청구된 정보를 공개는 하되, 청구인이 신청한 공개방법 이외의 방법으로 공개하기로 결정한 경우, 이에 대하여 항고소송으로 다툴 수 있다.","공공기관의 정보공개에 관한 법률상 모든 국민은 법률이 정하는 바에 따라 공공기관이 보유·관리하는 정보를 공개받을 권리를 가진다.","정보공개법상 비공개사유에 해당한다는 이유로 정보공개를 거부하기 위해서는 비공개사유에 해당하는 정보와 그 이외의 정보가 혼합되어 있어 분리가 가능한 경우에는 비공개정보 이외의 부분은 공개하여야 한다.","공개가 불가능한 정보를 포함한 청구에 대하여 공공기관이 일체의 공개를 거부한 경우, 법원은 일부취소판결을 할 수 있다.","정보공개청구권은 자유권적 성격과 청구권적 성격을 함께 가지고 있다."],answer:3},
    {num:38,subj:"행정법",text:"행정조사에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정조사는 처분이나 행정계획을 위한 사실 파악을 목적으로 하는 사실행위이다.","행정조사기본법에 따르면 행정조사는 원칙적으로 다른 행정기관과 공동으로 실시하여야 한다.","세무조사 결정이 처분성이 있는 경우, 부적법한 세무조사에 기하여 이루어진 과세처분은 위법하다.","행정조사기본법은 제3자에 의한 행정조사도 허용하고 있다.","원칙적으로 중복조사를 하여서는 아니된다."],answer:3},
    {num:39,subj:"행정법",text:"행정처분의 공정력 또는 선결문제에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정처분의 공정력은 아직 취소되지 않은 행정처분의 효력을 무효가 아닌 한 국가기관도 그 효력을 부인하지 못한다는 것이다.","형사법원은 행정처분의 위법 여부를 범죄성립의 선결문제로 판단할 수 있다.","형사법원이 행정처분의 위법 여부를 범죄성립의 선결문제로 심사한 경우, 그 형사판결의 기판력은 민사소송에 미친다.","민사법원은 선결문제로 행정처분의 무효 여부를 판단할 수 있다.","행정처분이 당연무효인 경우에는 공정력이 발생하지 않는다."],answer:0},
    {num:40,subj:"행정법",text:"행정소송법상 취소소송에서의 집행정지에 관한 설명으로 옳지 않은 것은?",choices:["집행정지결정의 효력은 취소소송의 제1심 법원의 결정으로도 가능하다.","집행정지에는 처분의 집행 또는 절차의 속행의 정지만 인정된다.","집행정지는 본안소송이 계속되어 있는 경우에만 가능하다.","공공복리에 중대한 영향을 미칠 우려가 있는 경우에는 집행정지를 할 수 없다.","법원이 집행정지결정을 한 후 그 이유가 소멸된 때에는 당사자의 신청이나 직권에 의해 취소할 수 있다."],answer:0},
    {num:41,subj:"행정법",text:"행정상 손실보상에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["손실보상청구권이 성립하기 위하여는 법률에 의거한 적법한 공권력의 행사로 인하여 가해진 특별한 손실이 있어야 한다.","수용 등의 공용침해에 있어서 보상규정이 없는 경우, 위헌·무효임을 전제로 한 손해배상청구를 할 수 없다는 견해가 판례이다.","이주대책의 수립대상자가 이주대책의 내용이 관계법령에 위반된다는 이유로 그 이주대책의 취소를 구하는 소송은 행정소송으로 제기하여야 한다.","이주대책의 법적 성격은 보상의 일환으로 생활을 실질적으로 보장하기 위한 것이다.","공익사업을 위한 토지 등의 취득 및 보상에 관한 법률상 이의재결에 대해서는 행정소송을 제기할 수 있다."],answer:3},
    {num:42,subj:"행정법",text:"지방자치법상 지방자치단체의 사무에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["지방자치단체의 고유사무는 지방자치단체의 존립목적이 되는 사무로서 자치사무라고도 한다.","자치사무에 대하여는 감독기관의 합법성 통제만 허용된다.","조례에 의한 주민에 대한 권리제한 및 의무부과는 법률의 위임이 없어도 가능하다.","지방자치단체는 조례로 주민의 권리 제한, 의무 부과에 관한 사항이나 벌칙을 정할 때에는 법률의 위임이 있어야 한다.","자치사무에 관하여 위법한 지방의회 의결 등에 대해 지방자치단체장은 재의를 요구할 수 있고, 대법원에 소를 제기할 수도 있다."],answer:4},
    {num:43,subj:"행정법",text:"행정소송법상 취소소송의 원고적격에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["처분의 직접 상대방이 아닌 제3자도 처분에 의하여 법률상 보호되는 이익을 침해당한 경우 원고적격이 인정된다.","법인이나 권리능력 없는 사단도 취소소송의 원고가 될 수 있다.","처분의 근거법규가 개인적 이익을 보호하는 법규로 해석되는 경우에는 그 처분에 의하여 권리가 침해된 자에게 원고적격이 인정된다.","지역주민의 환경이익과 같은 환경상 이익은 원고적격이 인정되는 법률상 이익에 해당하지 않는다.","행정소송법상 원고적격 여부는 소송요건의 하나로서 직권조사사항이다."],answer:0},
    {num:44,subj:"행정법",text:"항고소송에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정소송법상 항고소송에는 취소소송, 무효등확인소송, 부작위위법확인소송이 있다.","취소소송에서는 행정청의 처분 등이 위법한 경우에 한하여 이를 취소할 수 있으며, 부당한 처분을 취소할 수는 없다.","처분 성립 당시에는 적법하였으나 사후에 사정변경이 있어 처분이 위법하게 된 경우에는 처분을 취소할 수 없다.","무효등확인소송에서 원고는 보충성의 요건을 갖추어야 한다.","거부처분취소판결이 확정된 경우에도 재처분의무를 이행하지 아니하면 간접강제를 할 수 있다."],answer:0},
    {num:45,subj:"행정법",text:"당사자소송에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["공법상의 법률관계에 관한 소송으로서 그 법률관계의 한쪽 당사자를 피고로 하는 소송이다.","공무원 지위확인의 소는 당사자소송에 해당한다.","당사자소송은 민사소송과 달리 확인소송만 인정된다.","취소소송에서 소를 당사자소송으로 변경하는 것은 허용된다.","당사자소송에는 집행정지에 관한 규정이 준용되지 않는다."],answer:4},
    {num:46,subj:"행정법",text:"공물(公物)에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["공물은 직접 공적 목적에 사용되는 것이므로 특별한 규정이 없는 한 사법상의 거래 대상이 될 수 없다.","공유수면 매립이 완료된 부분은 법적인 공용폐지 절차 없이도 불요식의 의사표시에 의해 공물로서의 성격을 상실한다.","국·공립학교는 행정재산 중 공용재산에 해당한다.","도로는 행정재산 중 공공용재산에 해당한다.","행정재산은 시효취득의 대상이 되지 않는다."],answer:3},
    {num:47,subj:"행정법",text:"행정법상 행정지도에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정지도는 그 목적 달성에 필요한 최소한도에 그쳐야 한다.","행정지도는 상대방의 의사에 반하여 부당하게 강요하여서는 아니 된다.","구두의 행정지도도 허용된다.","행정지도는 처분성이 없으므로 항고소송의 대상이 될 수 없다.","위법한 행정지도에 따른 행위가 있다고 하여 위법성이 조각될 수 없다."],answer:0},
    {num:48,subj:"행정법",text:"행정상 강제징수에 관한 설명으로 옳지 않은 것은?",choices:["행정상 강제징수는 의무자가 금전납부의무를 이행하지 않는 경우에 행정청이 의무자의 재산에 실력을 가하여 이행된 것과 동일한 상태를 실현하는 강제수단이다.","국가의 행정상 강제징수의 경우 국세징수법의 예에 따르는 것이 보통이다.","지방세의 경우 지방세징수법에 별도의 규정을 두고 있다.","행정상 강제징수에서 체납자는 자신이 점유하는 타인 소유의 재산에 대해서도 압류하는 것을 수인해야 한다.","공법상의 금전급부의무를 이행하지 않는 경우에도 행정청은 민사소송절차에 의하여 재판상 청구를 할 수 있다."],answer:2},
    {num:49,subj:"행정법",text:"지방자치법상 지방자치단체의 사무에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["지방의회의 의결을 요하는 사무는 법령에 규정되어 있는 사무에 한한다.","주민에게 과도한 부담을 주거나 중대한 영향을 미치는 지방자치단체의 주요 결정사항 등에 대하여 주민투표를 실시할 수 있다.","지방자치단체의 장이 법령 또는 조례에 따라 그 권한에 속하는 사무의 일부를 관할 지방자치단체나 공공단체 또는 그 기관에 위임하거나 위탁할 수 있다.","지방자치단체가 설치·운영하는 기관에서 발생한 사항에 관하여 지방자치단체가 해당 기관에 배상 등의 청구를 가능하게 한다.","지방의회는 그 의결로써 특별위원회를 둘 수 있다."],answer:3},
    {num:50,subj:"행정법",text:"국가공무원법상 공무원에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["6급 이하의 일반직공무원에 대한 임용권자는 임용과 관련하여 다른 기관의 장에게 위임할 수 있다.","행정기관 소속 5급 이상 공무원의 전보는 소속 장관이 행한다.","공무원의 임용결격사유는 공무원으로 임용된 후에 발생하더라도 당연퇴직 사유에 해당하지 않는 것이 원칙이다.","직위해제된 공무원에 대하여는 직위를 부여하지 아니할 수 있다.","공무원이 당연퇴직 사유에 해당할 경우, 이를 통지하는 행위는 행정처분이 아니다."],answer:4},
    {num:51,subj:"행정학개론",text:"행정학의 접근방법에 관한 설명으로 옳지 않은 것은?",choices:["행태론적 접근방법은 행정현상을 인간행태를 통하여 연구한다.","생태론적 접근방법은 행정현상을 환경과의 관계 속에서 연구한다.","체제론적 접근방법은 투입-산출의 체계를 통하여 행정현상을 연구한다.","신제도론적 접근방법은 규범적 처방에 치중하여 제도를 연구한다.","역사적 접근방법은 역사적 사실을 행정현상의 이해에 활용한다."],answer:3},
    {num:52,subj:"행정학개론",text:"정부실패의 원인에 해당하지 않는 것은?",choices:["파생적 외부효과","공공재의 비배제성·비경합성","내부성(internalities)","지식정보의 불충분","권력의 편재"],answer:1},
    {num:53,subj:"행정학개론",text:"행정가치에 관한 설명으로 옳지 않은 것은?",choices:["합법성은 행정이 법에 따라 수행되어야 한다는 것을 의미한다.","민주성은 행정이 민주주의 이념에 부합하여야 한다는 것을 의미한다.","능률성은 투입 대비 산출의 극대화를 의미한다.","효과성은 목표의 달성도를 의미한다.","형평성은 공정한 배분과 절차의 준수만을 의미한다."],answer:4},
    {num:54,subj:"행정학개론",text:"막스 베버(Max Weber)의 이념형적 관료제 모형에 관한 설명으로 옳지 않은 것은?",choices:["관료는 전문지식과 기술에 따라 임용된다.","관료는 공식적 위계질서와 규칙에 따른다.","관료는 직무수행을 문서에 의한다.","관료와 행정수단(재화, 재원, 시설 등)은 분리된다.","관료는 직위의 권한에 근거하여 다양한 직업에 겸임될 수 있다."],answer:4},
    {num:55,subj:"행정학개론",text:"다음이 설명하는 조직이론은? 조직이 외부 환경변화에 효율적으로 적응하기 위해 조직의 형태를 변화시킨다는 것으로, 조직이 생존하기 위해서는 환경의 자원에 의존한다는 점을 강조한다.",choices:["상황이론","자원의존이론","제도이론","거래비용이론","조직군생태학이론"],answer:0},
    {num:56,subj:"행정학개론",text:"다음 내용에 해당하는 리더십이론은? 리더십의 효과는 리더의 특성뿐만 아니라 집단의 특성, 과업의 구조화 정도, 리더의 권위 등 상황에 따라 달라진다고 본다.",choices:["변혁적 리더십이론","경로-목표 이론","상황이론","서번트 리더십이론","수퍼 리더십이론"],answer:4},
    {num:57,subj:"행정학개론",text:"행정개혁의 저항을 극복하는 방법으로 옳지 않은 것은?",choices:["개혁의 명분을 확보한다.","단기성과의 도출을 위해 노력한다.","개혁의 추진과정에서 충분한 의사소통을 실시한다.","개혁에 대한 시범실시를 진행한다.","저항자에 대하여 처벌을 부과하는 것을 주된 방법으로 사용한다."],answer:1},
    {num:58,subj:"행정학개론",text:"예산의 원칙 중 한계를 설명하면서 나타나는 예외에 해당하는 것으로 옳은 것은?",choices:["단일성의 원칙 - 추가경정예산","완전성의 원칙 - 목적세","통일성의 원칙 - 예비비","한계성(한정성)의 원칙 - 기금","공개성의 원칙 - 특별회계"],answer:2},
    {num:59,subj:"행정학개론",text:"행정통제에 관한 설명으로 옳은 것은?",choices:["국가인권위원회는 입법부에 의한 행정통제기관이다.","헌법재판소는 사법부에 의한 행정통제기관이다.","감사원은 내부통제기관이다.","국무조정실은 외부통제기관이다.","국민권익위원회는 입법부에 의한 행정통제기관이다."],answer:3},
    {num:60,subj:"행정학개론",text:"지방자치단체의 재정에 관한 설명으로 옳지 않은 것은?",choices:["지방세는 지방자치단체가 과세권에 근거하여 주민으로부터 징수하는 세금이다.","지방교부세는 국가가 지방자치단체에 재정적 결함을 보충하기 위해 교부하는 재원이다.","국고보조금은 국가가 지방자치단체의 특정 사업을 지원하기 위해 교부하는 재원이다.","지방자치단체는 재정적 필요에 따라 예산 범위를 초과하여 채무를 부담할 수 있다.","지방재정법은 예산의 건전성을 위한 규정을 두고 있다."],answer:2},
    {num:61,subj:"행정학개론",text:"우리나라 정부조직에 관한 설명으로 옳지 않은 것은?",choices:["중앙행정기관으로는 부·처·청 등이 있다.","독립규제기관은 의회의 통제로부터 완전히 독립되어 있다.","책임운영기관은 기관의 장에게 재량권을 부여하고 성과에 대한 책임을 지게 하는 제도이다.","정부기업은 정부가 직접 운영하는 기업형태의 행정기관이다.","공기업은 정부가 지분의 일부를 소유하거나 경영에 참여하는 기업이다."],answer:3},
    {num:62,subj:"행정학개론",text:"인사행정에 관한 설명으로 옳지 않은 것은?",choices:["엽관제는 정당에 대한 공헌도에 따라 공직을 임명하는 제도이다.","직업공무원제도는 공직을 전문직업으로 삼아 근무하는 공무원제도이다.","대표관료제는 사회의 다양한 집단들로부터 관료를 충원하여 정부활동에 반영시키고자 한다.","계급제는 직무의 종류와 곤란도에 따라 직위를 분류하는 제도이다.","실적주의는 능력과 업적에 따라 공무원을 임용하는 제도이다."],answer:4},
    {num:63,subj:"행정학개론",text:"정책의제설정에 관한 설명으로 옳지 않은 것은?",choices:["콥(Cobb)과 로스(Ross)는 공중의제와 정부의제를 구분한다.","외부주도형은 정부 외부에서 정책의제화가 시작되는 방식이다.","동원형은 정부 내부에서 정책의제화가 이루어지는 방식이다.","내부접근형은 정부기관이 정책문제를 직접 채택하여 공중의제로 전환되는 방식이다.","정책의제설정의 과정에서 이익집단의 활동이 중요한 역할을 한다."],answer:2},
    {num:64,subj:"행정학개론",text:"전략적 기획에 관한 설명으로 옳은 것은?",choices:["장기적 환경변화에 대한 대응보다 단기 목표 달성을 강조한다.","조직 전체보다는 개별 구성원의 성과향상에 초점을 맞춘다.","외부환경의 분석을 통한 기회와 위협의 파악이 중요하다.","참여보다 최고관리자의 독립적 의사결정을 강조한다.","양적 목표 설정보다 질적 비전의 제시를 배제한다."],answer:3},
    {num:65,subj:"행정학개론",text:"정책결정모형에 관한 설명으로 옳지 않은 것은?",choices:["합리모형은 인간을 완전한 합리성을 가진 존재로 가정한다.","만족모형은 제한된 합리성 하에서 만족스러운 대안을 탐색한다.","점증모형은 기존의 정책에서 소폭으로 변화된 대안을 선택한다.","혼합탐색모형은 합리모형의 한계를 극복하기 위해 제안되었다.","쓰레기통 모형은 조직의 무정부 상태에서의 의사결정을 설명한다."],answer:2},
    {num:66,subj:"행정학개론",text:"정책평가에 관한 설명으로 옳지 않은 것은?",choices:["총괄평가는 정책이 종료된 후에 실시하는 평가이다.","형성평가는 정책이 집행되는 과정에서 실시하는 평가이다.","결과평가는 정책의 목표 달성도를 평가하는 것이다.","영향평가는 정책이 사회·경제적 환경에 미치는 영향을 평가하는 것이다.","메타평가는 정책평가 자체를 평가하는 것으로 과정평가의 일종이다."],answer:0},
    {num:67,subj:"행정학개론",text:"조직의 구조에 관한 설명으로 옳지 않은 것은?",choices:["공식화는 조직 내 규칙, 절차, 직무명세서 등의 문서화 정도를 말한다.","분권화는 의사결정 권한을 하위계층에 위임하는 것을 의미한다.","복잡성은 조직 내 분화의 정도를 나타낸다.","기계적 조직은 높은 분권화, 낮은 공식화의 특성이 있다.","유기적 조직은 환경이 불확실한 상황에서 효과적이다."],answer:2},
    {num:68,subj:"행정학개론",text:"예산 이론에 관한 설명으로 옳지 않은 것은?",choices:["총체주의에 따르면 예산결정은 합리적이고 포괄적인 분석에 기초한다.","점증주의에 따르면 예산결정은 전년도 예산을 기준으로 점진적으로 변화한다.","조직과정모형에 따르면 예산결정은 조직의 표준운영절차(SOP)에 따른다.","관료정치모형에 따르면 예산결정은 관료들의 협상과 타협을 통해 이루어진다.","다중합리성모형에 따르면 예산결정은 단일의 합리적 기준에 의한다."],answer:0},
    {num:69,subj:"행정학개론",text:"공무원 채용제도에 관한 설명으로 옳지 않은 것은?",choices:["공개경쟁채용시험은 불특정 다수의 응시자 중에서 우수한 인재를 선발하는 제도이다.","경력경쟁채용시험은 일정한 경력이나 자격을 갖춘 자를 특별채용하는 제도이다.","개방형 직위는 공무원을 민간인이나 타 기관의 공무원으로 보직하는 제도이다.","우리나라는 폐쇄형 임용제도를 원칙으로 하고 있다.","공무원의 신규채용은 공개경쟁채용시험에 의하는 것이 원칙이다."],answer:1},
    {num:70,subj:"행정학개론",text:"전자정부에 관한 설명으로 옳지 않은 것은?",choices:["전자정부는 정보기술을 활용하여 행정의 효율성과 투명성을 향상시키고자 한다.","전자정부는 국민에 대한 행정서비스를 개선하는 것을 목적으로 한다.","우리나라 전자정부법은 전자정부를 구현하기 위한 법적 기반을 제공한다.","전자정부의 구현은 행정의 디지털화만을 의미한다.","전자정부는 민원서비스의 온라인 제공을 포함한다."],answer:1},
    {num:71,subj:"행정학개론",text:"지방분권에 관한 설명으로 옳지 않은 것은?",choices:["지방분권은 중앙정부의 권한을 지방자치단체로 이양하는 것이다.","지방분권은 지방자치의 강화와 관련이 있다.","지방분권은 행정의 민주화와 효율화에 기여할 수 있다.","완전한 지방분권은 국가의 통일적 행정을 가능하게 한다.","주민참여는 지방분권의 실질적 구현에 기여한다."],answer:0},
    {num:72,subj:"행정학개론",text:"우리나라 예산제도에 관한 설명으로 옳지 않은 것은?",choices:["국가재정법에 따르면 회계연도는 매년 1월 1일에 시작하여 12월 31일에 종료한다.","기획재정부 장관은 예산안 편성지침을 각 중앙관서의 장에게 통보한다.","국회의 예산안 심의·의결 후 대통령이 공포하면 예산이 확정된다.","기금은 법률로 정하는 경우에만 설치할 수 있다.","추가경정예산은 예산이 성립된 후에 새로운 사정이 생긴 경우에 편성할 수 있다."],answer:2},
    {num:73,subj:"행정학개론",text:"정책집행에 관한 설명으로 옳지 않은 것은?",choices:["프레스만(Pressman)과 윌다브스키(Wildavsky)는 정책집행의 복잡성을 강조하였다.","하향식 접근방법은 정책결정자의 의도대로 집행이 이루어져야 한다고 본다.","상향식 접근방법은 일선공무원의 재량권을 중시한다.","통합적 접근방법은 하향식과 상향식 접근방법을 결합한다.","정책집행에서 관료의 재량권은 항상 정책목표 달성에 부정적 영향을 미친다."],answer:4},
    {num:74,subj:"행정학개론",text:"우리나라 지방자치제도에 관한 설명으로 옳지 않은 것은?",choices:["지방자치단체는 특별시, 광역시, 특별자치시, 도, 특별자치도, 시, 군, 구로 구분된다.","지방자치단체의 장과 지방의회의원은 주민의 직접선거로 선출된다.","주민소환제도는 선출직 공무원에 대한 주민의 직접 파면 제도이다.","지방의회는 조례 제정권과 예산 심의·의결권을 가진다.","지방자치단체의 자치재정권은 헌법에 의해 완전히 보장된다."],answer:3},
    {num:75,subj:"행정학개론",text:"행정문화에 관한 설명으로 옳지 않은 것은?",choices:["행정문화는 행정인이 공유하는 가치관, 신념, 행동양식 등을 포함한다.","행정문화는 행정행태에 영향을 미친다.","권위주의적 행정문화는 민주행정의 발전을 저해할 수 있다.","행정문화는 단기간에 쉽게 변화한다.","개방적 행정문화는 국민의 행정참여를 촉진한다."],answer:0},

  "2019": [
    {num:1,subj:"민법",text:"민법의 법원(法源)에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["관습법은 법률에 대하여 열후적ㆍ보충적 성격을 가진다.","헌법에 의하여 체결ㆍ공포된 조약으로서 민사에 관한 것은 민법의 법원이 된다.","관습법은 원칙적으로 당사자의 주장ㆍ입증을 기다림이 없이 법원이 직권으로 이를 확정","민법 제1조 소정의 ‘법률’은 헌법이 정하는 절차에 따라서 제정ㆍ공포되는 형식적 의미의","사회의 거듭된 관행으로 생성된 사회생활규범은 전체 법질서에 반하지 않아야 관습법으"],answer:3},
    {num:2,subj:"민법",text:"신의성실의 원칙에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["신의성실의 원칙에 반하는지 여부는 당사자의 주장이 없더라도 법원이 직권으로 판단할","특정채무를 보증하는 일반보증의 경우에는 채권자의 권리행사가 신의성실의 원칙에 비","강행규정에 위반하여 계약을 체결한 자가 스스로 그 계약의 성립을 부정하는 것은 특별","종전 토지 소유자가 자신의 권리를 행사하지 않았다는 사정은 그 토지의 소유권을 적법","계약의 성립에 기초가 되지 아니한 사정이 현저히 변경되어 일방당사자가 계약목적을"],answer:0},
    {num:4,subj:"민법",text:"미성년자 甲은 법정대리인 乙의 동의 없이 자신의 디지털 카메라를 丙에게 매도하는 내용의 계약(이하 ‘계약’)을 丙과 체결하였다. 이에 관한 설명으로 옳은 것은? (다툼 이 있으면 판례에 따름)",choices:["甲이 위 계약을 취소하려는 경우, 乙의 동의의 유무에 대한 증명책임은 甲에게 있다.","계약 당시 甲이 미성년자임을 알고 있었던 丙은 乙에 대하여 자신의 의사표시를 철회할","丙이 성년자가 된 甲에게 1개월의 기간을 정하여 계약의 추인 여부의 확답을 촉구한 경","丙이 미성년자인 甲에게 1개월의 기간을 정하여 계약의 추인 여부의 확답을 촉구한 경","甲이 위조하여 제시한 乙의 동의서를 丙이 신뢰하여 계약을 체결하였다면 乙은 미성년"],answer:4},
    {num:5,subj:"민법",text:"민법 제35조(법인의 불법행위능력)에 관한 설명으로 옳은 것은? (다툼이 있으면 판 례에 따름)",choices:["민법 제35조 소정의 ‘이사 기타 대표자’에는 대표권 없는 이사가 포함된다.","법인의 불법행위가 성립하는 경우, 대표자의 행위가 피해자에 대한 불법행위를 구성한다","법인의 불법행위가 성립하여 법인이 피해자에게 배상한 경우, 법인은 대표자 개인에 대","법인의 대표자의 행위가 직무에 관한 행위에 해당하지 아니함을 피해자가 경과실로 알","법인의 대표자의 행위가 법령의 규정에 위배된 것이라면 외관상, 객관적으로 직무에 관"],answer:1},
    {num:7,subj:"민법",text:"민법상 법인의 기관에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["민법상 이사의 임기를 제한하는 규정은 없다.","사원총회의 결의는 민법 또는 정관에 다른 규정이 없으면 사원 과반수의 출석과 출석사","이사는 정관 또는 총회의 결의로 금지하지 아니한 사항에 한하여 타인으로 하여금 특정","임시이사 선임의 요건인 ‘이사가 없거나 결원이 있는 경우’란 이사가 전혀 없거나 정관에","정관에 이사의 해임사유에 관한 규정이 있는 경우에는 이사의 중대한 의무위반이 있어"],answer:4},
    {num:8,subj:"민법",text:"민법상 법인의 소멸에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["사단법인은 사원총회의 결의로도 해산할 수 있다.","법원은 법인의 해산 및 청산을 검사, 감독한다.","법인에 대한 청산종결등기가 경료되었다면 청산사무가 종결되지 않았더라도 그 법인은","법인이 채무를 완제하지 못하게 된 때에는 이사는 지체없이 파산신청을 하여야 한다.","청산인은 청산법인의 능력 범위 내에서 대내적으로 청산사무를 집행하고 대외적으로 청"],answer:2},
    {num:9,subj:"민법",text:"물건에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["주물의 구성부분도 종물이 될 수 있다.","천연과실은 수취할 권리의 존속기간일수의 비율로 취득한다.","종물은 주물의 처분에 따른다는 민법 제100조제2항은 강행규정이다.","주물 그 자체의 효용과 직접 관계가 없는 물건은 주물 소유자의 사용에 공여되고 있더","건물의 개수는 공부상의 등록에 의하여만 결정된다."],answer:3},
    {num:10,subj:"민법",text:"반사회질서의 법률행위에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["선량한 풍속 기타 사회질서에 위반한 사항을 내용으로 하는 법률행위는 무효이다.","법률행위가 선량한 풍속 기타 사회질서에 위반되는지 여부는 법률행위가 이루어진 때를","법률행위의 성립과정에 강박이라는 불법적인 방법이 사용된 경우, 그것만으로는 반사회","다수의 보험계약을 통하여 보험금을 부정취득할 목적으로 체결된 보험계약은 그것만으","양도소득세의 일부를 회피할 목적으로 매매계약서에 실제로 거래한 것보다               낮은 금액을"],answer:3},
    {num:11,subj:"민법",text:"불공정한 법률행위에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["증여계약도 불공정한 법률행위가 될 수 있다.","급부와 반대급부 사이의 현저한 불균형을 판단함에 있어서 피해 당사자의 궁박, 경솔 또","대리행위의 경우, 경     솔과 무경험은 대리인을 기준으로 하여 판단하고 궁박은 본인의 입","피해 당사자가      궁박, 경솔 또는 무경험의 상태에 있었다면 상대방 당사자에게 그와 같은","법률행위가 현저하게 공정을        잃은 경우 그것은 당사자의 궁박, 경솔 또는 무경험으로 인"],answer:2},
    {num:12,subj:"민법",text:"착오로 인한 의사표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["장래의 미필적 사실의 발생에 대한 기대나 예상이 빗나간 것에 불과한 것은 착오라고","표의자가 착오로 인하여 경제적인 불이익을 입은 것이 아니라면 이를 법률행위 내용의","표의자가 경과실로 인하여 착오에 빠져 법률행위를 하고 그 착오를 이유로 법률행위를","착오로 인한 의사표시 취소에 관한 민법 제109조제1항의 적용을 당사자의 합의로 배제","의사표시의       착오가 표의자의 중대한 과실로 인한 때에는 상대방이 표의자의 착오를 알"],answer:4},
    {num:14,subj:"민법",text:"甲은 자기 소유의 부동산을 1억원에 매도하겠다는 청약을 등기우편으로 乙에게 보냈 다. 이에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["甲의 청약은 乙에게 도달한 때에 효력이 생긴다.","甲이 등기우편을 발송한 후 성년후견개시의 심판을 받은 경우, 乙에게 도달한 甲의 청약","甲의 등기우 은 반송되는 등 특별한 사정이 없는 한 乙에게 배달된 것으로 인정하여야 한다.","甲은 등기우편이 乙에게 도달하기 전에 자신의 청약을 철회할 수 있다.","甲의 청약이 효력을 발생하기 위해서 乙이 그 내용을 알 것까지는 요하지 않는다."],answer:1},
    {num:15,subj:"민법",text:"대리에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["대리인은 행위능력자임을 요하지 않는다.","유  언은 대리가 허용되지 않는다.","대리에 있어 본인을 위한 것임을 표시하는 현명은             묵시적으로 할 수는 없다.","임의대리의 경우 그 원인된 법률관계의 종료 전에 본인이 수권행위를 철회할 수 있다.","대리인이 수인인 때에는 원칙적으로          각자가 본인을 대리한다."],answer:2},
    {num:16,subj:"민법",text:"복대리에 관한 설명으로 옳은 것은?",choices:["복대리인은 대리인의 대리인이다.","법정대리인은 복대리인을 선임하지 못한다.","복대리인의 대리권은 대리인의 대리권의 범위를 넘지 못한다.","임의대리인이 부득이한 사유로 복대리인을 선임한 경우, 본인에 대하여 그 선임감독에","복대리인이 선임된 후 대리인의 대리권이 소멸하더라도 복대리권은 소멸하지 않는다."],answer:2},
    {num:17,subj:"민법",text:"무권대리에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["무권대리인이 체결한 계약은 본인이 이를 추인할 수 있다.","무권대리인이 체결한 계약의 상대방은 상당한 기간을 정하여 본인에게 추인여부의 확답","대리권 없이 타인의 부동산을 매도한 자가 그 부동산을 단독상속한 후 그 대리행위가","무권대리행위가 제3자의 기       망 등 위법행위로 야기되었더라도 민법 제135조에 따른 무권","민법 제135조에 따른 무권대리인의 상대방에 대한 책임은 대리권                    흠결에 관하여 무권대"],answer:4},
    {num:18,subj:"민법",text:"甲이 토지거래허가구역 내의 자신의 토지에 대하여 乙과 매매계약을 체결한 경우에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["토지거래허가를 받기 전에도 위 계약의 채권적 효력은 발생한다.","토지거래허가를 받기 전에도 乙은 甲에게 소유권이전의무 불이행으로 인한 손해배상청","위 계약 체결 후 토지거래       허가를 받은 경우, 위 계약은 특별한 사정이 없는 한 그 허가","토지거래허가를 받기 전에 甲이 허가신청협력의무의 이행거절의사를 명백히 표시한 경","토지거래   허가를 받지 못하여 위 계약이 확정적으로 무효가 된 경우, 그 무효가 됨에 있"],answer:3},
    {num:20,subj:"민법",text:"법률행위의 무효와 취소에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["무효인 법률행위는 추인하여도 원칙적으로 그 효력이 생기지 않는다.","법률행위의 일부분이 무효인 경우에 대하여 규정하고 있는 민법 제137조는 임의규정이다.","취소할 수 있는 법률행위에서 취소권자의 상대방이 그 취소할 수 있는 행위로 취득한","하나의 법률행위의 일부분에만 취소사유가 있다고 하더라도 그 법률행위가 가분적이거","임차권양도계약과 권리금 계약이 결합하여 경제적ㆍ사실적 일체로 행하여진 경우, 그 권"],answer:2},
    {num:21,subj:"민법",text:"법률행위의 조건과 기한에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["기한부 권리는 일반규정에 의하여 처분할 수 있다.","조건있는 법률행위의 당사자는 조건의 성부가 미정한 동             안에 조건의 성취로 인하여 생","해제조건있는 법률행위는 조건이 성취한 때로부           터 그 효력을 잃지만, 당사자의 의사에","시기있는 법률행위는 기한이 도래한 때로부         터 그 효력이 생긴다.","부 첩관계의 종료를 해제조건으로 하는 증여계약에서 그 조건은 무효이므로 그 증여계약"],answer:4},
    {num:24,subj:"민법",text:"민법상 소멸시효에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["판결에 의하여 확정된 채권은 판결확정당시에 변제기가 도래하지 않아도 10년의 소멸시","본래의 소멸시효 기산일과 당사자가 주장하는 기산일이 서로 다른 경우에 법원은 당사","소멸시효의 기산     점이 되는 ‘권리를 행사할 수 있는 때’란 권리를 행사하는 데 있어 사실","어떤 권리의 소멸시효기간이 얼마나 되는지에 대해서 법원은 당사자의 주장에 따라 판","어떤 채권이 1년의 단기소멸시효에 걸리는 경우, 그 채권의 발생원인이 된 계약에 기하"],answer:1},
    {num:25,subj:"민법",text:"강행규정이 아닌 것은? (다툼이 있으면 판례에 따름)",choices:["신의성실의 원칙에 관한 민법 제2조","권리능력의 존속기간에 관한 민법 제3조","미성년자의 행위능력에 관한 민법 제5조","사단법인의 사원권의 양도, 상속금지에 관한 민법 제5 조         6","법인해산 시      잔여재산의 귀속에 관한 민법 제80조"],answer:3},
    {num:27,subj:"행정법",text:"행정법의 일반원칙에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정의 자기구속원칙의 인정근거는 평등원칙 또는 신뢰보호원칙이다.","행정관행이 위법한 경우 명문의 규정이 없는 한 행정청은 자기구속을 당하지 않는다.","비례의 원칙은 헌법상의 원칙이다.","신뢰보호원칙에서 법률에 대한 신뢰는 신뢰보호의 대상이 되지 않는다.","신뢰보호원칙에서 특정 개인에 대한 공적인 견해표명이 있어야 하는 것은 아니다."],answer:3},

    {num:30,subj:"행정법",text:"강학상 허가에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["반드시 신청을 전제로 하는 것은 아니다.","건축허가는 대물적 성질을 갖는 것이어서 그 허가를 할 때에 인적 요소에 관해서는 형","허가에 붙은 기한이 그 허가된 사업의 성질상 부당하게 짧은 경우에는 그 허가조건의","허가신청 후 처분 전에 관계법령이 개정되었다면 원칙적으로 개정된 법령에 따라 허가","타법상의 인ㆍ   허가가 의제되는 허가를 하는 경우, 행정청은 타법상의 인ㆍ허가 요건에"],answer:4},
    {num:31,subj:"행정법",text:"행정행위의 효력에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["내용상 구속력은 행정행위의 실체법상 효력으로 관계인도 구속한다.","행정행위에 불가    쟁력이 발생하면 판결에서와 같은 기판력이 발생하여 그 처분의 기초가","행정행위가 당연무효가 아 닌 한 권한 있는 기관에 의해 취소되기 전까지 누구도 그 효","행정행위의 위법여부가 민사소송에서 선결문제가 된 경우 민사법원은 그 행정행위의 위","행정행위의 불가변력은     모든 행정행위에서 발생하는 효력은 아니다."],answer:1},

    {num:33,subj:"행정법",text:"2019. 2. 1. 행정청 甲은 乙에 대하여 2019. 3. 1.부터 2020. 4. 30.까지의 기간을 정 하여 도로점용허가처분을 하면서, 매달 100만원의 점용료를 납부할 의무를 명하는 부관을 부가하였다. 그리고 2019. 5. 1. 乙의 도로점용이 교통혼잡을 초래할 경우 도 로점용허가를 취소할 수 있다는 부관을 부가하였다. 이 사례에 관한 설명으로 옳은 것은? (취소소송을 제기하는 경우 제소기간은 준수한 것으로 보며, 다툼이 있으면 판례에 따름)",choices:["매달 100만원의 점용료를 납부하도록 하는 부관은 조건에 해당한다.","도로점용허가는 2020. 4. 30. 이후 행정청이 허가취소의 의사표시를 함으로써 효력이 소","2019. 3. 1.부           까","매달 100만원의    점                             례","2019. 5. 1. 甲이 부가한 부관은 乙의 동의가 있더라도 법령의            근거가 없으면 위법하다."],answer:3},

    {num:46,subj:"행정법",text:"행정관청 간의 관계에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["상급관청의 훈령권에는 법령상 근거가 요구된다.","대외적 구속력이 없는 훈령을 위반한 조치는 위법하다.","하급행정관청의 권한행사에 대한 상급행정관청의 내부적인 승인ㆍ인가는 행정처분이 아","‘동의’를 의미하는 관계기관의 ‘","상급관청의 하급관청에 대한 감시권에는 개별적인 법령상 근거를 요한다."],answer:2},
    {num:47,subj:"행정법",text:"경찰책임에 관한 설명으로 옳은 것은?",choices:["경찰위험에 책임이 없는 제3자에게 경찰권을 발동하려면 경찰긴급상태의 요건을 갖추어","물건으로 인한 위험이나 장해로부    터 발생하는 경찰책임을 행위책임이라고 한다.","행위책임은 공법적 책임이므로 고의나 과실을 요한다.","사법상 법인은 경찰책임을 부담하지 아니한다.","외국인은 경찰책임을 부담하지 아니한다."],answer:0},
    {num:48,subj:"행정법",text:"공무원의 권리와 의무에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["지방공무원법에 따라 공무원은 직무수행 시 소속상사의 직무상 명령에 복종하여야 하지","공무원이 보수에 해당하는 금원지급을 구할 경우 해당 보수항목이 국가예산에 계상되어","지방공무원법에 따른 고충   심사의 결정은 행정처분이 아니다.","지급결정된 연금의 지급청구소송은 공법상 당사자소송으로 제기되어야 한다.","공무원연금법상 연금수급권은 사회보장수급권과 재산권의 성격을 함께 가진다."],answer:1},
    {num:49,subj:"행정법",text:"공물에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["행정재산은 시효취득의 대상이 된다.","국유재산법상 행정재산의 사용허가는 사법상 계약의 성질을 가진다.","국유공물은 민사집행법에 의한 강제집행의 대상이 될 수 있다.","국유재산의 무단점유에 대한 변상금의 징수는 재량행위이다.","도로부지에는 저당권을 설정할 수 있다."],answer:4},
    {num:50,subj:"행정법",text:"지방자치단체의 사무에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["자치사무에 대한 국가의 감독은 적법성 통제에 그친다.","조례안으로 지방자치단체 사무의 민간위탁에 관하여 지방의회의 사전 동의를 받도록 하","자치사무에 있어서 시ㆍ도와 시ㆍ군ㆍ자치구의 사무가 경합하는 경우 시ㆍ군ㆍ자치구가","호적사무는 사법적(司法的) 성격이 강한 국가의 사무이다.","개별법령에서 조례로 정하도록 위임한 경우 기관위임사무에 대해서도 조례를 정할 수 있다."],answer:3},
    {num:51,subj:"행정학개론",text:"행정학의 학문적 성격에 관한 설명으로 옳은 것은?",choices:["행정학의 과학성을 강조하는 사람들은 행정현상의 보편적인 원칙을 인정하지 않는다.","행정학에서 기술성은 행태주의에 의해 중요하게 제기되었다.","상대적으로 사이몬(H. A. Simon)은 기술성을, 왈도(D. Waldo)는 과학성을 더 강조하였다.","행정학은 다른 학문으로부터 많은 이론과 지식을 받아들여 종합학문적인 성격을 지니고 있다.","1950년대에 공공선택론, 신행정론 등의 영향으로 행정학의 정체성 위기가 처음 등장했다."],answer:3},
    {num:52,subj:"행정학개론",text:"행정과 경영의 비교에 관한 설명으로 옳지 않은 것은?",choices:["행정의 목적은 공익 추구이고, 경영의 목적은 이윤 극대화이다.","행정은 경영보다 상대적으로 엄격한 법적 규제를 받는다.","행정은 모든 국민에 대한 평등성이 강조되지만 경영은 이윤 추구 과정에서 고객 간 차","행정과 경영은 능률성을 추구하는 과정에서 유사한 관리기법을 많이 활용한다.","상대적으로 행정은 관리적 측면이 강하게 나타나고 경영은 권력적 측면이 강하게 나타난다."],answer:4},
    {num:53,subj:"행정학개론",text:"신공공서비스론에 관한 설명으로 옳은 것은?",choices:["정부의 역할을 ‘노젓기’보다는 ‘방향잡기’로 규정한다.","관료는 사회문제를 해결하는 과정에서 협상과 중재 기능을 담당한다.","공익을 행정활동으로 생성되는 부산물로 간주한다.","정부관료제에 경쟁 원리를 도입하여 개혁할 것을 강조한다.","기업가적 목표달성을 위하여 폭넓은 행정재량을 허용한다."],answer:1},
    {num:54,subj:"행정학개론",text:"신제도주의에 관한 설명으로 옳지 않은 것은?",choices:["사람의 행태에 대한 연구에서 제도를 중요시한다.","사회학적 제도주의는 제도의 범위에 관습과 문화도 포함한다.","공공선택론은 합리적 선택 제도주의의 대표적 이론 중 하나이다.","역사적 제도주의는 각국 정책의 상이성과 효과를 역사적으로 형성된 각국의 제도에서","정책 또는 행정환경은 내생변수가 아닌 외생변수로 다룬다."],answer:4},
    {num:55,subj:"행정학개론",text:"공직부패에 관한 설명으로 옳은 것은?",choices:["사회문화적 접근법은 공직부패의 원인에 대하여 문화적 특성, 제도상 결함, 구조상 모순","체제론적 접근법은 부패의 원인을 주로 개인들의 윤리의식과 자질에서 찾는다.","제도적 접근법에서 행정통제 장치의 미비는 공무원 부패의 주요 원인이다.","백색부패는 부당하게 사익을 추구하는 부패의 유형이다.","부패의 제도화 정도에 따라 거래형 부패와 사기형 부패로 나눌 수 있다."],answer:2},
    {num:57,subj:"행정학개론",text:"정책평가에 관한 설명으로 옳지 않은 것은?",choices:["준실험설계는 실험집단과 통제집단의 동질성을 확보하여야 한다.","내적 타당성은 정책 집행 이후 변화가 오직 해당 정책에 기인한 것인지 아닌지를 밝히","외적 타당성은 정책평가 결과의 일반화 가능성을 의미한다.","평가성 검토(evaluability assessment)는 본격적인 평가를 시작하기 전에 실시하는 것으","허위변수는 두 변수 간에 전혀 관계가 없는데도 인과관계가 있는 것처럼 보이게 하는"],answer:0},
    {num:60,subj:"행정학개론",text:"정책결정에 있어서 사이버네틱스 모형에 관한 설명으로 옳지 않은 것은?",choices:["정책결정과정에서 변수의 단순화를 통해서 불확실성을 통제한다.","사전에 설정된 표준운영절차(SOP)의 중요성이 강조된다.","주요 변수의 유지를 위한 적응에 초점을 둔다.","사전에 설정된 고차원 목표의 극대화를 추구한다.","의사결정자는 처리할 수 없는 문제에 직면할 경우 표준운영절차(SOP)를 수정ㆍ변경ㆍ추"],answer:3},
    {num:61,subj:"행정학개론",text:"정부가 도입한 책임운영기관에 관한 설명으로 옳지 않은 것은?",choices:["기관의 지위에 따라 소속책임운영기관과 중앙책임운영기관으로 구분된다.","우리나라는 책임운영기관의 설치ㆍ운영에 관한 법률 등에 의해 운영되고 있다.","정부가 사업적ㆍ집행적 성격이 강한 기관을 분리시켜 유연한 경영방식을 도입한 것이다.","기관장에게 재량권을 부여하여 자율적인 경영과 그 성과에 대한 책임을 지게 한다.","예산편성 및 집행상의 자율권을 확보하기 위하여 특별위원회를 두며, 예산의 전용ㆍ이월"],answer:4},
    {num:63,subj:"행정학개론",text:"국가공무원법상 공무원의 징계에 관한 설명으로 옳지 않은 것은?",choices:["징계는 파면ㆍ해임ㆍ강등ㆍ정직ㆍ감봉ㆍ견책으로 구분한다.","정직은 1개월 이상 3개월 이하의 기간으로 하고, 그 기간 중 보수는 3분의 2를 감한다.","감 은 1개월 이상 3개월 이하의 기간 동   안 보수의 3분의 1을 감한다.","견책은 전과에 대하여훈계하고 회개하게 한다.","징계로 해임처분을 받은 때부터 3년이 지나지 아니한 자는 공무원으로 임용될 수 없다."],answer:1},
    {num:64,subj:"행정학개론",text:"실적주의 인사행정에 관한 설명으로 옳은 것은?",choices:["공무원의 정치적 중립을 어렵게 한다.","행정의 전문성을 저해한다.","개인의 능력이나 실적을 기준으로 임용한다.","빈번한 교체임용을 통해서 관료의 특권화를 막는다.","직업공무원제 수립을 저해한다."],answer:2},
    {num:68,subj:"행정학개론",text:"정부회계에 관한 설명으로 옳지 않은 것은?",choices:["복식부기는 거래의 이중성에 따라 장부의 차변과 대변에 각각 계상하고 차변의 합계와","미지급비용은 현금주의에서는 인식되지 않으나 발생주의에서는 부채로 인식된다.","현행 정부회계는 발생주의ㆍ복식부기 방식을 채택하여 재무제표를 작성한다.","국가회계법상 중앙정부의 대표적 재무제표는 재정상태보고서, 재정운영보고서, 현금흐름","발생주의ㆍ복식부기의 정부회계는 성과중심의 정부개혁에 유용한 정보를 제공한다."],answer:3},
    {num:70,subj:"행정학개론",text:"지방자치단체의 자치권에 관한 설명으로 옳지 않은 것은?",choices:["고유권설(지방권설)에서 자치권은 국가와 관계없이 인간이 태어나면서부터 천부의 인권","전래권설(국권설)에서 자치권은 주권적 통일국가의 통치구조 일환으로 형성된다는 의미","제도적 보장설은 자치권이 국가의 통치권에서 나오는 것이라고 하면서도, 헌법에 지방자","고유권설(지방권설)은 주로 헤겔(Hegel)의 영향을 받은 독일의 공법학자들에 의하여 주","제도적 보장   설에서의 보장은 지방자치제도의 일반적인 보장이지, 개별적인 지방자치단체"],answer:3},
    {num:71,subj:"행정학개론",text:"주민투표에 관한 설명으로 옳은 것은?",choices:["주민투표는 주민의 중요한 권리이기 때문에 의무화하여 위반자에게 벌금 등 제재를 가","항의적 주민투표(protest referendum)는 지방의회에서 의결한 사항에 대하여 그 효력 여","주민투표는 조례의 제정 또는 개ㆍ폐 등에 관하여 주민이 직접 의안을 발의하는 제도이다.","우리나라는 주민투표 결과의 확정을 위해서는 전체 유효투표권자 중 1/4 이상이 투표를","주민 투표의 본질은 대의제를 보완하려는 것이 아니라 대체하려는 것이다."],answer:1},
    {num:72,subj:"행정학개론",text:"지방공기업에 관한 설명으로 옳은 것은?",choices:["일반회계와는 별도로 지방의회의 예산 심의 및 의결이 필요 없는 특별회계로 운영된다.","지방공기업법의 적용을 받기 때문에 지방자치법의 적용대상은 아니다.","지방자치단체가 지역주민의 복리증진 등을 목적으로 직접 설치․경영하거나 법인을 설","지방자치단체로부터 독립해 있기 때문에 지방자치단체의 통제를 받지 않는다.","지방공사 및 지방공단에 소속된 직원은 신분이 지방공무원이다."],answer:2},
    {num:73,subj:"행정학개론",text:"우리나라 전자정부에 관한 설명으로 옳지 않은 것은?",choices:["수요자 중심보다는 공급자 중심의 행정서비스를 강조한다.","정부의 정책과정과 업무절차에 대한 투명성과 접근성을 높인다.","국민과의 소통과 협력을 확대하고, 24시간 행정서비스를 제공한다.","스마트워크센터를 통해 시ㆍ공간 제약없이 유연한 근무를 가능하게 한다.","인터넷이나 DB기술 활용을 통해 부서 간 효율적인 정보교류가 가능하다."],answer:0},
    {num:75,subj:"행정학개론",text:"오스본(D. Osborne)과 플래스트릭(P. Plastrik)의 ‘기업가 정부’를 만들기 위한 다섯 가지 전략에 관한 설명으로 옳지 않은 것은?",choices:["핵심전략: 공공조직의 목표를 대상으로 하고 목표, 역할, 정책방향의 명료화 추구","성과전략: 업무유인의 개선을 위해 경쟁을 도입하고 성과관리 추진","고객전략: 정부조직의 책임을 대상으로 고객에 대한 정부의 책임확보 및 고객에 의한 선","통제전략: 권력을 대상으로 하고 집권화를 추구","문화전략: 조직문화를 대상으로 구성원의 가치, 규범, 태도 그리고 기대를 바꾸려는 것"],answer:3},
  ],
  "2020": [
    {num:1,subj:"민법",text:"관습법과 사실인 관습에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름) ㄱ. 관습법은 사회의 기듭된 관행으로 생성된 사회생활규범이 법적 확신과 인식에 의하여 법적 규범으로 승인된 것이다. ㄴ. 종래 관습법으로 승인되었더라도 그 관습법을 적용하여야 할 시점에서 전체 법질서에 부합하지 않게 되었다면 법적 규범으로서의 효력이 부정된다. ㄷ. 사실인 관습은 법령으로서의 효력이 없는 단순한 관행으로서 당사자의 의사를 보충하는데 그친다.",choices:["ㄱ","ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ"],answer:4},
    {num:2,subj:"민법",text:"신의성실의 원칙(이하 \"신의칙\"이라 한다)에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["신의칙은 당사자의 주장이 없어도 법원이 직권으로 판단할 수 있다.","일반 행정법률관계에 관한 관청의 행위에 대하여 신의칙은 특별한 사정이 있는 경우 예외적으로 적용될 수 있다.","사용자는 특별한 사정이 없는 한 근로계약에 수반되는 신의칙상의 부수적 의무로서 피용자의 안전에 대한 보호의무를 부담한다.","숙박업자는 신의칙상 부수적 의무로서 투숙객의 안전을 배려할 보호의무를 부담한다.","항소권과 같은 소송법상의 권리에는 신의칙 내지 실효의 원칙이 적용될 수 없다."],answer:4},
    {num:3,subj:"민법",text:"부부 사이인 甲과 그의 아이 丙을 임신한 乙은 A의 과실로 교통사고를 당했다. 이에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름) ㄱ. 이 사고로 丙이 출생 전 乙과 함께 사망하였더라도 丙은 A에 대하여 불법행위로 인한 손해배상청구권을 가진다. ㄴ. 사고 후 살아서 출생한 丙은 A에 대하여 甲의 부상으로 입게 될 자신의 정신적 고통에 대한 위자료를 청구할 수 있다. ㄷ. 甲이 사고로 사망한 후 살아서 출생한 丙은 甲의 A에 대한 불법행위로 인한 손해배상청구권을 상속받지 못한다.",choices:["ㄱ","ㄴ","ㄷ","ㄱ, ㄴ","ㄴ, ㄷ"],answer:1},
    {num:4,subj:"민법",text:"제한능력자에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["미성년자가 법정대리인의 동의를 얻은 법률행위를 하기 전에는 법정대리인은 그가 한 동의를 취소할 수 있다.","미성년자는 자신의 노무제공에 따른 임금청구를 단독으로 할 수 있다.","미성년자는 타인의 대리인으로서 단독으로 유효한 대리행위를 할 수 있다.","피한정후견인은 적극적인 속임수로써 법정대리인의 동의가 있는 것으로 믿게 한 경우, 그 법률행위를 취소할 수 없다.","가정법원은 성년후견개시의 심판을 할 때 본인의 의사를 고려할 필요는 없다."],answer:4},
    {num:5,subj:"민법",text:"민법상 비법인사단에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["이사가 없거나 결원이 있는 경우 임시이사의 선임에 관한 민법 제63조 규정은 비법인사단에도 유추적용될 수 있다.","비법인사단의 사원이 집합체로서 물건을 소유할 때에는 총유로 한다.","비법인사단이 타인 간의 금전채무를 보증하는 행위는 총유물의 관리·처분행위로 볼 수 없다.","비법인사단에서 사원의 지위는 규약이나 관행에 의하여 양도 또는 상속될 수 없다.","비법인사단의 대표자가 직무에 관하여 타인에게 손해를 가한 경우, 민법 제35조제1항의 유추적용에 의해 비법인사단은 그 손해를 배상할 책임이 있다."],answer:3},
    {num:6,subj:"민법",text:"민법 제35조(법인의 불법행위능력)에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["대표권이 없는 이사가 직무행위로 타인에게 손해를 가한 경우 법인은 불법행위책임을 진다.","법인의 불법행위책임이 성립하는 경우 가해행위를 한 대표기관은 손해배상책임을 면한다.","외형상 대표자의 직무행위로 인정되더라도 법령에 위반한 행위는 직무에 관한 행위가 아니다.","대표자의 행위가 직무행위에 해당하지 않음을 피해자가 중대한 과실로 알지 못한 경우에는 법인에게 손해배상책임을 물을 수 없다.","법인의 불법행위책임에는 과실상계의 법리가 적용되지 않는다."],answer:3},
    {num:7,subj:"민법",text:"민법상 사단법인에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["이사는 원칙적으로 법인의 제반 업무처리를 대리인에게 포괄적으로 위임할 수 없다.","정관의 규범적 의미와 다른 해석이 사원총회의 결의에 의해 표명되었더라도 이는 법원을 구속하는 효력이 없다.","이사의 임면에 관한 사항은 정관의 임의적 기재사항이다.","이사회의 결의사항에 이해관계가 있는 이사는 의결권이 없다.","민법상 청산절차에 관한 규정에 반하는 잔여재산 처분행위는 특단의 사정이 없는 한 무효이다."],answer:2},
    {num:8,subj:"민법",text:"민법상 물건에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["건물의 개수(個數)를 결정함에 있어서 건축자나 소유자의 의사 등 주관적 사정은 고려되지 않는다.","주물 소유자의 상용에 공여되고 있더라도 주물 그 자체의 효용과 직접 관계없는 물건은 종물이 아니다.","당사자는 특약으로 주물과 종물을 별도로 처분할 수 있다.","국립공원의 입장료는 민법상 과실(果實)이 아니다.","주물의 소유자가 아닌 다른 사람의 소유에 속하는 물건은 종물이 될 수 없다."],answer:0},
    {num:9,subj:"민법",text:"반사회적 법률행위에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["해외파견 근로자의 귀국 후 일정기간 소속회사에 근무토록 한 약정은 특별한 사정이 없는 한 반사회적 법률행위라고 할 수 없다.","반사회적 법률행위로서 무효인 계약은 당사자가 무효임을 알고 추인하여도 원칙적으로는 새로운 법률행위로 볼 수 없다.","매매계약의 동기가 반사회적이고 그 동기가 외부에 표시된 경우 그 매매계약은 무효이다.","어느 법률행위가 선량한 풍속 기타 사회질서에 위반하는지는 특별한 사정이 없는 한 그 법률행위 당시를 기준으로 판단한다.","수사기관에서 허위진술의 대가를 지급하기로 한 약정은 그 대가가 적정하다면 반사회적 법률행위에 해당하지 않는다."],answer:4},
    {num:10,subj:"민법",text:"강행법규에 위반한 법률행위에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["강행법규에 위반한 자가 스스로 그 약정의 무효를 주장하는 것은 특별한 사정이 없는 한 신의칙에 반한다.","형사사건에 대한 의뢰인과 변호사의 성공보수약정은 강행법규위반으로서 무효일 뿐 반사회적 법률행위는 아니다.","부동산을 등기하지 않고 순차적으로 매도하는 중간생략등기합의는 강행법규에 위반하여 무효이다.","개업공인중개사가 중개의뢰인과 직접 거래하는 행위를 금지하는 공인중개사법 규정은 강행규정이 아니라 단속규정이다.","강행법규를 위반하여 무효인 계약에 대해서는 그 상대방의 선의, 무과실에 따라 표현대리 법리가 적용된다."],answer:3},
    {num:11,subj:"민법",text:"비진의표시에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["비진의표시에서 '진의'는 표의자가 진정으로 마음 속에서 바라는 사항을 뜻한다.","비진의표시에서 '진의'는 특정 내용의 의사표시를 하고자 하는 표의자의 생각을 의미하는 것은 아니다.","표의자가 진정 마음에서 바라지는 아니하였더라도 당시의 상황에서는 최선이라고 판단하여 의사표시를 하였다면 비진의표시는 아니다.","표의자가 강박에 의하여 증여를 하기로 하고 그에 따른 증여의 의사표시를 하였더라도, 재산을 강제로 뺏긴다는 본심이 잠재되어 있다면 그 증여는 비진의표시에 해당한다.","공무원의 사직의 의사표시와 같은 공법행위에도 비진의표시에 관한 민법의 규정이 적용된다."],answer:2},
    {num:12,subj:"민법",text:"통정허위표시에 기하여 새롭게 이해관계를 맺은 제3자에 해당하지 않는 사람은? (다툼이 있으면 판례에 따름)",choices:["통정허위표시인 매매계약에 기하여 부동산 소유권을 취득한 양수인으로부터 그 부동산을 양수한 사람","통정허위표시인 채권양도계약의 양도인에 대하여 채무를 부담하고 있던 사람","통정허위표시인 저당권 설정행위로 취득된 저당권의 실행으로 그 목적인 부동산을 경매에서 매수한 사람","통정허위표시인 금전소비대차계약에서 대주가 파산한 경우 파산관재인으로 선임된 사람","통정허위표시에 의하여 부동산 소유권을 취득한 양수인과 매매계약을 체결하고 소유권이전등기청구권 보전을 위한 가등기를 마친 사람"],answer:1},
    {num:13,subj:"민법",text:"착오의 의사표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["동기의 착오를 이유로 취소하려면 당사자 사이에 동기를 의사표시의 내용으로 하는 합의가 필요하다.","착오를 이유로 취소하기 위해서는 일반인이 표의자라면 그러한 의사표시를 하지 않았을 정도의 중요부분에 착오가 있어야 한다.","착오를 이유로 취소할 수 없는 중대한 과실은 표의자의 직업 등에 비추어 보통 요구되는 주의를 현저히 결여한 것을 의미한다.","매매계약이 적법하게 해제된 후에도 착오를 이유로 그 매매계약을 취소할 수 있다.","상대방의 기망으로 표시상의 착오에 빠진 자의 행위에 대하여 착오취소의 법리가 적용된다."],answer:0},
    {num:14,subj:"민법",text:"당사자 일방으로부터 부동산 매매계약의 체결에 관한 대리권만 수여받은 대리인이 특별한 사정이 없는 한 할 수 있는 행위에 해당하는 것은? (다툼이 있으면 판례에 따름)",choices:["매도인을 대리하여 중도금이나 잔금을 수령하는 행위","매도인을 대리하여 약정된 매매대금의 지급기일을 연기해주는 행위","매도인을 대리하여 잔금채권을 담보로 대출을 받는 행위","매수인을 대리하여 매매계약을 해제하는 행위","매수인을 대리하여 매매목적 부동산을 처분하는 행위"],answer:0},
    {num:15,subj:"민법",text:"표현대리에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["민법 제125조의 표현대리가 성립하기 위한 대리권 수여의 표시는 사회통념상 대리권을 추단할 수 있는 직함의 사용을 승낙한 경우도 포함한다.","대리인이 복대리인을 통하여 대리권의 범위를 넘는 법률행위를 한 경우에도 권한을 넘은 표현대리에 관한 민법 제126조가 적용된다.","표현대리가 성립하여 본인이 이행책임을 지는 경우, 상대방에게 과실이 있으면 과실상계의 법리를 적용하여 본인의 책임을 경감할 수 있다.","대리권 소멸 후의 표현대리가 인정된 경우에 그 표현대리의 권한을 넘는 대리행위가 있으면 권한을 넘은 표현대리가 성립할 수 있다.","권한을 넘은 표현대리에 관한 민법 제126조는 임의대리뿐만 아니라 법정대리에도 적용된다."],answer:2},
    {num:16,subj:"민법",text:"대리권 없는 乙이 甲을 대리하여 甲 소유 X건물에 대하여 丙과 매매계약을 체결하였다. 표현대리가 성립하지 않는 경우 이에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["계약체결 당시 乙이 무권대리인임을 丙이 알았다면 丙은 甲에게 추인 여부의 확답을 최고할 수 없다.","甲은 丙에 대하여 계약을 추인할 수 있으나 乙에 대해서는 이를 추인할 수 없다.","계약체결 당시 乙이 무권대리인임을 丙이 알았더라도 甲이 추인하기 전이라면 丙은 乙을 상대로 의사표시를 철회할 수 있다.","甲이 추인을 거절한 경우, 丙의 선택으로 乙에게 이행을 청구하였으나 이를 이행하지 않은 乙은 丙에 대하여 채무불이행에 따른 손해배상책임을 진다.","甲이 사망하여 乙이 단독상속한 경우 乙은 본인의 지위에서 위 계약의 추인을 거절할 수 있다."],answer:3},
    {num:17,subj:"민법",text:"법률행위의 무효에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["법률행위의 일부가 무효인 때에는 원칙적으로 그 전부를 무효로 한다.","무효인 법률행위에 따른 법률효과를 침해하는 것처럼 보이는 채무불이행이 있다면 채무불이행으로 인한 손해배상을 청구할 수 있다.","불공정한 법률행위로서 무효인 경우 무효행위의 전환에 관한 민법 제138조가 적용될 수 있다.","법률행위가 불성립하는 경우 무효행위의 추인을 통해 유효로 전환할 수 없다.","무효행위의 추인은 그 무효 원인이 소멸한 후에 하여야 효력이 있다."],answer:1},
    {num:18,subj:"민법",text:"법률행위의 취소에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["제한능력을 이유로 법률행위가 취소되면 제한능력자는 그 행위로 인해 받은 이익이 현존하는 한도에서 상환할 책임이 있다.","취소권은 추인할 수 있는 날로부터 3년내에, 법률행위를 한 날로부터 10년내에 행사하여야 한다.","취소할 수 있는 법률행위는 추인에 의하여 유효한 것으로 확정된다.","취소된 법률행위는 원칙적으로 처음부터 무효인 것으로 본다.","미성년자가 한 법률행위는 그가 단독으로 유효하게 취소할 수 없다."],answer:4},
    {num:19,subj:"민법",text:"무효 또는 취소할 수 있는 법률행위의 추인에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["무효인 계약은 계약당사자가 무효임을 알고 추인한 경우 계약성립시부터 새로운 법률행위를 한 것으로 본다.","불공정한 법률행위로서 무효인 경우 당사자가 무효임을 알고 추인하면 그 법률행위는 유효로 된다.","무권리자가 타인의 권리를 처분하는 행위는 권리자가 이를 알고 추인하여도 그 처분의 효력이 발생하지 않는다.","취소할 수 있는 법률행위를 추인할 수 있는 자는 그 법률행위의 취소권자이다.","피성년후견인은 취소할 수 있는 법률행위를 단독으로 유효하게 추인할 수 있다."],answer:3},
    {num:20,subj:"민법",text:"조건과 기한에 관한 설명으로 옳은 것은?",choices:["기한은 채권자의 이익을 위한 것으로 본다.","정지조건은 법률행위 효력의 발생을 장래의 확실한 사실에 의존케 하는 조건이다.","해제조건은 법률행위 효력의 발생을 장래의 불확실한 사실에 의존케 하는 조건이다.","불법조건이 붙은 법률행위는 원칙적으로 불법조건을 제외한 나머지는 유효하다.","시기있는 법률행위는 기한이 도래한 때로부터 그 효력이 생긴다."],answer:4},
    {num:21,subj:"민법",text:"甲은 乙에게 1천만 원을 빌려주면서 대여기간을 각 대여일로부터 1개월로 약정하였다. 민법의 기간에 관한 규정에 따를 때 변제기가 옳은 것을 모두 고른 것은? (8월 15일 외에는 평일을 전제로 함) ㄱ. 대여일: 1월 31일 14시, 변제기: 2월 28일(윤년 아님) 24시 ㄴ. 대여일: 3월 14일 17시, 변제기: 4월 14일 17시 ㄷ. 대여일: 7월 15일 17시, 변제기: 8월 15일(공휴일)의 익일인 8월 16일 24시",choices:["ㄷ","ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ"],answer:2},
    {num:22,subj:"민법",text:"소멸시효와 제척기간에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["권리자의 청구로 소멸시효가 중단된 경우 그때까지 경과된 기간은 시효기간에 산입된다.","소멸시효가 완성되면 그 기산일에 소급하여 권리소멸의 효과가 생긴다.","소멸시효의 이익을 포기하기 위해서는 원칙적으로 소멸시효의 완성사실을 알아야 한다.","제척기간의 기산점은 특별한 사정이 없는 한 원칙적으로 권리가 발생한 때이다.","제척기간은 그 성질상 기간의 중단이 있을 수 없다."],answer:0},
    {num:23,subj:"민법",text:"민법상 소멸시효에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름) ㄱ. 소유권은 재산권이므로 소멸시효의 대상이 된다. ㄴ. 음식점의 음식대금채권의 소멸시효는 1년이다. ㄷ. 점유자가 점유를 상실하면 그때로부터 점유권의 소멸시효가 진행된다.",choices:["ㄱ","ㄴ","ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ"],answer:1},
    {num:24,subj:"민법",text:"민법상 원칙적으로 적용되는 소멸시효의 기산점에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["변제기가 확정기한인 때에는 그 기한이 도래한 때부터 기산된다.","변제기가 불확정기한인 때에는 채권자가 기한도래의 사실을 안 때부터 기산된다.","기한의 정함이 없는 채권은 그 채권이 발생한 때부터 기산된다.","부작위를 목적으로 하는 채권의 소멸시효는 위반행위를 한 때부터 진행한다.","정지조건부 채권은 조건이 성취된 때부터 기산된다."],answer:1},
    {num:25,subj:"민법",text:"법률행위 해석에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["일반적으로 계약의 당사자가 누구인지는 그 계약에 관여한 당사자의 의사해석의 문제에 해당한다.","의사표시의 해석은 당사자가 그 표시행위에 부여한 객관적인 의미를 명백하게 확정하는 것이다.","표의자와 그 상대방이 생각한 의미가 서로 다른 경우, 합리적인 상대방의 시각에서 표의자가 표시한 내용을 어떻게 이해하였는지 고려하여 객관적·규범적으로 해석하여야 한다.","법률행위의 내용이 처분문서로 작성된 경우 문서에 부여된 객관적 의미와 관계없이 원칙적으로 당사자의 내심적 의사에 구속되어 그 내용을 해석하여야 한다.","법률행위의 내용이 처분문서로 작성된 경우 문언의 객관적인 의미가 명확하다면, 특별한 사정이 없는 한 문언대로 의사표시의 존재와 내용을 인정하여야 한다."],answer:3},
    {num:26,subj:"행정법",text:"법규명령에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["법률이 자치법적 사항을 공법적 단체의 정관에 위임하는 경우에는 포괄적 위임금지원칙이 적용되지 않는다.","행정입법부작위는 부작위위법확인소송의 대상이 된다.","행정입법이 대법원에 의하여 위헌이라는 판정이 있더라도 일반적으로 그 효력이 상실되는 것은 아니다.","집행명령은 상위 법령의 수권 없이 제정될 수 있다.","제재적 처분기준이 부령의 형식으로 규정되어 있는 때에는 국민에게 법적 구속력이 없다."],answer:1},
    {num:27,subj:"행정법",text:"행정지도에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정지도는 상대방의 협력을 전제로 법적 효과의 발생을 목적으로 하는 행정청의 의사표시이다.","행정지도의 상대방은 해당 행정지도의 방식·내용에 관하여 행정기관에 의견제출을 할 수 있다.","행정기관은 상대방이 행정지도에 따르지 않았다는 이유로 불이익한 조치를 하여서는 아니 된다.","행정지도를 하는 자는 상대방에게 행정지도의 취지 및 내용과 신분을 밝혀야 한다.","행정지도는 국가배상법 제2조의 직무행위에 해당된다."],answer:0},
    {num:28,subj:"행정법",text:"행정대집행법상 대집행의 요건이 아닌 것은?",choices:["공법상 의무의 불이행이 있을 것","불이행된 의무를 타인이 대신하여 행할 수 있을 것","의무를 명하는 처분에 불가쟁력이 발생하였을 것","다른 수단으로써 의무 이행의 확보가 곤란할 것","의무불이행을 방치하는 것이 심히 공익을 해할 것"],answer:2},
    {num:29,subj:"행정법",text:"질서위반행위규제법의 내용으로 옳지 않은 것은?",choices:["행정청이 부과한 과태료는 부과처분이 확정된 후 5년간 징수하지 아니하면 시효로 인하여 소멸한다.","질서위반행위의 성립과 과태료 처분은 처분 시의 법률에 따른다.","고의 또는 과실이 없는 질서위반행위는 과태료를 부과하지 않는다.","2인 이상이 질서위반행위에 가담한 때에는 각자가 질서위반행위를 한 것으로 본다.","행정청의 과태료 부과에 대해 당사자의 이의제기가 있는 경우에는 행정청의 과태료 부과처분은 효력을 상실한다."],answer:1},
    {num:30,subj:"행정법",text:"행정행위의 직권취소에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["직권취소는 별도의 법적 근거가 없어도 가능하다.","직권취소는 당해 처분의 취소소송 계속 중에도 할 수 있다.","수익적 행정행위의 직권취소에 대한 직권취소는 인정되지 않는다.","수익적 행정행위의 직권취소는 제한될 수 있다.","수익적 행정행위의 직권취소의 소급효는 제한될 수 있다."],answer:2},
    {num:31,subj:"행정법",text:"행정행위의 부관에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["법률의 근거 없이 기속행위에 그 효과를 제한하는 부관을 붙인 경우 그 부관은 무효이다.","사정변경으로 인하여 당초에 부담을 부가한 목적을 달성할 수 없게 된 경우 그 목적 달성에 필요한 범위 내에서 부담의 사후변경이 허용된다.","법률이 예정하는 행정행위의 효과를 일부 배제하는 부관도 인정된다.","다른 부관과 달리 부담은 독립하여 행정소송의 대상이 될 수 있다.","부담의 내용을 미리 협약의 형식으로 정한 다음 처분을 하면서 이를 부담으로 부가하는 것은 허용되지 않는다."],answer:4},
    {num:32,subj:"행정법",text:"행정행위 하자승계론의 전제요건에 해당하지 않는 것은?",choices:["선행행위와 후행행위가 모두 처분일 것","선행행위에 무효가 아닌 취소사유의 하자가 존재할 것","선행행위에 불가쟁력이 발생하였을 것","후행행위는 하자가 없는 적법한 행위일 것","후행행위가 선행행위에 대하여 내용적 구속력이 있을 것"],answer:4},
    {num:33,subj:"행정법",text:"법치행정원리에 관한 설명으로 옳은 것은?",choices:["법률우위의 원칙에서 말하는 법률은 국회가 제정한 형식적 의미의 법률만을 말한다.","법률우위의 원칙은 사법형식의 행정작용에는 적용되지 않는다.","법률우위의 원칙에 위반한 행정행위는 무효이다.","법률유보의 원칙에서 말하는 법률에는 법률의 위임에 의해 제정된 법규명령도 포함된다.","법률유보의 범위와 관련하여 본질성설에 따르는 경우 행정입법에의 위임은 금지된다."],answer:3},
    {num:34,subj:"행정법",text:"대물적 허가를 받아 영업을 하는 甲은 자신의 영업을 乙에게 양도하고자 乙과 영업의 양도·양수계약을 체결하고 관련법에 따라 관할 A행정청에 지위승계신고를 하였다. 이에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름) ㄱ. 적법한 지위승계신고를 하였다면 A행정청이 수리를 거부하더라도 乙에게 영업양수의 효과가 발생한다. ㄴ. 지위승계신고가 있기 전에 A행정청이 위 영업허가를 취소하려는 경우 허가취소의 상대방은 甲이 된다. ㄷ. 甲과 乙 사이의 영업양도·양수계약이 무효라면 지위승계신고가 수리되더라도 乙에게 영업양수의 효과가 발생하지 않는다. ㄹ. 영업양도·양수가 유효하더라도 명문의 규정이 없는 한 양도 전 甲의 위반행위를 이유로 乙에 대하여 제재처분을 할 수는 없다.",choices:["ㄱ, ㄴ","ㄱ, ㄹ","ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ"],answer:2},
    {num:35,subj:"행정법",text:"공공기관의 정보공개에 관한 법률에 따른 정보공개제도에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["공개를 청구하는 정보는 사회일반인의 관점에서 청구대상정보의 내용과 범위를 알 수 있을 정도로 특정되어야 한다.","공개청구한 정보를 공공기관이 보유·관리하고 있지 않은 경우에는 특별한 사정이 없는 한 해당 정보에 대한 공개거부처분의 취소를 구할 법률상의 이익이 없다.","정보공개청구의 목적이 오로지 담당공무원을 괴롭힐 목적인 경우처럼 권리의 남용이 명백한 경우에는 정보공개청구권의 행사가 허용되지 않는다.","비공개결정에 대해 이의신청을 거친 경우에는 행정심판을 제기할 수 없다.","청구인이 신청한 공개방법 이외의 방법으로 정보를 공개하기로 결정한 경우 청구인은 그에 대하여 항고소송으로 다툴 수 있다."],answer:3},
    {num:36,subj:"행정법",text:"행정절차에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["행정청은 신청 내용을 모두 그대로 인정하는 처분을 하는 경우에도 당사자에게 이유제시를 하여야 한다.","행정청과 당사자가 청문절차를 배제하기로 협약을 체결하였다면 청문절차를 거치지 않아도 되는 예외적 경우에 해당한다.","행정처분에 실체적 위법이 없는 한 절차적 하자만으로는 독립된 취소사유가 되지 못한다.","이유제시의 하자는 치유의 대상이 될 수 없다.","행정절차법상 불복방법에 대한 고지절차에 관한 규정을 위반하였다고 하여 그러한 이유만으로 처분이 위법하게 되는 것은 아니다."],answer:4},
    {num:37,subj:"행정법",text:"행정절차법이 규율 대상으로 명시하고 있는 것은?",choices:["행정지도절차","공법상 계약체결차","행정계획확정절차","행정조사절차","확약절차"],answer:0},
    {num:38,subj:"행정법",text:"A장관을 주무부장관으로 하는 국가사무인 X사무가 법령에 의해 B지방자치단체의 장에게 위임되었다. X사무의 처리에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["법령이 X사무에 대해 조례에 위임하는 경우 포괄적 위임도 가능하다.","A장관은 X사무의 처리가 위법한 경우에 한하여 B지방자치단체의 장을 감독할 수 있다.","A장관이 X사무의 처리에 관하여 시정명령을 발한 경우 B지방자치단체의 장은 이에 대해 대법원에 제소할 수 있다.","B지방자치단체의 장이 X사무를 처리하면서 불법행위를 하여 국가배상책임이 성립하는 경우 B지방자치단체도 배상책임이 있다.","A장관이 X사무의 해태를 이유로 직무이행명령을 발한 경우 B지방자치단체의 장은 이에 대해 대법원에 제소할 수 없다."],answer:3},
    {num:39,subj:"행정법",text:"지방자치제도에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["제주특별자치도와 세종특별자치시는 지방자치법상 특별지방자치단체에 해당한다.","외국인도 지방자치단체의 주민의 지위를 가질 수 있다.","지방자치법상 주민소송은 객관적 소송으로서 민중소송에 해당한다.","비례대표 지방의회의원에 대해서는 주민소환을 할 수 없다.","이행강제금의 부과·징수를 게을리 한 행위는 주민소송의 대상이 되는 공금의 부과·징수를 게을리 한 행위에 해당한다."],answer:0},
    {num:40,subj:"행정법",text:"공물에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["어떤 토지의 지목이 도로이고 국유재산대장에 등재되어 있다면 그 토지는 도로로서 행정재산에 해당한다고 보아야 한다.","공용폐지의 의사표시는 묵시적인 방법으로도 가능하므로 행정재산이 본래의 용도에 제공되지 않는 상태에 있다면 묵시적인 공용폐지가 있다고 보아야 한다.","행정재산은 사법상 거래의 대상이 되지 아니하는 불융통물이므로 관재 당국이 이를 모르고 매각하였더라도 그 매매는 당연무효이다.","적법한 개발행위로 인하여 공공용물의 일반사용이 종전에 비하여 제한을 받게 되었다면 특별한 사정이 없는 한 그로 인한 불이익은 손실보상의 대상이 된다.","특허에 의한 공물사용권은 공물의 관리주체에 대해 특별사용을 청구할 수 있는 채권에 그치는 것이 아니라 대세적 효력이 있는 물권이다."],answer:2},
    {num:41,subj:"행정법",text:"행정쟁송에 있어 가구제에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정심판법상 임시처분은 집행정지로 목적을 달성할 수 없는 경우에 허용된다.","행정심판법상 임시처분은 당사자의 신청이 있는 경우에만 할 수 있다.","취소소송에서는 민사집행법상의 가처분이 인정되지 않는다.","취소소송상 집행정지의 신청은 적법한 본안소송이 계속 중일 것을 요한다.","당사자소송에서는 행정소송법상의 집행정지가 인정되지 않는다."],answer:1},
    {num:42,subj:"행정법",text:"행정심판에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["행정심판 재결에는 특별한 사유가 없는 한 불가변력이 발생하지 않는다.","취소심판에는 처분사유의 추가·변경이 허용되지 않는다.","행정심판법은 무효등확인심판에서는 사정재결을 할 수 없음을 명문으로 규정하고 있다.","청구인은 행정심판청구서를 피청구인인 행정청에 제출할 수 없다.","행정심판법상 처분의 부존재확인심판은 허용되지 않는다."],answer:2},
    {num:43,subj:"행정법",text:"국가배상에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["국가가 국가배상책임을 이행한 경우 공무원에게 경과실이 있으면 국가는 그 공무원에게 구상할 수 없다.","국가배상법 제5조에는 점유자에게 과실이 없는 경우 점유자의 책임이 면책되는 규정이 없다.","국가배상청구소송은 배상심의회에 배상신청을 하지 아니하고도 제기할 수 있다.","부작위에 의한 국가배상책임은 조리상 작위의무를 위반한 경우에는 성립하지 않는다.","공무원의 고의·중과실에 의한 불법행위로 국가배상책임이 성립하는 경우 가해 공무원 개인은 그로 인한 손해배상책임을 부담한다."],answer:3},
    {num:44,subj:"행정법",text:"공익사업을 위한 토지 등의 취득 및 보상에 관한 법률의 내용에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["수용재결 신청 전 협의에 의한 취득은 사법상의 법률행위에 해당한다.","사업인정은 고시된 날부터 7일이 경과한 날에 효력을 발생한다.","수용재결은 행정심판 재결의 일종으로서 행정심판법상 재결의 기속력 규정이 준용된다.","수용재결에 대해 이의재결을 거쳐 취소소송을 제기하는 경우 이의재결을 소송의 대상으로 하여야 한다.","보상금액에 불복하여 사업시행자가 제기하는 보상금감액청구소송은 민사소송에 해당하므로 토지소유자 또는 관계인을 피고로 한다."],answer:0},
    {num:45,subj:"행정법",text:"취소소송에 적용되는 행정소송법 규정 중 무효등확인소송에 준용되지 않는 것은?",choices:["행정심판기록의 제출명령","관련청구소송의 병합","집행정지","처분변경으로 인한 소의 변경","간접강제"],answer:4},
    {num:46,subj:"행정법",text:"항고소송의 피고에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["처분이 있은 뒤에 그 처분에 관계되는 권한이 다른 행정청에 승계된 때에는 이를 승계한 행정청을 피고로 한다.","공정거래위원회의 처분에 대한 항고소송의 피고는 공정거래위원회가 된다.","조례에 대한 무효확인소송의 경우 해당 지방의회의 의장이 피고가 된다.","원고가 피고를 잘못 지정한 때에는 법원은 원고의 신청에 의하여 결정으로써 피고의 경정을 허가할 수 있다.","소의 종류의 변경 시에도 피고의 경정이 인정된다."],answer:2},
    {num:47,subj:"행정법",text:"甲의 도로점용허가 신청에 대하여 처분청 X는 거부처분을 하였다. 이에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름) ㄱ. 甲은 거부처분취소심판이나 의무이행심판을 제기할 수 있다. ㄴ. 만약, X가 거부처분에 앞서 사전통지를 하지 않았다면 그 거부처분에는 절차상 하자가 있다. ㄷ. 甲이 거부처분취소소송을 제기하여 인용판결이 확정되었다면 X는 도로점용허가를 발령하여야 한다. ㄹ. 甲이 거부처분취소소송을 제기하여 인용판결이 상고심에서 확정되었음에도 X가 아무런 조치를 취하지 아니하면 상고심 법원은 甲의 신청에 의해 간접강제 결정을 할 수 있다.",choices:["ㄱ","ㄱ, ㄷ","ㄱ, ㄹ","ㄴ, ㄷ","ㄴ, ㄹ"],answer:0},
    {num:48,subj:"행정법",text:"행정권한의 대리와 위임에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["임의대리에서 대리관청이 대리관계를 밝히고 처분을 한 경우 피대리관청이 처분청으로서 항고소송의 피고가 된다.","법정대리는 특별한 규정이 없는 한 피대리관청의 권한 전부에 미친다.","권한을 내부위임 받은 수임행정청은 위임행정청의 이름으로 권한을 행사하여야 한다.","권한의 내부위임은 법률의 근거가 없어도 가능하다.","권한의 일부에 대한 위임뿐만 아니라 권한 전부의 위임도 가능하다."],answer:4},
    {num:49,subj:"행정법",text:"국가공무원법상 소청에 관한 설명으로 옳은 것은?",choices:["소청을 통해 위법한 거부처분에 대하여 의무이행을 구하는 심사청구를 할 수 없다.","징계처분에 대해 소청심사위원회의 심사·결정을 거치지 아니하면 행정소송을 제기할 수 없다.","소청심사위원회가 소청인에게 진술 기회를 주지 아니하고 내린 결정은 취소사유의 하자가 있다.","징계처분에 대한 소청에 대하여는 불이익변경금지원칙이 적용되지 아니 한다.","행정기관소속 공무원의 소청을 심사하는 소청심사위원회는 법제처에 둔다."],answer:1},
    {num:50,subj:"행정법",text:"국가공무원의 법률관계에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["공무원임용에 결격사유가 있는지의 여부는 임용 당시에 시행되던 법률을 기준으로 판단하여야 한다.","공무원은 임용장이나 임용통지서에 적힌 날짜에 임용된 것으로 본다.","공무원임용 결격사유가 있는 자를 공무원에 임명하는 행위는 당연무효이다.","국가공무원법상의 직위해제처분에는 사전통지에 관한 행정절차법 규정이 적용된다.","당연퇴직의 사실을 알리는 통지행위는 행정소송법상 처분에 해당하지 않는다."],answer:3},
    {num:51,subj:"행정학개론",text:"행정에 관한 설명으로 옳지 않은 것은?",choices:["공익을 지향하며 공공문제의 해결이라는 공공 목적을 달성한다.","공공서비스를 생산하고 공급하며 배분하는 모든 활동을 의미한다.","오늘날에는 정부가 공공서비스의 생산 및 공급을 독점한다.","참여와 협력이라는 거버넌스 개념을 지향해가고 있다.","공공서비스의 생산·분배 과정에서 국민의 의견을 존중하고 국민에 대해 책임을 다해야 한다."],answer:2},
    {num:52,subj:"행정학개론",text:"다음 내용과 밀접한 관련이 있는 이론은? 관료의 사익추구 / 예산극대화 / 지대추구행위 / 정치·행정 현상의 경제학적 분석",choices:["체제이론","거버넌스이론","신행정학이론","공공선택이론","포스트모더니즘이론"],answer:3},
    {num:53,subj:"행정학개론",text:"리그스(F. W. Riggs)의 프리즘적 모형(Prismatic Model)에 관한 설명으로 옳지 않은 것은?",choices:["개발도상국의 행정체제를 설명하기 위한 이론적 모형이다.","프리즘적 사회는 농업사회에서 산업사회로 넘어가는 과도기적 사회를 말한다.","프리즘적 사회의 특징은 형식주의, 정실주의, 이질혼합성을 들 수 있다.","생태론적 접근방법에 의해 설명된다.","농업사회에서 지배적인 행정 모형을 사랑방 모형(Sala Model)이라 한다."],answer:4},
    {num:54,subj:"행정학개론",text:"옴부즈만(Ombudsman) 제도에 관한 설명으로 옳지 않은 것은?",choices:["국민의 이익을 보호하려는 취지에서 1809년 스웨덴에서 시작된 행정감찰관제도이다.","필요한 사항을 조사해 결과를 알려주고 언론을 통해 공표하기도 한다.","옴부즈만은 기능적으로 자율적이고 입법부와 행정부로부터 독립되어 있다.","독립적 지위를 가진 사람이 조사를 하여 시정을 촉구하거나 건의함으로써 국민의 권리를 구제한다.","옴부즈만과 유사한 국민권익위원회는 법원이 내린 결정 처분에 대해 시정조치, 권고, 취소를 결정한다."],answer:4},
    {num:55,subj:"행정학개론",text:"행정통제의 유형 중 내부통제로 옳은 것은?",choices:["국민에 의한 통제","이익집단에 의한 통제","사법부에 의한 통제","감사원에 의한 통제","입법부에 의한 통제"],answer:3},
    {num:56,subj:"행정학개론",text:"정책의 기능과 유형에 관한 설명으로 옳지 않은 것은?",choices:["정책은 정치적·행정적 과정으로서 단순하고 정태적 과정을 거친다.","정책 자체가 하나의 행동노선을 담고 있기 때문에 그에 관련된 개인들의 행동을 위한 지침역할을 한다.","정책은 변동과 안정을 야기하기도 하며 사회의 이익을 조정·통합하기도 한다.","리플리와 프랭클린(R. Ripley & G. Franklin)의 경쟁적 규제정책은 배분정책과 규제정책의 성격을 동시에 지니고 있다.","국경일 제정, 국기 게양 등은 국민적 통합을 위하여 정치적인 목적으로 사용하는 상징정책의 예이다."],answer:0},
    {num:57,subj:"행정학개론",text:"시장실패의 요인으로 옳은 것을 모두 고른 것은? ㄱ. 불완전한 경쟁 / ㄴ. 비용과 수입의 절연 / ㄷ. 정보의 불충분성 / ㄹ. 내부조직목표와 사회적 목표의 괴리 / ㅁ. 파생적 외부효과 / ㅂ. 외부효과",choices:["ㄱ, ㄷ, ㅂ","ㄱ, ㄹ, ㅁ","ㄱ, ㄹ, ㅂ","ㄴ, ㄷ, ㅁ","ㄴ, ㄹ, ㅁ"],answer:0},
    {num:58,subj:"행정학개론",text:"전자정부와 행정의 변화에 관한 설명으로 옳은 것은?",choices:["정보행정은 정보기술을 활용하여 수요자중심으로 행정서비스를 개선한다.","전자정부는 단순히 정보기술에 의하여 정부의 업무처리 방식만을 변화시킨다.","정보정책은 행정업무를 전자화하는 것으로 행정업무처리 재설계와는 관계가 없다.","전자정부는 정보기술을 활용하여 업무처리 전반을 혁신시켜야 하기 때문에 실무보다는 이론이 강조되는 분야이다.","전자정부는 행정부문에 정보기술의 도입 및 활용에 초점을 두기보다 정보기술 그 자체를 연구의 대상으로 한다."],answer:0},
    {num:59,subj:"행정학개론",text:"로위(T. Lowi)의 정책유형에 해당하는 것을 모두 고른 것은? ㄱ. 분배정책 / ㄴ. 규제정책 / ㄷ. 보호적 규제정책 / ㄹ. 자율규제정책 / ㅁ. 재분배정책 / ㅂ. 구성정책",choices:["ㄱ, ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㅁ, ㅂ","ㄱ, ㄹ, ㅁ, ㅂ","ㄴ, ㄷ, ㄹ, ㅁ","ㄷ, ㄹ, ㅁ, ㅂ"],answer:1},
    {num:60,subj:"행정학개론",text:"베버(M. Weber)가 제시한 관료제의 특징으로 옳지 않은 것은?",choices:["합법적으로 제정한 법규에 근거를 두고 운영된다.","권한과 책임이 명백한 계층제 구조로 이루어진다.","관료는 임무수행을 구두가 아니라 문서로 한다.","임무수행에 필요한 전문적 훈련을 받은 사람들이 관료로 채용된다.","임무수행은 인격성(personality)과 비합리성이 중시된다."],answer:4},
    {num:61,subj:"행정학개론",text:"조직목표 변동에 관한 설명으로 옳지 않은 것은?",choices:["원래의 목표가 다른 목표로 전환되는 것이 목표의 대치 또는 전환이다.","목표가 달성되었거나 달성이 불가능한 경우 본래의 목표를 새로운 목표로 교체하는 것이 목표의 승계이다.","동종목표의 수 또는 이종목표가 늘어나는 것이 목표의 추가이다.","동종 또는 이종 목표의 수나 범위가 줄어드는 것이 목표의 축소이다.","미헬스(R. Michels)의 과두제 철칙(iron law of oligarchy)은 목표의 추가 현상을 설명한 것이다."],answer:4},
    {num:62,subj:"행정학개론",text:"허즈버그(F. Herzberg)가 제시한 위생요인이 아닌 것은?",choices:["인정감","봉급","대인관계","근무조건","조직정책"],answer:0},
    {num:63,subj:"행정학개론",text:"우리나라 공무원 분류 중 특수경력직 공무원에 해당되지 않는 것은?",choices:["국회의원","헌법재판소 헌법연구관","대통령 비서실장","국민권익위원회 위원장","감사원 사무차장"],answer:[1,4]},
    {num:64,subj:"행정학개론",text:"우리나라 공무원 시보임용제도에 관한 설명으로 옳지 않은 것은?",choices:["공무원시험에 합격한 사람들의 공직 적격성을 심사하고 공무원 실무능력 배양을 위해 존재한다.","국가공무원법에 의하면 공무원의 시보기간은 3개월이다.","시보기간 중 근무성적이 좋으면 정규공무원으로 임용한다.","시보기간 중 교육훈련 성적이 나쁘거나 공무원으로서의 자질이 부족하다고 판단되는 경우 면직될 수 있다.","시보기간 중 휴직한 기간, 직위해제 기간 및 징계에 따른 정직이나 감봉 처분을 받은 기간은 시보 임용 기간에 산입되지 않는다."],answer:1},
    {num:65,subj:"행정학개론",text:"우리나라 책임운영기관에 관한 설명으로 옳은 것은?",choices:["2009년 이명박 정부에서 처음으로 도입되었다.","조직, 예산 등의 운영상 자율성이 책임운영기관장이 아닌 주무부처 장관에게 부여되어 있다.","중앙책임운영기관으로 특허청이 있다.","소속책임운영기관에 대한 종합평가는 기획재정부가 주관한다.","소속책임운영기관과 소속중앙행정기관 간 공무원의 인사교류는 불가능하다."],answer:2},
    {num:66,subj:"행정학개론",text:"공무원 A는 주5일 대중교통으로 출퇴근 한다. 코로나19 사태로 인해 재택근무를 하고 싶으나 그가 맡은 업무는 정형적이면서도 보안을 유지해야 하는 특성이 있어 집에서 일할 수 없고 반드시 주5일 출근을 해야만 한다. 대중교통 이용 시 사람들과의 접촉을 최소화하기 위하여 A가 택할 수 있는 가장 적합한 탄력근무 방식으로 묶인 것은?",choices:["ㄱ(시간선택제 전환근무), ㄴ(시차출퇴근제)","ㄱ(시간선택제 전환근무), ㄹ(재량근무제)","ㄴ(시차출퇴근제), ㅁ(근무시간선택제)","ㄷ(원격근무제), ㄹ(재량근무제)","ㄷ(원격근무제), ㅁ(근무시간선택제)"],answer:2},
    {num:67,subj:"행정학개론",text:"우리나라가 시행 중인 재정관리혁신 조치의 하나인 예비타당성 조사에 관한 설명으로 옳지 않은 것은?",choices:["대규모 공공투자사업의 타당성을 분석하고 그 결과에 따라 재정사업의 신규투자 여부를 결정한다.","2000회계연도 예산을 편성할 때부터 적용되었다.","한국개발연구원, 한국조세재정연구원 등 법령으로 정하는 지정기준을 갖춘 전문기관이 수행할 수 있다.","정책성 분석을 배제하고 경제성 분석에 집중한다.","이 제도 도입 이전인 1994년부터 무분별한 사업비 증가를 방지하려는 총사업비관리제도가 운영되고 있다."],answer:3},
    {num:68,subj:"행정학개론",text:"예산제도의 등장 순으로 옳게 나열한 것은? ㄱ. 영기준예산 / ㄴ. 계획예산(PPBS) / ㄷ. 품목별예산 / ㄹ. 성과주의예산 / ㅁ. 결과지향예산",choices:["ㄱ-ㄷ-ㄴ-ㄹ-ㅁ","ㄷ-ㄱ-ㄹ-ㄴ-ㅁ","ㄷ-ㄹ-ㄴ-ㄱ-ㅁ","ㄹ-ㄱ-ㅁ-ㄷ-ㄴ","ㄹ-ㄷ-ㄱ-ㄴ-ㅁ"],answer:2},
    {num:69,subj:"행정학개론",text:"성인지예산제도에 관한 설명으로 옳지 않은 것은?",choices:["2010회계연도부터 우리나라 정부예산에 실제 시행되었다.","예산이 남성이 아니라 여성에게 미치는 효과를 분석하여 양성평등을 위한 예산집행을 추구한다.","성인지 예산서에는 성평등 기대효과, 성과목표, 성별 수혜분석 등을 포함하여야 한다.","양성평등을 위한 정책의 결과(성인지예산서 작성)와 과정(예산의 성별 영향 분석과정)을 동시에 추구한다.","예산과정에 대한 성 주류화의 적용으로 양성평등을 위한 실질적인 예산배분의 변화를 추구한다."],answer:1},
    {num:70,subj:"행정학개론",text:"2018년 전국동시지방선거 개표 후에 한 팀원들이 티타임에 나눈 대화이다. 다음 2018년 전국동시지방선거 당시 대화자들의 주민등록지를 고려할 때, 대화내용이 우리나라 지방자치의 실제와 맞지 않는 사람은?",choices:["A: 세종특별자치시","B: 서울특별시 관악구","C: 성남시 분당구","D: 기장군","E: 대전광역시 유성구"],answer:1},

    {num:73,subj:"행정학개론",text:"신공공관리(New Public Management)에 관한 설명으로 옳지 않은 것은?",choices:["정부는 시민을 위해 정부서비스의 품질을 향상시켜야 한다.","자원배분의 투명성을 높이고 거래비용을 최소화해야 한다.","정부의 기능을 민간화하고 지출을 팽창시켜야 한다.","공공관리와 시민에 대한 공공서비스 공급의 효율화를 위해 시장기제를 도입해야 한다.","정부서비스 공급의 관리는 산출·성과지향적이어야 한다."],answer:2},
    {num:74,subj:"행정학개론",text:"행정개혁의 접근방법에 관한 설명으로 옳은 것은?",choices:["구조적 접근방법은 행태과학의 지식과 기법을 활용한다.","과정적 접근방법이 관심을 갖는 개혁대상은 분권화의 수준개선과 조직의 기능이다.","과정적 접근방법은 바람직한 문화변동을 추진한다.","구조적 접근방법이 갖는 관심은 통솔범위의 조정, 권한배분의 개편 등을 대상으로 한다.","통합적 접근방법은 폐쇄체제에 입각하여 개혁대상을 포괄적으로 관찰하는 것이다."],answer:3},
    {num:75,subj:"행정학개론",text:"행정개념에 관한 설명으로 옳지 않은 것은?",choices:["행정의 실체와 역할은 정부를 둘러싼 정치적·사회적·문화적 환경 등의 다양한 환경 속에서 규정된다.","행정의 영역과 범위는 명확하게 설정되고 있지 않으며 그 한계도 분명하지 않아서 고도로 체계화된 개념화는 어렵다.","행정에 대한 연구대상의 선택이나 연구방법의 변화에 따라 다르게 이해되어 왔다.","행정개념이 기능개념이기 때문에 기능 변화와 다양화에 따라 여러 시각으로 설명될 수 없다.","오늘날에는 행정에 대한 개념 해석이 계속 확대되고 있다."],answer:3},
