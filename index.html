<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>행정사 기출문제 플랫폼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--sf:#1a1d27;--sf2:#222534;--sf3:#2a2d3e;
  --bd:#2e3148;--bd2:#3a3f5c;
  --tx:#f0f2ff;--tx2:#9aa0c0;--tx3:#5a6080;
  --bl:#4f7bff;--bl2:#3a5ce0;--bls:#1e2a5e;
  --gn:#22d172;--gns:#0d3326;
  --yw:#f5c842;--yws:#332c0d;
  --rd:#ff5a5a;--rds:#3a1010;
  --r:14px;--rs:10px;--rx:8px;
}
html{background:var(--bg)}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.scr{display:none;flex:1;flex-direction:column;padding-bottom:32px}.scr.on{display:flex}
/* 헤더 */
.hdr{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:20}
.hbk{background:none;border:none;cursor:pointer;color:var(--tx2);width:36px;height:36px;border-radius:var(--rx);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbk:hover{background:var(--sf3)}.hbk svg{width:20px;height:20px}
.htl{font-size:15px;font-weight:600;flex:1}.hcp{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--sf3);color:var(--tx2);border:1px solid var(--bd2);flex-shrink:0}
/* 홈 */
.hp{padding:20px 20px 0}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.lm{width:40px;height:40px;background:var(--bl);border-radius:12px;display:flex;align-items:center;justify-content:center}
.lm svg{width:22px;height:22px;color:#fff}
.lt h1{font-size:18px;font-weight:700}.lt p{font-size:12px;color:var(--tx3);margin-top:2px}
.mtabs{display:flex;gap:6px;background:var(--sf2);padding:5px;border-radius:var(--rs);margin-bottom:20px}
.mtab{flex:1;padding:9px 6px;border:none;border-radius:var(--rx);cursor:pointer;font-size:13px;font-weight:500;color:var(--tx2);background:none;transition:all .2s;font-family:inherit}
.mtab.on{background:var(--bl);color:#fff;font-weight:600}
.tc{display:none}.tc.on{display:block}
.stl{font-size:11px;font-weight:600;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;padding:12px 4px 8px}
/* 회차 카드 */
.yc{display:flex;align-items:center;gap:14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.yc:hover{border-color:var(--bl);background:var(--sf2)}
.yc.done{border-color:var(--gns)}.yc.done::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gn)}
.yi{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700;line-height:1.2;text-align:center}
.yi.u{background:var(--sf3);color:var(--tx2)}.yi.d{background:var(--gns);color:var(--gn)}
.yinfo{flex:1;min-width:0}
.ytl{font-size:14px;font-weight:600}.ymeta{font-size:12px;color:var(--tx3);margin-top:2px}
.yscore{text-align:right;flex-shrink:0}
.sp{font-size:16px;font-weight:700;display:block}
.sf{font-size:10px;color:var(--tx3)}
.yarr{color:var(--tx3);flex-shrink:0}.yarr svg{width:16px;height:16px}
.mpb{margin-top:5px}.mpbar{height:3px;background:var(--sf3);border-radius:2px;overflow:hidden}.mpfill{height:100%;border-radius:2px}.mplbl{font-size:10px;color:var(--tx3);margin-top:2px}
/* 테마 */
.ss{margin-bottom:18px}
.shdr{display:flex;align-items:center;gap:8px;padding:12px 4px 8px}
.sdot{width:8px;height:8px;border-radius:50%}
.slbl{font-size:13px;font-weight:600}.scnt{font-size:11px;color:var(--tx3);margin-left:auto}
.thc{display:flex;align-items:center;gap:12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:12px 14px;margin-bottom:7px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.thc:hover{border-color:var(--bl);background:var(--sf2)}
.thc.done{border-color:var(--gns)}.thc.done::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gn)}
.tn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.thi{flex:1;min-width:0}
.thnm{font-size:13px;font-weight:600}.thdc{font-size:11px;color:var(--tx3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.thsc{font-size:13px;font-weight:700;flex-shrink:0}
/* 진행 */
.pw{padding:14px 20px 0}
.ptop{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pl{font-size:12px;color:var(--tx2)}.pr{font-size:12px;font-weight:600;color:var(--bl)}
.pbar{height:4px;background:var(--sf3);border-radius:4px;overflow:hidden}
.pfill{height:100%;background:var(--bl);border-radius:4px;transition:width .4s ease}
/* 문제 */
.eb{padding:14px 20px 0;flex:1}
.qcard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:12px}
.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.qnb{font-size:11px;font-weight:600;color:var(--bl);background:var(--bls);padding:3px 8px;border-radius:6px}
.sqc{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--sf3);color:var(--tx2)}
.yyc{font-size:10px;padding:2px 7px;border-radius:5px;background:var(--sf3);color:var(--tx3)}
.qt{font-size:14px;line-height:1.85;white-space:pre-line}
.chs{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.cb{width:100%;text-align:left;padding:12px 14px;border-radius:var(--rs);border:1px solid var(--bd2);background:var(--sf);cursor:pointer;font-size:13px;color:var(--tx);line-height:1.6;transition:all .15s;display:flex;align-items:flex-start;gap:10px;font-family:inherit}
.cb:hover:not(:disabled){border-color:var(--bl);background:var(--bls)}
.cl{font-weight:700;color:var(--tx3);min-width:18px;flex-shrink:0}
.cb.sel{border-color:var(--bl);background:var(--bls)}.cb.sel .cl{color:var(--bl)}
.cb.ok{border-color:var(--gn)!important;background:var(--gns)!important}.cb.ok .cl{color:var(--gn)!important}
.cb.ng{border-color:var(--rd)!important;background:var(--rds)!important}.cb.ng .cl{color:var(--rd)!important}
.cb:disabled{cursor:default}
/* 해설 */
.exbox{background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rs);padding:14px;margin-bottom:12px;display:none}
.exbox.on{display:block}
.exhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.extl{font-size:12px;font-weight:600;color:var(--yw)}
.exbadge{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--yws);color:var(--yw);border:1px solid var(--yw)}
.extxt{font-size:13px;color:var(--tx2);line-height:1.85}
.spin{width:14px;height:14px;border:2px solid var(--bd2);border-top-color:var(--yw);border-radius:50%;animation:sp .8s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.exbtn{width:100%;padding:10px;border-radius:var(--rx);border:1px dashed var(--bd2);background:none;color:var(--tx3);font-size:12px;cursor:pointer;margin-bottom:12px;font-family:inherit;transition:all .2s}
.exbtn:hover{border-color:var(--yw);color:var(--yw)}
/* 네비 */
.nav{display:flex;gap:8px;margin-top:4px}
.nb{flex:1;padding:13px;border-radius:var(--rs);font-size:13px;font-weight:600;border:1px solid var(--bd2);background:var(--sf);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--tx2);font-family:inherit}
.nb:hover{background:var(--sf3)}.nb:disabled{opacity:.3;cursor:default}
.nb.nx{background:var(--bl);color:#fff;border-color:var(--bl);flex:2}.nb.nx:hover{background:var(--bl2)}
/* 메모 */
.mw{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:12px 14px;margin-bottom:10px}
.ml{font-size:11px;color:var(--tx3);margin-bottom:6px;display:block}
.ma{width:100%;min-height:58px;padding:8px;font-size:13px;border-radius:var(--rx);border:1px solid var(--bd2);background:var(--sf2);color:var(--tx);resize:vertical;font-family:inherit;line-height:1.6}
.ma:focus{outline:none;border-color:var(--bl)}
.mr{display:flex;align-items:center;gap:8px;margin-top:8px}
.msb{font-size:12px;padding:5px 12px;border-radius:6px;background:var(--sf3);border:1px solid var(--bd2);color:var(--tx2);cursor:pointer;font-family:inherit}
.msb:hover{border-color:var(--bl);color:var(--bl)}
.msd{color:var(--gn);font-size:12px;opacity:0;transition:opacity .3s}
/* 결과 */
.rh{padding:24px 20px 16px;text-align:center}
.rring{width:110px;height:110px;margin:0 auto 14px;position:relative}
