<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>행정사 기출문제 플랫폼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--sf:#1a1d27;--sf2:#222534;--sf3:#2a2d3e;
  --bd:#2e3148;--bd2:#3a3f5c;
  --tx:#f0f2ff;--tx2:#9aa0c0;--tx3:#5a6080;
  --bl:#4f7bff;--bl2:#3a5ce0;--bls:#1e2a5e;
  --gn:#22d172;--gns:#0d3326;
  --yw:#f5c842;--yws:#332c0d;
  --rd:#ff5a5a;--rds:#3a1010;
  --r:14px;--rs:10px;--rx:8px;
}
html{background:var(--bg)}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.scr{display:none;flex:1;flex-direction:column;padding-bottom:32px}.scr.on{display:flex}
/* 헤더 */
.hdr{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:20}
.hbk{background:none;border:none;cursor:pointer;color:var(--tx2);width:36px;height:36px;border-radius:var(--rx);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbk:hover{background:var(--sf3)}.hbk svg{width:20px;height:20px}
.htl{font-size:15px;font-weight:600;flex:1}.hcp{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--sf3);color:var(--tx2);border:1px solid var(--bd2);flex-shrink:0}
/* 홈 */
.hp{padding:20px 20px 0}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.lm{width:40px;height:40px;background:var(--bl);border-radius:12px;display:flex;align-items:center;justify-content:center}
.lm svg{width:22px;height:22px;color:#fff}
.lt h1{font-size:18px;font-weight:700}.lt p{font-size:12px;color:var(--tx3);margin-top:2px}
.mtabs{display:flex;gap:6px;background:var(--sf2);padding:5px;border-radius:var(--rs);margin-bottom:20px}
.mtab{flex:1;padding:9px 6px;border:none;border-radius:var(--rx);cursor:pointer;font-size:13px;font-weight:500;color:var(--tx2);background:none;transition:all .2s;font-family:inherit}
.mtab.on{background:var(--bl);color:#fff;font-weight:600}
.tc{display:none}.tc.on{display:block}
.stl{font-size:11px;font-weight:600;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;padding:12px 4px 8px}
/* 회차 카드 */
.yc{display:flex;align-items:center;gap:14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.yc:hover{border-color:var(--bl);background:var(--sf2)}
.yc.done{border-color:var(--gns)}.yc.done::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gn)}
.yi{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700;line-height:1.2;text-align:center}
.yi.u{background:var(--sf3);color:var(--tx2)}.yi.d{background:var(--gns);color:var(--gn)}
.yinfo{flex:1;min-width:0}
.ytl{font-size:14px;font-weight:600}.ymeta{font-size:12px;color:var(--tx3);margin-top:2px}
.yscore{text-align:right;flex-shrink:0}
.sp{font-size:16px;font-weight:700;display:block}
.sf{font-size:10px;color:var(--tx3)}
.yarr{color:var(--tx3);flex-shrink:0}.yarr svg{width:16px;height:16px}
.mpb{margin-top:5px}.mpbar{height:3px;background:var(--sf3);border-radius:2px;overflow:hidden}.mpfill{height:100%;border-radius:2px}.mplbl{font-size:10px;color:var(--tx3);margin-top:2px}
/* 테마 */
.ss{margin-bottom:18px}
.shdr{display:flex;align-items:center;gap:8px;padding:12px 4px 8px}
.sdot{width:8px;height:8px;border-radius:50%}
.slbl{font-size:13px;font-weight:600}.scnt{font-size:11px;color:var(--tx3);margin-left:auto}
.thc{display:flex;align-items:center;gap:12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:12px 14px;margin-bottom:7px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.thc:hover{border-color:var(--bl);background:var(--sf2)}
.thc.done{border-color:var(--gns)}.thc.done::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gn)}
.tn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.thi{flex:1;min-width:0}
.thnm{font-size:13px;font-weight:600}.thdc{font-size:11px;color:var(--tx3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.thsc{font-size:13px;font-weight:700;flex-shrink:0}
/* 진행 */
.pw{padding:14px 20px 0}
.ptop{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pl{font-size:12px;color:var(--tx2)}.pr{font-size:12px;font-weight:600;color:var(--bl)}
.pbar{height:4px;background:var(--sf3);border-radius:4px;overflow:hidden}
.pfill{height:100%;background:var(--bl);border-radius:4px;transition:width .4s ease}
/* 문제 */
.eb{padding:14px 20px 0;flex:1}
.qcard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:12px}
.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.qnb{font-size:11px;font-weight:600;color:var(--bl);background:var(--bls);padding:3px 8px;border-radius:6px}
.sqc{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--sf3);color:var(--tx2)}
.yyc{font-size:10px;padding:2px 7px;border-radius:5px;background:var(--sf3);color:var(--tx3)}
.qt{font-size:14px;line-height:1.85;white-space:pre-line}
.chs{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.cb{width:100%;text-align:left;padding:12px 14px;border-radius:var(--rs);border:1px solid var(--bd2);background:var(--sf);cursor:pointer;font-size:13px;color:var(--tx);line-height:1.6;transition:all .15s;display:flex;align-items:flex-start;gap:10px;font-family:inherit}
.cb:hover:not(:disabled){border-color:var(--bl);background:var(--bls)}
.cl{font-weight:700;color:var(--tx3);min-width:18px;flex-shrink:0}
.cb.sel{border-color:var(--bl);background:var(--bls)}.cb.sel .cl{color:var(--bl)}
.cb.ok{border-color:var(--gn)!important;background:var(--gns)!important}.cb.ok .cl{color:var(--gn)!important}
.cb.ng{border-color:var(--rd)!important;background:var(--rds)!important}.cb.ng .cl{color:var(--rd)!important}
.cb:disabled{cursor:default}
/* 해설 */
.exbox{background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rs);padding:14px;margin-bottom:12px;display:none}
.exbox.on{display:block}
.exhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.extl{font-size:12px;font-weight:600;color:var(--yw)}
.exbadge{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--yws);color:var(--yw);border:1px solid var(--yw)}
.extxt{font-size:13px;color:var(--tx2);line-height:1.85}
.spin{width:14px;height:14px;border:2px solid var(--bd2);border-top-color:var(--yw);border-radius:50%;animation:sp .8s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.exbtn{width:100%;padding:10px;border-radius:var(--rx);border:1px dashed var(--bd2);background:none;color:var(--tx3);font-size:12px;cursor:pointer;margin-bottom:12px;font-family:inherit;transition:all .2s}
.exbtn:hover{border-color:var(--yw);color:var(--yw)}
/* 네비 */
.nav{display:flex;gap:8px;margin-top:4px}
.nb{flex:1;padding:13px;border-radius:var(--rs);font-size:13px;font-weight:600;border:1px solid var(--bd2);background:var(--sf);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--tx2);font-family:inherit}
.nb:hover{background:var(--sf3)}.nb:disabled{opacity:.3;cursor:default}
.nb.nx{background:var(--bl);color:#fff;border-color:var(--bl);flex:2}.nb.nx:hover{background:var(--bl2)}
/* 메모 */
.mw{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:12px 14px;margin-bottom:10px}
.ml{font-size:11px;color:var(--tx3);margin-bottom:6px;display:block}
.ma{width:100%;min-height:58px;padding:8px;font-size:13px;border-radius:var(--rx);border:1px solid var(--bd2);background:var(--sf2);color:var(--tx);resize:vertical;font-family:inherit;line-height:1.6}
.ma:focus{outline:none;border-color:var(--bl)}
.mr{display:flex;align-items:center;gap:8px;margin-top:8px}
.msb{font-size:12px;padding:5px 12px;border-radius:6px;background:var(--sf3);border:1px solid var(--bd2);color:var(--tx2);cursor:pointer;font-family:inherit}
.msb:hover{border-color:var(--bl);color:var(--bl)}
.msd{color:var(--gn);font-size:12px;opacity:0;transition:opacity .3s}
/* 결과 */
.rh{padding:24px 20px 16px;text-align:center}
.rring{width:110px;height:110px;margin:0 auto 14px;position:relative}
.rring svg{width:110px;height:110px;transform:rotate(-90deg)}
.rbg{fill:none;stroke:var(--sf3);stroke-width:8}
.rfl{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s ease}
.rlbl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.rpct{font-size:22px;font-weight:700;display:block}.rsub{font-size:10px;color:var(--tx3)}
.rtl{font-size:20px;font-weight:700;margin-bottom:4px}.rsb{font-size:13px;color:var(--tx3)}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 20px;margin-bottom:12px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:12px 6px;text-align:center}
.sv{font-size:18px;font-weight:700;display:block}.slb{font-size:10px;color:var(--tx3);margin-top:2px;display:block}
.btns{padding:0 20px;display:flex;flex-direction:column;gap:8px;margin-top:8px}
.btn{width:100%;padding:14px;border-radius:var(--rs);font-size:14px;font-weight:600;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;transition:all .15s}
.bp{background:var(--bl);color:#fff}.bp:hover{background:var(--bl2)}
.bs{background:var(--sf);color:var(--tx2);border:1px solid var(--bd2)}.bs:hover{background:var(--sf2)}
.shdr2{padding:14px 20px 8px;display:flex;align-items:center;justify-content:space-between}
.shdr2 h3{font-size:13px;font-weight:600;color:var(--tx2)}.shdr2 span{font-size:12px;color:var(--tx3)}
.rvlist{padding:0 20px 8px}
.rvi{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:14px;margin-bottom:8px}
.rvq{font-size:13px;line-height:1.7;margin-bottom:10px}
.rvchs{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.rc{font-size:12px;padding:7px 10px;border-radius:6px;border:1px solid var(--bd);color:var(--tx2);display:flex;align-items:flex-start;gap:6px}
.rc.ok{border-color:var(--gn);color:var(--gn);background:var(--gns)}
.rc.ng{border-color:var(--rd);color:var(--rd);background:var(--rds)}
.rclb{font-weight:700;flex-shrink:0}
.rvft{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.rvmt{font-size:11px;color:var(--tx3)}
.rveb{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--bd2);background:none;color:var(--yw);cursor:pointer;font-family:inherit}
.rveb:hover{background:var(--yws)}
.rvexbox{margin-top:10px;padding:10px 12px;background:var(--sf2);border-radius:var(--rx);border-left:2px solid var(--yw);display:none}
.rvexbox.on{display:block}
.rvext{font-size:12px;color:var(--tx2);line-height:1.8}
.dvd{height:1px;background:var(--bd);margin:8px 20px}
.empty{text-align:center;padding:36px 20px;color:var(--tx3);font-size:13px}
.sbody{flex:1;overflow-y:auto;padding:0 20px}
/* 정답없음 배지 */
.nano{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--sf3);color:var(--tx3);border:1px solid var(--bd2)}
</style>
</head>
<body>
<div id="app">

<!-- ═══ 홈 ═══ -->
<div id="s-home" class="scr on">
  <div class="hp">
    <div class="logo">
      <div class="lm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <div class="lt"><h1>행정사 기출문제</h1><p>2014~2025 · 678문제 · 정답+AI해설</p></div>
    </div>
    <div class="mtabs">
      <button class="mtab on" onclick="switchTab('year',this)">📅 회차별</button>
      <button class="mtab" onclick="switchTab('theme',this)">🗂️ 테마별</button>
    </div>
  </div>
  <div id="tab-year" class="tc on sbody" style="padding-top:0">
    <div id="yd-sec" style="display:none"><div class="stl">완료한 회차</div><div id="yd-list"></div></div>
    <div id="yt-sec"><div class="stl">미완료 회차</div><div id="yt-list"></div></div>
  </div>
  <div id="tab-theme" class="tc sbody" style="padding-top:0"><div id="theme-wrap"></div></div>
</div>

<!-- ═══ 문제 ═══ -->
<div id="s-exam" class="scr">
  <div class="hdr">
    <button class="hbk" onclick="confirmBack()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></button>
    <span class="htl" id="exam-title"></span>
    <span class="hcp" id="exam-chip"></span>
  </div>
  <div class="pw">
    <div class="ptop"><span class="pl" id="q-ctr">1/75</span><span class="pr" id="q-pct">0%</span></div>
    <div class="pbar"><div class="pfill" id="p-fill" style="width:0%"></div></div>
  </div>
  <div class="eb">
    <div class="qcard">
      <div class="qmeta">
        <span class="qnb" id="q-num">문제 1</span>
        <span class="sqc" id="q-subj">민법</span>
        <span class="yyc" id="q-ychip" style="display:none"></span>
        <span class="nano" id="q-noanswer" style="display:none">정답미제공</span>
      </div>
      <div class="qt" id="q-text"></div>
    </div>
    <div class="chs" id="choices"></div>
    <div class="exbox" id="ex-box">
      <div class="exhdr"><span class="extl">💡 AI 해설</span><span class="exbadge">Claude</span></div>
      <div class="extxt" id="ex-text"></div>
    </div>
    <button class="exbtn" id="ex-btn" onclick="askExplain()" style="display:none">💡 AI 해설 보기</button>
    <div class="mw">
      <span class="ml">✏️ 메모</span>
      <textarea class="ma" id="memo" placeholder="풀이 메모를 남기세요"></textarea>
      <div class="mr"><button class="msb" onclick="saveMemo()">저장</button><span class="msd" id="memo-ok">저장됨 ✓</span></div>
    </div>
    <div class="nav">
      <button class="nb" id="btn-prev" onclick="prevQ()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg> 이전</button>
      <button class="nb nx" id="btn-next" onclick="nextQ()">다음 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>
  </div>
</div>

<!-- ═══ 결과 ═══ -->
<div id="s-result" class="scr">
  <div class="hdr">
    <button class="hbk" onclick="goHome()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></button>
    <span class="htl" id="res-title">채점 결과</span>
  </div>
  <div style="flex:1;overflow-y:auto">
    <div class="rh">
      <div class="rring">
        <svg viewBox="0 0 110 110"><circle class="rbg" cx="55" cy="55" r="46"/><circle class="rfl" id="r-fill" cx="55" cy="55" r="46" stroke="#22d172" stroke-dasharray="289" stroke-dashoffset="289"/></svg>
        <div class="rlbl"><span class="rpct" id="r-pct">-</span><span class="rsub" id="r-sub">정답률</span></div>
      </div>
      <div class="rtl" id="r-tl">채점 완료</div>
      <div class="rsb" id="r-sb"></div>
    </div>
    <div class="sgrid">
      <div class="sc"><span class="sv" id="st-ok" style="color:var(--gn)">0</span><span class="slb">정답</span></div>
      <div class="sc"><span class="sv" id="st-ng" style="color:var(--rd)">0</span><span class="slb">오답</span></div>
      <div class="sc"><span class="sv" id="st-sk" style="color:var(--tx3)">0</span><span class="slb">미선택</span></div>
      <div class="sc"><span class="sv" id="st-tt" style="color:var(--bl)">0</span><span class="slb">전체</span></div>
    </div>
    <div class="dvd"></div>
    <div class="shdr2"><h3>오답 학습 가이드</h3><span id="wc-lbl"></span></div>
    <div class="rvlist" id="rv-list"></div>
    <div class="btns" style="margin-top:12px">
      <button class="btn bp" onclick="goHome()">🏠 홈으로</button>
      <button class="btn bs" onclick="retryExam()">🔁 다시 풀기</button>
    </div>
  </div>
</div>

</div>
<script>
const MODEL='claude-sonnet-4-20250514';
const QUESTIONS_DB = {
  "2014": [
    {num:1,subj:"민법",text:"법인에 관한 설명으로 옳지 않은 것은? (다툼이 있는 경우에는 판례에 의함)",choices:["영리법인은 모두 사단법인이다.","감사는 법인의 임의기관이다.","특별한 사정이 없으면, 사단법인의 사원의 지위는 양도 또는 상속할 수 없다.","특별한 사정이 없으면, 사단법인의 해산결의는 총사원 4분의 3 이상의 동의로 한다.","법인의 해산과 청산은 청산인이 감독한다."],answer:3},
    {num:2,subj:"민법",text:"신의성실의 원칙(이하 “신의칙”이라 함)에 관한 설명으로 옳지 않은 것은? (다툼이 있는 경우에는 판례에 의함)",choices:["신의칙이란 법률관계의 당사자로서 형평에 어긋나거나 신뢰를 버리는 내용 또는 방법으로","신의칙에 관한 제2조는 강행규정이므로 법원은 그 위반 여부를 직권으로 판단할 수 있다.","강행규정을 위반한 행위를 한 사람이 그 무효를 주장하는 것은 특별한 사정이 없으면,","권리의 행사로 권리자가 얻는 이익보다 상대방이 잃은 이익이 현저하게 크다는 사정만","본인을 상속한 무권대리인이 무권대리행위의 무효를 주장하는 것은 신의칙에 반한다."],answer:2},
    {num:3,subj:"민법",text:"민법 제35조(법인의 불법행위능력)에 관한 설명으로 옳지 않은 것은? (다툼이 있는 경우에는 판례에 의함)",choices:["“법인의 대표자”에는 법인을 실질적으로 운영하면서 법인을 사실상 대표하여 법인의 사무를","“직무에 관하여”는 행위의 외형상 대표자의 직무행위로 인정할 수 있는 행위이면 된다.","법인의 불법행위가 성립하게 되면 가해행위를 한 대표자는 손해배상책임을 면한다.","비법인사단의 대표자의 행위가 직무에 관한 행위에 해당하지 아니함을 피해자가 알았거나","법인의 목적범위 외의 행위로 인하여 타인에게 손해를 가한 때에는 그 사항의 의결에"],answer:4},
    {num:4,subj:"민법",text:"법인의 이사에 관한 설명으로 옳지 않은 것은? (다툼이 있는 경우에는 판례에 의함)",choices:["이사의 임면에 관한 사항은 정관의 필요적 기재사항이다.","이사의 대표권의 제한은 이를 등기하지 않으면 악의의 제3자에게도 대항할 수 없다.","이사가 그의 권한으로 선임한 대리인은 법인의 기관이다.","특별한 사정이 없으면, 법인과 이사의 이익이 상반하는 사항에 관하여는 그 이사는 대표","이사의 직무대행자는 원칙적으로 법인의 통상사무에 속하는 행위만을 할 수 있다."],answer:4},
    {num:5,subj:"민법",text:"미성년자 甲이 법정대리인 乙의 동의 없이 자신의 노트북 컴퓨터를 丙에게 매각하였다. 다음 설명 중 옳은 것은?",choices:["丙은 乙이 추인하기 전에 거절권을 행사할 수 있다.","丙이 그 물건을 다시 丁에게 증여한 경우, 甲은 丁을 상대로 매매계약을 취소할 수 있다.","계약체결시에 甲이 미성년자임을 안 丙은 그의 의사표시를 철회할 수 있다.","甲이 속임수로써 乙의 동의가 있는 것으로 믿게 한 경우, 甲은 계약을 원인으로 얻은 모든","丙은 19세가 된 甲에게 1개월 이상의 기간을 정하여 매매계약을 추인할 것인지 여부의"],answer:3},
    {num:6,subj:"민법",text:"성년후견, 한정후견, 특정후견에 관한 설명으로 옳지 않은 것은?",choices:["피성년후견인의 법률행위는 취소할 수 있다.","가정법원은 한정후견개시의 심판을 할 때 본인의 의사를 고려하여야 한다.","가정법원이 피한정후견인에 대하여 성년후견개시의 심판을 할 때에는 종전의 한정후견의","특정후견은 본인의 의사에 반하여 할 수 있다.","특정후견의 심판을 하는 경우에는 특정후견의 기간 또는 사무의 범위를 정하여야 한다."],answer:1},
    {num:7,subj:"민법",text:"관습법과 사실인 관습에 관한 설명으로 옳지 않은 것은? (다툼이 있는 경우에는 판례 에 의함)",choices:["관습법은 헌법을 최상위규범으로 하는 전체 법질서에 반하지 않고 정당성과 합리성이","관습법은 바로 법원(法源)으로서 법령과 같은 효력을 갖는 관습이므로 법령에 저촉하는","사실인 관습은 사회의 관행에 의하여 발생한 사회생활규범인 점에서 관습법과 같다.","사실인 관습은 단순한 관행으로서 법률행위의 당사자의 의사를 보충한다.","관습법도 사회구성원이 그러한 관행의 법적 구속력에 대하여 확신을 갖지 않게 된 경우"],answer:2},
    {num:8,subj:"민법",text:"「국토의 계획 및 이용에 관한 법률」이 정하는 토지거래허가구역 내의 토지거래행 위에 관한 설명으로 옳지 않은 것은? (다툼이 있는 경우에는 판례에 의함)",choices:["권리의 이전 또는 설정에 관한 토지거래계약은 그에 대한 허가를 받을 때까지는 효력이","당사자의 일방이 허가신청절차에 협력하지 아니한다면 상대방은 소송으로써 그 이행을","매수인이 대금을 선급하기로 약정하였다면 허가를 받기 전에도 매도인은 대금 미지급을","일단 허가를 받으면 토지거래계약은 처음부터 효력이 있으므로 거래계약을 다시 체결할","토지매매계약의 무효가 확정되지 않은 상태에서는 매수인은 임의로 지급한 계약금을 부당"],answer:0},
    {num:9,subj:"민법",text:"다음 설명 중 옳지 않은 것은? (다툼이 있는 경우에는 판례에 의함)",choices:["주물과 종물은 모두 동일한 소유자에 속하여야 하므로 법률상 하나의 물건으로 취급된다.","권원 없이 타인의 토지에 한 그루의 수목을 식재한 사람은 그 소유권을 잃는다.","물건의 소유자만이 아니라 그 물건의 수익권자도 과실을 수취할 수 있는 권리자이다.","주물 소유자의 상용에 공여되는 물건이라도 주물 그 자체의 효용과 직접 관계없는 물건","물건의 사용대가로 받는 금전 기타의 물건은 수취할 권리의 존속기간 일수의 비율로 취"],answer:1},
    {num:10,subj:"민법",text:"불공정한 법률행위에 관한 설명으로 옳지 않은 것은? (다툼이 있는 경우에는 판례에 의함)",choices:["“궁박”은 “급박한 곤궁”을 의미하지만 이는 반드시 경제적 궁박으로 제한되지 않는다.","급부와 반대급부간에 현저한 불균형이 있으면 궁박ㆍ경솔 또는 무경험으로 인한 법률행","불공정한 법률행위에 해당하는지 여부는 법률행위시를 기준으로 판단하여야 한다.","증여와 같이 아무런 대가 없이 의무자가 일방적으로 급부하는 법률행위는 그 공정성 여","불공정한 법률행위에 해당하여 무효가 된 때에도 무효행위의 전환이 인정될 수 있다."],answer:2},
    {num:11,subj:"민법",text:"착오에 관한 설명으로 옳지 않은 것은? (다툼이 있는 경우에는 판례에 의함)",choices:["법률행위의 일부분에만 착오가 있고 그 법률행위가 가분적이면 그 나머지 부분이라도","표의자가 착오로 의사표시를 하였으나 그에게 아무런 경제적 불이익이 발생하지 않은","법률행위의 중요부분의 착오는 착오가 없었더라면 표의자뿐만 아니라 일반인도 표의자의","등기명의자가 소유권이전등기의 무효를 주장한 종전 소유자의 공동상속인 중 1인을","채무자의 채무불이행을 원인으로 적법하게 해제된 매매계약도 착오를 이유로 취소될 수 있다."],answer:1},
    {num:12,subj:"민법",text:"법률행위의 해석에 관한 설명으로 옳은 것은? (다툼이 있는 경우에는 판례에 의함)",choices:["매매계약서에 “계약사항에 대한 이의가 생겼을 때에는 매도인의 해석에 따른다”는 조항을","분양약정에서 당사자들이 분양가격의 결정기준으로 합의하였던 기준들에 따른 분양가격의","당사자가 합의로 지명한 감정인의 감정의견에 따라 보상금을 지급하기로 약정한 경우에는","어떠한 의무를 부담하는 내용의 기재가 있는 서면에 \"최대 노력하겠습니다\"라고 기입한 경우","부동산 매매계약에서 당사자가 모두 甲 토지를 계약의 목적물로 삼았으나 그 지번 등에"],answer:4},
    {num:13,subj:"민법",text:"통정허위표시에 관한 설명으로 옳은 것은? (다툼이 있는 경우에는 판례에 의함)",choices:["통정은 상대방과 짜고 함을 의미하지만, 이때 표의자의 상대방이 단순히 진의와 다른","대리인이 그 권한 안에서 본인의 이름으로 의사표시를 함에 있어서 상대방과 통정하여","허위표시의 당사자가 아닌 사람은 허위표시의 무효로써 허위표시에 기초하여 새로운","상대방과 허위표시로써 성립한 가장채권을 보유한 채권자에 대하여 파산이 선고된 경우","통정한 허위표시에 의하여 외형상 형성된 법률관계로 생긴 채권을 가압류한 경우, 그 가"],answer:3},
    {num:14,subj:"민법",text:"대리에 관한 설명으로 옳지 않은 것은? (다툼이 있는 경우에는 판례에 의함)",choices:["매매계약을 체결할 권한을 수여받은 대리인은 특별한 사정이 없으면, 그 매매계약에 따른","매매계약의 체결과 이행에 관하여 포괄적인 권한을 수여받은 대리인은 특별한 사정이","대여금의 영수권한만을 위임받은 대리인은 그 대여금 채무의 일부를 면제하기 위하여는","특별한 사정이 없으면, 예금계약의 체결을 위임받은 자의 대리권에는 그 예금을 담보로","본인을 위하여 금전소비대차와 그 담보를 위한 담보권설정계약을 체결할 권한을 수여받은"],answer:3},
    {num:15,subj:"민법",text:"기간에 관한 설명으로 옳은 것은?",choices:["기간의 계산에 관한 민법규정은 강행규정이다.","연령을 계산할 때에는 출생일을 산입하지 아니한다.","기간을 일, 주, 월 또는 년으로 정한 때에는 기간말일의 개시로 만료한다.","시, 분, 초를 단위로 하는 기간은 자연적 계산방법에 따라 즉시부터 기산한다.","기간의 계산에 관한 민법규정은 기산일로부터 소급하여 계산되는 기간의 계산방법에 대"],answer:1},
    {num:16,subj:"민법",text:"의사표시의 효력발생시기에 관한 설명으로 옳지 않은 것은? (다툼이 있는 경우에는 판례에 의함)",choices:["상대방이 있는 의사표시는 상대방에게 도달한 때에 그 효력이 생기는 것이 원칙이다.","표의자는 그의 의사표시가 상대방에게 도달하였으나 상대방이 이행에 착수하기 전에는","제한능력자에게 의사를 표시한 사람은 제한능력자의 법정대리인이 의사표시가 도달한","상대방이 정당한 사유 없이 의사표시의 수령을 거절한 경우에는 그 의사표시는 상대방이","의사표시의 부도달에 대한 위험은 표의자에게 있다."],answer:4},
    {num:18,subj:"민법",text:"표현대리에 관한 설명으로 옳지 않은 것은? (다툼이 있는 경우에는 판례에 의함)",choices:["표현대리가 성립하면 본인은 표현대리행위에 대하여 전적으로 책임을 져야 하고, 과실","대리권 수여의 표시에 의한 표현대리는 본인과 대리행위를 한 사람 사이의 기본적인 법률","등기신청행위를 기본대리권으로 가진 사람이 대물변제라는 사법행위를 한 경우, 그 대리행","권한을 넘은 표현대리에서 무권대리인에게 그 권한이 있다고 믿을 만한 정당한 이유가","기본적인 어떠한 대리권도 없었던 사람에 대하여 대리권소멸 후의 표현대리는 성립할"],answer:0},
    {num:19,subj:"민법",text:"소멸시효에 관한 설명으로 옳은 것은? (다툼이 있는 경우에는 판례에 의함)",choices:["시효의 중단사유가 재판상의 청구인 때에는 중단까지 경과한 시효기간은 이를 산입하지","건물이 완공되지 않아 소유권이전등기청구권을 행사할 수 없었다는 사유는 그 청구권의","근저당권설정등기청구권은 피담보채권에 부종하는 청구권이므로 독자적인 시효기간의","물상보증인이 피담보채무의 부존재를 이유로 제기한 저당권설정등기 말소청구소송에서","채무자는 소멸시효의 진행이 개시된 이후는 물론 그 이전에도 채무를 승인하여 시효를"],answer:0},

    {num:38,subj:"행정법",text:"공익사업을 위한 토지 등의 취득 및 보상에 관한 법률에 따른 토지수용에 대한 이의 신청 및 행정소송에 관한 설명으로 옳지 않은 것은? (다툼이 있는 경우에는 판례에 의함)",choices:["이의신청은 행정심판으로서의 성질을 가지며, 이에 관한 규정은 행정심판법에 대한 특별","수용재결에 불복하여 취소소송을 제기하는 때에는 이의신청을 거친 경우에도 수용재결","보상금증감청구소송은 공법상 당사자소송에 해당한다.","보상금증감청구소송을 제기하는 자가 토지소유자일 때에는 사업시행자를 피고로 한다.","수용재결에 대한 행정소송이 제기되면 사업의 진행 및 토지의 수용 또는 사용은 정지된다."],answer:0},
    {num:40,subj:"행정법",text:"공물의 사용관계에 관한 내용으로 옳지 않은 것은? (다툼이 있는 경우에는 판례에 의함)",choices:["공공용물에 관하여 적법한 개발행위가 이루어짐으로써 일정 범위의 사람들의 일반사용이","구체적으로 공물을 사용하지 않고 있는 이상 그 공물의 인접주민이라는 사정만으로는","하천부지에 대한 점용허가 여부는 관리청의 자유재량에 속하므로 이에 대해서 부관을","하천부지의 점용허가를 받은 사람은 그 하천부지를 권원 없이 점유ㆍ사용하는 자에 대","국유재산의 관리청이 행정재산의 사용ㆍ수익 허가를 받은 자에 대하여 하는 사용료 부"],answer:4},
    {num:41,subj:"행정법",text:"우리나라 지방행정에 있어서 주민참여의 실태에 관한 설명으로 옳지 않은 것은?",choices:["지방자치단체의 예산편성 과정에서 주민참여의 제도화","지방행정 통제수단으로서 주민 옴부즈만에 대한 높은 자율성 보장","주민의 이익이 잘 반영되는 직접적인 주민참여의 확대","지방자치단체 관할구역에 주민등록이 되어 있는 외국인의 조례 개폐청구 참여 허용","간접적인 주민참여제도로서 행정부 내 도시계획위원회 활동"],answer:1},
    {num:43,subj:"행정법",text:"정책결정모형에 관한 설명으로 옳지 않은 것은?",choices:["합리모형에서는 의사결정자가 정책결정에 있어서 주관적이고 감정적인 요소를 배제하고","점증모형은 현재 정책에 대한 약간의 변화만을 고려해 정책을 결정하고 시간이 흐름에","쓰레기통 모형은 쿠바 미사일 위기에 따른 미국 정부의 정책결정 과정을 설명하기 위해서","공공선택 모형에서는 정부를 공공재의 생산자로, 시민들을 공공재의 소비자로 규정한다.","앨리슨 모형은 정책결정 과정을 합리모형, 조직과정모형 및 관료정치모형 등으로 분류하고"],answer:3},
    {num:44,subj:"행정법",text:"행정에 있어서 가외성(Redundancy)에 관한 설명으로 옳지 않은 것은?",choices:["중첩성이라고도 한다.","작고 효율적인 행정개혁을 저해할 수도 있다.","조직의 실패 확률을 감소시켜 안정성을 높여준다.","환경의 불확실성이 커질수록 가외성의 필요성은 감소한다.","환경에 대한 조직의 적응성을 높여준다."],answer:[1,3]},
    {num:45,subj:"행정법",text:"공공조직 업무개선을 위해 정보통신기술을 활용한 리엔지니어링(Reen gi nee ri n g )에 관한 설명으로 옳지 않은 것은?",choices:["조직 내 부서별 고도 분업화에 따른 폐단을 극복하기 위한 방안으로 등장하였다.","리엔지니어링의 궁극적인 목적은 성과향상과 고객만족의 극대화에 있다.","리엔지니어링에는 조직 및 인력감축이 필수적이다.","리엔지니어링은 프로세스의 변화뿐만 아니라 조직구조나 문화 등 다양한 측면에서의 변","공공서비스의 비분할성 및 비경합성 등과 같은 특징으로 인해 리엔지니어링 추진이 쉽지"],answer:4},
    {num:46,subj:"행정법",text:"공무원에 대한 다 면 평가 방식의 장 점 과 유용성에 관한 설명으로 옳지 않은 것은?",choices:["조직구성원 간 원활한 커뮤니케이션을 통해 상호 이해의 폭을 넓힐 수 있다.","다면평가를 통해 능력과 성과중심의 인사관리가 이뤄질 경우, 개인의 행태변화에 긍정적인","개인평가에 있어서 다면평가를 통해 인사고과에 대한 객관성과 공정성을 높일 수 있다.","평가결과는 구성원에 대한 보상과 개인별 역량개발 및 교육훈련 등에 활용될 수 있다.","다면평가는 조직 내 구성원간의 갈등 해소 및 신뢰성을 제고하고, 그 평가결과는 승진이나"],answer:0},
    {num:48,subj:"행정법",text:"공공행정에 관한 설명으로 옳지 않은 것은?",choices:["행정은 사회환경과 밀접한 관계를 갖고 있다.","행정국가는 정치행정일원론의 입장에서 설명할 수 있다.","행정은 경영보다 엄격한 법적 규제를 받는다.","행정에 있어서 의사결정은 가치체계와 밀접한 관계를 갖고 있다.","국민의 권리를 제한하고 의무를 부과하는 것은 행정의 본질과 거리가 멀다."],answer:2},
    {num:49,subj:"행정법",text:"우리나라 공공조직에서 도입된 팀제( Tea m S yst e m)에 관한 설명으로 옳지 않은 것은?",choices:["조직의 인력을 신축적으로 운영하고, 실무 차원에서 팀장 및 팀원의 권한을 향상시킨다.","조직구성원들의 신속한 의사결정을 저해시킨다.","팀제를 통해 조직구성원의 참여를 제고시키고 개인적 의견반영이 용이하다.","조직의 경직성을 탈피하고 팀 내 전문능력 및 기술을 활용하게 한다.","종전 수직적 조직을 수평적 조직으로 전환해 전략적 업무를 수행하는 조직에 적합하다."],answer:4},
    {num:50,subj:"행정법",text:"우리나라 지방자치제도에 관한 설명으로 옳은 것은?",choices:["시ㆍ도를 달리하는 시ㆍ군ㆍ구간의 자치단체 조합의 설치는 지방의회 의결을 거쳐 시ㆍ","자치구가 아닌 행정구 읍ㆍ면ㆍ동의 명칭과 폐치ㆍ분할은 해당 지방의회의 의결로 결정한다.","지방자치단체의 사무 중 단체위임사무는 지방자치단체의 장에게 위임하여 처리하는 사무이다.","중앙행정기관장과 지방자치단체의 장이 의견을 달리하는 사무처리의 조정을 위해 안전","주민발안제에 있어 사용료의 부과, 행정기구 변경 및 공공시설 설치 반대 등의 사항은"],answer:0},
    {num:51,subj:"행정학개론",text:"공공부문에서 성과관리 도구로서 균 형성과표( BSC , B a l anced S c or eca r d)에 관한 설 명으로 옳지 않은 것은?",choices:["거시적ㆍ장기적 측면의 조직문화 형성보다는 순익과 같은 미시적ㆍ단기적 목표와 계획","성과평가에 구성원의 역량이나 고객의 신뢰를 포함시킬 것을 강조한다.","과정과 결과 및 조직 내ㆍ외부적 관점 중 어느 하나보다는 통합적 균형을 추구한다.","성과관리를 위해 조직을 유기적 시스템으로 간주하여 상ㆍ하 또는 수평적 연계성을 강조","기존의 성과관리와 마찬가지로 성과지표와 전략과의 연계를 그대로 받아들인다."],answer:2},
    {num:54,subj:"행정학개론",text:"우리나라 지방 교 부 세 에 관한 설명으로 옳지 않은 것은?",choices:["지방교부세는 본질적으로 지방자치단체의 공유적 독립재원에 속한다.","보통교부세는 사용용도가 정해져 있지 않은 일반재원이다.","지방자치단체간 재정불균형의 조정은 가능하나 중앙정부와 지방자치단체간 수평적 재정","지방자치단체들은 재정자립도 향상 차원에서 지방교부세의 증액을 위해 노력하고 있다.","현행 제도상 보통교부세를 교부받지 않는 지방자치단체도 존재하고 있다."],answer:4},
    {num:55,subj:"행정학개론",text:"정책평가의 목적에 관한 설명으로 옳지 않은 것은?",choices:["목표가 얼마나 잘 충족되었는지 파악할 수 있다.","정책 성공과 실패의 원인을 구체적으로 제시할 수 있다.","정책 성공을 위한 원칙 발견과 향상된 연구를 위한 토대를 마련할 수 있다.","목표달성을 위해 사용된 수단과 하위 목표들을 재확인할 수 있다.","정책문제의 구조화와 정책담당자의 자율성을 확보하는 데 있다."],answer:3},
    {num:56,subj:"행정학개론",text:"공공조직에서 막스 베버 ( M . W e b e r )가 제시한 관 료 제의 주요 특 징 에 해당되지 않는 것은?",choices:["업무의 분업구조 속에서 직무에 대한 권한과 관할범위의 규정","조직형태에 있어서 명확한 계서제적 구조","권한 및 업무에 있어서 자의성과 개인적 선호가 배제된 문서화된 법규","비개인성(Impersonality)을 배제한 업무수행","업무에 있어서 조직구성원의 전문화와 전임화"],answer:2},
    {num:57,subj:"행정학개론",text:"우리나라 정부회계의 장부 기장 방식 중 현금주의 와 발생주의에 관한 설명으로 옳지 않은 것은?",choices:["전통적으로 지방정부의 일반회계는 현금주의를, 중앙정부 기업특별회계는 발생주의 회계","현금주의 회계방식은 경영성과 파악이 용이하며, 발생주의 회계방식은 절차와 운용이 간편","현금주의 회계방식은 이해와 통제가 용이하며, 발생주의 회계방식은 재정 건전성 확보가","현금주의 회계방식은 일반행정 부분에 적용가능하며, 발생주의 회계방식은 사업적 성격이","현금주의 회계방식은 손해배상 비용이나 부채성 충당금 등에 대한 인식이 어렵지만,"],answer:3},
    {num:58,subj:"행정학개론",text:"행정가치에 관한 설명으로 옳지 않은 것은?",choices:["합법성은 시민권의 신장과 자유권의 옹호가 중요했던 입법국가 시대의 주요 가치이다.","신공공관리론에서는 정치적 책임성과 법적 책임성 외에도 시장 책임성을 강조한다.","효과성은 1960년대 발전행정의 사고가 지배적일 때 주된 가치판단 기준이었다.","사회적 능률성은 민주성의 개념으로 이해되는 데 신행정론에서 처음 주창된 가치이다.","민원처리 과정을 온라인으로 공개함으로써 과정의 투명성을 확보할 수 있다."],answer:0},
  ],
  "2015": [
    {num:1,subj:"민법",text:"신의성실의 원칙에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["병원은 입원환자의 휴대품 등의 도난을 방지하는데 필요한 적절한 조치를 강구할 신의","채무자의 소멸시효에 기한 항변권의 행사에는 신의성실의 원칙이 적용되지 않는다.","강행법규를 위반한 자가 스스로 그 약정의 무효를 주장하는 것은 특별한 사정이 없는 한","송전선이 토지 위를 통과하고 있다는 점을 알면서 그 토지를 시가대로 취득한 자의","미성년자가 법정대리인의 동의 없이 신용구매계약을 체결한 후에 법정대리인의 동의"],answer:4},
    {num:2,subj:"민법",text:"민법의 법원(法源)에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["민사에 관하여 법률에 규정이 없으면 관습법에 의하고 관습법이 없으면 조리에 의한다.","헌법에 의하여 체결ㆍ공포된 조약이나 일반적으로 승인된 국제법규가 민사에 관한 것이","공동선조와 성과 본을 같이 하는 후손은 성별의 구별 없이 성년이 되면 당연히 종중의","법령과 같은 효력을 갖는 관습법은 특별한 사정이 없으면 당사자의 주장ㆍ증명을 기다릴","헌법을 최상위 규범으로 하는 전체 법질서에 반하는 사회생활규범은 사회의 거듭된"],answer:1},
    {num:3,subj:"민법",text:"성년후견, 한정후견, 특정후견에 관한 설명으로 옳은 것은?",choices:["지방자치단체의 장은 성년후견개시의 원인이 소멸된 경우에는 성년후견종료의 심판을","성년후견인은 피성년후견인의 법률행위가 일용품의 구입 등 일상생활에 필요하고 그","가정법원은 피한정후견인이 한정후견인의 동의를 받아야 하는 행위의 범위를 정할 수 없다.","가정법원은 취소할 수 없는 피성년후견인의 법률행위의 범위를 정할 수 있다.","가정법원은 성년후견개시의 심판을 할 때 본인의 의사를 고려할 필요가 없다."],answer:3},
    {num:5,subj:"민법",text:"법인의 불법행위능력(민법 제35조)에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["법인을 실질적으로 운영하면서 법인을 사실상 대표하여 법인의 사무를 집행하는 자가","대표권이 없는 이사는 법인의 기관이기는 하지만 대표기관은 아니기 때문에 그 이사의","대표자의 행위가 대표자 개인의 사리를 도모하기 위한 것이었다 하더라도 외관상,","대표자의 행위가 직무에 관한 행위에 해당하지 아니함을 피해자 자신이 알았거나 또는","법인의 목적범위 외의 행위로 타인에게 손해를 가한 경우, 그 사항의 의결에 찬성하거나"],answer:0},
    {num:6,subj:"민법",text:"민법상 법인의 소멸에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["법인이 목적 이외의 사업을 하거나 설립허가의 조건에 위반하거나 기타 공익을 해하는","청산이 종결한 때에는 청산인은 3주간 내에 이를 등기하고 주무관청에 신고하여야 한다.","청산 중의 법인은 채권신고기간이 경과하더라도 변제기에 이르지 않은 채권에 대해서는","청산절차에 관한 규정은 모두 제3자의 이해관계에 중대한 영향을 미치는 것으로서 강행","법인에 대한 청산종결등기가 마쳐졌더라도 청산사무가 종결되지 않는 한 그 범위 내에서"],answer:2},
    {num:7,subj:"민법",text:"민법상 법인의 기관에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["사단법인의 이사와 감사는 필수기관이다.","이사가 없거나 결원이 있는 경우에 이로 인하여 손해가 생길 염려가 있는 때에는 법원은","사단법인의 사원의 지위는 양도 또는 상속할 수 없다는 민법의 규정은 강행규정이므로,","법인과 이사의 이익이 상반하는 사항에 관하여는 임시이사를 선임하여야 한다.","사원총회에서 결의할 수 있는 것은 정관에 다른 규정이 없는 한 총회를 소집할 때 미리"],answer:4},
    {num:8,subj:"민법",text:"민법상 물건에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["전기 기타 관리할 수 있는 자연력은 물건이 아니다.","주물의 소유자나 이용자의 사용에 공여되고 있으면 주물 그 자체의 효용과 직접 관계가","입목에 관한 법률에 따른 입목등기를 하지 않은 수목이더라도 명인방법을 갖추면 토지와","천연과실은 수취할 권리의 존속기간일수의 비율로 취득한다.","당사자는 주물을 처분할 때에 특약으로 종물만을 별도로 처분할 수 없다."],answer:2},
    {num:10,subj:"민법",text:"의사표시에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["착오에 의한 의사표시의 취소는 선의의 제3자에게 대항할 수 있다.","부동산 매매에서 시가에 관한 착오는 특별한 사정이 없는 한 법률행위의 중요부분에","채무자의 법률행위가 통정허위표시에 해당되어 무효인 경우에는 채권자취소권의 대상이","진의 아닌 의사표시는 상대방이 표의자의 진의 아님을 알았거나 알 수 있었을 경우에","강박이 의사결정의 자유를 완전히 박탈하는 정도에 이르지 않고 이를 제한하는 정도에"],answer:1},
    {num:11,subj:"민법",text:"허위표 시에 기 초하여 새로운 법률상 의 이해 관계를 맺은 자 (통정 허위표 시에서 의 제3자 )에 해당 하지 않 는 것은 ? (다 툼이 있 으면 판 례에 따 름)",choices:["가장매매의 매수인으로부터 목적부동산을 다시 매수하여 소유권이전등기를 마친 자","가장매매의 매수인으로부터 매매계약에 의한 소유권이전청구권보전을 위한 가등기를 마친 자","허위표시인 전세권설정계약에 기하여 등기까지 마친 전세권에 대하여 저당권을 취득한 자","허위표시인 근저당권설정계약이 유효하다고 믿고 그 피담보채권에 대하여 가압류한 자","채권의 가장양도에서 가장양수인에게 채무를 변제하지 않고 있었던 채무자"],answer:4},
    {num:12,subj:"민법",text:"불공정한 법률행위(민법 제104조)에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["법률행위가 현저하게 공정을 잃은 경우, 그것은 경솔하게 이루어졌거나 궁박한 사정이","강제경매에서 시가보다 현저하게 낮게 매각된 경우에 불공정한 법률행위가 성립될 수 없다.","불공정한 법률행위가 성립하기 위한 요건인 궁박, 경솔, 무경험은 그 중 일부만 갖추어도 된다.","불공정한 법률행위에서 궁박이란 급박한 곤궁을 의미하는 것으로서 정신적 원인에 기인","대리행위의 경우에 경솔ㆍ무경험은 대리인을 기준으로 판단하고, 궁박 상태에 있었는지"],answer:0},
    {num:13,subj:"민법",text:"표현대리에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["유권대리에 관한 주장 속에는 무권대리에 속하는 표현대리의 주장이 포함되어 있다고 볼 수 없다.","대리권소멸 후의 표현대리에 관한 규정은 법정대리에는 적용되지 않는다.","표현대리가 성립하여 대리행위의 효과가 본인에게 귀속되면 표현대리의 성질이 유권","기본대리권이 월권행위와 관련이 없는 경우에는 권한을 넘은 표현대리는 성립할 여지가 없다.","대리권을 추단할 수 있는 직함이나 명칭 등의 사용을 본인이 승낙 또는 묵인하였더라도"],answer:0},
    {num:14,subj:"민법",text:"복대리에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["복대리인은 대리인의 대리인이 아니다.","복대리에서도 표현대리가 성립할 수 있다.","복대리인은 본인이나 제3자에 대하여 대리인과 동일한 권리의무가 있다.","복대리인이 선임된 후에 대리인의 대리권이 소멸하더라도 복대리권은 소멸하지 않는다.","법정대리인이 부득이한 사유로 복대리인을 선임한 경우, 본인에 대하여 복대리인의 선임"],answer:3},
    {num:15,subj:"민법",text:"무권대리행위의 추인에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["추인의 의사표시는 본인으로부터 그에 관한 대리권을 수여받은 임의대리인도 할 수 있다.","추인의 의사표시는 무권대리인 뿐만 아니라 무권대리행위의 상대방에 대하여도 할 수 있다.","무권대리행위의 상대방이 계약 당시 무권대리임을 안 경우에는 본인에 대해 추인 여부의","추인은 의사표시 전부에 대하여 행하여져야 하고, 그 내용을 변경하여 추인할 경우에는","본인이 무권대리인에게 무권대리행위를 추인한 경우, 계약 당시에 대리권 없음을 알지 못한"],answer:2},
    {num:16,subj:"민법",text:"甲이 만 18세인 대학생 乙에게 X 아파트 분양계약체결에 관한 대리권을 수여하였고, 乙은 甲을 대리하여 丙이 분양하는 X 아파트를 3억원에 분양받기로 하는 계약을 체 결한 경우에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["丙은 甲에 대하여 X 아파트 분양계약에 따른 이행을 청구할 수 있다.","乙의 법정대리인은 X 아파트 분양계약을 법정대리인의 동의가 없다는 이유로 취소할 수 없다.","丙이 X 아파트에 대한 소유권이전등기를 해 주지 않은 경우, 특별한 사정이 없는 한","만일 乙이 무권대리인이었고, 丙이 이를 알지 못하였다면, 丙은 乙에게 계약의 이행을","만일 X 아파트 단지 인근에 쓰레기 매립장이 건설예정인 사실을 알고 있는 丙이 乙에게"],answer:3},
    {num:17,subj:"민법",text:"법률행위의 조건과 기한에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["기한의 이익은 포기할 수 있지만, 상대방의 이익을 해하지 못한다.","정지조건 있는 법률행위는 조건이 성취한 때로부터 그 효력을 잃는다.","조건의 성취가 미정한 권리의무는 일반규정에 의하여 처분, 상속, 보존 또는 담보로 할","조건부 법률행위에 있어 조건의 내용 자체가 불법적인 것이어서 무효일 경우, 그 조건만을","불확정한 사실이 발생한 때를 이행기한으로 정한 경우, 그 사실이 발생한 때뿐만 아니라"],answer:1},
    {num:18,subj:"민법",text:"민법상 기간에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["기간을 일, 주, 월 또는 년으로 정한 때에 그 기간의 초일을 산입하기로 한 당사자 사이의","1996. 6. 5. 08시에 출생한 사람은 2015. 6. 5. 0시부터 성년자가 된다.","월로 정한 기간의 기산일이 공휴일인 경우에는 그 다음 날부터 기산한다.","2015. 5. 31. 09시부터 1개월인 경우, 2015. 6. 30. 24시에 기간이 만료한다.","2015. 6. 10. 09시에 甲이 乙에게 자전거를 빌리면서 10시간 후에 반환하기로 한 경우, 甲은"],answer:2},
    {num:19,subj:"민법",text:"소멸시효의 중단 또는 정지에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["재판상의 청구는 그 소송이 취하된 경우에는 그로부터 6개월 내에 다시 재판상의 청구","당연 무효의 가압류ㆍ가처분은 소멸시효의 중단사유에 해당하지 않는다.","부부 중 한쪽이 다른 쪽에 대하여 갖는 권리는 혼인관계가 종료된 때부터 6개월 내에는","승인은 소멸시효의 진행이 개시된 이후에만 가능하고, 그 이전에는 승인을 하더라도","시효중단의 효력 있는 승인에는 상대방의 권리에 관한 처분의 능력이나 권한이 있을"],answer:4},
    {num:20,subj:"민법",text:"甲은 토지거래허가구역 내의 X 토지에 대하여 관할관청으로부터 허가를 받지 않고 乙에게 매도하는 계약을 체결하였고, 乙은 계약금을 지급한 경우에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["甲은 허가를 받기 전에도 특별한 사정이 없는 한 계약금의 배액을 상환하고 적법하게","甲ㆍ乙 쌍방이 허가신청을 하지 않기로 의사표시를 명백히 한 경우에는 X 토지에 대한","乙은 매매계약이 확정적으로 무효가 되지 않는 한 계약체결시 지급한 계약금에 대하여","매매계약과 별개의 약정으로, 甲과 乙은 매매 잔금이 지급기일에 지급되지 않는 경우에","매매계약을 체결한 이후에 X 토지에 대한 토지거래허가구역지정이 해제된 경우, 甲과 乙"],answer:1},
    {num:21,subj:"민법",text:"행정법의 효력에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["대통령령, 총리령 및 부령은 특별한 규정이 없으면 공포한 날부터 15일이 경과함으로써","법령은 지역적으로 대한민국의 영토전역에 걸쳐 효력을 가지는 것이 원칙이나 예외적으로","일반국민의 이해에 직접 관계가 없는 경우 등 특별한 사정이 있는 경우라도 법령의","인ㆍ허가신청 후 처분 전에 관계법령이 개정 시행된 경우, 행정행위는 신청 당시에 시행","법령은 대한민국의 영토 내에 있는 모든 사람에게 적용되는 것이 원칙이므로 외국인에"],answer:1},
    {num:22,subj:"민법",text:"행정법의 대상이 되는 행정에 관한 설명으로 옳지 않은 것은?",choices:["헌법의 구체화법인 행정법의 대상으로서 행정은 권력분립원리에 따라 확립된 개념이다.","행정의 목표로서 공익의 개념은 명백한 것이기 때문에 공익의 개념은 시간의 흐름에","우리나라의 경우 대통령의 통치행위를 판례에서 인정한 바 있다.","행정을 공법상 행정과 사법상 행정으로 구분하는 주된 실익은 양자에 적용되는 실체법이","급부행정은 공법적인 방식 외에 사법적인 방식으로도 이루어진다."],answer:1},
    {num:24,subj:"민법",text:"행정지도에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정지도의 상대방은 해당 행정지도의 방식ㆍ내용 등에 관하여 행정기관에 의견 제출을","행정기관은 행정지도의 상대방이 행정지도에 따르지 아니하였다는 것을 이유로 불이익한","행정지도는 일정한 법적 효과의 발생을 목적으로 하는 처분이다.","법치주의의 붕괴, 책임소재의 불분명으로 인한 책임행정의 이탈 등은 행정지도의 문제점에","주무부처 장관의 대학총장들에 대한 학칙시정요구는 규제적ㆍ구속적 성격이 강하기"],answer:2},
    {num:25,subj:"민법",text:"허가에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["허가권자는 중대한 공익상의 필요가 없는데도 관계 법령에서 정한 제한사유 이외의","허가는 반드시 신청을 전제로 한다.","허가의 취소사유가 발생하면 취소가 가능하지만 일부취소는 불가능하다.","허가가 있으면 당해 허가의 대상이 된 행위에 대한 금지가 해제될 뿐만 아니라 타법에","인ㆍ허가의제 효과를 수반하는 건축신고는 수리를 요하는 신고에 해당하지 않는다."],answer:0},
    {num:26,subj:"행정법",text:"행정규칙에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정규칙은 원칙적으로 대외적 구속력이 없다.","재량준칙이 되풀이 시행되어 행정관행이 성립한 경우 당해 재량준칙에 자기구속력을","행정규칙의 제정에는 법령의 수권을 요하지 않는다.","행정규칙에서 정한 요건을 충족하지 않으면 그 처분은 절차상의 하자로 위법한 처분이 된다.","행정규칙은 대외적인 행위가 아니라 행정조직 내부에서의 행위이므로 원칙상 헌법소원의"],answer:3},
    {num:28,subj:"행정법",text:"행정계획에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정청이 이미 도시계획이 결정ㆍ고시된 지역에 대하여 다른 도시계획을 결정ㆍ고시한","행정주체가 행정계획을 입안ㆍ결정하는 데에는 광범위한 계획재량을 가지더라도, 행정계획에","국토이용계획은 계획의 확정 후에 어떤 사정의 변동이 있다고 하여 지역주민이나 일반","도시계획구역 내 토지 등을 소유하고 있는 주민은 입안권자에게 도시계획입안을 요구할","택지개발 예정지구 지정처분은 광범위한 재량행위라고 할 것이므로 그 재량권의 일탈ㆍ"],answer:1},
    {num:29,subj:"행정법",text:"공공기관의 정보공개에 관한 법령상 정보공개에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["공개청구의 대상이 되는 정보는 그 문서가 반드시 원본이어야 한다.","권리능력 없는 사단은 정보공개청구권자에 해당하지 않는다.","정보공개청구제도는 행정의 투명성과 적법성을 위한 것이므로 국민의 정보공개청구는","외국인은 정보공개청구권이 인정되지 않는다.","공공기관이 그 정보를 보유ㆍ관리하고 있지 아니한 경우에는 특별한 사정이 없는 한"],answer:4},
    {num:30,subj:"행정법",text:"대집행에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정대집행에 있어서 1차 계고에 이어 2차 계고를 행한 경우, 2차 계고는 새로운 행정","대집행영장에 의한 통지는 비상시 등 그 절차를 취할 여유가 없는 경우 당해 수속을","대집행을 실시하기 위하여 지출한 비용은 국세징수법의 예에 의하여 징수할 수 있다.","행정상 의무이행확보수단으로 행정대집행의 절차가 인정되는 경우에는 따로 민사소송의","비대체적 부작위의무를 대상으로 하는 행정대집행명령은 위법하다."],answer:0},
    {num:31,subj:"행정법",text:"행정조사에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정기관의 장은 법령 등에서 규정하고 있는 조사사항을 조사대상자로 하여금 스스로","행정조사는 법령 등의 위반에 대한 처벌보다는 법령 등을 준수하도록 유도하는 데 중점을","행정기관은 유사하거나 동일한 사안에 대하여는 공동조사 등을 실시함으로써 행정조사가","조사대상자의 자발적인 협조를 얻어 행정조사를 실시하고자 하는 경우 조사대상자는","세무조사결정은 납세의무자의 권리ㆍ의무에 직접 영향을 미치는 공권력의 행사에 따른"],answer:4},
    {num:32,subj:"행정법",text:"행정소송제도에 관한 설명 중 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["판례는 예방적 부작위청구소송(예방적 금지소송)을 인정한다.","주민소송은 주관적 소송에 해당한다.","현행 행정소송법은 취소소송중심주의를 취하고 있다.","행정처분에 대한 무효확인청구와 취소청구는 선택적 청구로서의 병합은 허용된다.","당사자소송의 인정에 있어서는 개별법의 근거가 필요하다."],answer:2},
    {num:33,subj:"행정법",text:"행정심판에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["처분의 취소를 구하는 취지의 처분청에 대한 진정서 제출은 행정심판법 소정의 행정","고시 또는 공고에 의하여 행정처분을 하는 경우, 행정심판 청구기간의 기산일은 고시","행정심판에 있어서 행정심판위원회는 재결 당시까지 제출된 모든 자료를 종합하여 행정","형성적 재결이 있는 경우에는 그 대상이 된 행정처분은 재결 자체에 의하여 당연히","행정심판법상 재결의 기속력은 당해 처분에 관하여 재결주문 및 그 전제가 된 요건사실의"],answer:4},
    {num:34,subj:"행정법",text:"행정소송법상 집행정지에 관한 설명으로 옳은 것은?",choices:["집행정지의 결정 또는 기각의 결정에 대하여는 즉시항고할 수 없다.","집행정지는 공공복리에 중대한 영향을 미칠 우려가 있을 때에도 허용된다.","취소소송의 제기는 처분등의 효력이나 그 집행 또는 절차의 속행에 영향을 준다.","처분의 효력정지는 처분등의 집행 또는 절차의 속행을 정지함으로써 목적을 달성할 수","긴급한 필요가 있다고 인정할 때에는 본안이 계속되고 있는 법원은 직권에 의하여 처분"],answer:3},
    {num:36,subj:"행정법",text:"지방의회에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["지방의회는 지방자치단체의 구성부분으로 헌법이 인정하는 기관이다.","지방의회의 사무직원은 지방자치단체장의 추천에 의하여 의장이 임명한다.","지방의회의 회의는 공개가 원칙이지만 의원 3명이상의 발의로 출석의원 3분의 2 이상이","체포 또는 구금된 지방의회의원이 있으면 관계 수사기관의 장은 지체 없이 해당 의장에게","지방의회는 그 지방자치단체의 사무에 대하여 행정사무감사권 및 조사권을 갖는다."],answer:1},
    {num:38,subj:"행정법",text:"공물에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["지방자치단체가 법령상의 의무에 위반하여 국가가 관리하는 자연공물인 바닷 가를","도로점용의 허가는 특정인에게 일정한 내용의 공물사용권을 설정하는 설권행위에 해당","공유수면의 일부가 사실상 매립되어 대지화되었다 하더라도 공용폐지를 하지 아니하였다면","행정재산은 사법상 거래의 대상이 되지 아니하는 불융통물이지만 관재 당국이 이를","하천의 점용허가권은 특허에 의한 공물사용권의 일종으로 일정한 특별사용을 청구할 수"],answer:2},
    {num:39,subj:"행정법",text:"공용부담 및 공용수용에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["공용수용은 당사자와의 협력을 기반으로 하기 때문에 최소침해의 원칙이 적용되지 않는다.","공용부담이라 함은 일정한 공공복리를 적극적으로 증진하기 위하여 개인에게 부과되는","판례는 공익사업을 위한 토지 등의 취득 및 보상에 관한 법령에 의한 협의취득을 사법","공용수용에 있어서 사업인정고시가 된 후 권리의 변동이 있을 때에는 그 권리를 승계한","헌법재판소는 환매권을 헌법상의 재산권보장으로부터 도출되는 것으로 보고 있다."],answer:0},
    {num:41,subj:"행정법",text:"옴부즈만(ombudsman)제도에 관한 설명으로 옳지 않은 것은?",choices:["문제해결을 위한 처리과정에 시간이 많이 걸린다.","행정권의 남용이나 부당행위로 국민의 권리가 침해되었을 때 구제하는 것을 목적으로 한다.","일반적으로 시민의 고발에 의하여 활동을 개시하지만 자기직권으로 조사활동을 하기도 한다.","우리나라의 국민권익위원회는 옴부즈만제도와 유사하다고 볼 수 있다.","스 웨덴 에서 처음 시행된 이후 현재 유 럽 을 비 롯 한 많 은 나라에서 활용되고 있는"],answer:0},
    {num:42,subj:"행정법",text:"정책결정모형의 하나인 쓰레기통모형(garbage can model)에 관한 설명으로 옳지 않은 것은?",choices:["조직화된 무정부상태(organized anarchy)에서 이루어지는 의사결정을 설명한다.","코헨(M. Cohen), 마치(J. March), 올슨(J. Olson)이 정립한 모형이다.","의사결정의 네 가지 요소인 정책문제, 해결방안, 참여자, 선택기회가 초기부터 서로 강한","고도로 불확실한 조직상황에서 이루어지는 의사결정과정을 기술하고 설명하는 모형이다.","상하위 계층적 관계를 지니지 않은 참여자들에 의하여 의사결정이 이루어지는 경우에도"],answer:2},
    {num:43,subj:"행정법",text:"정책집행에서 상향적 접근방법에 관한 설명으로 옳지 않은 것은?",choices:["정책목표 보다는 집행문제의 해결에 초점을 맞춘다.","의도하지 않았던 정책의 효과를 분석할 수 있다.","정책집행과정에 대해 정확하게 이해하기 위해서 일선집행관료와 대상 집단의 행태를","선거직 공무원에 의한 정책결정과 책임이라는 민주주의의 기본가치를 충실하게 반영한다.","일선집행관료들이 쉽게 느끼지 못하는 사회적, 경제적, 법적 요인들이 경시되기 쉽다."],answer:3},
    {num:44,subj:"행정법",text:"공공선택이론에 관하여 설명한 것은?",choices:["행정현상을 자연ㆍ사회ㆍ문화적 환경과 관련시켜 이해하며 집합적 행위나 제도를 거시적","공공서비스의 효율적 공급을 위해 공공부문의 시장경제화를 추구하며 정치 및 행정","인간의 주관적 관념, 의식 및 동기의 의미를 이해하는 데에 초점을 맞추어 조직문제에","정책결정자가 대 안들 의 표면 화 된 가치를 비교할 수 없어 선 택 이 어려운 상 황 에서","공공서비스 전달 및 공공문제 해결과정에서 정부와 민간부문 간의 협력적 네트워크를"],answer:1},
    {num:45,subj:"행정법",text:"사회적 자본(Soc i al C a p it al)에 관한 설명으로 옳은 것은?",choices:["귤릭(L. Gulick), 어윅(L. Urwick), 페이욜(H. Fayol) 등이 주장하였다.","가치중립적이며 과학적인 탐구를 강조한다.","경제대공황(Great Depression)을 극복하기 위한 방법론을 제시하였다.","사회구성원들 간의 신뢰와 협력을 중시한다.","신행정학의 이론 형성에 영향을 끼쳤다."],answer:3},
    {num:47,subj:"행정법",text:"국가공무원법상에 규정된 직위해제 사유에 해당되지 않는 자는?",choices:["직무수행 능력이 부족한 자","휴직 사유가 소멸된 후에도 직무에 복귀하지 않은 자","근무성적이 극히 나쁜 자","파면ㆍ해임에 해당하는 징계의결이 요구 중인 자","정직에 해당하는 징계의결이 요구 중인 자"],answer:1},
    {num:50,subj:"행정법",text:"품목 별예 산 제도에 관한 설명으로 옳지 않은 것은?",choices:["예산의 유용이나 남용을 방지하는 데 도움이 된다.","투입지향적 예산제도이다.","정부사업의 우선순위 파악이 용이하다.","기획지향적이라기 보다는 통제지향적이다.","의회의 예산심의가 용이하다."],answer:2},
    {num:51,subj:"행정학개론",text:"국가 재 정법상 기금에 관한 설명으로 옳지 않은 것은?",choices:["기금관리주체는 지출계획의 주요항목 지출금액의 범위 안에서 대통령령이 정하는 바에","정부는 주요항목 단위로 마련된 기금운용계획안을 회계연도 개시 90일 전까지 국회에","국회는 정부가 제출한 기금운용계획안의 주요항목 지출금액을 증액하거나 새로운 과목을","정부는 기금이 여성과 남성에 미칠 영향을 미리 분석한 보고서를 작성하여야 한다.","국가가 특정한 목적을 위하여 특정한 자금을 신축적으로 운용할 필요가 있을 때에"],answer:1},
    {num:53,subj:"행정학개론",text:"미   국의 행정개 혁 과 관련하여 (              ) 안에 들 어 갈 것으로 알 맞 은 것은? (      )에서 제안한 정부 재창 조의 기본원칙은 관 료 적 문서주의(red t a p e) 제거, 고 객 우선주의, 성과 산출 을 위한 권한 위임, 기본 원칙으로의 복 귀 등이다.",choices:["시장성 테스트(Market Testing)","넥스트 스텝(Next Steps)","국정성과팀(National Performance Review)","클리블랜드위원회(Cleveland Committee)","브라운로위원회(Brownlow Commission)"],answer:2},
    {num:54,subj:"행정학개론",text:"매트 릭스 조직에 관한 설명으로 옳지 않은 것은?",choices:["인력 활용의 측면에서 비용 부담이 크다.","신축성과 적응성이 요구되는 불안정하고 급변하는 조직 환경에 효과적인 조직이다.","각 분야의 전문가들 간 수평적 의사소통을 통해 다양한 아이디어가 제시된다.","매트릭스 조직의 사례로 대규모 기업의 사업부제 시스템 등을 들 수 있다.","기능구조와 사업구조의 결합을 시도하는 조직이며, 행렬조직이라고도 한다."],answer:0},
    {num:55,subj:"행정학개론",text:"정치행정일원론에 관한 설명으로 옳지 않은 것은?",choices:["경제대공황(Great Depression), 뉴딜정책 이후 정부의 적극적 역할이 강조된 시기에","행정에 있어서 정책수립이라는 정치적ㆍ가치배분적 기능이 중요시 된다.","정치와 행정은 불가분의 관계에 있으므로 둘은 상호배타적이라기보다 서로 협조적","디목(M. E. Dimock), 애플비(P. H. Appleby) 등에 의해 주장되었다.","행정에 있어서 절약과 능률을 최고 가치로 추구한다."],answer:4},
    {num:56,subj:"행정학개론",text:"현행 우리나라 지방자치법상 지방의회의 권한에 관한 내용으로 옳지 않은 것은?",choices:["지방의회는 재적의원 3분의 2 이상의 출석과 출석의원 3분의 2 이상의 찬성으로 그 자치","지방의회는 조례의 제정ㆍ개정 및 폐지, 기금의 설치ㆍ운용, 청원의 수리와 처리 등에","지방의회는 매년 1회 그 지방자치단체의 사무에 대하여 시ㆍ도에서는 14일의 범위에서,","본회의나 위원회는 그 의결로 안건의 심의와 직접 관련된 서류의 제출을 해당 지방","지방자치단체의 장이나 관계 공무원은 지방의회나 그 위원회가 행정사무처리상황의 보고를"],answer:0},
    {num:59,subj:"행정학개론",text:"변혁 적 리 더십 ( T rans f orma ti onal L eaders hip )에 관한 설명으로 옳지 않은 것은?",choices:["변화를 지향하고 체제 개방적이다.","영감과 비전 제시, 공유에 의한 동기유발을 중시한다.","지도자와 부하들 간의 합리적ㆍ타산적 교환관계를 중시한다.","기계적 관료제 구조보다는 임시체제에 더 적합하다.","리더의 카리스마, 구성원에 대한 지적 자극, 인간적인 관계 등이 어우러져 나타난다."],answer:2},
    {num:60,subj:"행정학개론",text:"국고보조금에 관한 설명으로 옳지 않은 것은?",choices:["지방자치단체의 자율성을 약화시킨다.","용도가 정해져 있지 않은 일반재원이다.","중앙정부와 지방정부 간의 수직적 재정 조정제도이다.","중앙정부가 재정여건, 정책목표 등을 고려하여 지원여부를 결정한다.","국가 시책을 장려하기 위하여 지원하는 경우도 있다."],answer:1},

  "2016": [
    {num:1,subj:"민법",text:"성년후견, 한정후견, 특정후견에 관한 설명으로 옳지 않은 것은?",choices:["가정법원은 한정후견개시의 심판을 직권으로 하지 못한다.","한정후견종료의 심판은 장래에 향하여 효력을 가진다.","특정후견은 본인의 의사에 반하여 할 수 있다.","가정법원은 취소할 수 없는 피성년후견인의 법률행위의 범위를 정할 수 있다.","정신적 제약으로 사무를 처리할 능력이 지속적으로 결여된 사람에 대하여 지방자치단체"],answer:3},
    {num:3,subj:"민법",text:"권리능력에 관한 설명으로 옳은 것은?",choices:["2인 이상이 동일한 위난으로 사망한 경우 동시에 사망한 것으로 본다.","태아는 모든 법률관계에서 권리의 주체가 될 수 있다.","의사능력이 없는 자는 권리능력도 인정되지 않는다.","외국인은 대한민국의 도선사(導船士)가 될 수 있다.","우리 민법은 외국인의 권리능력에 관하여 명문규정을 두고 있지 않다."],answer:2},
    {num:4,subj:"민법",text:"민법상 법인에 관한 설명으로 옳은 것은?",choices:["사교 등 비영리를 목적으로 하는 사단은 주무관청의 허가없이 신고만으로 법인을 설립","이사가 없는 경우에 이로 인하여 손해가 생길 염려 있는 경우, 법원은 이해관계인의 청","법인이 주사무소소재지를 관할하는 등기소의 관할구역외로 주사무소를 이전하는 경우,","이사의 대표권에 대한 제한은 이를 정관에 기재하지 아니하여도 그 효력이 있다.","법인은 정관 또는 총회의 결의로 감사를 두어야 한다."],answer:1},
    {num:5,subj:"민법",text:"부재와 실종에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["법원이 선임한 재산관리인은 관리할 재산목록을 작성하여야 한다.","특별실종의 경우 실종선고를 받은 자는 실종선고일부터 1년의 기간이 만료한 때에 사망","실종자의 범죄 또는 실종자에 대한 범죄의 성부 등은 실종선고와 관계없이 결정된다.","실종선고가 확정되면 선고 자체가 취소되지 않는 한 실종자의 생존 기타 반증을 들어","부재자가 스스로 재산관리인을 둔 경우 그 재산관리인은 부재자의 임의대리인이다."],answer:3},
    {num:6,subj:"민법",text:"민법상 법인의 권리능력과 불법행위능력에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["법인은 법률의 규정에 좇아 정관으로 정한 목적의 범위내에서 권리와 의무의 주체가 된다.","법인의 피용자가 사무집행에 관하여 불법행위를 한 경우, 법인은 민법 제756조의 책임을","법인의 목적범위외의 행위로 인하여 타인에게 손해를 가한 때에는 그 사항의 의결에 찬","법인의 대표자의 행위가 직무에 관한 행위에 해당하지 아니함을 피해자가 중대한 과실","민법 제35조제1항의 법인의 대표자에는 그 명칭이나 직위 여하 또는 대표자로 등기되었"],answer:2},
    {num:7,subj:"민법",text:"의사표시에 관한 설명으로 옳은 것은?",choices:["의사표시자가 그 통지를 발송한 후 사망하여도 의사표시의 효력에 영향을 미치지 아니한다.","진의 아닌 의사표시에서 상대방이 표의자의 진의아님을 알았거나 알 수 있었을 경우,","표의자가 과실로 상대방의 소재를 알지 못하는 경우, 의사표시는 민사소송법 공시송달의","상대방이 있는 의사표시는 상대방이 요지(了知)한 때에 그 효력이 생긴다.","상대방있는 의사표시에 관하여 제3자가 강박을 행한 경우, 상대방이 그 사실을 알았던"],answer:0},
    {num:8,subj:"민법",text:"법인의 정관에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["법인의 존립시기나 해산사유는 재단법인 정관의 필요적 기재사항이다.","사단법인의 정관의 변경은 주무관청의 허가를 얻지 아니하면 그 효력이 없다.","재단법인의 설립자가 그 명칭, 사무소소재지 또는 이사임면의 방법을 정하지 아니하고","사단법인의 정관은 정수에 관하여 정관에 다른 규정이 없는 한 총사원 3분의 2 이상의","재단법인의 목적을 달성할 수 없는 때에는 설립자나 이사는 주무관청의 허가를 얻어 설"],answer:4},
    {num:9,subj:"민법",text:"반사회질서의 법률행위에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["어느 법률행위가 선량한 풍속 기타 사회질서에 위반되어 무효인지의 여부는 법률행위시","금전소비대차시 당사자 사이의 경제력 차이로 인하여 사회통념상 허용되는 한도를 초과","부첩관계를 해소하면서 첩의 희생을 위자하고 첩의 장래 생활대책을 마련해 준다는","의무의 강제에 의하여 얻어지는 채권자의 이익에 비하여 약정된 위약벌이 과도하게 무","강제집행을 면할 목적으로 부동산에 허위의 근저당권설정등기를 경료하는 행위는 반사"],answer:0},
    {num:10,subj:"민법",text:"표현대리와 협의의 무권대리에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례 에 따름)",choices:["유권대리에 관한 주장 속에는 표현대리의 주장이 당연히 포함되어 있다고 볼 수는 없다.","처음부터 어떠한 대리권도 없었던 자에 대하여 대리권 소멸 후의 표현대리는 성립할 수","증권회사로부터 위임받은 고객의 유치, 투자상담 및 권유, 위탁매매약정실적의 제고 등의","협의의 무권대리인이 타인의 대리인으로 한 계약은 본인이 이를 추인하지 아니하면 본","협의의 무권대리행위의 상대방은 계약 당시 무권대리행위임을 안 때에는 본인이나 그"],answer:1},
    {num:11,subj:"민법",text:"통정허위표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["통정허위표시는 무효이나, 그 무효로써 선의의 제3자에게 대항하지 못한다.","선의의 제3자가 되기 위해서는 선의임에 과실이 없어야 한다.","제3자는 특별한 사정이 없는 한 선의로 추정할 것이므로, 제3자가 악의라는 사실에 관한","통정허위표시에 의한 매매의 매수인으로부터 매수목적물에 대하여 선의로 저당권을 설","통정허위표시로 설정된 전세권에 대하여 선의로 저당권을 취득한 자는 선의의 제3자에"],answer:4},
    {num:12,subj:"민법",text:"대리에 관한 설명으로 옳은 것은?",choices:["복대리인은 그 권한 내에서 대리인을 대리한다.","임의대리인의 대리권의 범위를 정하지 아니한 경우, 대리인은 보존행위 뿐만 아니라 처","대리인은 본인의 허락이 있어도 부동산 매매에 관하여 자기계약을 체결하지 못한다.","임의대리에서 본인은 원인된 법률관계가 존속하고 있으면, 수권행위를 철회하여 임의대","복대리인은 본인이나 제3자에 대하여 대리인과 동일한 권리의무가 있다."],answer:2},
    {num:13,subj:"민법",text:"물건에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["민법상 전기(電氣)는 물건이다.","주물이 압류된 경우 압류의 효력은 종물에도 미친다.","종물은 주물의 처분에 따른다는 민법 제100조제2항의 규정은 권리 상호간에 적용될 수 없다.","주물을 처분할 때 특약으로 종물을 제외할 수 있고 종물만을 별도로 처분할 수도 있다.","법정과실은 수취할 권리의 존속기간일수의 비율로 취득하고, 천연과실은 그 원물로부터"],answer:3},
    {num:14,subj:"민법",text:"甲의 아들인 성년자 乙이 아무런 권한없이 丙에게 甲의 대리인이라고 사칭하고, 甲 소유의 X아파트를 丙에게 매각하였다. 다음 설명 중 옳지 않은 것은? (다툼이 있으 면 판례에 따름)",choices:["乙이 丙에게 X아파트를 매각한 직후 甲이 X아파트를 丁에게 매각하고 소유권이전등기를 경료","甲은 丙에 대하여 적극적으로 추인의 의사가 없음을 표시하여 무권대리행위를 무효로","丙이 매매계약 당시 乙에게 대리권이 없음을 알지 못하였던 경우, 丙은 甲의 추인이 있기","丙은 상당한 기간을 정하여 甲에게 X아파트 매매계약의 추인여부의 확답을 최고할 수","乙이 자신의 대리권을 증명하지 못하고 甲의 추인을 받지 못한 경우, 乙은 과실이 없어도"],answer:4},
    {num:15,subj:"민법",text:"「국토의 계획 및 이용에 관한 법률」상의 토지거래허가구역 내의 토지를 매매한 경 우에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["토지매매계약은 관할관청의 허가를 받아야만 그 효력이 발생하고 그 허가를 받기 전에는","처음부터 토지거래허가를 배제하거나 잠탈하는 내용의 계약일 경우에는 확정적으로 무","당사자들이 계약상 대금지급의무를 소유권이전등기의무에 선행하여 이행하기로 약정하","매도인의 토지거래허가 신청절차 협력의무와 매수인의 매매대금지급의무가 동시이행의","계약의 쌍방 당사자는 공동허가신청절차에 협력할 의무가 있지만, 이러한 의무에 일방이"],answer:2},
    {num:16,subj:"민법",text:"민법상 기간에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["월로 정한 기간의 기산일이 공휴일인 경우에는 그 다음 날부터 기산한다.","기한을 일, 주, 월 또는 연으로 정한 때에 기간의 초일을 산입하지 아니하는 것은 강행규","2016. 4. 30. 10시부터 2개월인 경우 2016. 6. 30. 10시로 기간이 만료한다.","사단법인의 사원총회일이 2016. 7. 19. 10시인 경우 늦어도 7. 12. 24시까지 사원에게 총","1997. 6. 1. 07시에 출생한 사람은 2016. 6. 1. 0시부터 성년자가 된다."],answer:1},
    {num:17,subj:"민법",text:"법률행위의 무효와 취소에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["무효인 법률행위의 추인은 명시적으로 하여야 하고 묵시적으로는 할 수 없다.","법률행위가 취소되면 처음부터 무효인 것으로 되지만, 제한능력자는 그 행위로 인하여","착오에 의한 의사표시를 한 자가 사망한 경우, 그 상속인은 피상속인의 착오를 이유로","취소권은 추인할 수 있는 날로부터 10년내에 행사하면 된다.","법률행위의 일부분이 무효인 경우, 그 무효부분이 없더라도 법률행위를 하였을 것이라고"],answer:3},
    {num:18,subj:"민법",text:"법률행위의 조건과 기한에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["조건성취로 불이익을 받을 자가 고의가 아닌 과실로 신의성실에 반하여 조건의 성취를","정지조건이 성취되면 법률효과는 그 성취된 때로부터 발생하며, 당사자의 의사로 이를","조건이 선량한 풍속 기타 사회질서에 위반한 것인 때에는 그 조건은 무효로 되지만 그","“3년 안에 甲이 사망하면 현재 甲이 사용 중인 乙소유의 자전거를 乙이 丙에게 증여한","조건의 성취가 미정한 권리는 일반규정에 의하여 처분할 수 없다."],answer:4},
    {num:20,subj:"민법",text:"소멸시효에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["물상보증인이 채권자를 상대로 채무자의 채무가 모두 소멸하였다고 주장하면서 근저당","비법인사단이 총유물을 매도한 후 그 대표자가 매수인에게 소유권이전등기의무에 대하","채권자가 물상보증인의 소유인 부동산에 경료된 근저당권을 실행하기 위하여 경매를 신","담보가등기가 경료된 부동산을 양수하여 소유권이전등기를 마친 자는 그 가등기담보권","대여금 채권의 소멸시효가 진행하는 중 채권자가 채무자 소유의 부동산에 가압류집행을"],answer:1},
    {num:21,subj:"민법",text:"사인(私人)의 공법행위로서 신고에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["법령상 신고사항이 아닌 신고를 수리한 경우, 그 수리는 항고소송의 대상이 되지 않는다.","행정청은 필요한 구비서류가 첨부되어 있지 않은 신고서가 제출된 경우에는 지체 없이","법상 금지되어 있는 행위를 해제시키는 기능을 갖는 신고의 경우 그 신고 없이 한 행위","건축법에 따른 착공신고가 반려되었음에도 당해 건축물의 착공을 개시하면 시정명령, 이","적법한 요건을 갖추어 당구장업 영업신고를 한 경우 행정청이 그 신고에 대한 수리를"],answer:2},
    {num:22,subj:"민법",text:"행정법의 법원(法源)에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정법의 일반원칙은 법원의 성격을 갖는다.","행정법에는 헌법, 민법, 형법과 같은 단일 법전(法典)이 없다.","위법한 행정처분이라 하더라도 수차례에 걸쳐 반복적으로 행해져 행정관행이 되었다면","대법원의 판례가 법률해석의 일반적인 기준을 제시하였어도 사안이 서로 다른 사건을","‘남북 사이의 화해와 불가침 및 교류협력에 관한 합의서’는 국가 간 맺은 조약이 아니므"],answer:3},
    {num:24,subj:"민법",text:"행정입법에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["법률의 위임에 의해 효력을 갖게 된 법규명령이 법률의 개정으로 위임의 근거가 없어지","감사원규칙은 총리령ㆍ부령과 마찬가지로 헌법에 명시적 근거가 있으므로 법규명령으로","고시는 그 내용에 따라 법규명령 또는 행정규칙에 해당할 수도 있고 행정처분에 해당할 수도 있다.","명령ㆍ규칙이 헌법에 위반되는 여부가 재판의 전제가 된 경우에 대법원은 이를 최종적","조례에 대한 법률의 위임은 반드시 구체적으로 범위를 정해서만 할 수 있으며 포괄적"],answer:2},
    {num:25,subj:"민법",text:"판례에 의할 때, 선행처분에 취소사유가 있음을 들어 후행처분의 위법을 주장할 수 없는 경우는? 선행처분                   후행처분",choices:["사업인정처분          수용재결처분","대집행 계고처분        대집행영장발부통보처분","대집행 계고처분        대집행비용납부명령처분","안경사시험합격무효처분     안경사면허취소처분","친일반민족행위자 결정처분   독립유공자 예우에 관한 법률 적용배제자 결정처분"],answer:1},
    {num:28,subj:"행정법",text:"이행강제금에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["이행강제금은 그에 관한 법적 근거가 없더라도 부과할 수 있다.","이행강제금에 관한 일반법으로는 건축법이 있다.","건축법상 이행강제금은 반복하여 부과할 수 없다.","이행강제금과 행정벌의 병과는 허용된다.","이행강제금은 대체적 작위의무 위반에 대해서는 부과될 수 없다."],answer:0},
    {num:29,subj:"행정법",text:"행정절차에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정청이 처분을 할 때에는 신청 내용을 모두 그대로 인정하는 경우에도 당사자에게 그","행정청은 해당 처분의 성질상 의견청취가 현저히 곤란하거나 명백히 불필요하다고 인정","국가공무원법상 직위해제처분의 경우에는 처분의 사전통지 및 의견청취 등에 관한 행정","법령상 청문이 요구되는 경우에, 행정처분의 상대방이 청문일시에 불출석하였다는 이유","행정청이 처분을 할 때에는 원칙적으로 문서로 해야 하지만, 신속히 처리할 필요가 있거"],answer:4},
    {num:30,subj:"행정법",text:"공공기관의 정보공개에 관한 법령상 정보공개에 관한 설명으로 옳지 않은 것은? (다 툼이 있으면 판례에 따름)",choices:["사립대학교도 정보공개 의무기관인 공공기관에 해당된다.","모든 국민은 정보의 공개를 청구할 권리를 가진다.","정보공개청구권자에 해당하는 국민에는 자연인은 물론 법인, 권리능력 없는 사단이나 재","정보공개청구는 정보공개청구서를 제출하는 것 외에 말로써도 할 수 있다.","정보공개청구자는 공개를 구하는 정보를 공공기관이 보유ㆍ관리하고 있을 가능성이 전"],answer:3},
    {num:31,subj:"행정법",text:"행정심판에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정심판에서는 사정재결이 인정되고 있지 않다.","행정소송법에는 의무이행소송이 규정되어 있지 않은 반면, 행정심판법에는 의무이행심판","서울특별시장과 서울특별시의회의 처분 또는 부작위에 대한 심판청구는 중앙행정심판위","‘새로운 처분의 처분사유’와 ‘종전 처분에 관하여 위법한 것으로 재결에서 판단된 사유’가","심판청구에 대한 재결이 있으면 그 재결 및 같은 처분 또는 부작위에 대하여 다시 행정"],answer:3},
    {num:32,subj:"행정법",text:"질서위반행위규제법상 과태료에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["과태료 부과에 대해서는 항고소송으로 다툴 수 있다.","과태료는 행정벌에 해당하므로 이에는 소멸시효가 인정되지 않는다.","하나의 행위가 둘 이상의 질서위반행위에 해당하는 경우에는 각 질서위반행위에 대하여","과태료의 부과대상인 질서위반행위에 대해 책임주의 원칙이 적용되고 있다.","과태료의 부과ㆍ징수 등의 절차에 관해 질서위반행위규제법과 저촉되는 다른 법률의 규"],answer:4},
    {num:33,subj:"행정법",text:"행정구제제도에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["행정심판을 권리구제를 위한 필요적 전심절차로 규정하면서도 그 절차에 사법절차를 준","행정처분에 대해 행정소송으로는 위법성 통제만 가능한 데 반하여, 행정심판으로는 위법","처분의 효과가 기간의 경과로 인하여 소멸된 뒤에도 그 처분의 취소로 인하여 회복되는","행정소송법상의 당사자소송에는 민사집행법상의 가처분에 관한 규정이 준용된다.","행정소송법은 행정소송에 대한 각급 판결에 의하여 명령ㆍ규칙이 헌법 또는 법률에 위"],answer:0},
    {num:34,subj:"행정법",text:"공무원의 신분관계에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)",choices:["국가공무원법상 임용결격사유는 모두 당연퇴직사유에 해당된다.","지방공무원법상 정규공무원 임용행위와 시보임용행위는 별도의 임용행위이므로 그 요건","직위해제처분이 있은 후 동일한 사유에 대해 다시 해임처분이 있다면 일사부재리의 법","징계의 종류로서 파면과 해임은 둘 다 공무원 신분을 박탈시키며 공직취임 제한기간이","공무원 임용결격사유가 있는지의 여부는 임용당시가 아니라 채용후보자 명부에 등록한"],answer:1},
    {num:35,subj:"행정법",text:"판례에 의할 때 당사자소송으로 다툴 수 없는 것은?",choices:["국가에 대한 납세의무자의 부가가치세 환급세액 지급청구소송","도시 및 주거환경정비법상 관리처분계획에 대한 행정청의 인가ㆍ고시 후 관리처분계획","지방자치단체가 보조금 지급결정을 하면서 일정 기한 내에 보조금을 반환하도록 하는","공익사업을 위한 토지 등의 취득 및 보상에 관한 법률상의 보상금증액청구소송과 보상","공익사업을 위한 토지 등의 취득 및 보상에 관한 법률상 세입자의 주거이전비 보상청구소송"],answer:4},
    {num:36,subj:"행정법",text:"정부조직법상 행정청의 조직과 권한에 관한 설명으로 옳지 않은 것은?",choices:["행정기관은 법령으로 정하는 바에 따라 그 소관사무의 일부를 보조기관 또는 하급행정","상급행정기관으로부터 사무를 위임받은 하급행정기관은 특히 필요한 경우 법령으로 정","행정기관은 법령으로 정하는 바에 따라 그 소관사무 중 조사ㆍ검사ㆍ검정ㆍ관리 업무","부ㆍ처의 장은 그 소관사무의 효율적 추진을 위하여 필요한 경우에는 국무총리에게 소","행정기관 또는 소속기관을 설치하거나 공무원의 정원을 증원할 때에는 반드시 예산상의"],answer:1},
    {num:38,subj:"행정법",text:"부동산 가격공시 및 감정평가에 관한 법률상 공시지가에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)",choices:["개별공시지가는 개발이익환수에 관한 법률에 의한 개발부담금의 부과 그 밖의 다른 법","개별공시지가에 이의가 있는 자는 개별공시지가의 결정ㆍ공시일부터 30일 이내에 서면","표준지공시지가는 토지수용에 대한 보상금 산정의 기준이 된다.","표준지공시지가의 결정은 항고소송의 대상인 처분으로 볼 수 없다.","표준지공시지가에 이의가 있는 자는 표준지공시지가의 공시일부터 30일 이내에 서면으"],answer:3},
    {num:39,subj:"행정법",text:"경찰관 직무집행법의 내용으로 옳지 않은 것은?",choices:["경찰장구란 경찰관이 휴대하여 범인 검거와 범죄 진압 등의 직무 수행에 사용하는 수갑,","경찰관이 보호조치를 하는 경우에 구호대상자가 휴대하고 있는 무기 등 위험을 일으킬","경찰관이 불심검문 과정에서 경찰서에 동행할 것을 요구한 경우, 동행을 요구받은 사람","경찰관은 불심검문과 관련하여 동행요구에 응해 경찰서로 동행한 사람을 6시간을 초과","경찰관의 적법한 직무집행으로 인하여 손실을 입은 경우에 대한 보상은 경찰관 직무집"],answer:2},
    {num:47,subj:"행정법",text:"우리나라 주민소환제에 관한 설명으로 옳은 것은?",choices:["주민이 지방정부의 정책결정이나 행정과정에 직접 참여하여 지역의 주요 현안을 함께","주민소환투표결과의 확정은 주민소환투표권자 총수의 과반수 투표와 유효투표 총수 과반","비례대표선거구 의원을 포함한 지방의회의원과 지방자치단체의 장이 그 대상이 된다.","위법ㆍ부당행위, 정치적 무능력, 직무유기, 독단적인 행정운영 등 지방자치제의 폐단을","주민에게 손해를 입힌 경우, 관련 감사기관에 감사를 청구하여 그 시정을 요구하는 제도이다."],answer:0},
    {num:48,subj:"행정법",text:"과학적 관리론과 인간관계론에 관한 설명으로 옳지 않은 것은?",choices:["과학적 관리론은 비공식적 집단의 역할을 강조하지만, 인간관계론은 공식적 조직의 역할","메이요(Mayo)의 호손(Hawthorne) 실험은 인간관계론의 형성에 영향을 주었다.","인간관계론은 작업환경이나 물리적 조건보다 조직구성원들의 사회심리적 요인을 중시한다.","과학적 관리론과 인간관계론은 생산성 향상을 추구한다는 점에서 유사하다.","과학적 관리론은 과업목표의 달성을 위해 체계적인 관리와 통제를 중시하는 관료제 조"],answer:2},
    {num:49,subj:"행정법",text:"공무원의 강등과 강임에 관한 설명으로 옳은 것은?",choices:["강등은 직위가 폐직되거나 하위의 직위로 변경되어 과원이 된 경우에 이루어진다.","강임은 결원을 보충하는 방법의 하나이다.","강등된 공무원은 상위 직급에 결원이 생기면 우선승진의 대상이 된다.","공무원 본인이 동의하지 않으면 강등할 수 없다.","징계의 수단으로 강임이 제도적으로 인정되고 있다."],answer:1},
    {num:50,subj:"행정법",text:"우리나라 예산심의에 관한 설명으로 옳지 않은 것은?",choices:["국회는 국가의 예산안을 심의ㆍ확정한다.","국회는 정부예산에 대한 통제권을 가지므로 정부의 동의없이 지출예산 각항의 금액을","국회는 회계연도 개시 30일전까지 예산안을 의결하여야 한다.","국회는 정부의 동의없이 새로운 비목을 설치할 수 없다.","국회에 제출된 예산안은 소관상임위원회의 예비심사를 거친다."],answer:1},
    {num:52,subj:"행정학개론",text:"행정학의 주요이론과 접근방법에 관한 설명으로 옳은 것은?",choices:["생태론적 접근방법은 행정의 가치지향성과 기술성을 중시하며, 시장원리에 입각한 공공","행태론적 접근방법은 행정현상을 자연ㆍ사회ㆍ문화적 환경과 관련시켜 설명한다.","신행정론은 고객 중심의 행정, 사회적 형평성 등을 강조한다.","체제론적 접근방법은 행정과 환경의 상호작용을 중시하고, 선진국보다 개발도상국의 행","신공공관리론은 상호 신뢰에 기반한 조정과 협조를 강조하지만, 뉴거버넌스론(New"],answer:4},
    {num:53,subj:"행정학개론",text:"우리나라 지방재정조정제도에 관한 설명으로 옳지 않은 것은?",choices:["지역 간 재정적 불균형을 시정하는 기능을 한다.","거주지역에 관계없이 국민에게 보장해야 하는 최소한의 공공서비스를 제공하기 위한 재","국가적으로 추진하는 사업을 장려하거나 촉진하는 기능을 수행한다.","긍정적 외부효과가 큰 지방공공재의 공급을 지원하는 기능이 있다.","지방행정 수행에 필요한 재정수요를 충족시켜 지방재정자립도 향상에 기여한다."],answer:4},
    {num:56,subj:"행정학개론",text:"조직구조의 기본변수 중 공식화(formalization)에 관한 설명으로 옳지 않은 것은?",choices:["공식화는 조직 내에 규칙, 절차, 지시 및 의사전달이 명문화된 정도를 의미한다.","공식화 수준이 높은 경우, 조직구성원들의 행동이 정형화되어 그들에 대한 통제가 어려","공식화를 통해 업무처리상 혼란을 방지할 수 있다.","조직환경이 안정적이고 조직규모가 클수록 공식화 수준이 높다.","공식화 수준이 너무 높으면, 업무처리에 있어서 조직구성원의 자율성과 창의성이 저해되"],answer:3},
    {num:57,subj:"행정학개론",text:"정치행정일원론과 정치행정이원론에 관한 설명으로 옳은 것은?",choices:["정치행정이원론은 행정의 정치적 기능을 강조한다.","과학적 관리론은 정치행정일원론의 발전에 기여하였다.","정치행정일원론은 정치와 행정을 엄격히 구분한다.","정치행정이원론은 엽관주의의 폐해를 극복하기 위하여 대두되었다.","윌슨(Wilson)은 정치행정일원론의 입장을 견지하였다."],answer:0},
    {num:58,subj:"행정학개론",text:"정부3.0에 관한 설명으로 옳지 않은 것은?",choices:["2010년 이명박 정부에서 처음 실시되었다.","정부와 국민 간의 양방향 소통을 중시하며, 국민에게 맞춤형 서비스 제공을 목적으로 한다.","인터넷, 스마트기기, 빅데이터 등 정보통신기술을 적극 활용한다.","투명한 정부, 유능한 정부, 서비스 정부를 목표로 한다.","개방, 공유, 소통, 협력을 핵심가치로 한다."],answer:0},
    {num:59,subj:"행정학개론",text:"점증주의 정책결정모형에 관한 설명으로 옳지 않은 것은?",choices:["정치적 다원주의 입장에서 이해관계자들의 타협과 조정을 통해 정책결정이 이루어진다.","경제적 합리성보다 정치적 합리성을 중요시한다.","계속적ㆍ점진적인 방식으로 당면한 정책문제를 해결하고자 한다.","정책의 정치적 실현가능성을 높여주는 장점이 있다.","정책결정자의 직관이나 판단력, 창의력 등 초합리적인 요소를 중시하는 규범적ㆍ처방적"],answer:3},
    {num:60,subj:"행정학개론",text:"우리나라 지방자치제의 특징이나 내용에 관한 설명으로 옳은 것은?",choices:["시ㆍ군 및 자치구의 장이 법령의 규정에 따라 그 의무에 속하는 국가위임사무의 관리와","시ㆍ군 및 자치구의 사무에 관한 그 장의 명령이나 처분이 법령에 위반되거나 현저히","시ㆍ군 및 자치구에 대하여 지방의회의 의결이 법령에 위반되거나 공익을 현저히 해친","지방자치단체의 기관구성은 기본적으로 기관대립형을 채택하고 있다.","기관위임사무는 주로 전국적 이해관계보다 지방적 이해관계가 큰 사무들이 그 대상이"],answer:4},
